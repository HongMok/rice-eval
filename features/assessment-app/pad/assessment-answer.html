<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评估答题 - 康复师App PAD端</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* 顶部栏 */
.topbar { height: 56px; background: var(--app-card); border-bottom: 1px solid var(--app-border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
.topbar .back { font-size: 16px; cursor: pointer; margin-right: 12px; color: var(--app-text); text-decoration: none; }
.topbar .title { font-size: 16px; font-weight: 600; width: 200px; flex-shrink: 0; }
.topbar .progress-area { display: flex; align-items: center; gap: 12px; flex: 1; }
.progress-label { font-size: 13px; font-weight: 500; color: var(--app-text-sec); white-space: nowrap; flex-shrink: 0; }
.progress-info { display: flex; align-items: center; gap: 12px; }
.progress-title { font-size: 14px; font-weight: 600; color: var(--app-primary); white-space: nowrap; }
.progress-title.completed { color: #52C41A; }
.progress-hint { font-size: 11px; color: #B0B8C8; white-space: nowrap; }
.progress-hint.completed { color: #52C41A; }
.progress-track { width: 100%; height: 6px; background: #E8ECF0; border-radius: 9999px; overflow: hidden; flex-shrink: 1; min-width: 100px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--app-primary), #60B8FF); border-radius: 9999px; transition: width .3s; }

/* 主体 */
.main-body { flex: 1; display: flex; overflow: hidden; }

/* 左侧导航树 */
.nav-tree { width: 240px; background: var(--app-card); border-right: 1px solid var(--app-border); overflow-y: auto; flex-shrink: 0; padding: 12px 0; }
.tree-group { margin-bottom: 4px; }
.tree-group-title { display: flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 14px; font-weight: 600; color: var(--app-text); cursor: pointer; user-select: none; }
.tree-group-title:hover { background: #F5F7FA; }
.tree-group-title .arrow { font-size: 10px; transition: transform .2s; display: inline-block; }
.tree-group-title.collapsed .arrow { transform: rotate(-90deg); }
.tree-children { }
.tree-children.hidden { display: none; }
.tree-item { display: flex; align-items: center; gap: 6px; padding: 9px 16px 9px 28px; font-size: 14px; color: var(--app-text-nav); cursor: pointer; border-left: 3px solid transparent; line-height: 1.4; }
.tree-item:hover { background: #F5F7FA; }
.tree-item.active { background: var(--app-primary-light); color: var(--app-primary); border-left-color: var(--app-primary); font-weight: 500; }
.tree-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.tree-item .dot.empty { background: #D1D5DB; }
.tree-item .dot.partial { background: var(--app-warning); }
.tree-item .dot.full { background: var(--app-success); }
.tree-item .tree-name { flex: 1; min-width: 0; }
.tree-item .tree-progress { font-size: 12px; color: #B0B8C8; flex-shrink: 0; margin-left: 4px; }
.tree-item.active .tree-progress { color: var(--app-primary); opacity: 0.6; }

/* 右侧题目区域 */
.question-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.question-header { padding: 16px 20px 12px; background: var(--app-bg); display: flex; align-items: center; justify-content: space-between; }
.question-header .header-left { display: flex; align-items: center; gap: 8px; }
.question-header h2 { font-size: 16px; font-weight: 600; }
.domain-info-btn { background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.6; transition: opacity .15s; padding: 2px; }
.domain-info-btn:hover { opacity: 1; }
.question-header .pending-info { font-size: 13px; color: var(--app-warning); cursor: pointer; display: none; }

/* 卡片式题目列表 */
.question-cards-wrap { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
.q-card { background: var(--app-card); border-radius: var(--app-radius-xl); box-shadow: var(--app-shadow); padding: 16px 20px; margin-bottom: 12px; border-left: 3px solid transparent; transition: border-color .2s; }
.q-card.marked { border-left-color: var(--app-warning); }
.q-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.q-card-header .q-num { font-weight: 500; color: var(--app-text-sec); font-size: 12px; flex-shrink: 0; }
.q-card-header .q-title { font-size: 14px; font-weight: 600; color: var(--app-text); flex: 1; }
.q-card-header .q-material { font-size: 12px; color: #8C95A6; flex-shrink: 0; max-width: 240px; text-align: right; background: #F5F7FA; padding: 2px 8px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.q-card-desc { font-size: 14px; font-weight: 400; color: var(--app-text); line-height: 1.5; margin-top: 4px; margin-bottom: 8px; }
.q-card-age { display: inline-block; font-size: 12px; color: #8C95A6; background: #F5F7FA; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px; }
.q-card-scores { display: flex; gap: 0; margin-bottom: 4px; align-items: center; }
.q-card-scores .score-radio { min-width: 100px; height: 48px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(59,155,245,0.35); cursor: pointer; font-size: 15px; font-weight: 500; transition: all .15s; background: #fff; color: var(--app-primary); padding: 0 12px; white-space: nowrap; }
.q-card-scores .score-radio:first-child { border-radius: var(--app-radius-md) 0 0 var(--app-radius-md); }
.q-card-scores .score-radio:last-of-type { border-radius: 0 var(--app-radius-md) var(--app-radius-md) 0; }
.q-card-scores .score-radio:not(:first-child) { border-left: none; }
.q-card-scores .score-radio.selected { color: #fff; }
.q-card-scores .score-radio.selected + .score-radio { border-left: 1px solid rgba(59,155,245,0.35); }
.q-card-scores .mark-btn, .q-card-header .mark-btn { background: none; border: 1px solid #D1D5DB; border-radius: var(--app-radius-md); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #C4C9D4; transition: all .15s; padding: 0; }
.q-card-scores .mark-btn { margin-left: 8px; width: 48px; height: 48px; }
.q-card-header .mark-btn { width: 32px; height: 32px; }
.q-card-scores .mark-btn:hover:not(.no-hover), .q-card-header .mark-btn:hover:not(.no-hover) { color: var(--app-warning); border-color: var(--app-warning); }
.q-card-scores .mark-btn.marked, .q-card-header .mark-btn.marked { color: var(--app-warning); border-color: var(--app-warning); background: rgba(245,166,35,0.1); }
.q-card-scores .mark-btn.marked svg path, .q-card-header .mark-btn.marked svg path { fill: currentColor; }
.q-card-scores .mark-btn svg, .q-card-header .mark-btn svg { pointer-events: none; }
.q-card-score-desc { font-size: 12px; color: var(--app-text-sec); margin-top: 6px; line-height: 1.5; min-height: 18px; }

/* 设置按钮 */
.settings-btn { background: none; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--app-text-sec); margin-left: 12px; flex-shrink: 0; }
.settings-btn:hover { color: var(--app-primary); border-color: var(--app-primary); }

/* 设置浮窗 */
.settings-popover { position: fixed; top: 60px; right: 20px; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 16px; width: 280px; z-index: 200; display: none; }
.settings-popover.show { display: block; }
.settings-popover h4 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.settings-popover .mode-option { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--app-border); border-radius: 8px; cursor: pointer; margin-bottom: 8px; transition: all .15s; }
.settings-popover .mode-option:hover { border-color: var(--app-primary); }
.settings-popover .mode-option.active { border-color: var(--app-primary); background: #EBF5FF; }
.settings-popover .mode-option .mode-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--app-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.settings-popover .mode-option.active .mode-radio { border-color: var(--app-primary); }
.settings-popover .mode-option.active .mode-radio::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--app-primary); }
.settings-popover .mode-label { font-size: 13px; font-weight: 500; }
.settings-popover .mode-desc { font-size: 12px; color: var(--app-text-sec); margin-top: 2px; }

/* 回合统计区域 */
.rounds-area { background: #FAFBFC; border: 1px solid var(--app-border); border-radius: 10px; padding: 12px; margin-bottom: 4px; }
.rounds-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.rounds-header .rounds-title { font-size: 13px; font-weight: 600; color: var(--app-text); }
.rounds-header .rounds-hint { font-size: 11px; color: var(--app-text-sec); }
.round-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.round-row .round-label { font-size: 12px; font-weight: 600; color: var(--app-primary); min-width: 52px; }
.round-row .round-btn { flex: 1; height: 36px; border: 1px solid rgba(59,155,245,0.35); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; background: #fff; transition: all .15s; display: flex; align-items: center; justify-content: center; color: var(--app-primary); }
.round-row .round-btn:hover { opacity: 0.85; }
.round-row .round-btn.sel-independent { background: #52C41A; color: #fff; border-color: #52C41A; }
.round-row .round-btn.sel-error { background: #F56C6C; color: #fff; border-color: #F56C6C; }
.round-row .round-btn.sel-prompted { background: #F5A623; color: #fff; border-color: #F5A623; }
.rounds-add { width: 100%; height: 32px; border: 1px dashed var(--app-border); border-radius: 6px; background: none; cursor: pointer; font-size: 12px; color: var(--app-text-sec); margin-top: 6px; }
.rounds-add:hover { border-color: var(--app-primary); color: var(--app-primary); }
.rounds-result { font-size: 12px; color: var(--app-text-sec); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--app-border); }
.rounds-result .result-score { font-weight: 600; color: var(--app-primary); }

/* 备注区域 */
.q-card-note { margin-top: 4px; }
.note-toggle { font-size: 13px; color: #5A6478; cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px; }
.note-toggle:hover { color: var(--app-primary); }
.note-toggle.has-note { color: var(--app-primary); }
.note-toggle svg { pointer-events: none; }
.note-wrap { margin-top: 6px; position: relative; }
.note-input { width: 100%; height: 60px; padding: 8px 10px; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: 13px; font-family: var(--app-font); color: var(--app-text); resize: vertical; outline: none; transition: border-color .2s; font-style: normal; }
.note-input:focus { border-color: var(--app-primary); }
.note-input::placeholder { font-style: italic; color: #B0B8C8; }
.note-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.note-count { font-size: 11px; color: #B0B8C8; }
.note-save-btn { background: none; border: none; color: var(--app-primary); font-size: 13px; cursor: pointer; font-family: var(--app-font); padding: 2px 8px; }
.note-save-btn:hover { text-decoration: underline; }
.note-saved-tip { font-size: 12px; color: var(--app-success); margin-left: 8px; }

/* 底部操作栏 */
.bottom-bar { background: var(--app-card); border-top: 1px solid var(--app-border); padding: 12px 20px; display: flex; align-items: center; flex-shrink: 0; }
.bottom-left { display: flex; align-items: center; gap: 8px; min-width: 200px; }
.pending-count { font-size: 13px; color: var(--app-warning); }
.bottom-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
.bottom-right { min-width: 120px; display: flex; justify-content: flex-end; }
.btn-action { padding: 8px 0; border-radius: var(--app-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--app-font); transition: all .2s; width: 110px; text-align: center; }
.btn-action.danger-outline { background: #fff; color: var(--app-danger); border: 1px solid var(--app-danger); }
.btn-action.danger-outline:hover { background: #FEF2F2; }
.btn-action.success-outline { background: #fff; color: var(--app-success); border: 1px solid var(--app-success); }
.btn-action.success-outline:hover { background: #F0FFF4; }
.btn-action.primary-fill { background: var(--app-primary); color: #fff; border: 1px solid var(--app-primary); }
.btn-action.primary-fill:hover { background: var(--app-primary-hover); }
.btn-action.primary-outline { background: #fff; color: var(--app-primary); border: 1px solid var(--app-primary); }
.btn-action.primary-outline:hover { background: var(--app-primary-light); }
.btn-submit { padding: 10px 32px; border: none; border-radius: var(--app-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--app-font); transition: all .2s; }
.btn-submit.primary { background: var(--app-primary); color: #fff; }
.btn-submit.primary:hover { background: var(--app-primary-hover); }
.btn-submit.secondary { background: #fff; color: var(--app-text-sec); border: 1px solid var(--app-border); }
.btn-submit.secondary:hover { background: #F5F7FA; }

/* 弹窗 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: var(--app-radius-xl); padding: 24px; width: 480px; max-height: 80vh; display: flex; flex-direction: column; }
.modal h3 { font-size: 16px; margin-bottom: 12px; }
.modal p { font-size: 14px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button { padding: 8px 20px; border-radius: var(--app-radius-md); font-size: 14px; cursor: pointer; font-family: var(--app-font); }
.modal-btns .cancel { background: #fff; border: 1px solid var(--app-border); }
.modal-btns .confirm { background: var(--app-primary); color: #fff; border: none; }

/* 待定列表弹窗 */
.pending-list { max-height: 400px; overflow-y: auto; margin-bottom: 16px; flex: 1; }
.pending-group-title { font-weight: 600; margin: 8px 0 4px; font-size: 13px; color: var(--app-text); }
.pending-item { padding: 8px 0; border-bottom: 1px solid var(--app-border); font-size: 13px; cursor: pointer; color: var(--app-primary); }
.pending-item:hover { text-decoration: underline; }

/* 领域说明弹窗 */
.score-desc-list { max-height: 400px; overflow-y: auto; margin-bottom: 16px; }
.score-desc-item { padding: 10px 0; border-bottom: 1px solid var(--app-border); font-size: 14px; line-height: 1.6; }
.score-desc-item:last-child { border-bottom: none; }
.score-desc-value { font-weight: 600; color: var(--app-primary); margin-right: 4px; }
.score-desc-label { font-weight: 500; margin-right: 4px; }
.score-desc-text { color: var(--app-text-sec); }

/* 重置按钮（可拖拽） */
.reset-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 8px 14px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; z-index: 9999; opacity: 0.5; user-select: none; }
.reset-btn:hover { opacity: 1; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1A2233; color: #fff; padding: 10px 20px; border-radius: var(--app-radius-md); font-size: 13px; z-index: 10000; display: none; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
.modal-overlay#resetModal .modal { width: 360px; }
.modal-overlay#quickActionModal .modal { width: 400px; }

/* byOrder 合并卡片：领域评分行 */
.q-card-domain-row { margin-bottom: 6px; }
.q-card-domain-row:last-child { margin-bottom: 0; }
.q-card-domain-label { font-size: 12px; color: #8C95A6; margin-bottom: 4px; font-weight: 500; }
/* 领域锚点分隔线 */
.domain-anchor-divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 12px; }
.domain-anchor-divider:first-child { margin-top: 0; }
.domain-anchor-divider .divider-label { font-size: 13px; font-weight: 600; color: var(--app-primary); white-space: nowrap; flex-shrink: 0; }
.domain-anchor-divider .divider-line { flex: 1; height: 1px; background: var(--app-border); }

/* 信息盒子（描述+材料+年龄） */
.q-card-info-box { background: #EBF5FF; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
.q-card-info-box .info-desc { font-size: 14px; color: #1A2233; line-height: 1.5; }
.q-card-info-box .info-materials { font-size: 12px; color: #5A6478; margin-top: 4px; }
.q-card-info-box .info-materials .info-materials-label { color: #8C95A6; }
.q-card-info-box .info-age { display: inline-block; font-size: 12px; color: #3B9BF5; background: rgba(59,155,245,0.1); padding: 2px 8px; border-radius: 4px; margin-top: 6px; }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <span class="back" onclick="showExitModal()">←</span>
  <span class="title" id="headerTitle">评估</span>
  <div class="progress-area">
    <span class="progress-label">已完成</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-title" id="progressTitle">0/0</span>
    <span class="progress-hint" id="progressHint">（进度自动保存，中途退出不会丢失）</span>
    <button class="settings-btn" onclick="toggleSettings()" title="评分设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- 主体 -->
<div class="main-body">
  <!-- 左侧导航 -->
  <div class="nav-tree" id="navTree"></div>

  <!-- 右侧题目 -->
  <div class="question-area">
    <div class="question-header">
      <div class="header-left">
        <h2 id="domainTitle">加载中...</h2>
      </div>
      <span class="pending-info" id="pendingInfo" style="display:none"></span>
    </div>
    <div class="question-cards-wrap" id="questionCardsWrap"></div>
    <div class="bottom-bar" id="bottomBar"></div>
  </div>
</div>

<!-- 提交确认弹窗 -->
<div class="modal-overlay" id="submitModal">
  <div class="modal">
    <h3>确认提交</h3>
    <p id="submitMsg"></p>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal('submitModal')">取消</button>
      <button class="confirm" onclick="confirmSubmit()">确认提交</button>
    </div>
  </div>
</div>

<!-- 待定列表弹窗 -->
<div class="modal-overlay" id="pendingModal">
  <div class="modal">
    <h3>待定题目列表</h3>
    <div class="pending-list" id="pendingList"></div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal('pendingModal')">关闭</button>
    </div>
  </div>
</div>

<!-- 重置确认弹窗 -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>确认重置</h3>
    <p>确定要重置所有评估数据吗？此操作不可撤销。</p>
    <div class="modal-btns">

<div class="toast" id="toast"></div>
<button class="reset-btn" id="resetBtn" onmousedown="startDragReset(event)" onclick="resetAll()">🔄 一键重置</button>

<script>
/* ===== 拖拽重置按钮 ===== */
let resetDragging=false,resetOffsetX=0,resetOffsetY=0,resetMoved=false;
(function(){var p=JSON.parse(localStorage.getItem('rice_reset_btn_pos')||'null');if(p){var b=document.getElementById('resetBtn');b.style.left=p.left+'px';b.style.top=p.top+'px';b.style.right='auto';b.style.bottom='auto';}})();
function startDragReset(e){var b=document.getElementById('resetBtn');resetDragging=true;resetMoved=false;resetOffsetX=e.clientX-b.getBoundingClientRect().left;resetOffsetY=e.clientY-b.getBoundingClientRect().top;e.preventDefault();}
document.addEventListener('mousemove',function(e){if(!resetDragging)return;resetMoved=true;var b=document.getElementById('resetBtn');b.style.left=(e.clientX-resetOffsetX)+'px';b.style.top=(e.clientY-resetOffsetY)+'px';b.style.right='auto';b.style.bottom='auto';});
document.addEventListener('mouseup',function(){if(resetDragging&&resetMoved){var b=document.getElementById('resetBtn');localStorage.setItem('rice_reset_btn_pos',JSON.stringify({left:parseInt(b.style.left),top:parseInt(b.style.top)}));}resetDragging=false;});
document.getElementById('resetBtn').addEventListener('click',function(e){if(resetMoved){e.stopImmediatePropagation();resetMoved=false;}},true);

/* ========================================================
   answerConfig 驱动配置（内嵌，不 fetch）
   ======================================================== */
const ANSWER_CONFIGS = {
  pep3:   { listMode: "byDomain", cardFields: ["itemName", "desc", "materials"], showScoreDesc: false, navCollapsedByDefault: false, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: false },
  cpep:   { listMode: "byDomain", cardFields: ["itemName", "desc", "materials", "ageRange"], showScoreDesc: true, navCollapsedByDefault: true, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: false },
  vbmapp: { listMode: "byDomain", cardFields: ["itemName", "desc"], showScoreDesc: false, navCollapsedByDefault: false, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: false },
  common: { listMode: "byDomain", cardFields: ["itemName", "desc", "materials", "ageRange"], showScoreDesc: true, navCollapsedByDefault: false, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: true }
};

/* ===== URL 参数 & 工具信息 ===== */
const params = new URLSearchParams(location.search);
const toolId = params.get('tool') || localStorage.getItem('rice_assessment_current_tool') || 'pep3';
const recordId = params.get('record') || localStorage.getItem('rice_assessment_current_record') || '';

const toolsData = JSON.parse(localStorage.getItem('rice_assessment_tools') || '[]');
const toolInfo = toolsData.find(t => t.id === toolId);
const toolType = (toolInfo && toolInfo.type) || toolId;
const toolName = (toolInfo && toolInfo.name) || toolType.toUpperCase();

const answerConfig = (function() {
  // 优先从 localStorage 类型配置读取（类型管理保存的配置）
  const typeConfigRaw = localStorage.getItem('rice_assessment_type_config');
  if (typeConfigRaw) {
    try {
      const typeConfig = JSON.parse(typeConfigRaw);
      const matched = (typeConfig.types || []).find(t => t.id === toolType);
      if (matched && matched.answerConfig) return matched.answerConfig;
    } catch(e) {}
  }
  return ANSWER_CONFIGS[toolType] || ANSWER_CONFIGS.common;
})();

const ANSWERS_KEY = 'rice_assessment_answers_';
const RECORDS_KEY = 'rice_assessment_records';
const answersKey = ANSWERS_KEY + recordId;

/* ===== 全局状态 ===== */
let navGroups = [];
let allQuestions = [];
let questionsByDomain = {};
let allDomainKeys = [];
let answers = {};
let marks = {};
let notes = {};
let currentDomain = '';
let mergedQuestions = []; // byOrder 模式：按排序号合并后的题目数组

/* ===== 评分按钮颜色 ===== */
function getScoreColor(index, total) {
  if (total <= 1) return '#52C41A';
  if (index === 0) return '#52C41A';
  if (index === total - 1) return '#F56C6C';
  return '#F5A623';
}
function getScoreClass(index, total) {
  if (total <= 1) return 'score-pass';
  if (index === 0) return 'score-pass';
  if (index === total - 1) return 'score-fail';
  return 'score-emerging';
}

/* ===== 默认评估配置（fallback） ===== */
const FALLBACK_STRUCTURES = {
  pep3: [
    { group: '发展性子测验', items: ['认知/语前语言','语言表达','语言理解','精细动作','粗大动作','视觉动作模仿'] },
    { group: '行为特征子测验', items: ['情感表达','社会互动','非语言行为特征','语言行为特征'] },
    { group: '养育者报告', items: ['问题行为','个人自理','适应行为'] }
  ],
  cpep: [
    { group: '感知觉', items: ['视觉注视','视觉追踪','听觉','触觉'] },
    { group: '精细动作', items: ['手指精细动作','手眼协调','双手协调','工具使用'] },
    { group: '大运动', items: ['坐','站','走','跑跳','平衡','球类'] },
    { group: '言语/语言', items: ['语前技能','语言理解','语言表达','对话'] },
    { group: '认知', items: ['注意力','记忆','概念','推理'] },
    { group: '社会交往', items: ['社会认知','社会互动','游戏','情绪'] },
    { group: '自理', items: ['进食','穿衣','如厕','个人卫生'] }
  ],
  vbmapp: [
    { group: 'Level 1 (0-18月)', items: ['Mand(要求)','Tact(命名)','Listener(听者反应)','VP/MTS(视觉配对)','Play(游戏)','Social(社交)','Imitation(模仿)','Echoic(仿说)','LRFFC(听者功能)'] },
    { group: 'Level 2 (18-30月)', items: ['Mand(要求)','Tact(命名)','Listener(听者反应)','VP/MTS(视觉配对)','Play(游戏)','Social(社交)','Reading(阅读)','Writing(书写)','LRFFC(听者功能)','Intraverbal(对话)'] },
    { group: 'Level 3 (30-48月)', items: ['Mand(要求)','Tact(命名)','Listener(听者反应)','VP/MTS(视觉配对)','Play(游戏)','Social(社交)','Reading(阅读)','Writing(书写)','LRFFC(听者功能)','Intraverbal(对话)','Group(团体)','Linguistics(语言结构)'] }
  ]
};

const PEP3_QCOUNTS = { '认知/语前语言':20,'语言表达':18,'语言理解':16,'精细动作':22,'粗大动作':14,'视觉动作模仿':12,'情感表达':10,'社会互动':10,'非语言行为特征':8,'语言行为特征':8,'问题行为':12,'个人自理':10,'适应行为':12 };

function generateFallbackConfig(tid) {
  const structure = FALLBACK_STRUCTURES[tid] || FALLBACK_STRUCTURES.pep3;
  const isVbmapp = tid === 'vbmapp';
  const isCpep = tid === 'cpep';
  const defaultScores = isVbmapp
    ? [{value:1,label:'达标',desc:'完全达到该里程碑要求'},{value:0.5,label:'部分达标',desc:'部分达到或需要辅助'},{value:0,label:'未达标',desc:'未达到该里程碑要求'}]
    : isCpep
    ? [{value:1,label:'通过',desc:'独立完成任务'},{value:0.5,label:'中间反应',desc:'部分完成或需要提示'},{value:0,label:'不通过',desc:'无反应或无法完成'}]
    : [{value:2,label:'通过',desc:'独立完成任务'},{value:1,label:'萌芽',desc:'部分完成或需要提示'},{value:0,label:'不通过',desc:'无反应或无法完成'}];
  const materials = ['图片卡(4张)','彩色积木(6块)','小铃铛','拼图(6片)','彩色小球(3个)','杯子和勺子','蜡笔和纸','形状板','布偶玩具','泡泡液和吹杆','串珠和绳子','镜子','无'];
  const ages = ['6-12月','12-18月','18-24月','24-36月','36-48月','48-60月','60-72月'];
  const descTemplates = {
    pep3: [
      '将{材料}放在桌上，观察儿童是否主动探索',
      '示范动作后，观察儿童是否能模仿完成',
      '给出口头指令，观察儿童是否能正确执行',
      '展示{材料}，要求儿童指认或命名',
      '引导儿童完成{材料}相关的操作任务',
      '观察儿童在自由活动中的自发行为表现',
      '通过游戏互动评估儿童的社交反应',
      '要求儿童按照示范完成精细动作任务',
      '评估儿童对声音/视觉刺激的反应',
      '观察儿童的语言表达和沟通意图'
    ],
    cpep: [
      '呈现{材料}，观察儿童的感知觉反应',
      '示范操作{材料}，评估儿童的模仿能力',
      '给出指令，评估儿童的语言理解水平',
      '引导儿童用{材料}完成精细动作任务',
      '评估儿童在结构化情境中的认知表现',
      '通过互动游戏评估儿童的社交能力',
      '观察儿童的粗大动作发展水平',
      '评估儿童的自理能力和日常技能'
    ],
    vbmapp: [
      '在自然情境中观察儿童是否能主动提出要求',
      '呈现{材料}，评估儿童的命名能力',
      '给出指令，评估儿童的听者反应',
      '呈现配对材料，评估视觉配对能力',
      '在游戏情境中评估儿童的游戏技能',
      '评估儿童与同伴/成人的社交互动',
      '示范动作，评估儿童的模仿能力',
      '评估儿童的仿说和发音能力'
    ]
  };
  const itemTemplates = {
    pep3: ['转头寻找声源','追视移动物体','从杯中找物','放入形状板','完成拼图','按颜色分类','指认颜色','配对图片','按大小排列','模仿画圆','数数','说出名字','用短句表达','描述图片','回答问题','复述故事','按指令取物','模仿拍手','搓胶泥','操作万花筒'],
    cpep: ['视觉注视','视觉追踪','听觉辨别','触觉探索','手指捏取','手眼协调','双手配合','工具使用','独立坐稳','站立平衡','行走能力','跑跳能力','动作模仿','口型模仿','听指令','理解问句','命名物品','表达需求','注意力','记忆力'],
    vbmapp: ['要求物品','要求动作','要求帮助','命名物品','命名动作','命名属性','听指令取物','听指令做动作','配对实物','配对图片','独立游戏','假装游戏','回应问候','轮流互动','模仿动作','模仿声音','仿说单词','仿说短句','发音清晰','语调模仿']
  };
  const descs = descTemplates[tid] || descTemplates.pep3;
  const items = itemTemplates[tid] || itemTemplates.pep3;
  const config = {};
  structure.forEach(g => {
    g.items.forEach(item => {
      const dk = g.group + '__' + item;
      const count = PEP3_QCOUNTS[item] || (isCpep ? 10 : isVbmapp ? 5 : 10);
      const qs = [];
      for (let i = 1; i <= count; i++) {
        const mat = materials[(i - 1) % materials.length];
        const descTpl = descs[(i - 1) % descs.length];
        const itemSuffix = items[(i - 1) % items.length];
        qs.push({
          id: tid + '_' + item + '_' + i,
          number: i,
          itemName: itemSuffix,
          desc: descTpl.replace('{材料}', mat),
          materials: mat === '无' ? '' : mat,
          ageRange: ages[(i - 1) % ages.length],
          required: true,
          enabled: true,
          scores: defaultScores.map(s => ({...s}))
        });
      }
      config[dk] = qs;
    });
  });
  return config;
}

/* ===== 数据加载 ===== */
function loadData() {
  const configKey = 'rice_assessment_config_' + toolId;
  let raw = localStorage.getItem(configKey);
  if (!raw) {
    // 尝试生成 fallback 默认配置
    const fallbackTid = ['pep3','cpep','vbmapp'].includes(toolId) ? toolId : null;
    if (fallbackTid) {
      console.log('[loadData] No config found, generating fallback for:', fallbackTid);
      const fallbackConfig = generateFallbackConfig(fallbackTid);
      localStorage.setItem(configKey, JSON.stringify(fallbackConfig));
      raw = localStorage.getItem(configKey);
    } else {
      console.warn('[loadData] No config in localStorage for:', configKey);
      document.getElementById('domainTitle').textContent = '未找到评估配置数据';
      return;
    }
  }
  let configData;
  try { configData = JSON.parse(raw); } catch(e) {
    console.error('[loadData] JSON parse error:', e);
    document.getElementById('domainTitle').textContent = '配置数据解析失败';
    return;
  }

  const groupMap = new Map();
  Object.keys(configData).forEach(key => {
    const parts = key.split('__');
    const groupName = parts[0] || '默认分组';
    const domainName = parts[1] || '默认领域';
    const rawQs = configData[key] || [];
    if (!groupMap.has(groupName)) groupMap.set(groupName, []);
    const questions = rawQs.filter(q => q.enabled !== false).map((q, idx) => ({
      id: q.id || (toolId + '_' + key + '_' + idx),
      number: q.number || (idx + 1),
      domainKey: key,
      domainName: domainName,
      groupName: groupName,
      itemName: q.itemName || '',
      desc: q.desc || '',
      materials: q.materials || '',
      ageRange: q.ageRange || '',
      required: q.required !== false,
      scores: q.scores || []
    }));
    groupMap.get(groupName).push({ domainName, domainKey: key, questions });
  });

  navGroups = [];
  allQuestions = [];
  questionsByDomain = {};
  allDomainKeys = [];
  let globalNum = 1;
  const isByOrder = answerConfig.listMode === 'byOrder';
  groupMap.forEach((domains, groupName) => {
    const items = [];
    domains.forEach(d => {
      if (!isByOrder) {
        d.questions.forEach(q => { q.number = globalNum++; });
      }
      questionsByDomain[d.domainKey] = d.questions;
      allQuestions.push(...d.questions);
      allDomainKeys.push(d.domainKey);
      items.push(d);
    });
    navGroups.push({ groupName, items });
  });
  console.log('[loadData] Loaded', allQuestions.length, 'questions for', toolId, '(type:', toolType + ')');

  // byOrder 模式：按排序号合并题目
  if (answerConfig.listMode === 'byOrder') {
    const numberMap = new Map();
    allQuestions.forEach(q => {
      if (!numberMap.has(q.number)) numberMap.set(q.number, []);
      numberMap.get(q.number).push(q);
    });
    mergedQuestions = [];
    const sortedNumbers = [...numberMap.keys()].sort((a, b) => a - b);
    sortedNumbers.forEach(num => {
      mergedQuestions.push({ number: num, items: numberMap.get(num) });
    });
    console.log('[loadData] byOrder mergedQuestions:', mergedQuestions.length, 'groups');
  }
}

/* ===== 答题数据管理 ===== */
function initAnswers() {
  const saved = localStorage.getItem(answersKey);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data && typeof data === 'object') {
        if (data.answers !== undefined && typeof data.answers === 'object' && !data.answers.value) {
          // 旧格式 { answers:{qId:numVal}, marks:{}, notes:{} }
          Object.keys(data.answers).forEach(qId => {
            answers[qId] = { value: data.answers[qId], label: '' };
          });
          marks = data.marks || {};
          notes = data.notes || {};
        } else {
          // 新格式 { qId: {value,label,notes}, _marks:{} }
          Object.keys(data).forEach(qId => {
            if (qId === '_marks') return;
            if (data[qId] && typeof data[qId] === 'object' && data[qId].value !== undefined) {
              answers[qId] = { value: data[qId].value, label: data[qId].label || '' };
              if (data[qId].notes) notes[qId] = data[qId].notes;
            }
          });
          if (data._marks) marks = data._marks;
        }
      }
    } catch(e) { console.warn('initAnswers parse error', e); }
  }
  saveAnswers();
}

function saveAnswers() {
  const store = {};
  Object.keys(answers).forEach(qId => {
    store[qId] = { value: answers[qId].value, label: answers[qId].label || '' };
    if (notes[qId]) store[qId].notes = notes[qId];
    // 保存回合统计数据
    if (roundsData[qId] && roundsData[qId].some(r => r.result !== null)) {
      store[qId].rounds = roundsData[qId];
    }
  });
  Object.keys(notes).forEach(qId => {
    if (!store[qId]) store[qId] = { value: undefined, label: '' };
    store[qId].notes = notes[qId];
  });
  store._marks = marks;
  localStorage.setItem(answersKey, JSON.stringify(store));
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = allQuestions.length;
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  const titleEl = document.getElementById('progressTitle');
  const hintEl = document.getElementById('progressHint');
  if (titleEl) {
    titleEl.textContent = answered + '/' + total;
    if (answered >= total && total > 0) {
      titleEl.className = 'progress-title completed';
      if (hintEl) { hintEl.textContent = '（全部完成）'; hintEl.className = 'progress-hint completed'; }
    } else {
      titleEl.className = 'progress-title';
      if (hintEl) { hintEl.textContent = '（进度自动保存，中途退出不会丢失）'; hintEl.className = 'progress-hint'; }
    }
  }
  document.getElementById('progressFill').style.width = pct + '%';
  const markedCount = Object.values(marks).filter(Boolean).length;
  const pendingInfoEl = document.getElementById('pendingInfo');
  if (pendingInfoEl) pendingInfoEl.textContent = '\u2691 已标记待定: ' + markedCount + '题';
  const pendingEl = document.getElementById('pendingCount');
  if (pendingEl) pendingEl.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>待定: ' + markedCount + '题 <a href="#" onclick="showPendingList();return false" style="color:#3B9BF5">查看</a>';
  const btn = document.getElementById('submitBtn');
  if (btn) {
    if (answered >= total && total > 0) {
      btn.className = 'btn-submit primary';
    } else {
      btn.className = 'btn-submit secondary';
    }
  }
  const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  const rec = records.find(r => r.id === recordId);
  if (rec) { rec.answeredCount = answered; localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }
}

/* ===== 导航树渲染 ===== */
function renderNavTree() {
  const nav = document.getElementById('navTree');
  const collapsed = answerConfig.navCollapsedByDefault;
  const isByOrder = answerConfig.listMode === 'byOrder';
  nav.innerHTML = navGroups.map(g => {
    const items = g.items.map(d => {
      const qs = questionsByDomain[d.domainKey] || [];
      const answeredN = qs.filter(q => answers[q.id] !== undefined).length;
      const total = qs.length;
      const dotClass = answeredN === 0 ? 'empty' : answeredN >= total ? 'full' : 'partial';
      const clickAction = isByOrder
        ? 'scrollToDomain(\'' + d.domainKey + '\',\'' + escAttr(d.domainName) + '\')'
        : 'selectDomain(\'' + d.domainKey + '\',\'' + escAttr(d.domainName) + '\')';
      return '<div class="tree-item ' + (currentDomain === d.domainKey ? 'active' : '') + '" onclick="' + clickAction + '">'
        + '<span class="dot ' + dotClass + '"></span>'
        + '<span class="tree-name">' + escHtml(d.domainName) + '</span>'
        + '<span class="tree-progress">(' + answeredN + '/' + total + ')</span>'
        + '</div>';
    }).join('');
    const isCollapsed = collapsed && currentDomain && !g.items.some(d => d.domainKey === currentDomain);
    return '<div class="tree-group">'
      + '<div class="tree-group-title' + (isCollapsed ? ' collapsed' : '') + '" onclick="toggleGroup(this)"><span class="arrow">\u25BC</span> ' + escHtml(g.groupName) + '</div>'
      + '<div class="tree-children' + (isCollapsed ? ' hidden' : '') + '">' + items + '</div>'
      + '</div>';
  }).join('');
}

function toggleGroup(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('hidden');
}

function selectDomain(key, name) {
  currentDomain = key;
  document.getElementById('domainTitle').textContent = name;
  renderNavTree();
  renderQuestions();
  document.getElementById('questionCardsWrap').scrollTop = 0;
}

/* ===== byOrder 模式：滚动到领域锚点 ===== */
function scrollToDomain(key, name) {
  currentDomain = key;
  renderNavTree();
  var anchor = document.getElementById('anchor_' + key);
  if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ===== byOrder 模式：渲染全部题目 ===== */
function renderByOrder() {
  document.getElementById('domainTitle').textContent = '全部题目';
  const wrap = document.getElementById('questionCardsWrap');
  const fields = answerConfig.cardFields;
  const showDesc = answerConfig.showScoreDesc;

  // 为每个 mergedQuestion 确定它属于哪些领域，用于插入领域锚点分隔线
  // 按排序号顺序遍历，当遇到新领域的第一道题时插入锚点
  const seenDomains = new Set();
  let html = '';

  mergedQuestions.forEach(mq => {
    const primaryQ = mq.items[0];
    // 检查是否需要插入领域锚点分隔线
    mq.items.forEach(q => {
      if (!seenDomains.has(q.domainKey)) {
        seenDomains.add(q.domainKey);
        html += '<div class="domain-anchor-divider" id="anchor_' + q.domainKey + '">'
          + '<span class="divider-label">' + escHtml(q.domainName) + '</span>'
          + '<span class="divider-line"></span>'
          + '</div>';
      }
    });

    const isMerged = mq.items.length > 1;

    // 判断整张卡片是否有任何 item 被标记待定
    const anyMarked = mq.items.some(q => marks[q.id]);

    const showItemName = fields.includes('itemName');
    const showMaterials = fields.includes('materials');
    const showDescField = fields.includes('desc');
    const showAgeRange = fields.includes('ageRange');

    // 卡片头部（用 primaryQ 的信息）+ mark button at top-right
    let headerHtml = '<div class="q-card-header">'
      + '<span class="q-num">' + primaryQ.number + '.</span>';
    if (showItemName) {
      headerHtml += '<span class="q-title">' + escHtml(primaryQ.itemName) + '</span>';
    }
    headerHtml += '<button class="mark-btn ' + (anyMarked ? 'marked' : '') + '" onclick="toggleMark(\'' + primaryQ.id + '\',this)" title="标记待定"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></button>';
    headerHtml += '</div>';

    // 信息盒子（描述+材料+年龄）
    let infoBoxHtml = '';
    const hasDesc = showDescField && primaryQ.desc;
    const hasMaterials = showMaterials && primaryQ.materials;
    const hasAge = showAgeRange && primaryQ.ageRange;
    if (hasDesc || hasMaterials || hasAge) {
      infoBoxHtml = '<div class="q-card-info-box">';
      if (hasDesc) infoBoxHtml += '<div class="info-desc">' + escHtml(primaryQ.desc) + '</div>';
      if (hasMaterials) infoBoxHtml += '<div class="info-materials"><span class="info-materials-label">材料：</span>' + escHtml(primaryQ.materials) + '</div>';
      if (hasAge) infoBoxHtml += '<span class="info-age">' + escHtml(primaryQ.ageRange) + '</span>';
      infoBoxHtml += '</div>';
    }

    // 评分区域
    let scoreAreaHtml = '';
    if (isMerged) {
      // 合并卡片：每个领域一行评分
      scoreAreaHtml = mq.items.map(q => {
        return renderDomainScoreRow(q, showDesc);
      }).join('');
    } else {
      // 普通卡片：和 byDomain 一样
      scoreAreaHtml = renderSingleScoreRow(primaryQ, showDesc);
    }

    // 备注（合并卡片只显示一个备注，用 primaryQ 的 id）
    const noteQId = primaryQ.id;
    const noteText = notes[noteQId] || '';
    const hasNote = noteText.length > 0;
    const noteHtml = '<div class="q-card-note">'
      + '<span class="note-toggle ' + (hasNote ? 'has-note' : '') + '" onclick="toggleNote(\'' + noteQId + '\')">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg> 备注' + (hasNote ? ' (已填)' : '') + '</span>'
      + '<div class="note-wrap" id="noteWrap_' + noteQId + '" style="' + (hasNote ? '' : 'display:none') + '">'
      + '<textarea class="note-input" id="note_' + noteQId + '" maxlength="200" placeholder="记录观察到的行为表现、环境因素等..." oninput="onNoteInput(\'' + noteQId + '\')" onfocus="onNoteFocus(\'' + noteQId + '\')" onblur="onNoteBlur(\'' + noteQId + '\')">' + escHtml(noteText) + '</textarea>'
      + '<div class="note-footer">'
      + '<span class="note-count" id="noteCount_' + noteQId + '">' + noteText.length + '/200</span>'
      + '<button class="note-save-btn" id="noteSaveBtn_' + noteQId + '" style="display:none" onclick="saveNoteBtn(\'' + noteQId + '\')">保存</button>'
      + '</div>'
      + '</div>'
      + '</div>';

    // 用所有 items 的 id 拼接作为卡片 id（方便定位）
    const cardId = 'row_' + primaryQ.id;
    html += '<div class="q-card ' + (anyMarked ? 'marked' : '') + '" id="' + cardId + '">'
      + headerHtml + infoBoxHtml + scoreAreaHtml + noteHtml
      + '</div>';
  });

  wrap.innerHTML = html;
}

/* 渲染单题评分行（byOrder 普通卡片，和 byDomain 一致） */
function renderSingleScoreRow(q, showDesc) {
  const ans = answers[q.id];
  const isMarked = marks[q.id];
  const scores = q.scores || [];
  const total = scores.length;

  // 回合统计模式
  if (scoringMode === 'rounds' && total > 0) {
    return '<div id="rounds_' + q.id + '">' + renderRoundsUI(q.id, scores) + '</div>';
  }

  // 直接评分模式（原逻辑）
  let scoreButtonsHtml = '';
  if (total > 0) {
    const displayScores = [...scores].reverse();
    const displayTotal = displayScores.length;
    scoreButtonsHtml = '<div class="q-card-scores">' + displayScores.map((s, i) => {
      const color = getScoreColor(displayTotal - 1 - i, displayTotal);
      const colorClass = getScoreClass(displayTotal - 1 - i, displayTotal);
      const selected = ans && ans.value === s.value;
      const style = selected ? 'background:' + color + ';color:#fff;border-color:' + color : '';
      const btnText = s.value + ' ' + (s.label || '');
      return '<div class="score-radio ' + colorClass + ' ' + (selected ? 'selected' : '') + '" data-idx="' + i + '" data-color="' + color + '" data-value="' + s.value + '" data-label="' + escAttr(s.label || '') + '" onclick="scoreQuestion(\'' + q.id + '\',' + s.value + ',\'' + escAttr(s.label || '') + '\',this)" style="' + style + '" title="' + escAttr(s.desc || '') + '">' + escHtml(btnText) + '</div>';
    }).join('')
      + '</div>';
  }
  let scoreDescHtml = '';
  if (showDesc) {
    let descText = '';
    if (ans) {
      const matched = scores.find(s => s.value === ans.value);
      if (matched && matched.desc) descText = matched.desc;
    }
    scoreDescHtml = '<div class="q-card-score-desc" id="scoreDesc_' + q.id + '">' + escHtml(descText) + '</div>';
  }
  return scoreButtonsHtml + scoreDescHtml;
}

/* 渲染合并卡片中的单个领域评分行（带领域名标签） */
function renderDomainScoreRow(q, showDesc) {
  const ans = answers[q.id];
  const isMarked = marks[q.id];
  const scores = q.scores || [];
  const total = scores.length;
  let html = '<div class="q-card-domain-row">';
  html += '<div class="q-card-domain-label">' + escHtml(q.domainName) + '</div>';

  // 回合统计模式
  if (scoringMode === 'rounds' && total > 0) {
    html += '<div id="rounds_' + q.id + '">' + renderRoundsUI(q.id, scores) + '</div>';
    html += '</div>';
    return html;
  }

  // 直接评分模式（原逻辑）
  if (total > 0) {
    const displayScores = [...scores].reverse();
    const displayTotal = displayScores.length;
    html += '<div class="q-card-scores">' + displayScores.map((s, i) => {
      const color = getScoreColor(displayTotal - 1 - i, displayTotal);
      const colorClass = getScoreClass(displayTotal - 1 - i, displayTotal);
      const selected = ans && ans.value === s.value;
      const style = selected ? 'background:' + color + ';color:#fff;border-color:' + color : '';
      const btnText = s.value + ' ' + (s.label || '');
      return '<div class="score-radio ' + colorClass + ' ' + (selected ? 'selected' : '') + '" data-idx="' + i + '" data-color="' + color + '" data-value="' + s.value + '" data-label="' + escAttr(s.label || '') + '" onclick="scoreQuestion(\'' + q.id + '\',' + s.value + ',\'' + escAttr(s.label || '') + '\',this)" style="' + style + '" title="' + escAttr(s.desc || '') + '">' + escHtml(btnText) + '</div>';
    }).join('')
      + '</div>';
  }
  if (showDesc) {
    let descText = '';
    if (ans) {
      const matched = scores.find(s => s.value === ans.value);
      if (matched && matched.desc) descText = matched.desc;
    }
    html += '<div class="q-card-score-desc" id="scoreDesc_' + q.id + '">' + escHtml(descText) + '</div>';
  }
  html += '</div>';
  return html;
}

    headerHtml += '</div>';

    // Info box

    const hasDescContent = showDescField && q.desc;
    const hasMaterials = showMaterials && q.materials;
    const hasAge = showAgeRange && q.ageRange;
    if (hasDescContent || hasMaterials || hasAge) {
      infoBoxHtml = '<div class="q-card-info-box">';
      if (hasDescContent) infoBoxHtml += '<div class="info-desc">' + escHtml(q.desc) + '</div>';
      if (hasMaterials) infoBoxHtml += '<div class="info-materials"><span class="info-materials-label">材料：</span>' + escHtml(q.materials) + '</div>';
      if (hasAge) infoBoxHtml += '<span class="info-age">' + escHtml(q.ageRange) + '</span>';
      infoBoxHtml += '</div>';
    }

    // Score buttons (NO mark button here)
    let scoreButtonsHtml = '';
    if (scoringMode === 'rounds' && total > 0) {
      scoreButtonsHtml = '<div id="rounds_' + q.id + '">' + renderRoundsUI(q.id, scores) + '</div>';
    } else if (total > 0) {
      const displayScores = [...scores].reverse();
      const displayTotal = displayScores.length;
      scoreButtonsHtml = '<div class="q-card-scores">' + displayScores.map((s, i) => {
        const color = getScoreColor(displayTotal - 1 - i, displayTotal);

        const btnText = s.value + ' ' + (s.label || '');
        return '<div class="score-radio ' + colorClass + ' ' + (selected ? 'selected' : '') + '" data-idx="' + i + '" data-color="' + color + '" data-value="' + s.value + '" data-label="' + escAttr(s.label || '') + '" onclick="scoreQuestion(\'' + q.id + '\',' + s.value + ',\'' + escAttr(s.label || '') + '\',this)" style="' + style + '" title="' + escAttr(s.desc || '') + '">' + escHtml(btnText) + '</div>';

    let scoreDescHtml = '';
    if (showDesc) {
      let descText = '';
      if (ans) {
        const matched = scores.find(s => s.value === ans.value);
        if (matched && matched.desc) descText = matched.desc;
      }
      scoreDescHtml = '<div class="q-card-score-desc" id="scoreDesc_' + q.id + '">' + escHtml(descText) + '</div>';

    // 备注
    const noteHtml = '<div class="q-card-note">'
      + '<span class="note-toggle ' + (hasNote ? 'has-note' : '') + '" onclick="toggleNote(\'' + q.id + '\')">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg> 备注' + (hasNote ? ' (已填)' : '') + '</span>'
      + '<div class="note-wrap" id="noteWrap_' + q.id + '" style="' + (hasNote ? '' : 'display:none') + '">'

      + headerHtml + infoBoxHtml + scoreButtonsHtml + scoreDescHtml + noteHtml
      + '</div>';
  }).join('');
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function scoreQuestion(qId, val, label, el) {
  answers[qId] = { value: val, label: label };
  saveAnswers();
  // 只清除同一行评分按钮组内的选中状态（不影响合并卡片中其他领域的评分）
  const scoresRow = el.closest('.q-card-scores');
  scoresRow.querySelectorAll('.score-radio').forEach(r => {
    r.classList.remove('selected');
    r.style.background = '';
    r.style.color = '';
    r.style.borderColor = '';
  });
  el.classList.add('selected');
  const color = el.dataset.color;
  el.style.background = color;
  el.style.color = '#fff';
  el.style.borderColor = color;

  // 更新相邻按钮的左边框（选中后需要恢复被隐藏的边框）
  const nextSibling = el.nextElementSibling;
  if (nextSibling && nextSibling.classList.contains('score-radio')) {
    nextSibling.style.borderLeftWidth = '1px';
  }

  // 更新 scoreDesc（如果 showScoreDesc）
  if (answerConfig.showScoreDesc) {
    const descEl = document.getElementById('scoreDesc_' + qId);
    if (descEl) {
      const q = allQuestions.find(qq => qq.id === qId);
      if (q) {
        const matched = (q.scores || []).find(s => s.value === val);
        descEl.textContent = (matched && matched.desc) || '';
      }
    }
  }
  renderNavTree();
}

function toggleMark(qId, btn) {
  marks[qId] = !marks[qId];
  saveAnswers();
  if (marks[qId]) {
    btn.classList.add('marked');
    btn.classList.remove('no-hover');
  } else {
    btn.classList.remove('marked');
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.style.background = '';
    // 临时禁用 hover 效果，鼠标离开后恢复
    btn.classList.add('no-hover');
    btn.addEventListener('mouseleave', function onLeave() {
      btn.classList.remove('no-hover');
      btn.removeEventListener('mouseleave', onLeave);
    });
  }
  const card = btn.closest('.q-card');
  if (card) {
    if (marks[qId]) { card.classList.add('marked'); }
    else { card.classList.remove('marked'); }
  }
  showToast(marks[qId] ? '已标记为待定' : '已取消待定');
}

/* ===== 备注 ===== */
function toggleNote(qId) {
  const wrap = document.getElementById('noteWrap_' + qId);
  if (!wrap) return;
  const isHidden = wrap.style.display === 'none';
  if (isHidden) {
    // 互斥收起：收起其他空备注
    allQuestions.forEach(function(q) {
      if (q.id === qId) return;
      var otherWrap = document.getElementById('noteWrap_' + q.id);
      if (otherWrap && otherWrap.style.display !== 'none') {
        var otherTa = document.getElementById('note_' + q.id);
        if (otherTa && !otherTa.value.trim()) {
          otherWrap.style.display = 'none';
        }
      }
    });
    wrap.style.display = '';
    var ta = document.getElementById('note_' + qId);
    if (ta) ta.focus();
  } else {
    wrap.style.display = 'none';
    // 收起时自动保存
    saveNote(qId);
  }
}

function onNoteInput(qId) {
  var ta = document.getElementById('note_' + qId);
  var countEl = document.getElementById('noteCount_' + qId);
  if (ta && countEl) countEl.textContent = ta.value.length + '/200';
}

function onNoteFocus(qId) {
  var btn = document.getElementById('noteSaveBtn_' + qId);
  if (btn) btn.style.display = '';
}

function onNoteBlur(qId) {
  // 延迟处理，让 saveNoteBtn 的 click 能触发
  setTimeout(function() {
    var btn = document.getElementById('noteSaveBtn_' + qId);
    if (btn) btn.style.display = 'none';
    // 没有内容时自动收起备注区域
    var ta = document.getElementById('note_' + qId);
    var wrap = document.getElementById('noteWrap_' + qId);
    if (ta && wrap && !ta.value.trim()) {
      wrap.style.display = 'none';
    }
  }, 200);
}

function saveNoteBtn(qId) {
  saveNote(qId);
  var btn = document.getElementById('noteSaveBtn_' + qId);
  if (btn) {
    btn.style.display = 'none';
    // 显示"已保存"提示
    var footer = btn.parentElement;
    var tip = document.createElement('span');
    tip.className = 'note-saved-tip';
    tip.textContent = '已保存';
    footer.appendChild(tip);
    setTimeout(function() { tip.remove(); }, 1000);
  }
}

function saveNote(qId) {
  const ta = document.getElementById('note_' + qId);
  if (!ta) return;
  const val = ta.value.trim();
  if (val) { notes[qId] = val; } else { delete notes[qId]; }
  saveAnswers();
  const card = document.getElementById('row_' + qId);
  if (card) {
    const toggle = card.querySelector('.note-toggle');
    if (val) {
      toggle.classList.add('has-note');
      toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg> 备注 (已填)';
    } else {
      toggle.classList.remove('has-note');
      toggle.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg> 备注';
    }
  }
}

/* ===== 领域说明弹窗 ===== */
function showDomainInfo() {
  const qs = questionsByDomain[currentDomain] || [];
  const domainName = currentDomain.split('__')[1] || '当前领域';
  document.getElementById('domainInfoTitle').textContent = '评分标准 — ' + domainName;
  const firstQ = qs[0];
  const descList = document.getElementById('scoreDescList');
  if (!firstQ || !firstQ.scores || firstQ.scores.length === 0) {
    descList.innerHTML = '<p style="color:#8C95A6;font-size:14px">暂无评分标准说明</p>';
  } else {
    descList.innerHTML = firstQ.scores.map((s, i) => {
      const color = getScoreColor(i, firstQ.scores.length);
      return '<div class="score-desc-item">'
        + '<span class="score-desc-value" style="color:' + color + '">' + s.value + '</span>'
        + '<span class="score-desc-label">- ' + escHtml(s.label) + '：</span>'
        + '<span class="score-desc-text">' + (s.desc ? escHtml(s.desc) : '无说明') + '</span>'
        + '</div>';
    }).join('');
  }
  document.getElementById('domainInfoModal').classList.add('show');
}

/* ===== 底部操作栏（quickActions 驱动） ===== */
function renderBottomBar() {
  const actions = answerConfig.quickActions || [];
  const isByOrder = answerConfig.listMode === 'byOrder';
  const bar = document.getElementById('bottomBar');
  let leftHtml = '<div class="bottom-left"><span class="pending-count" id="pendingCount"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>待定: 0题 <a href="#" onclick="showPendingList();return false" style="color:#3B9BF5">查看</a></span></div>';
  let centerHtml = '<div class="bottom-center">';
  if (isByOrder) {
    // byOrder 模式：只保留一键不通过和一键通过，作用于全部未答题目
    if (actions.includes('failAll')) centerHtml += '<button class="btn-action danger-outline" onclick="quickScoreAll(\'fail\')">一键不通过</button>';
    if (actions.includes('passAll')) centerHtml += '<button class="btn-action success-outline" onclick="quickScoreAll(\'pass\')">一键通过</button>';
  } else {
    // byDomain 模式：原有逻辑
    if (actions.includes('failAll')) centerHtml += '<button class="btn-action danger-outline" onclick="quickScoreAll(\'fail\')">一键不通过</button>';
    if (actions.includes('nextDomain')) centerHtml += '<button class="btn-action primary-fill" onclick="goNextDomain()">下一领域</button>';
    if (actions.includes('passAll')) centerHtml += '<button class="btn-action success-outline" onclick="quickScoreAll(\'pass\')">一键通过</button>';
  }
  centerHtml += '</div>';
  let rightHtml = '<div class="bottom-right"><button class="btn-submit secondary" id="submitBtn" onclick="trySubmit()">提交评估</button></div>';
  bar.innerHTML = leftHtml + centerHtml + rightHtml;
}

function quickScoreAll(type) {
  const isByOrder = answerConfig.listMode === 'byOrder';
  const qs = isByOrder ? allQuestions : (questionsByDomain[currentDomain] || []);
  const unanswered = qs.filter(q => answers[q.id] === undefined);
  if (unanswered.length === 0) { showToast(isByOrder ? '所有题目已作答' : '当前领域所有题目已作答'); return; }

  // pass = scores[0]（最高分），fail = scores[最后一个]（最低分）
  const sampleQ = qs[0];
  if (!sampleQ || !sampleQ.scores || sampleQ.scores.length === 0) { showToast('无评分选项'); return; }

  const targetScore = type === 'pass' ? sampleQ.scores[0] : sampleQ.scores[sampleQ.scores.length - 1];
  const labelText = targetScore.value + ' ' + targetScore.label;
  const scopeText = isByOrder ? '全部未答题目' : '当前领域所有未答题目';

  document.getElementById('quickActionMsg').textContent = '确定将' + scopeText + '（' + unanswered.length + '题）评为「' + labelText + '」吗？';
  const confirmBtn = document.getElementById('quickActionConfirmBtn');
  confirmBtn.onclick = function() {
    unanswered.forEach(q => {
      // 每道题用自己的 scores（可能不同）
      const sc = q.scores || [];
      const target = type === 'pass' ? sc[0] : sc[sc.length - 1];
      if (target) answers[q.id] = { value: target.value, label: target.label || '' };
    });
    saveAnswers();
    renderNavTree();
    if (isByOrder) { renderByOrder(); } else { renderQuestions(); }
    closeModal('quickActionModal');
    showToast('已将 ' + unanswered.length + ' 题评为 ' + labelText);
  };
  document.getElementById('quickActionModal').classList.add('show');
}

function goNextDomain() {
  const idx = allDomainKeys.indexOf(currentDomain);
  if (idx < 0 || idx >= allDomainKeys.length - 1) {
    showToast('已是最后一个领域');
    return;
  }
  // 检查当前领域是否有未完成题目
  const qs = questionsByDomain[currentDomain] || [];
  const unanswered = qs.filter(q => answers[q.id] === undefined).length;
  if (unanswered > 0) {
    const nextKey = allDomainKeys[idx + 1];
    const nextName = nextKey.split('__')[1] || '';
    document.getElementById('quickActionMsg').textContent = '当前领域还有 ' + unanswered + ' 道题目未作答，确定跳转到下一领域吗？';
    const confirmBtn = document.getElementById('quickActionConfirmBtn');
    confirmBtn.onclick = function() {
      closeModal('quickActionModal');
      selectDomain(nextKey, nextName);
    };
    document.getElementById('quickActionModal').classList.add('show');
    return;
  }
  const nextKey = allDomainKeys[idx + 1];
  const nextName = nextKey.split('__')[1] || '';
  selectDomain(nextKey, nextName);
}

/* ===== 保存/退出 ===== */
function saveProgress() { saveAnswers(); showToast('已保存'); }
function showExitModal() { saveAnswers(); document.getElementById('exitModal').classList.add('show'); }
function doExit() { closeModal('exitModal'); location.href = 'assessment-list.html'; }

/* ===== 提交 ===== */
function trySubmit() {
  const unanswered = allQuestions.filter(q => answers[q.id] === undefined).length;
  const total = allQuestions.length;
  const answered = total - unanswered;
  const allowPartial = answerConfig.allowPartialSubmit === true;
  if (answered === 0) {
    document.getElementById('incompleteMsg').textContent = '尚未作答任何题目，无法提交。';
    document.getElementById('incompleteModal').classList.add('show');
    return;
  }
  if (unanswered > 0 && !allowPartial) {
    document.getElementById('incompleteMsg').textContent = '还有 ' + unanswered + ' 道题目未作答，请完成所有题目后再提交。';
    document.getElementById('incompleteModal').classList.add('show');
    return;
  }
  if (unanswered > 0 && allowPartial) {
    document.getElementById('submitMsg').textContent = '还有 ' + unanswered + ' 道题目未作答（已完成 ' + answered + '/' + total + '），确认提交吗？提交后不可修改。';
  } else {
    document.getElementById('submitMsg').textContent = '确认提交评估吗？提交后不可修改。';
  }
  document.getElementById('submitModal').classList.add('show');
}

function confirmSubmit() {
  closeModal('submitModal');
  const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  const rec = records.find(r => r.id === recordId);
  if (rec) { rec.status = 'completed'; rec.answeredCount = allQuestions.length; localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }
  showToast('正在生成评估结果...');
  setTimeout(function(){ location.href = 'assessment-result.html?record=' + recordId + '&tool=' + toolId; }, 1500);
}

/* ===== 待定列表（按分组展示） ===== */
function showPendingList() {
  const markedQs = allQuestions.filter(q => marks[q.id]);
  const list = document.getElementById('pendingList');
  if (markedQs.length === 0) {
    list.innerHTML = '<p style="color:#8C95A6;font-size:13px">暂无待定题目</p>';
  } else {
    const grouped = new Map();
    markedQs.forEach(q => {
      const gKey = q.groupName + ' / ' + q.domainName;
      if (!grouped.has(gKey)) grouped.set(gKey, []);
      grouped.get(gKey).push(q);
    });
    let html = '';
    grouped.forEach((qs, gKey) => {
      html += '<div class="pending-group-title">\u25BC ' + escHtml(gKey) + '</div>';
      qs.forEach(q => {
        html += '<div class="pending-item" onclick="gotoPending(\'' + q.domainKey + '\',\'' + escAttr(q.domainName) + '\',\'' + q.id + '\')">#' + q.number + ' ' + escHtml(q.itemName || q.desc) + '</div>';
      });
    });
    list.innerHTML = html;
  }
  document.getElementById('pendingModal').classList.add('show');
}

function gotoPending(domain, name, qId) {
  closeModal('pendingModal');
  if (answerConfig.listMode === 'byOrder') {
    // byOrder 模式：直接滚动到题目
    setTimeout(function(){ var row = document.getElementById('row_' + qId); if(row) row.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
  } else {
    selectDomain(domain, name);
    setTimeout(function(){ var row = document.getElementById('row_' + qId); if(row) row.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
  }
}

/* ===== 弹窗/Toast ===== */
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}

/* ===== 重置 ===== */
function resetAll() { document.getElementById('resetModal').classList.add('show'); }
function doReset() {
  closeModal('resetModal');
  Object.keys(localStorage).forEach(function(k){ if(k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.reload();
}

/* ===== 统计模式 ===== */
const SCORING_MODE_KEY = 'rice_assessment_scoring_mode';
let scoringMode = localStorage.getItem(SCORING_MODE_KEY) || 'rounds'; // default to rounds
let pendingMode = null;
let roundsData = {}; // { qId: [{round:1, result:'independent'|'error'|'prompted'}, ...] }

function toggleSettings() {
  document.getElementById('settingsPopover').classList.toggle('show');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.settings-btn') && !e.target.closest('.settings-popover')) {
    document.getElementById('settingsPopover').classList.remove('show');
  }
});

function switchScoringMode(mode) {
  if (mode === scoringMode) return;
  const hasData = Object.keys(answers).length > 0 || Object.keys(roundsData).length > 0;
  if (hasData) {
    pendingMode = mode;
    const answeredCount = Object.keys(answers).length;
    const roundsCount = Object.keys(roundsData).filter(k => roundsData[k].some(r => r.result !== null)).length;
    const msg = mode === 'rounds'
      ? '切换后，已有的评分结果将同步到回合统计模式。确定切换吗？'
      : '切换后，已有的评分结果将同步到直接评分模式，但回合统计数据将被清除。确定切换吗？';
    document.getElementById('modeSwitchMsg').textContent = msg;
    document.getElementById('modeSwitchModal').classList.add('show');
  } else {
    applyScoringMode(mode);
  }
}

function confirmModeSwitch() {
  if (pendingMode === 'direct') {
    // 回合统计 → 直接评分：清除回合数据
    roundsData = {};
  }
  if (pendingMode) applyScoringMode(pendingMode);
  closeModal('modeSwitchModal');
}

function applyScoringMode(mode) {
  scoringMode = mode;
  pendingMode = null;
  localStorage.setItem(SCORING_MODE_KEY, mode);
  document.getElementById('modeDirectOpt').classList.toggle('active', mode === 'direct');
  document.getElementById('modeRoundsOpt').classList.toggle('active', mode === 'rounds');
  document.getElementById('settingsPopover').classList.remove('show');
  // Re-render based on list mode
  if (answerConfig.listMode === 'byOrder') {
    renderByOrder();
  } else {
    renderQuestions();
  }
  showToast(mode === 'rounds' ? '已切换到回合统计模式' : '已切换到直接评分模式');
}

function renderRoundsUI(qId, scores) {
  const rounds = roundsData[qId] || [{round:1,result:null},{round:2,result:null},{round:3,result:null}];
  if (!roundsData[qId]) roundsData[qId] = rounds;
  
  let html = '<div class="rounds-area">';
  html += '<div class="rounds-header"><span class="rounds-title">回合统计</span><span class="rounds-hint">默认建议 3 回合，可自由增加</span></div>';
  
  rounds.forEach((r, i) => {
    html += '<div class="round-row">';
    html += '<span class="round-label">第' + (i+1) + '回合</span>';
    html += '<button class="round-btn ' + (r.result === 'independent' ? 'sel-independent' : '') + '" onclick="setRoundResult(\'' + qId + '\',' + i + ',\'independent\')">独立 (+)</button>';
    html += '<button class="round-btn ' + (r.result === 'error' ? 'sel-error' : '') + '" onclick="setRoundResult(\'' + qId + '\',' + i + ',\'error\')">错误 (-)</button>';
    html += '<button class="round-btn ' + (r.result === 'prompted' ? 'sel-prompted' : '') + '" onclick="setRoundResult(\'' + qId + '\',' + i + ',\'prompted\')">辅助 (P)</button>';
    html += '</div>';
  });
  
  html += '<div style="display:flex;gap:8px;align-items:center;margin-top:6px">';
  html += '<button class="rounds-add" style="flex:1;margin-top:0" onclick="addRound(\'' + qId + '\')">+ 新增测试回合</button>';
  html += '<button class="rounds-add" style="width:auto;margin-top:0;padding:0 12px;color:#8C95A6;border-color:#D1D5DB" onclick="resetRounds(\'' + qId + '\')">重置</button>';
  html += '</div>';
  
  // Calculate and show result
  const answered = rounds.filter(r => r.result !== null);
  if (answered.length > 0) {
    const indep = answered.filter(r => r.result === 'independent').length;
    const prompted = answered.filter(r => r.result === 'prompted').length;
    const total = answered.length;
    const indepRate = indep / total;
    const promptedRate = prompted / total;
    
    let resultScore, resultLabel;
    const maxScore = scores[0];
    const midScore = scores.length >= 3 ? scores[Math.floor(scores.length / 2)] : scores[scores.length > 1 ? 1 : 0];
    const minScore = scores[scores.length - 1];
    
    // 量化换算规则（基于独立完成率和辅助完成率）：
    // 1. 独立率 >= 80% → 最高分（scores[0]）
    // 2. 独立率 >= 30% 且 < 80% → 中间分（scores[mid]）
    // 3. 独立率 < 30% 且 辅助率 > 0% → 中间分（scores[mid]）
    // 4. 独立率 < 30% 且 辅助率 == 0%（即全部错误）→ 最低分（scores[last]）
    if (indepRate >= 0.8) { resultScore = maxScore; resultLabel = '独立率≥80%→最高分'; }
    else if (indepRate >= 0.3) { resultScore = midScore; resultLabel = '独立率≥30%→中间分'; }
    else if (promptedRate > 0) { resultScore = midScore; resultLabel = '辅助率>0%→中间分'; }
    else { resultScore = minScore; resultLabel = '独立率<30%且无辅助→最低分'; }
    
    // 根据评分等级映射颜色：最高分=绿，中间分=橙，最低分=红
    var resultColor = '#F5A623';
    if (resultScore === maxScore) resultColor = '#52C41A';
    else if (resultScore === minScore) resultColor = '#F56C6C';
    
    html += '<div class="rounds-result">换算评分：<span class="result-score" style="font-size:16px;color:' + resultColor + '">' + resultScore.value + ' ' + resultScore.label + '</span> <span style="font-size:12px;color:#8C95A6">（独立 ' + indep + '/' + total + '=' + Math.round(indepRate * 100) + '%，辅助 ' + prompted + '/' + total + '=' + Math.round(promptedRate * 100) + '%，' + resultLabel + '）</span></div>';
    
    // Auto-save the calculated score
    answers[qId] = { value: resultScore.value, label: resultScore.label };
    saveAnswers();
    updateProgress();
  } else if (answers[qId] && answers[qId].value !== undefined) {
    // 回合为空但有直接评分结果（从直接评分模式带过来的）
    const existAns = answers[qId];
    const matchedScore = scores.find(s => s.value === existAns.value);
    var carryColor = '#8C95A6';
    if (matchedScore === scores[0]) carryColor = '#52C41A';
    else if (matchedScore === scores[scores.length - 1]) carryColor = '#F56C6C';
    else if (matchedScore) carryColor = '#F5A623';
    html += '<div class="rounds-result" style="color:#8C95A6">当前评分：<span style="font-size:16px;font-weight:600;color:' + carryColor + '">' + existAns.value + ' ' + (existAns.label || '') + '</span> <span style="font-size:12px">（来自直接评分，录入回合后将被覆盖）</span></div>';
  }
  
  html += '</div>';
  return html;
}

function setRoundResult(qId, roundIdx, result) {
  if (!roundsData[qId]) roundsData[qId] = [{round:1,result:null},{round:2,result:null},{round:3,result:null}];
  roundsData[qId][roundIdx].result = result;
  // Re-render this question's rounds area
  const el = document.getElementById('rounds_' + qId);
  if (el) {
    // Get scores for this question
    const q = allQuestions.find(qq => qq.id === qId);
    const scoresList = q ? (q.scores || []) : [];
    el.innerHTML = renderRoundsUI(qId, scoresList);
  }
  saveAnswers();
}

function addRound(qId) {
  if (!roundsData[qId]) roundsData[qId] = [];
  roundsData[qId].push({ round: roundsData[qId].length + 1, result: null });
  const el = document.getElementById('rounds_' + qId);
  if (el) {
    const q = allQuestions.find(qq => qq.id === qId);
    const scoresList = q ? (q.scores || []) : [];
    el.innerHTML = renderRoundsUI(qId, scoresList);
  }
}

let pendingResetQId = null;
function resetRounds(qId) {
  pendingResetQId = qId;
  document.getElementById('quickActionMsg').textContent = '确定要重置该题的回合统计数据吗？将清空所有回合记录并恢复为 3 个空白回合。';
  const confirmBtn = document.getElementById('quickActionConfirmBtn');
  confirmBtn.onclick = function() {
    roundsData[pendingResetQId] = [{round:1,result:null},{round:2,result:null},{round:3,result:null}];
    delete answers[pendingResetQId];
    saveAnswers();
    const el = document.getElementById('rounds_' + pendingResetQId);
    if (el) {
      const q = allQuestions.find(qq => qq.id === pendingResetQId);
      const scoresList = q ? (q.scores || []) : [];
      el.innerHTML = renderRoundsUI(pendingResetQId, scoresList);
    }
    renderNavTree();
    closeModal('quickActionModal');
    showToast('已重置回合数据');
    pendingResetQId = null;
  };
  document.getElementById('quickActionModal').classList.add('show');
}

/* ===== 定时自动保存 ===== */
let autoSaveTimer = null;
function startAutoSave() {
  if (autoSaveTimer) clearInterval(autoSaveTimer);
  autoSaveTimer = setInterval(function() { saveAnswers(); }, 30000);
}

/* ===== 初始化 ===== */
(function init() {
  document.getElementById('headerTitle').textContent = toolName + ' 评估';
  // 恢复缓存的统计模式 UI 状态
  document.getElementById('modeDirectOpt').classList.toggle('active', scoringMode === 'direct');
  document.getElementById('modeRoundsOpt').classList.toggle('active', scoringMode === 'rounds');
  loadData();
  if (allQuestions.length === 0) return;
  renderBottomBar();
  initAnswers();
  renderNavTree();
  startAutoSave();
  if (answerConfig.listMode === 'byOrder') {
    renderByOrder();
  } else {
    if (allDomainKeys.length > 0) {
      const firstKey = allDomainKeys[0];
      const firstName = firstKey.split('__')[1] || '';
      selectDomain(firstKey, firstName);
    }
  }
})();
</script>
