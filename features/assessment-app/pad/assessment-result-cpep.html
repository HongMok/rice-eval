<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-PEP 评估报告 - 康复师App PAD端</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.topbar { height: 48px; background: var(--app-card); border-bottom: 1px solid var(--app-border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
.topbar .back { font-size: 16px; cursor: pointer; margin-right: 12px; text-decoration: none; color: var(--app-text); }
.topbar .title { font-size: 16px; font-weight: 600; }
.tab-bar { background: var(--app-card); border-bottom: 1px solid var(--app-border); padding: 0 20px; display: flex; flex-shrink: 0; }
.tab-btn { padding: 12px 24px; font-size: 14px; color: var(--app-text-nav); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; font-family: var(--app-font); font-weight: 500; }
.tab-btn:hover { color: var(--app-primary); }
.tab-btn.active { color: var(--app-primary); border-bottom-color: var(--app-primary); }
.content { flex: 1; overflow-y: auto; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }
.section-label { display: inline-block; background: var(--app-primary); color: #fff; font-size: 13px; font-weight: 500; padding: 4px 14px; border-radius: var(--app-radius-md); margin-bottom: 14px; }
.card { background: var(--app-card); border-radius: var(--app-radius-xl); padding: 20px; box-shadow: var(--app-shadow); margin-bottom: 20px; }
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 24px; }
.info-item { font-size: 14px; }
.info-item .label { color: var(--app-text-sec); margin-right: 4px; }
.info-item .value { font-weight: 500; }
.report-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.report-desc { font-size: 13px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 20px; }
table.score-tbl { width: 100%; border-collapse: collapse; }
table.score-tbl th { background: #F5F7FA; padding: 10px 14px; text-align: left; font-weight: 500; color: var(--app-text-sec); font-size: 13px; border-bottom: 1px solid var(--app-border); }
table.score-tbl td { padding: 10px 14px; border-bottom: 1px solid var(--app-border); font-size: 14px; }
table.score-tbl tr:last-child td { border-bottom: none; }
table.score-tbl tr:hover td { background: #FAFBFC; }
.group-header td { background: #F0F4FF; font-weight: 600; font-size: 13px; color: var(--app-primary); }
.level-badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
.level-badge.ok { background: #F0FFF4; color: var(--app-success); }
.level-badge.mild { background: #FFF8EB; color: var(--app-warning); }
.level-badge.severe { background: #FFF0F0; color: var(--app-danger); }
</style>
<style>
.editable-area { position: relative; }
.editable-area .edit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.editable-area .edit-link { color: var(--app-primary); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.editable-area .area-text { font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
.editable-area .area-textarea { width: 100%; min-height: 120px; font-size: 14px; line-height: 1.8; font-family: var(--app-font); border: 1px solid var(--app-primary); border-radius: var(--app-radius-md); padding: 12px; resize: vertical; outline: none; display: none; }
.editable-area .edit-actions { display: none; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.editable-area .edit-actions button { padding: 6px 16px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); }
.editable-area .edit-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.editable-area .edit-actions .btn-save { background: var(--app-primary); color: #fff; border: none; }
.radar-svg { width: 100%; max-width: 420px; height: 420px; }
.chart-center { text-align: center; }
.bottom-actions { background: var(--app-card); border-top: 1px solid var(--app-border); padding: 12px 20px; display: flex; justify-content: center; gap: 16px; flex-shrink: 0; }
.btn-export { padding: 10px 32px; background: #fff; border: 1px solid #D8DDE5; border-radius: var(--app-radius-md); font-size: 14px; cursor: pointer; color: var(--app-text-sec); font-family: var(--app-font); }
.btn-export:hover { background: #F5F7FA; }
.btn-send { padding: 10px 32px; background: var(--app-primary); color: #fff; border: none; border-radius: var(--app-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--app-font); }
.btn-send:hover { background: var(--app-primary-hover); }
</style>
<style>
/* IEP styles */
.iep-title { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 16px; }
.iep-info { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px 24px; font-size: 14px; margin-bottom: 16px; }
.iep-info .label { color: var(--app-text-sec); }
.iep-info .link { color: var(--app-primary); cursor: pointer; }
.iep-table { width: 100%; border-collapse: collapse; background: var(--app-card); border-radius: var(--app-radius-lg); overflow: hidden; }
.iep-table th { background: var(--app-primary); color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; font-weight: 500; }
.iep-table td { padding: 10px 14px; border-bottom: 1px solid var(--app-border); font-size: 13px; vertical-align: top; }
.iep-table .domain-cell { font-weight: 500; border-right: 1px solid var(--app-border); }
.iep-table .goal-cell { border-right: 1px solid var(--app-border); }
.iep-table .del-link { color: var(--app-danger); font-size: 12px; cursor: pointer; }

.iep-actions { display: flex; justify-content: center; gap: 12px; padding: 12px 20px; position: sticky; bottom: 0; background: var(--app-card); border-top: 1px solid var(--app-border); z-index: 10; }
.iep-actions button { padding: 8px 24px; border-radius: var(--app-radius-md); font-size: 14px; cursor: pointer; font-family: var(--app-font); font-weight: 500; }
.iep-btn-export { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.iep-btn-import { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-edit { background: var(--app-primary); border: none; color: #fff; }
.iep-btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-btn-add { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-save { background: var(--app-primary); border: none; color: #fff; }
.iep-add-wrap { position: relative; display: inline-block; }
.iep-add-popover { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; border-radius: var(--app-radius-lg); box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 8px 0; min-width: 160px; display: none; z-index: 20; margin-bottom: 8px; }
.iep-add-popover.show { display: block; }
.iep-add-popover::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #fff; }
.iep-add-popover .pop-item { padding: 10px 20px; font-size: 14px; cursor: pointer; color: var(--app-primary); text-align: center; }
.iep-add-popover .pop-item:hover { background: var(--app-primary-light); }
.iep-add-popover .pop-divider { height: 1px; background: var(--app-border); margin: 0 12px; }

.iep-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.iep-modal h3 .close { cursor: pointer; font-size: 18px; color: var(--app-text-sec); background: none; border: none; }

.q-card .q-score-opt.selected-pass { background: #F0FFF4; color: var(--app-success); border-color: var(--app-success); }

.reset-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 8px 14px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; z-index: 9999; opacity: 0.5; }

<script>
const params = new URLSearchParams(location.search);
const recordId = params.get('record') || 'rec002';

/* ===== CPEP-3 副测验结构（PEP-3 标准） ===== */
const DEV_SUBTESTS = [
  { name: '认知-语言', code: 'CVP', count: 34 },
  { name: '语言表达', code: 'EL', count: 25 },
  { name: '语言理解', code: 'RL', count: 26 },
  { name: '小肌肉', code: 'FM', count: 20 },
  { name: '大肌肉', code: 'GM', count: 18 },
  { name: '模仿', code: 'VMI', count: 10 }
];
const BEHAV_SUBTESTS = [
  { name: '情感表达', code: 'AE', count: 8 },
  { name: '社会互动', code: 'SR', count: 12 },
  { name: '行为特征-非语言', code: 'CMB', count: 15 },
  { name: '行为特征-语言', code: 'CVB', count: 11 }
];
const CAREGIVER_SUBTESTS = [
  { name: '个人自理', code: 'PSC', count: 13, hasDev: true },
  { name: '问题行为', code: 'PB', count: 10, hasDev: false },
  { name: '适应行为', code: 'AB', count: 15, hasDev: false }
];
const ALL_DEV_BEHAV = DEV_SUBTESTS.concat(BEHAV_SUBTESTS);
const ALL_SUBTESTS = ALL_DEV_BEHAV.concat(CAREGIVER_SUBTESTS);
const TOTAL_Q = ALL_SUBTESTS.reduce((s, d) => s + d.count, 0);

/* 合成分数定义 */
const COMPOSITES = [
  { name: '沟通', code: 'C', components: ['CVP','EL','RL'] },
  { name: '体能', code: 'M', components: ['FM','GM','VMI'] },
  { name: '行为', code: 'MB', components: ['AE','SR','CMB','CVB'] }
];

const ACTUAL_AGE_MONTHS = 58; // 4岁10月

/* ===== 确定性伪随机 ===== */
function seededRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) { h = ((h << 5) - h + seed.charCodeAt(i)) | 0; }
  return function() { h = (h * 1103515245 + 12345) & 0x7fffffff; return (h % 1000) / 1000; };
}

/* ===== 计算函数 ===== */
function getDevAge(pct) {
  let m;
  if (pct >= 90) m = ACTUAL_AGE_MONTHS;
  else if (pct >= 80) m = ACTUAL_AGE_MONTHS - 6;
  else if (pct >= 70) m = ACTUAL_AGE_MONTHS - 12;
  else if (pct >= 60) m = ACTUAL_AGE_MONTHS - 18;
  else if (pct >= 50) m = ACTUAL_AGE_MONTHS - 24;
  else if (pct >= 40) m = ACTUAL_AGE_MONTHS - 30;
  else m = ACTUAL_AGE_MONTHS - 36;
  if (m < 12) return '<12';
  return Math.floor(m / 12) + '岁' + (m % 12) + '月';
}
function getPercentile(pct) {
  if (pct >= 90) return 95;
  if (pct >= 80) return 75;
  if (pct >= 70) return 50;
  if (pct >= 60) return 25;
  if (pct >= 50) return 10;
  return Math.max(1, Math.round(pct / 10));
}
function getLevel(ptile) {
  if (ptile >= 75) return { text: '适当', cls: 'ok' };
  if (ptile >= 50) return { text: '轻度', cls: 'mild' };
  return { text: '严重', cls: 'severe' };
}

/* ===== 加载答题数据 ===== */
function loadAnswers() {
  const key = 'rice_assessment_answers_' + recordId;
  const stored = localStorage.getItem(key);
  const result = { scores: {}, notes: {}, rounds: {} };
  if (stored) {
    try {
      const data = JSON.parse(stored);
      Object.keys(data).forEach(qId => {
        if (qId === '_marks') return;
        const v = data[qId];
        if (v && typeof v === 'object' && v.value !== undefined) {
          result.scores[qId] = v.value;
          if (v.notes) result.notes[qId] = v.notes;
          if (v.rounds) result.rounds[qId] = v.rounds;
        } else if (typeof v === 'number') { result.scores[qId] = v; }
      });
      if (data.answers) { Object.keys(data.answers).forEach(qId => { result.scores[qId] = data.answers[qId]; }); if (data.notes) Object.assign(result.notes, data.notes); }
      return result;
    } catch(e) {}
  }
  /* fallback: 确定性中等分数据 */
  const rand = seededRandom(recordId + '_cpep3_fallback');
  const notes = ['需要多次示范','对材料表现出兴趣','注意力约30秒','需手把手辅助','自发完成','有轻微抵触','提示下完成一半'];
  for (let i = 1; i <= TOTAL_Q; i++) {
    const r = rand();
    result.scores['cpep_q' + i] = r < 0.45 ? 2 : r < 0.75 ? 1 : 0;
    if (rand() < 0.1) result.notes['cpep_q' + i] = notes[Math.floor(rand() * notes.length)];
  }
  return result;
}
const answerData = loadAnswers();
const answers = answerData.scores;
const answerNotes = answerData.notes;
const answerRounds = answerData.rounds;

/* ===== 计算各副测验得分 ===== */
function calcSubtestScores() {
  let qIdx = 1;
  return ALL_SUBTESTS.map(st => {
    let P = 0, E = 0, F = 0;
    for (let i = 0; i < st.count; i++) {
      const v = answers['cpep_q' + qIdx];
      if (v === 2) P++; else if (v === 1) E++; else F++;
      qIdx++;
    }
    const pct = st.count > 0 ? Math.round(P / st.count * 100) : 0;
    const ptile = getPercentile(pct);
    const level = getLevel(ptile);
    const isDev = DEV_SUBTESTS.some(d => d.code === st.code) || (st.hasDev === true);
    const devAge = isDev ? getDevAge(pct) : '';
    return { ...st, P, E, F, pct, ptile, level, devAge };
  });
}
const subtestScores = calcSubtestScores();
const devBehavScores = subtestScores.slice(0, 10);
const caregiverScores = subtestScores.slice(10);

/* 合成分数计算 */
function calcComposites() {
  return COMPOSITES.map(comp => {
    const subs = comp.components.map(code => subtestScores.find(s => s.code === code));
    const stdSum = subs.reduce((s, sub) => s + (sub ? sub.ptile : 0), 0);
    const maxStd = subs.length * 95;
    const compPct = maxStd > 0 ? Math.round(stdSum / maxStd * 100) : 0;
    const ptile = getPercentile(compPct);
    const level = getLevel(ptile);
    const devAge = getDevAge(compPct);
    return { ...comp, subs, stdSum, ptile, level, devAge };
  });
}
const composites = calcComposites();

/* ===== 行为病理行为靶心图（等分角度，每扇形独立环数） ===== */
function drawBehaviorTarget() {
  var svg = document.getElementById('behaviorTargetChart');
  if (!svg) return;

  /* 5个行为领域（按截图顺序：情感在正上方，顺时针） */
  /* 每个扇形等分72°，但每个扇形内部的环数 = 该领域题目数 */
  var SECTORS = [
    { name: '情感', total: 6 },
    { name: '人际关系、合作行为\n及对人的兴趣', total: 7 },
    { name: '游戏及物品喜好', total: 6 },
    { name: '感觉模式', total: 14 },
    { name: '语言', total: 11 }
  ];

  /* 确定性模拟 S/M/A 数据 */
  var rand = seededRandom(recordId + '_behav_target');
  SECTORS.forEach(function(sec) {
    var S = 0, M = 0, A = 0;
    for (var i = 0; i < sec.total; i++) {
      var r = rand();
      if (r < 0.15) S++;
      else if (r < 0.35) M++;
      else A++;
    }
    sec.S = S; sec.M = M; sec.A = A;
  });

  var cx = 280, cy = 280, maxR = 210;
  var n = SECTORS.length;
  var sectorAngle = (2 * Math.PI) / n; /* 72° each */
  var html = '';

  /* 绘制每个扇形（等分角度，独立环数） */
  SECTORS.forEach(function(sec, i) {
    var startA = -Math.PI / 2 + i * sectorAngle;
    var endA = startA + sectorAngle;
    var rings = sec.total;
    var ringW = maxR / rings;

    /* 画该扇形内的所有环（背景线） */
    for (var r = 1; r <= rings; r++) {
      var outerR = r * ringW;
      var innerR = (r - 1) * ringW;
      html += arcSec(cx, cy, innerR, outerR, startA, endA, 'none', '#D0D5DD', 0.5);
    }

    /* S 从圆心涂黑 */
    for (var r = 0; r < sec.S && r < rings; r++) {
      html += arcSec(cx, cy, r * ringW, (r + 1) * ringW, startA, endA, '#333333', 'none', 0);
    }
    /* M 接着涂灰 */
    for (var r = sec.S; r < sec.S + sec.M && r < rings; r++) {
      html += arcSec(cx, cy, r * ringW, (r + 1) * ringW, startA, endA, '#B0B8C4', 'none', 0);
    }

    sec._startA = startA;
    sec._endA = endA;
  });

  /* 分隔线 */
  for (var i = 0; i < n; i++) {
    var a = -Math.PI / 2 + i * sectorAngle;
    html += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + maxR * Math.cos(a)) + '" y2="' + (cy + maxR * Math.sin(a)) + '" stroke="#999" stroke-width="1"/>';
  }

  /* 标签（每个扇形中间角度方向） */
  SECTORS.forEach(function(sec) {
    var midA = (sec._startA + sec._endA) / 2;
    var labelR = maxR + 35;
    var lx = cx + labelR * Math.cos(midA);
    var ly = cy + labelR * Math.sin(midA);
    var anchor = 'middle';
    if (midA > -0.2 && midA < Math.PI * 0.7) anchor = 'start';
    else if (midA > Math.PI * 0.7 || midA < -Math.PI * 0.7) anchor = 'end';
    var lines = sec.name.split('\n');
    var yOff = -(lines.length - 1) * 7;
    lines.forEach(function(line, li) {
      html += '<text x="' + lx + '" y="' + (ly + yOff + li * 14) + '" text-anchor="' + anchor + '" dominant-baseline="middle" font-size="12" font-weight="500" fill="#1A2233">' + line + '</text>';
    });
    html += '<text x="' + lx + '" y="' + (ly + yOff + lines.length * 14) + '" text-anchor="' + anchor + '" font-size="10" fill="#8C95A6">S:' + sec.S + '  M:' + sec.M + '  A:' + sec.A + '</text>';
  });

  /* 图例 */
  html += '<rect x="80" y="10" width="14" height="14" fill="#333333" rx="2"/><text x="98" y="21" font-size="11" fill="#5A6478">S（严重）</text>';
  html += '<rect x="190" y="10" width="14" height="14" fill="#B0B8C4" rx="2"/><text x="208" y="21" font-size="11" fill="#5A6478">M（轻度）</text>';

/* 辅助：绘制扇形环 */
function arcSec(cx, cy, innerR, outerR, startAngle, endAngle, fill, stroke, strokeW) {
  var strokeAttr = (stroke && stroke !== 'none') ? ' stroke="' + stroke + '" stroke-width="' + strokeW + '"' : '';
  if (innerR < 0.5) {
    var x1 = cx + outerR * Math.cos(startAngle), y1 = cy + outerR * Math.sin(startAngle);
    var x2 = cx + outerR * Math.cos(endAngle), y2 = cy + outerR * Math.sin(endAngle);
    var la = (endAngle - startAngle) > Math.PI ? 1 : 0;
    return '<path d="M' + cx + ',' + cy + ' L' + x1 + ',' + y1 + ' A' + outerR + ',' + outerR + ' 0 ' + la + ',1 ' + x2 + ',' + y2 + ' Z" fill="' + fill + '"' + strokeAttr + '/>';
  }
  var ox1 = cx + outerR * Math.cos(startAngle), oy1 = cy + outerR * Math.sin(startAngle);
  var ox2 = cx + outerR * Math.cos(endAngle), oy2 = cy + outerR * Math.sin(endAngle);
  var ix1 = cx + innerR * Math.cos(endAngle), iy1 = cy + innerR * Math.sin(endAngle);
  var ix2 = cx + innerR * Math.cos(startAngle), iy2 = cy + innerR * Math.sin(startAngle);
  var la = (endAngle - startAngle) > Math.PI ? 1 : 0;
  return '<path d="M' + ox1 + ',' + oy1 + ' A' + outerR + ',' + outerR + ' 0 ' + la + ',1 ' + ox2 + ',' + oy2 + ' L' + ix1 + ',' + iy1 + ' A' + innerR + ',' + innerR + ' 0 ' + la + ',0 ' + ix2 + ',' + iy2 + ' Z" fill="' + fill + '"' + strokeAttr + '/>';
}

function generateIEP(pkt) {
