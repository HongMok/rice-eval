<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>评估答题 - 康复师App 手机端</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--app-font);
  background: var(--app-bg);
  color: var(--app-text);
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ===== 顶部栏 ===== */
.topbar {
  background: var(--app-card);
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--app-border);
}
.topbar .back {
  font-size: 18px;
  cursor: pointer;
  color: var(--app-text);
  text-decoration: none;
  padding: 4px 8px 4px 0;
  flex-shrink: 0;
}
.topbar .title {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar .progress-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--app-primary);
  flex-shrink: 0;
  margin-left: 8px;
}
.topbar .progress-text.completed { color: var(--app-success); }
.topbar .settings-btn {
  background: none;
  border: none;
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--app-text-sec);
  flex-shrink: 0;
  margin-left: 4px;
}
.topbar .settings-btn:active { color: var(--app-primary); }

/* ===== 进度条 ===== */
.progress-bar-wrap {
  background: var(--app-card);
  padding: 0 12px 8px;
  flex-shrink: 0;
}
.progress-track {
  width: 100%;
  height: 4px;
  background: #E8ECF0;
  border-radius: 9999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--app-primary), #60B8FF);
  border-radius: 9999px;
  transition: width .3s;
}

/* ===== 主卡片区域 ===== */
.card-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px 12px 0;
  -webkit-overflow-scrolling: touch;
}
.card-loading {
  text-align: center;
  padding: 40px 0;
  color: var(--app-text-sec);
  font-size: 14px;
}
.q-card {
  background: var(--app-card);
  border-radius: var(--app-radius-xl);
  box-shadow: var(--app-shadow);
  padding: 16px;
  border-left: 3px solid transparent;
  transition: border-color .2s;
  min-height: 120px;
}
.q-card.marked { border-left-color: var(--app-warning); }
.q-card-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.q-card-header .q-num {
  font-size: 13px;
  font-weight: 600;
  color: var(--app-primary);
  flex-shrink: 0;
}
.q-card-header .q-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--app-text);
  flex: 1;
  line-height: 1.4;
}
.q-card-header .mark-btn {
  background: none;
  border: 1px solid #D1D5DB;
  border-radius: var(--app-radius-md);
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #C4C9D4;
  flex-shrink: 0;
  transition: all .15s;
}
.q-card-header .mark-btn.marked {
  color: var(--app-warning);
  border-color: var(--app-warning);
  background: rgba(245,166,35,0.1);
}
.q-card-header .mark-btn svg { pointer-events: none; }

/* 信息盒子 */
.q-card-info-box {
  background: #EBF5FF;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 10px;
}
.q-card-info-box .info-desc {
  font-size: 14px;
  color: #1A2233;
  line-height: 1.5;
}
.q-card-info-box .info-materials {
  font-size: 12px;
  color: #5A6478;
  margin-top: 4px;
}
.q-card-info-box .info-materials .info-materials-label { color: #8C95A6; }
.q-card-info-box .info-age {
  display: inline-block;
  font-size: 12px;
  color: #3B9BF5;
  background: rgba(59,155,245,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 6px;
}

/* 备注 */
.q-card-note { margin-top: 8px; }
.note-toggle {
  font-size: 13px;
  color: #5A6478;
  cursor: pointer;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.note-toggle.has-note { color: var(--app-primary); }
.note-wrap { margin-top: 6px; }
.note-input {
  width: 100%;
  height: 60px;
  padding: 8px 10px;
  border: 1px solid var(--app-border);
  border-radius: var(--app-radius-md);
  font-size: 13px;
  font-family: var(--app-font);
  color: var(--app-text);
  resize: none;
  outline: none;
}
.note-input:focus { border-color: var(--app-primary); }
.note-input::placeholder { font-style: italic; color: #B0B8C8; }
.note-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 4px;
}
.note-count { font-size: 11px; color: #B0B8C8; }
.note-save-btn {
  background: none;
  border: none;
  color: var(--app-primary);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--app-font);
  padding: 2px 8px;
}
.note-saved-tip { font-size: 12px; color: var(--app-success); margin-left: 8px; }

/* 领域标签 */
.q-card-domain-label {
  font-size: 12px;
  color: #8C95A6;
  margin-bottom: 4px;
  font-weight: 500;
}
.q-card-domain-row { margin-bottom: 8px; }
.q-card-domain-row:last-child { margin-bottom: 0; }

/* ===== 评分按钮区 ===== */
.score-area {
  background: var(--app-card);
  padding: 8px 12px;
  flex-shrink: 0;
  border-top: 1px solid var(--app-border);
}
.score-area .q-card-scores {
  display: flex;
  gap: 0;
}
.score-area .score-radio {
  flex: 1;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(59,155,245,0.35);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  background: #fff;
  color: var(--app-primary);
  transition: all .15s;
  white-space: nowrap;
}
.score-area .score-radio:first-child { border-radius: var(--app-radius-md) 0 0 var(--app-radius-md); }
.score-area .score-radio:last-child { border-radius: 0 var(--app-radius-md) var(--app-radius-md) 0; }
.score-area .score-radio:not(:first-child) { border-left: none; }
.score-area .score-radio.selected { color: #fff; }
.score-area .score-radio:active { opacity: 0.8; }
.score-area .score-desc-text {
  font-size: 12px;
  color: var(--app-text-sec);
  margin-top: 4px;
  text-align: center;
  min-height: 16px;
}

/* 回合统计区域（在卡片内） */
.rounds-area {
  background: #FAFBFC;
  border: 1px solid var(--app-border);
  border-radius: 10px;
  padding: 10px;
  margin-top: 8px;
}
.rounds-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.rounds-header .rounds-title { font-size: 13px; font-weight: 600; color: var(--app-text); }
.rounds-header .rounds-hint { font-size: 11px; color: var(--app-text-sec); }
.round-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 4px;
}
.round-row .round-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--app-primary);
  min-width: 44px;
}
.round-row .round-btn {
  flex: 1;
  height: 32px;
  border: 1px solid rgba(59,155,245,0.35);
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  background: #fff;
  color: var(--app-primary);
  display: flex;
  align-items: center;
  justify-content: center;
}
.round-row .round-btn:active { opacity: 0.8; }
.round-row .round-btn.sel-independent { background: #52C41A; color: #fff; border-color: #52C41A; }
.round-row .round-btn.sel-error { background: #F56C6C; color: #fff; border-color: #F56C6C; }
.round-row .round-btn.sel-prompted { background: #F5A623; color: #fff; border-color: #F5A623; }
.rounds-add {
  width: 100%;
  height: 28px;
  border: 1px dashed var(--app-border);
  border-radius: 6px;
  background: none;
  cursor: pointer;
  font-size: 12px;
  color: var(--app-text-sec);
  margin-top: 4px;
}
.rounds-result {
  font-size: 12px;
  color: var(--app-text-sec);
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--app-border);
}
.rounds-result .result-score { font-weight: 600; color: var(--app-primary); }

/* ===== 导航按钮 ===== */
.nav-bar {
  display: flex;
  gap: 8px;
  padding: 6px 12px;
  background: var(--app-card);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1;
  height: 36px;
  border: 1px solid var(--app-border);
  border-radius: var(--app-radius-md);
  background: #fff;
  color: var(--app-text-nav);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--app-font);
}
.nav-btn:active { background: #F5F7FA; }
.nav-btn.skip { color: var(--app-text-sec); }
.nav-btn:disabled { opacity: 0.4; cursor: default; }

/* ===== 底部固定栏 ===== */
.bottom-bar {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: var(--app-card);
  border-top: 1px solid var(--app-border);
  flex-shrink: 0;
}
.bottom-btn {
  flex: 1;
  height: 40px;
  border-radius: var(--app-radius-md);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--app-font);
  border: none;
}
.bottom-btn.primary { background: var(--app-primary); color: #fff; }
.bottom-btn.primary:active { background: var(--app-primary-hover); }
.bottom-btn.secondary { background: #fff; color: var(--app-text-sec); border: 1px solid var(--app-border); }
.bottom-btn.secondary:active { background: #F5F7FA; }
.bottom-btn.primary.ready { background: var(--app-success); }

/* ===== 设置浮窗 ===== */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  display: none;
}
.settings-overlay.show { display: block; }
.settings-popover {
  position: absolute;
  top: 52px;
  right: 12px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  padding: 14px;
  width: 260px;
}
.settings-popover h4 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.settings-popover .mode-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--app-border);
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 8px;
}
.settings-popover .mode-option.active { border-color: var(--app-primary); background: #EBF5FF; }
.settings-popover .mode-option .mode-radio {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid var(--app-border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.settings-popover .mode-option.active .mode-radio { border-color: var(--app-primary); }
.settings-popover .mode-option.active .mode-radio::after {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--app-primary);
}
.settings-popover .mode-label { font-size: 13px; font-weight: 500; }
.settings-popover .mode-desc { font-size: 12px; color: var(--app-text-sec); margin-top: 2px; }

/* ===== 弹窗 ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--app-radius-xl);
  padding: 20px;
  width: calc(100% - 48px);
  max-width: 360px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal h3 { font-size: 16px; margin-bottom: 10px; }
.modal p { font-size: 14px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 14px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button {
  padding: 8px 18px;
  border-radius: var(--app-radius-md);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--app-font);
}
.modal-btns .cancel { background: #fff; border: 1px solid var(--app-border); }
.modal-btns .confirm { background: var(--app-primary); color: #fff; border: none; }

/* 待定列表 */
.pending-list { max-height: 300px; overflow-y: auto; margin-bottom: 12px; flex: 1; }
.pending-group-title { font-weight: 600; margin: 8px 0 4px; font-size: 13px; }
.pending-item {
  padding: 8px 0;
  border-bottom: 1px solid var(--app-border);
  font-size: 13px;
  cursor: pointer;
  color: var(--app-primary);
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #1A2233;
  color: #fff;
  padding: 8px 16px;
  border-radius: var(--app-radius-md);
  font-size: 13px;
  z-index: 10000;
  display: none;
  white-space: nowrap;
}
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }

/* ===== 重置按钮 ===== */
.reset-btn {
  position: fixed;
  bottom: 100px;
  right: 8px;
  background: rgba(0,0,0,0.35);
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: var(--app-radius-md);
  font-size: 12px;
  cursor: pointer;
  z-index: 9999;
  opacity: 0.5;
}
.reset-btn:active { opacity: 1; }

/* ===== 滑动动画 ===== */
.card-area .q-card { animation: cardIn .25s ease; }
@keyframes cardIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <span class="back" onclick="showExitModal()">←</span>
  <span class="title" id="headerTitle">评估</span>
  <span class="progress-text" id="progressText">0/0</span>
  <button class="settings-btn" onclick="toggleSettings()" title="评分设置">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<!-- 进度条 -->
<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<!-- 主卡片区域 -->
<div class="card-area" id="cardArea">
  <div class="card-loading">加载中...</div>
</div>

<!-- 评分按钮区 -->
<div class="score-area" id="scoreArea"></div>

<!-- 导航按钮 -->
<div class="nav-bar" id="navBar">
  <button class="nav-btn" id="prevBtn" onclick="goPrev()">上一题</button>
  <button class="nav-btn skip" id="skipBtn" onclick="goSkip()">跳过</button>
  <button class="nav-btn" id="nextBtn" onclick="goNext()">下一题</button>
</div>

<!-- 底部固定栏 -->
<div class="bottom-bar">
  <button class="bottom-btn secondary" onclick="showExitModal()">保存退出</button>
  <button class="bottom-btn primary" id="submitBtn" onclick="trySubmit()">提交评估</button>
</div>

<!-- 设置浮窗 -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-popover" id="settingsPopover">
    <h4>统计方式</h4>
    <div class="mode-option active" id="modeDirectOpt" onclick="switchScoringMode('direct')">
      <div class="mode-radio"></div>
      <div>
        <div class="mode-label">直接评分</div>
        <div class="mode-desc">直接点击评分等级，一次完成评分</div>
      </div>
    </div>
    <div class="mode-option" id="modeRoundsOpt" onclick="switchScoringMode('rounds')">
      <div class="mode-radio"></div>
      <div>
        <div class="mode-label">回合统计</div>
        <div class="mode-desc">多回合探测，自动换算评分</div>
      </div>
    </div>
  </div>
</div>

<!-- 提交确认弹窗 -->
<div class="modal-overlay" id="submitModal">
  <div class="modal"><h3>确认提交</h3><p id="submitMsg"></p>
    <div class="modal-btns"><button class="cancel" onclick="closeModal('submitModal')">取消</button><button class="confirm" onclick="confirmSubmit()">确认提交</button></div>
  </div>
</div>

<!-- 退出确认弹窗 -->
<div class="modal-overlay" id="exitModal">
  <div class="modal"><h3>确认退出</h3><p>当前评估进度已自动保存，下次可继续作答。确定退出吗？</p>
    <div class="modal-btns"><button class="confirm" onclick="closeModal('exitModal')">继续评估</button><button class="cancel" onclick="doExit()">退出</button></div>
  </div>
</div>

<!-- 未完成提示弹窗 -->
<div class="modal-overlay" id="incompleteModal">
  <div class="modal"><h3>无法提交</h3><p id="incompleteMsg"></p>
    <div class="modal-btns"><button class="confirm" onclick="closeModal('incompleteModal')">知道了</button></div>
  </div>
</div>

<!-- 待定列表弹窗 -->
<div class="modal-overlay" id="pendingModal">
  <div class="modal"><h3>待定题目列表</h3>
    <div class="pending-list" id="pendingList"></div>
    <div class="modal-btns"><button class="cancel" onclick="closeModal('pendingModal')">关闭</button></div>
  </div>
</div>

<!-- 重置确认弹窗 -->
<div class="modal-overlay" id="resetModal">
  <div class="modal"><h3>确认重置</h3><p>确定要重置所有评估数据吗？此操作不可撤销。</p>
    <div class="modal-btns"><button class="cancel" onclick="closeModal('resetModal')">取消</button><button class="confirm" onclick="doReset()">确认重置</button></div>
  </div>
</div>

<!-- 模式切换确认弹窗 -->
<div class="modal-overlay" id="modeSwitchModal">
  <div class="modal"><h3 id="modeSwitchTitle">切换统计方式</h3><p id="modeSwitchMsg"></p>
    <div class="modal-btns"><button class="cancel" onclick="closeModal('modeSwitchModal')">取消</button><button class="confirm" onclick="confirmModeSwitch()">确认切换</button></div>
  </div>
</div>

<!-- 一键操作确认弹窗 -->
<div class="modal-overlay" id="quickActionModal">
  <div class="modal"><h3>确认操作</h3><p id="quickActionMsg"></p>
    <div class="modal-btns"><button class="cancel" onclick="closeModal('quickActionModal')">取消</button><button class="confirm" id="quickActionConfirmBtn">确认</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="reset-btn" id="resetBtn" onclick="resetAll()">🔄 一键重置</button>

<script>
/* ========================================================
   answerConfig 驱动配置
   ======================================================== */
const ANSWER_CONFIGS = {
  pep3:   { listMode: "byDomain", cardFields: ["itemName", "desc", "materials"], showScoreDesc: false, navCollapsedByDefault: false, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: false },
  cpep:   { listMode: "byDomain", cardFields: ["itemName", "desc", "materials", "ageRange"], showScoreDesc: true, navCollapsedByDefault: true, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: false },
  vbmapp: { listMode: "byDomain", cardFields: ["itemName", "desc"], showScoreDesc: false, navCollapsedByDefault: false, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: false },
  common: { listMode: "byDomain", cardFields: ["itemName", "desc", "materials", "ageRange"], showScoreDesc: true, navCollapsedByDefault: false, quickActions: ["failAll", "passAll", "nextDomain"], allowPartialSubmit: true }
};

/* ===== URL 参数 & 工具信息 ===== */
const params = new URLSearchParams(location.search);
const toolId = params.get('tool') || localStorage.getItem('rice_assessment_current_tool') || 'pep3';
const recordId = params.get('record') || localStorage.getItem('rice_assessment_current_record') || '';

const toolsData = JSON.parse(localStorage.getItem('rice_assessment_tools') || '[]');
const toolInfo = toolsData.find(t => t.id === toolId);
const toolType = (toolInfo && toolInfo.type) || toolId;
const toolName = (toolInfo && toolInfo.name) || toolType.toUpperCase();

const answerConfig = (function() {
  const typeConfigRaw = localStorage.getItem('rice_assessment_type_config');
  if (typeConfigRaw) {
    try {
      const typeConfig = JSON.parse(typeConfigRaw);
      const matched = (typeConfig.types || []).find(t => t.id === toolType);
      if (matched && matched.answerConfig) return matched.answerConfig;
    } catch(e) {}
  }
  return ANSWER_CONFIGS[toolType] || ANSWER_CONFIGS.common;
})();

const ANSWERS_KEY = 'rice_assessment_answers_';
const RECORDS_KEY = 'rice_assessment_records';
const answersKey = ANSWERS_KEY + recordId;

/* ===== 全局状态 ===== */
let navGroups = [];
let allQuestions = [];
let questionsByDomain = {};
let allDomainKeys = [];
let answers = {};
let marks = {};
let notes = {};
let currentIndex = 0; // 当前题目索引（在 flatQuestions 中）
let flatQuestions = []; // 扁平化的题目列表（用于单卡片导航）
let mergedQuestions = [];

/* ===== 评分按钮颜色 ===== */
function getScoreColor(index, total) {
  if (total <= 1) return '#52C41A';
  if (index === 0) return '#52C41A';
  if (index === total - 1) return '#F56C6C';
  return '#F5A623';
}
function getScoreClass(index, total) {
  if (total <= 1) return 'score-pass';
  if (index === 0) return 'score-pass';
  if (index === total - 1) return 'score-fail';
  return 'score-emerging';
}

/* ===== 数据加载 ===== */
function loadData() {
  const configKey = 'rice_assessment_config_' + toolId;
  const raw = localStorage.getItem(configKey);
  if (!raw) {
    document.getElementById('cardArea').innerHTML = '<div class="card-loading">未找到评估配置数据</div>';
    return;
  }
  let configData;
  try { configData = JSON.parse(raw); } catch(e) {
    document.getElementById('cardArea').innerHTML = '<div class="card-loading">配置数据解析失败</div>';
    return;
  }

  const groupMap = new Map();
  Object.keys(configData).forEach(key => {
    const parts = key.split('__');
    const groupName = parts[0] || '默认分组';
    const domainName = parts[1] || '默认领域';
    const rawQs = configData[key] || [];
    if (!groupMap.has(groupName)) groupMap.set(groupName, []);
    const questions = rawQs.filter(q => q.enabled !== false).map((q, idx) => ({
      id: q.id || (toolId + '_' + key + '_' + idx),
      number: q.number || (idx + 1),
      domainKey: key,
      domainName: domainName,
      groupName: groupName,
      itemName: q.itemName || '',
      desc: q.desc || '',
      materials: q.materials || '',
      ageRange: q.ageRange || '',
      required: q.required !== false,
      scores: q.scores || []
    }));
    groupMap.get(groupName).push({ domainName, domainKey: key, questions });
  });

  navGroups = [];
  allQuestions = [];
  questionsByDomain = {};
  allDomainKeys = [];
  let globalNum = 1;
  const isByOrder = answerConfig.listMode === 'byOrder';
  groupMap.forEach((domains, groupName) => {
    domains.forEach(d => {
      if (!isByOrder) {
        d.questions.forEach(q => { q.number = globalNum++; });
      }
      questionsByDomain[d.domainKey] = d.questions;
      allQuestions.push(...d.questions);
      allDomainKeys.push(d.domainKey);
    });
    navGroups.push({ groupName, items: domains });
  });

  // byOrder 模式：按排序号合并
  if (isByOrder) {
    const numberMap = new Map();
    allQuestions.forEach(q => {
      if (!numberMap.has(q.number)) numberMap.set(q.number, []);
      numberMap.get(q.number).push(q);
    });
    mergedQuestions = [];
    const sortedNumbers = [...numberMap.keys()].sort((a, b) => a - b);
    sortedNumbers.forEach(num => {
      mergedQuestions.push({ number: num, items: numberMap.get(num) });
    });
  }

  // 构建 flatQuestions（用于单卡片导航）
  if (isByOrder) {
    flatQuestions = mergedQuestions; // 每个元素 { number, items:[] }
  } else {
    flatQuestions = allQuestions.map(q => ({ number: q.number, items: [q] }));
  }
}

/* ===== 答题数据管理 ===== */
function initAnswers() {
  const saved = localStorage.getItem(answersKey);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data && typeof data === 'object') {
        if (data.answers !== undefined && typeof data.answers === 'object' && !data.answers.value) {
          Object.keys(data.answers).forEach(qId => {
            answers[qId] = { value: data.answers[qId], label: '' };
          });
          marks = data.marks || {};
          notes = data.notes || {};
        } else {
          Object.keys(data).forEach(qId => {
            if (qId === '_marks') return;
            if (data[qId] && typeof data[qId] === 'object' && data[qId].value !== undefined) {
              answers[qId] = { value: data[qId].value, label: data[qId].label || '' };
              if (data[qId].notes) notes[qId] = data[qId].notes;
              if (data[qId].rounds) roundsData[qId] = data[qId].rounds;
            }
          });
          if (data._marks) marks = data._marks;
        }
      }
    } catch(e) {}
  }
  // 恢复上次浏览位置
  const lastIdx = parseInt(localStorage.getItem('rice_assessment_mobile_index_' + recordId) || '0');
  if (lastIdx >= 0 && lastIdx < flatQuestions.length) currentIndex = lastIdx;
  saveAnswers();
}

function saveAnswers() {
  const store = {};
  Object.keys(answers).forEach(qId => {
    store[qId] = { value: answers[qId].value, label: answers[qId].label || '' };
    if (notes[qId]) store[qId].notes = notes[qId];
    if (roundsData[qId] && roundsData[qId].some(r => r.result !== null)) {
      store[qId].rounds = roundsData[qId];
    }
  });
  Object.keys(notes).forEach(qId => {
    if (!store[qId]) store[qId] = { value: undefined, label: '' };
    store[qId].notes = notes[qId];
  });
  store._marks = marks;
  localStorage.setItem(answersKey, JSON.stringify(store));
  localStorage.setItem('rice_assessment_mobile_index_' + recordId, currentIndex);
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = allQuestions.length;
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  const ptEl = document.getElementById('progressText');
  if (ptEl) {
    ptEl.textContent = answered + '/' + total;
    ptEl.className = (answered >= total && total > 0) ? 'progress-text completed' : 'progress-text';
  }
  document.getElementById('progressFill').style.width = pct + '%';
  const btn = document.getElementById('submitBtn');
  if (btn) {
    if (answered >= total && total > 0) {
      btn.className = 'bottom-btn primary ready';
      btn.textContent = '提交评估 ✓';
    } else {
      btn.className = 'bottom-btn primary';
      btn.textContent = '提交评估';
    }
  }
  const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  const rec = records.find(r => r.id === recordId);
  if (rec) { rec.answeredCount = answered; localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }
}

/* ===== 渲染当前卡片 ===== */
function renderCurrentCard() {
  if (flatQuestions.length === 0) return;
  const mq = flatQuestions[currentIndex];
  if (!mq) return;
  const primaryQ = mq.items[0];
  const isMerged = mq.items.length > 1;
  const anyMarked = mq.items.some(q => marks[q.id]);
  const fields = answerConfig.cardFields;
  const showDesc = answerConfig.showScoreDesc;
  const showItemName = fields.includes('itemName');
  const showMaterials = fields.includes('materials');
  const showDescField = fields.includes('desc');
  const showAgeRange = fields.includes('ageRange');

  // Header
  let html = '<div class="q-card ' + (anyMarked ? 'marked' : '') + '" id="currentCard">';
  html += '<div class="q-card-header">';
  html += '<span class="q-num">' + primaryQ.number + '.</span>';
  if (showItemName) html += '<span class="q-title">' + escHtml(primaryQ.itemName) + '</span>';
  html += '<button class="mark-btn ' + (anyMarked ? 'marked' : '') + '" onclick="toggleMarkCurrent()" title="标记待定"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></button>';
  html += '</div>';

  // Info box
  const hasDescContent = showDescField && primaryQ.desc;
  const hasMaterials = showMaterials && primaryQ.materials;
  const hasAge = showAgeRange && primaryQ.ageRange;
  if (hasDescContent || hasMaterials || hasAge) {
    html += '<div class="q-card-info-box">';
    if (hasDescContent) html += '<div class="info-desc">' + escHtml(primaryQ.desc) + '</div>';
    if (hasMaterials) html += '<div class="info-materials"><span class="info-materials-label">材料：</span>' + escHtml(primaryQ.materials) + '</div>';
    if (hasAge) html += '<span class="info-age">' + escHtml(primaryQ.ageRange) + '</span>';
    html += '</div>';
  }

  // Rounds mode: render rounds UI inside card
  if (scoringMode === 'rounds') {
    if (isMerged) {
      mq.items.forEach(q => {
        html += '<div class="q-card-domain-row">';
        html += '<div class="q-card-domain-label">' + escHtml(q.domainName) + '</div>';
        html += '<div id="rounds_' + q.id + '">' + renderRoundsUI(q.id, q.scores || []) + '</div>';
        html += '</div>';
      });
    } else {
      html += '<div id="rounds_' + primaryQ.id + '">' + renderRoundsUI(primaryQ.id, primaryQ.scores || []) + '</div>';
    }
  }

  // Note
  const noteQId = primaryQ.id;
  const noteText = notes[noteQId] || '';
  const hasNote = noteText.length > 0;
  html += '<div class="q-card-note">';
  html += '<span class="note-toggle ' + (hasNote ? 'has-note' : '') + '" onclick="toggleNote(\'' + noteQId + '\')">';
  html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg> 备注' + (hasNote ? ' (已填)' : '') + '</span>';
  html += '<div class="note-wrap" id="noteWrap_' + noteQId + '" style="' + (hasNote ? '' : 'display:none') + '">';
  html += '<textarea class="note-input" id="note_' + noteQId + '" maxlength="200" placeholder="记录观察到的行为表现..." oninput="onNoteInput(\'' + noteQId + '\')">' + escHtml(noteText) + '</textarea>';
  html += '<div class="note-footer"><span class="note-count" id="noteCount_' + noteQId + '">' + noteText.length + '/200</span>';
  html += '<button class="note-save-btn" onclick="saveNoteBtn(\'' + noteQId + '\')">保存</button></div>';
  html += '</div></div>';

  html += '</div>';
  document.getElementById('cardArea').innerHTML = html;

  // Render score buttons (direct mode only, outside card)
  renderScoreButtons();
  updateNavButtons();
}

/* ===== 渲染评分按钮（底部区域） ===== */
function renderScoreButtons() {
  const scoreArea = document.getElementById('scoreArea');
  if (scoringMode === 'rounds') {
    scoreArea.innerHTML = '';
    scoreArea.style.display = 'none';
    return;
  }
  scoreArea.style.display = '';
  const mq = flatQuestions[currentIndex];
  if (!mq) { scoreArea.innerHTML = ''; return; }
  const isMerged = mq.items.length > 1;

  if (isMerged) {
    // Merged card: one score row per domain
    let html = '';
    mq.items.forEach(q => {
      html += '<div class="q-card-domain-row">';
      html += '<div class="q-card-domain-label">' + escHtml(q.domainName) + '</div>';
      html += renderScoreRow(q);
      html += '</div>';
    });
    scoreArea.innerHTML = html;
  } else {
    scoreArea.innerHTML = renderScoreRow(mq.items[0]);
  }
}

function renderScoreRow(q) {
  const ans = answers[q.id];
  const scores = q.scores || [];
  const total = scores.length;
  if (total === 0) return '';
  const displayScores = [...scores].reverse();
  const displayTotal = displayScores.length;
  let html = '<div class="q-card-scores">';
  displayScores.forEach((s, i) => {
    const color = getScoreColor(displayTotal - 1 - i, displayTotal);
    const selected = ans && ans.value === s.value;
    const style = selected ? 'background:' + color + ';color:#fff;border-color:' + color : '';
    const btnText = s.value + ' ' + (s.label || '');
    html += '<div class="score-radio ' + (selected ? 'selected' : '') + '" data-color="' + color + '" data-value="' + s.value + '" data-label="' + escAttr(s.label || '') + '" data-qid="' + q.id + '" onclick="scoreQuestion(\'' + q.id + '\',' + s.value + ',\'' + escAttr(s.label || '') + '\',this)" style="' + style + '">' + escHtml(btnText) + '</div>';
  });
  html += '</div>';
  if (answerConfig.showScoreDesc) {
    let descText = '';
    if (ans) {
      const matched = scores.find(s => s.value === ans.value);
      if (matched && matched.desc) descText = matched.desc;
    }
    html += '<div class="score-desc-text" id="scoreDesc_' + q.id + '">' + escHtml(descText) + '</div>';
  }
  return html;
}

/* ===== 评分操作 ===== */
function scoreQuestion(qId, val, label, el) {
  answers[qId] = { value: val, label: label };
  saveAnswers();
  // Update button states in the same row
  const row = el.closest('.q-card-scores');
  row.querySelectorAll('.score-radio').forEach(r => {
    r.classList.remove('selected');
    r.style.background = '';
    r.style.color = '';
    r.style.borderColor = '';
  });
  el.classList.add('selected');
  const color = el.dataset.color;
  el.style.background = color;
  el.style.color = '#fff';
  el.style.borderColor = color;

  if (answerConfig.showScoreDesc) {
    const descEl = document.getElementById('scoreDesc_' + qId);
    if (descEl) {
      const q = allQuestions.find(qq => qq.id === qId);
      if (q) {
        const matched = (q.scores || []).find(s => s.value === val);
        descEl.textContent = (matched && matched.desc) || '';
      }
    }
  }

  // Auto-advance: for single-item cards, go to next after scoring
  const mq = flatQuestions[currentIndex];
  if (mq && mq.items.length === 1) {
    setTimeout(function() { goNext(); }, 350);
  }
}

/* ===== 标记待定 ===== */
function toggleMarkCurrent() {
  const mq = flatQuestions[currentIndex];
  if (!mq) return;
  // Toggle mark on all items in this card
  const newState = !mq.items.some(q => marks[q.id]);
  mq.items.forEach(q => { marks[q.id] = newState; });
  saveAnswers();
  renderCurrentCard();
  showToast(newState ? '已标记为待定' : '已取消待定');
}

/* ===== 导航 ===== */
function updateNavButtons() {
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= flatQuestions.length - 1;
  // Update skip button text
  const mq = flatQuestions[currentIndex];
  const allAnswered = mq && mq.items.every(q => answers[q.id] !== undefined);
  document.getElementById('skipBtn').textContent = allAnswered ? '已答' : '跳过';
}

function goPrev() {
  if (currentIndex > 0) {
    saveCurrentNote();
    currentIndex--;
    renderCurrentCard();
  }
}

function goNext() {
  if (currentIndex < flatQuestions.length - 1) {
    saveCurrentNote();
    currentIndex++;
    renderCurrentCard();
  }
}

function goSkip() {
  goNext();
}

function goToIndex(idx) {
  if (idx >= 0 && idx < flatQuestions.length) {
    saveCurrentNote();
    currentIndex = idx;
    renderCurrentCard();
  }
}

/* ===== 备注 ===== */
function toggleNote(qId) {
  const wrap = document.getElementById('noteWrap_' + qId);
  if (!wrap) return;
  const isHidden = wrap.style.display === 'none';
  wrap.style.display = isHidden ? '' : 'none';
  if (isHidden) {
    var ta = document.getElementById('note_' + qId);
    if (ta) ta.focus();
  } else {
    saveNote(qId);
  }
}

function onNoteInput(qId) {
  var ta = document.getElementById('note_' + qId);
  var countEl = document.getElementById('noteCount_' + qId);
  if (ta && countEl) countEl.textContent = ta.value.length + '/200';
}

function saveNoteBtn(qId) {
  saveNote(qId);
  showToast('备注已保存');
}

function saveNote(qId) {
  const ta = document.getElementById('note_' + qId);
  if (!ta) return;
  const val = ta.value.trim();
  if (val) { notes[qId] = val; } else { delete notes[qId]; }
  saveAnswers();
}

function saveCurrentNote() {
  const mq = flatQuestions[currentIndex];
  if (mq) saveNote(mq.items[0].id);
}

/* ===== 统计模式 ===== */
const SCORING_MODE_KEY = 'rice_assessment_scoring_mode';
let scoringMode = localStorage.getItem(SCORING_MODE_KEY) || 'rounds';
let pendingMode = null;
let roundsData = {};

function toggleSettings() {
  document.getElementById('settingsOverlay').classList.toggle('show');
}

function closeSettings(e) {
  if (e.target === document.getElementById('settingsOverlay')) {
    document.getElementById('settingsOverlay').classList.remove('show');
  }
}

function switchScoringMode(mode) {
  if (mode === scoringMode) return;
  const hasData = Object.keys(answers).length > 0 || Object.keys(roundsData).length > 0;
  if (hasData) {
    pendingMode = mode;
    const msg = mode === 'rounds'
      ? '切换后，已有的评分结果将同步到回合统计模式。确定切换吗？'
      : '切换后，已有的评分结果将同步到直接评分模式，但回合统计数据将被清除。确定切换吗？';
    document.getElementById('modeSwitchMsg').textContent = msg;
    document.getElementById('modeSwitchModal').classList.add('show');
  } else {
    applyScoringMode(mode);
  }
}

function confirmModeSwitch() {
  if (pendingMode === 'direct') roundsData = {};
  if (pendingMode) applyScoringMode(pendingMode);
  closeModal('modeSwitchModal');
}

function applyScoringMode(mode) {
  scoringMode = mode;
  pendingMode = null;
  localStorage.setItem(SCORING_MODE_KEY, mode);
  document.getElementById('modeDirectOpt').classList.toggle('active', mode === 'direct');
  document.getElementById('modeRoundsOpt').classList.toggle('active', mode === 'rounds');
  document.getElementById('settingsOverlay').classList.remove('show');
  renderCurrentCard();
  showToast(mode === 'rounds' ? '已切换到回合统计模式' : '已切换到直接评分模式');
}

function renderRoundsUI(qId, scores) {
  const rounds = roundsData[qId] || [{round:1,result:null},{round:2,result:null},{round:3,result:null}];
  if (!roundsData[qId]) roundsData[qId] = rounds;
  let html = '<div class="rounds-area">';
  html += '<div class="rounds-header"><span class="rounds-title">回合统计</span><span class="rounds-hint">默认3回合</span></div>';
  rounds.forEach((r, i) => {
    html += '<div class="round-row">';
    html += '<span class="round-label">第' + (i+1) + '回合</span>';
    html += '<button class="round-btn ' + (r.result === 'independent' ? 'sel-independent' : '') + '" onclick="setRoundResult(\'' + qId + '\',' + i + ',\'independent\')">独立(+)</button>';
    html += '<button class="round-btn ' + (r.result === 'error' ? 'sel-error' : '') + '" onclick="setRoundResult(\'' + qId + '\',' + i + ',\'error\')">错误(-)</button>';
    html += '<button class="round-btn ' + (r.result === 'prompted' ? 'sel-prompted' : '') + '" onclick="setRoundResult(\'' + qId + '\',' + i + ',\'prompted\')">辅助(P)</button>';
    html += '</div>';
  });
  html += '<div style="display:flex;gap:6px;margin-top:4px">';
  html += '<button class="rounds-add" style="flex:1;margin-top:0" onclick="addRound(\'' + qId + '\')">+ 新增回合</button>';
  html += '<button class="rounds-add" style="width:auto;margin-top:0;padding:0 10px;color:#8C95A6" onclick="resetRounds(\'' + qId + '\')">重置</button>';
  html += '</div>';

  const answered = rounds.filter(r => r.result !== null);
  if (answered.length > 0) {
    const indep = answered.filter(r => r.result === 'independent').length;
    const prompted = answered.filter(r => r.result === 'prompted').length;
    const total = answered.length;
    const indepRate = indep / total;
    const promptedRate = prompted / total;
    const maxScore = scores[0];
    const midScore = scores.length >= 3 ? scores[Math.floor(scores.length / 2)] : scores[scores.length > 1 ? 1 : 0];
    const minScore = scores[scores.length - 1];
    let resultScore, resultLabel;
    if (indepRate >= 0.8) { resultScore = maxScore; resultLabel = '独立率≥80%→最高分'; }
    else if (indepRate >= 0.3) { resultScore = midScore; resultLabel = '独立率≥30%→中间分'; }
    else if (promptedRate > 0) { resultScore = midScore; resultLabel = '辅助率>0%→中间分'; }
    else { resultScore = minScore; resultLabel = '独立率<30%且无辅助→最低分'; }
    var resultColor = '#F5A623';
    if (resultScore === maxScore) resultColor = '#52C41A';
    else if (resultScore === minScore) resultColor = '#F56C6C';
    html += '<div class="rounds-result">换算：<span class="result-score" style="font-size:15px;color:' + resultColor + '">' + resultScore.value + ' ' + resultScore.label + '</span> <span style="font-size:11px;color:#8C95A6">（独立' + indep + '/' + total + '=' + Math.round(indepRate*100) + '%，' + resultLabel + '）</span></div>';
    answers[qId] = { value: resultScore.value, label: resultScore.label };
    saveAnswers();
    updateProgress();
  } else if (answers[qId] && answers[qId].value !== undefined) {
    const existAns = answers[qId];
    html += '<div class="rounds-result" style="color:#8C95A6">当前：<span style="font-weight:600">' + existAns.value + ' ' + (existAns.label||'') + '</span> <span style="font-size:11px">（来自直接评分）</span></div>';
  }
  html += '</div>';
  return html;
}

function setRoundResult(qId, roundIdx, result) {
  if (!roundsData[qId]) roundsData[qId] = [{round:1,result:null},{round:2,result:null},{round:3,result:null}];
  roundsData[qId][roundIdx].result = result;
  const el = document.getElementById('rounds_' + qId);
  if (el) {
    const q = allQuestions.find(qq => qq.id === qId);
    el.innerHTML = renderRoundsUI(qId, q ? (q.scores || []) : []);
  }
  saveAnswers();
}

function addRound(qId) {
  if (!roundsData[qId]) roundsData[qId] = [];
  roundsData[qId].push({ round: roundsData[qId].length + 1, result: null });
  const el = document.getElementById('rounds_' + qId);
  if (el) {
    const q = allQuestions.find(qq => qq.id === qId);
    el.innerHTML = renderRoundsUI(qId, q ? (q.scores || []) : []);
  }
}

function resetRounds(qId) {
  document.getElementById('quickActionMsg').textContent = '确定重置该题的回合统计数据吗？';
  const confirmBtn = document.getElementById('quickActionConfirmBtn');
  confirmBtn.onclick = function() {
    roundsData[qId] = [{round:1,result:null},{round:2,result:null},{round:3,result:null}];
    delete answers[qId];
    saveAnswers();
    renderCurrentCard();
    closeModal('quickActionModal');
    showToast('已重置回合数据');
  };
  document.getElementById('quickActionModal').classList.add('show');
}

/* ===== 待定列表 ===== */
function showPendingList() {
  const markedQs = allQuestions.filter(q => marks[q.id]);
  const list = document.getElementById('pendingList');
  if (markedQs.length === 0) {
    list.innerHTML = '<p style="color:#8C95A6;font-size:13px">暂无待定题目</p>';
  } else {
    const grouped = new Map();
    markedQs.forEach(q => {
      const gKey = q.groupName + ' / ' + q.domainName;
      if (!grouped.has(gKey)) grouped.set(gKey, []);
      grouped.get(gKey).push(q);
    });
    let html = '';
    grouped.forEach((qs, gKey) => {
      html += '<div class="pending-group-title">▼ ' + escHtml(gKey) + '</div>';
      qs.forEach(q => {
        const idx = flatQuestions.findIndex(fq => fq.items.some(item => item.id === q.id));
        html += '<div class="pending-item" onclick="closeModal(\'pendingModal\');goToIndex(' + idx + ')">#' + q.number + ' ' + escHtml(q.itemName || q.desc) + '</div>';
      });
    });
    list.innerHTML = html;
  }
  document.getElementById('pendingModal').classList.add('show');
}

/* ===== 保存/退出 ===== */
function showExitModal() { saveAnswers(); document.getElementById('exitModal').classList.add('show'); }
function doExit() { closeModal('exitModal'); location.href = 'assessment-list.html'; }

/* ===== 提交 ===== */
function trySubmit() {
  const unanswered = allQuestions.filter(q => answers[q.id] === undefined).length;
  const total = allQuestions.length;
  const answered = total - unanswered;
  const allowPartial = answerConfig.allowPartialSubmit === true;
  if (answered === 0) {
    document.getElementById('incompleteMsg').textContent = '尚未作答任何题目，无法提交。';
    document.getElementById('incompleteModal').classList.add('show');
    return;
  }
  if (unanswered > 0 && !allowPartial) {
    document.getElementById('incompleteMsg').textContent = '还有 ' + unanswered + ' 道题目未作答，请完成所有题目后再提交。';
    document.getElementById('incompleteModal').classList.add('show');
    return;
  }
  if (unanswered > 0 && allowPartial) {
    document.getElementById('submitMsg').textContent = '还有 ' + unanswered + ' 道题目未作答（已完成 ' + answered + '/' + total + '），确认提交吗？';
  } else {
    document.getElementById('submitMsg').textContent = '确认提交评估吗？提交后不可修改。';
  }
  document.getElementById('submitModal').classList.add('show');
}

function confirmSubmit() {
  closeModal('submitModal');
  const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  const rec = records.find(r => r.id === recordId);
  if (rec) { rec.status = 'completed'; rec.answeredCount = allQuestions.length; localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }
  showToast('正在生成评估结果...');
  setTimeout(function(){ location.href = 'assessment-result.html?record=' + recordId + '&tool=' + toolId; }, 1500);
}

/* ===== 弹窗/Toast ===== */
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}

/* ===== 重置 ===== */
function resetAll() { document.getElementById('resetModal').classList.add('show'); }
function doReset() {
  closeModal('resetModal');
  Object.keys(localStorage).forEach(function(k){ if(k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.reload();
}

/* ===== 工具函数 ===== */
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ===== 触摸滑动支持 ===== */
let touchStartX = 0, touchStartY = 0;
document.getElementById('cardArea').addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('cardArea').addEventListener('touchend', function(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) goNext();
    else goPrev();
  }
}, { passive: true });

/* ===== 定时自动保存 ===== */
let autoSaveTimer = null;
function startAutoSave() {
  if (autoSaveTimer) clearInterval(autoSaveTimer);
  autoSaveTimer = setInterval(function() { saveAnswers(); }, 30000);
}

/* ===== 初始化 ===== */
(function init() {
  document.getElementById('headerTitle').textContent = toolName;
  document.getElementById('modeDirectOpt').classList.toggle('active', scoringMode === 'direct');
  document.getElementById('modeRoundsOpt').classList.toggle('active', scoringMode === 'rounds');
  loadData();
  if (allQuestions.length === 0) return;
  initAnswers();
  startAutoSave();
  renderCurrentCard();
})();
</script>
</body>
</html>
