<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PEP-3 评估报告 - 手机端</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; max-width: 420px; margin: 0 auto; }

/* 底部Tab导航 */
.bottom-tab-bar { background: var(--app-card); border-top: 1px solid var(--app-border); display: flex; flex-shrink: 0; position: relative; z-index: 50; }
.bottom-tab-btn { flex: 1; padding: 8px 0 6px; font-size: 12px; color: var(--app-text-nav); cursor: pointer; border: none; background: none; font-family: var(--app-font); font-weight: 500; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.bottom-tab-btn .tab-icon { font-size: 18px; }
.bottom-tab-btn.active { color: var(--app-primary); }

.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.tab-content { display: none; padding: 12px; }
.tab-content.active { display: block; }
.section-label { display: inline-block; background: var(--app-primary); color: #fff; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: var(--app-radius-md); margin-bottom: 10px; }
.card { background: var(--app-card); border-radius: var(--app-radius-lg); padding: 14px; box-shadow: var(--app-shadow); margin-bottom: 12px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-item { font-size: 13px; }
.info-item .label { color: var(--app-text-sec); }
.info-item .value { font-weight: 500; }
.report-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.report-desc { font-size: 12px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 14px; }
.tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -14px; padding: 0 14px; }
table.score-tbl { width: 100%; border-collapse: collapse; min-width: 480px; }
table.score-tbl th { background: #F5F7FA; padding: 7px 8px; text-align: left; font-weight: 500; color: var(--app-text-sec); font-size: 11px; border-bottom: 1px solid var(--app-border); white-space: nowrap; }
table.score-tbl td { padding: 7px 8px; border-bottom: 1px solid var(--app-border); font-size: 13px; white-space: nowrap; }
table.score-tbl tr:last-child td { border-bottom: none; }
table.score-tbl tr:hover td { background: #FAFBFC; }
table.score-tbl tr.total-row td { font-weight: 600; background: #F5F7FA; }
.behavior-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--app-border); gap: 8px; flex-wrap: wrap; }
.behavior-row:last-child { border-bottom: none; }
.behavior-row .bname { font-size: 13px; font-weight: 500; min-width: 80px; }
.behavior-row .bscore { font-size: 13px; color: var(--app-text-sec); }
.behavior-row .brating { display: flex; gap: 6px; }
.rating-opt { padding: 3px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; }
.rating-opt.selected { background: var(--app-primary); color: #fff; border-color: var(--app-primary); }
.editable-area { position: relative; }
.editable-area .edit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.editable-area .edit-link { color: var(--app-primary); font-size: 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.editable-area .area-text { font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
.editable-area .area-textarea { width: 100%; min-height: 100px; font-size: 13px; line-height: 1.8; font-family: var(--app-font); border: 1px solid var(--app-primary); border-radius: var(--app-radius-md); padding: 10px; resize: vertical; outline: none; display: none; }
.editable-area .area-textarea:focus { box-shadow: 0 0 0 2px rgba(59,155,245,0.2); }
.editable-area .edit-actions { display: none; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.editable-area .edit-actions button { padding: 6px 14px; border-radius: var(--app-radius-md); font-size: 12px; cursor: pointer; font-family: var(--app-font); }
.editable-area .edit-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.editable-area .edit-actions .btn-save { background: var(--app-primary); color: #fff; border: none; }
.pct-bar { display: inline-block; height: 6px; border-radius: 3px; background: var(--app-primary); vertical-align: middle; margin-right: 4px; }
.radar-svg { width: 100%; max-width: 300px; height: 300px; }
.chart-center { text-align: center; }
.bottom-actions { background: var(--app-card); border-top: 1px solid var(--app-border); padding: 10px 12px; display: flex; justify-content: center; gap: 12px; flex-shrink: 0; }
.btn-export { padding: 8px 20px; background: #fff; border: 1px solid #D8DDE5; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; color: var(--app-text-sec); font-family: var(--app-font); }
.btn-send { padding: 8px 20px; background: var(--app-primary); color: #fff; border: none; border-radius: var(--app-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--app-font); }
</style>
<style>
/* IEP 样式 - 手机端 */
.iep-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 12px; }
.iep-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; margin-bottom: 12px; }
.iep-info .label { color: var(--app-text-sec); }
.iep-info .link { color: var(--app-primary); cursor: pointer; }
.iep-tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.iep-table { width: 100%; border-collapse: collapse; min-width: 500px; }
.iep-table th { background: var(--app-primary); color: #fff; padding: 8px 10px; text-align: left; font-size: 12px; font-weight: 500; white-space: nowrap; }
.iep-table td { padding: 8px 10px; border-bottom: 1px solid var(--app-border); font-size: 12px; vertical-align: top; }
.iep-table tr:hover td { background: #FAFBFC; }
.iep-table .domain-cell { font-weight: 500; border-right: 1px solid var(--app-border); }
.iep-table .goal-cell { border-right: 1px solid var(--app-border); }
.iep-table .del-link { color: var(--app-danger); font-size: 11px; cursor: pointer; display: inline-flex; align-items: center; gap: 2px; white-space: nowrap; }
.iep-table .del-link:hover { opacity: 0.7; }
.iep-domain-del { color: var(--app-danger); font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; margin-top: 6px; text-decoration: none; white-space: nowrap; }
.iep-actions { display: flex; justify-content: center; gap: 8px; padding: 10px 0; flex-wrap: wrap; }
.iep-actions button { padding: 7px 16px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); font-weight: 500; }
.iep-btn-export { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.iep-btn-import { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-edit { background: var(--app-primary); border: none; color: #fff; }
.iep-btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-btn-add { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-save { background: var(--app-primary); border: none; color: #fff; }
/* 添加目标弹出菜单 */
.iep-add-wrap { position: relative; display: inline-block; }
.iep-add-popover { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; border-radius: var(--app-radius-lg); box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 8px 0; min-width: 150px; display: none; z-index: 20; margin-bottom: 8px; }
.iep-add-popover.show { display: block; }
.iep-add-popover::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #fff; }
.iep-add-popover .pop-item { padding: 10px 16px; font-size: 13px; cursor: pointer; color: var(--app-primary); text-align: center; }
.iep-add-popover .pop-item:hover { background: var(--app-primary-light); }
.iep-add-popover .pop-divider { height: 1px; background: var(--app-border); margin: 0 12px; }
/* 弹窗 - 手机端底部弹出 */
.iep-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.iep-modal-overlay.show { display: flex; }
.iep-modal { background: #fff; border-radius: var(--app-radius-xl) var(--app-radius-xl) 0 0; padding: 20px 16px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; }
.iep-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.iep-modal h3 .close { cursor: pointer; font-size: 18px; color: var(--app-text-sec); background: none; border: none; }
.iep-modal .form-group { margin-bottom: 12px; }
.iep-modal .form-group label { display: block; font-size: 12px; color: var(--app-text-sec); margin-bottom: 4px; }
.iep-modal .form-group input, .iep-modal .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: 14px; font-family: var(--app-font); }
.iep-modal .form-group textarea { min-height: 70px; resize: vertical; }
.iep-modal .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.iep-modal .form-actions button { padding: 8px 18px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); }
.iep-modal .form-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-modal .form-actions .btn-confirm { background: var(--app-primary); border: none; color: #fff; }
</style>
<style>
/* 评估量表Tab - 手机端：顶部下拉选择替代左侧导航 */
.scale-dropdown-bar { padding: 10px 0; }
.scale-dropdown-bar select { width: 100%; padding: 8px 10px; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: 13px; font-family: var(--app-font); background: #fff; color: var(--app-text); appearance: auto; }
.scale-summary-bar { background: var(--app-card); border-radius: var(--app-radius-lg); padding: 10px 12px; margin-bottom: 10px; }
.scale-summary-bar .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.scale-stats { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 12px; }
.scale-stats .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 2px; }
.sum-bar { flex: 1; min-width: 80px; height: 6px; background: #E8ECF0; border-radius: 3px; overflow: hidden; display: flex; }
.sum-bar-seg { height: 100%; }
.q-card { background: var(--app-card); border: 1px solid var(--app-border); border-radius: var(--app-radius-lg); padding: 12px; margin-bottom: 8px; }
.q-card .q-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.q-card .q-num { font-size: 13px; font-weight: 600; color: var(--app-primary); min-width: 24px; }
.q-card .q-desc { font-size: 13px; line-height: 1.5; flex: 1; }
.q-card .q-scores { display: flex; gap: 4px; flex-wrap: wrap; }
.q-card .q-score-opt { padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; color: var(--app-text-sec); flex: 1; text-align: center; }
.q-card .q-score-opt.selected-0 { background: #FFF0F0; color: var(--app-danger); border-color: var(--app-danger); }
.q-card .q-score-opt.selected-1 { background: #FFF8EB; color: var(--app-warning); border-color: var(--app-warning); }
.q-card .q-score-opt.selected-2 { background: #F0FFF4; color: var(--app-success); border-color: var(--app-success); }
.q-card .q-note { margin-top: 6px; font-size: 11px; color: var(--app-text-sec); background: #F9FAFB; border-radius: 6px; padding: 5px 8px; }
.q-card .q-note::before { content: '📝 '; }
.score-badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
.score-badge.s0 { background: #FFF0F0; color: var(--app-danger); }
.score-badge.s1 { background: #FFF8EB; color: var(--app-warning); }
.score-badge.s2 { background: #F0FFF4; color: var(--app-success); }
.reset-btn { position: fixed; bottom: 60px; right: 12px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 6px 12px; border-radius: var(--app-radius-md); font-size: 12px; cursor: pointer; z-index: 9999; opacity: 0.5; }
.reset-btn:hover { opacity: 1; }
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #1A2233; color: #fff; padding: 8px 16px; border-radius: var(--app-radius-md); font-size: 13px; z-index: 10000; display: none; white-space: nowrap; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
</style>
<style>
/* @media print 样式 */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
  .bottom-tab-bar, .bottom-actions, .reset-btn, .toast, .edit-link, .edit-actions, .iep-actions, .iep-btn-export, .iep-btn-import, .iep-btn-edit, .iep-btn-cancel, .iep-btn-add, .iep-btn-save { display: none !important; }
  body { height: auto !important; overflow: visible !important; max-width: none !important; }
  .content { overflow: visible !important; height: auto !important; }
  .tab-content { display: block !important; padding: 12px !important; }
  .tab-content#tabIEP, .tab-content#tabScale { display: none !important; }
  .card, .section-card, .report-card { background: none !important; box-shadow: none !important; border: none !important; border-radius: 0 !important; padding: 0 !important; margin-bottom: 0 !important; }
  .card + .card { margin-top: 8px !important; padding-top: 12px !important; border-top: 1px solid #E0E4E8 !important; }
  .section-label { display: block !important; background: #3B9BF5 !important; color: #fff !important; font-size: 13px !important; font-weight: 600 !important; padding: 6px 12px !important; border-radius: 0 !important; margin: 12px 0 10px 0 !important; break-after: avoid !important; page-break-after: avoid !important; }
  .card:first-child .section-label { margin-top: 0 !important; }
  .domain-report, .behavior-row { break-inside: avoid !important; page-break-inside: avoid !important; }
  .info-grid { break-inside: avoid !important; page-break-inside: avoid !important; }
  .report-title { font-size: 18px !important; text-align: center !important; break-after: avoid !important; }
  .report-desc { break-after: avoid !important; }
  p, .dr-desc, .dr-advice, .area-text { orphans: 3; widows: 3; }
  table { border-collapse: collapse !important; }
  th { background: #F5F7FA !important; }
  td, th { border: 1px solid #E8ECF0 !important; padding: 5px 6px !important; }
  .rating-opt.selected { background: #3B9BF5 !important; color: #fff !important; }
  .q-score-opt.selected-2 { background: #F0FFF4 !important; color: #52C41A !important; border-color: #52C41A !important; }
  .q-score-opt.selected-1 { background: #FFF8EB !important; color: #F5A623 !important; border-color: #F5A623 !important; }
  .q-score-opt.selected-0 { background: #FFF0F0 !important; color: #F56C6C !important; border-color: #F56C6C !important; }
  .pct-bar, .sum-bar-seg, .domain-fill { -webkit-print-color-adjust: exact !important; }
  svg { -webkit-print-color-adjust: exact !important; }
  .editable-area .area-text { display: block !important; }
  .editable-area .area-textarea { display: none !important; }
  .tbl-scroll, .iep-tbl-scroll { overflow: visible !important; }
  table.score-tbl, .iep-table { min-width: 0 !important; }
  @page { margin: 15mm 10mm; size: A4; }
  .domain-report, .behavior-row, .q-card { break-inside: avoid; page-break-inside: avoid; }
  .print-header { display: block !important; text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid #3B9BF5; }
}
</style>
</head>
<body>

<div class="content">
  <!-- Tab 1: 评估报告 -->
  <div class="tab-content active" id="tabReport"></div>
  <!-- Tab 2: IEP -->
  <div class="tab-content" id="tabIEP">
    <div class="iep-title">张小明IEP</div>
    <div class="card">
      <div class="iep-info">
        <div><span class="label">学生姓名：</span>张小明</div>
        <div><span class="label">性别：</span>男</div>
        <div><span class="label">出生日期：</span>2019-05-20</div>
        <div><span class="label">使用日期：</span><span class="link" id="iepDateLink" onclick="showToast('日期选择功能开发中')">请选择 ></span></div>
        <div><span class="label">制定人员：</span>李老师</div>
        <div><span class="label">家长签名：</span></div>
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;color:var(--app-text-sec);">课程包：</label>
      <select id="coursePacketSelect" onchange="onCoursePacketChange()" style="padding:6px 10px;border:1px solid var(--app-border);border-radius:var(--app-radius-md);font-size:13px;font-family:var(--app-font);width:100%;margin-top:4px;"></select>
    </div>
    <div id="iepContent"><div style="text-align:center;padding:30px 0;color:var(--app-text-sec);font-size:13px;">请先选择课程包，系统将根据评估结果自动生成 IEP 建议</div></div>
  </div>
  <!-- Tab 3: 评估量表 -->
  <div class="tab-content" id="tabScale" style="padding:12px;">
    <div class="scale-dropdown-bar" id="scaleDropdownBar"></div>
    <div id="scaleSummaryBar" class="scale-summary-bar"></div>
    <div id="scaleCards"></div>
  </div>
</div>

<div class="bottom-actions" id="bottomActions">
  <button class="btn-export" onclick="exportPDF()">导出PDF</button>
  <button class="btn-send" onclick="showToast('已生成家长版报告链接')">发送报告</button>
</div>

<!-- 底部Tab导航 -->
<div class="bottom-tab-bar">
  <button class="bottom-tab-btn active" onclick="switchTab(0,this)"><span class="tab-icon">📊</span>评估报告</button>
  <button class="bottom-tab-btn" onclick="switchTab(1,this)"><span class="tab-icon">📋</span>IEP</button>
  <button class="bottom-tab-btn" onclick="switchTab(2,this)"><span class="tab-icon">📝</span>评估量表</button>
</div>

<!-- IEP 删除确认弹窗 -->
<div class="iep-modal-overlay" id="iepDeleteModal">
  <div class="iep-modal">
    <h3>确认删除 <button class="close" onclick="closeDeleteModal()">✕</button></h3>
    <p style="font-size:13px;color:var(--app-text-sec);line-height:1.6;margin-bottom:14px;" id="iepDeleteMsg">确定要删除这条目标吗？</p>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
      <button class="btn-confirm" style="background:var(--app-danger);" onclick="execDelete()">删除</button>
    </div>
  </div>
</div>

<!-- IEP 添加目标弹窗 -->
<div class="iep-modal-overlay" id="iepAddModal">
  <div class="iep-modal">
    <h3>添加目标 <button class="close" onclick="closeIEPModal()">✕</button></h3>
    <div class="form-group">
      <label>年龄段及领域</label>
      <input type="text" id="iepAddDomain" placeholder="如：2-3岁-语言理解">
    </div>
    <div class="form-group">
      <label>干预目标</label>
      <input type="text" id="iepAddGoal" placeholder="如：命名训练">
    </div>
    <div class="form-group">
      <label>阶段目标（每行一个）</label>
      <textarea id="iepAddStages" placeholder="命名常见物品&#10;命名动作&#10;命名属性"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeIEPModal()">取消</button>
      <button class="btn-confirm" onclick="confirmAddGoal()">确认添加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="reset-btn" onclick="resetAll()">🔄 一键重置</button>

<script>

/* === 参数 === */
const params = new URLSearchParams(location.search);
const recordId = params.get('record') || 'rec001';

/* === PEP-3 领域结构 === */
const FUNC_DOMAINS = [
  { name: '模仿', code: 'I', total: 16 },
  { name: '知觉', code: 'P', total: 13 },
  { name: '小肌肉', code: 'FM', total: 16 },
  { name: '大肌肉', code: 'GM', total: 18 },
  { name: '手眼协调', code: 'EH', total: 15 },
  { name: '认知理解', code: 'CP', total: 26 },
  { name: '认知表达', code: 'CV', total: 27 }
];
const BEHAVIOR_DOMAINS = [

/* 确定性伪随机（基于种子字符串，同一 recordId 始终生成相同数据） */
function seededRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) { h = ((h << 5) - h + seed.charCodeAt(i)) | 0; }
  return function() { h = (h * 1103515245 + 12345) & 0x7fffffff; return (h % 1000) / 1000; };
}

/* === 加载答题数据 === */
function loadAnswers() {
  const key = 'rice_assessment_answers_' + recordId;
  const stored = localStorage.getItem(key);
  const result = { scores: {}, notes: {}, rounds: {} };
  if (stored) {
    const data = JSON.parse(stored);
    Object.keys(data).forEach(qId => {
      if (qId === '_marks') return;
      const v = data[qId];
      if (v && typeof v === 'object' && v.value !== undefined) {
        result.scores[qId] = v.value;
        if (v.notes) result.notes[qId] = v.notes;
        if (v.rounds && Array.isArray(v.rounds)) result.rounds[qId] = v.rounds;
      } else if (typeof v === 'number') {
        result.scores[qId] = v;
      }
    });
    // 旧格式兼容
    if (data.answers && typeof data.answers === 'object') {
      Object.keys(data.answers).forEach(qId => { result.scores[qId] = data.answers[qId]; });
      if (data.notes) Object.assign(result.notes, data.notes);
    }
    return result;
  }
  // fallback: 生成确定性中等分数据 + 部分备注（同一 recordId 始终相同）
  const sampleNotes = ['需要多次示范才能完成','对材料表现出明显兴趣','注意力持续约30秒','需要手把手辅助','自发完成，表现积极','有轻微抵触情绪','在提示下能完成一半'];
  const rand = seededRandom(recordId + '_pep3_fallback');
  for (let i = 1; i <= 174; i++) {
    const r = rand();
    result.scores['pep3_q' + i] = r < 0.5 ? 2 : r < 0.8 ? 1 : 0;
    if (rand() < 0.15) {
      result.notes['pep3_q' + i] = sampleNotes[Math.floor(rand() * sampleNotes.length)];
    }
  }
  return result;
}

/* === 发展年龄推算（基于得分率和实足年龄） === */
const ACTUAL_AGE_MONTHS = 56; // 4岁8月 = 56个月
function calcDevAgeMonths(pct) {
  if (pct >= 90) return ACTUAL_AGE_MONTHS;
  if (pct >= 80) return ACTUAL_AGE_MONTHS - 6;
  if (pct >= 70) return ACTUAL_AGE_MONTHS - 12;
  if (pct >= 60) return ACTUAL_AGE_MONTHS - 18;
  if (pct >= 50) return ACTUAL_AGE_MONTHS - 24;
  if (pct >= 40) return ACTUAL_AGE_MONTHS - 30;
  return ACTUAL_AGE_MONTHS - 36;
}
function monthsToAge(m) {
  if (m <= 0) m = 6;
  const y = Math.floor(m / 12);
  const mo = m % 12;
  return y + '岁' + mo + '月';
}
function calcPercentileRank(pct) {
  if (pct >= 90) return 95;
  if (pct >= 80) return 75;
  if (pct >= 70) return 50;
  if (pct >= 60) return 25;
  if (pct >= 50) return 10;
  return 5;
}
function calcDevLevel(percentile) {
  if (percentile >= 75) return '适当';
  if (percentile >= 50) return '轻度';
  return '严重';
}
function devLevelColor(level) {
  if (level === '适当') return 'var(--app-success)';
  if (level === '轻度') return 'var(--app-warning)';
  return 'var(--app-danger)';
}

/* === 计算各领域得分 === */
function calcDomainScores() {
  // 简化：按题号范围分配到功能发展领域
  const funcScores = FUNC_DOMAINS.map(d => {
    let p = 0, e = 0, f = 0;
    for (let i = 0; i < d.total; i++) {
      const qIdx = FUNC_DOMAINS.slice(0, FUNC_DOMAINS.indexOf(d)).reduce((s, dd) => s + dd.total, 0) + i + 1;
      const v = answers['pep3_q' + qIdx];
      if (v === 2) p++;
      else if (v === 1) e++;
      else f++;
    }
    const pct = Math.round(p / d.total * 100);
    const devMonths = calcDevAgeMonths(pct);
    const percentile = calcPercentileRank(pct);
    const devLevel = calcDevLevel(percentile);
    return { ...d, p, e, f, pct, devMonths, devAge: monthsToAge(devMonths), percentile, devLevel };
  });
  const behaviorScores = BEHAVIOR_DOMAINS.map(d => {
    let total = 0, count = 0;
    const startIdx = FUNC_DOMAINS.reduce((s, dd) => s + dd.total, 0);
    for (let i = 0; i < d.total; i++) {
      const qIdx = startIdx + BEHAVIOR_DOMAINS.slice(0, BEHAVIOR_DOMAINS.indexOf(d)).reduce((s, dd) => s + dd.total, 0) + i + 1;
      const v = answers['pep3_q' + qIdx];
      if (v !== undefined) { total += v; count++; }
    }
    const avg = count > 0 ? total / count : 0;
    const rating = avg >= 1.5 ? 'A' : avg >= 0.8 ? 'M' : 'S';
    const percentile = rating === 'A' ? 75 : rating === 'M' ? 50 : 25;
    const devLevel = calcDevLevel(percentile);
    return { ...d, score: total, rating, percentile, devLevel };
  });
  return { funcScores, behaviorScores };
}

/* === 合成分数计算 === */
function calcCompositeScores() {
  // 沟通(C) = 认知表达(CV) + 认知理解(CP) + 模仿(I) 的标准分总和
  const commDomains = funcScores.filter(d => ['CV','CP','I'].includes(d.code));
  const commSum = commDomains.reduce((s, d) => s + d.percentile, 0);
  const commMax = commDomains.length * 95;
  const commPct = commMax > 0 ? Math.round(commSum / commMax * 100) : 0;

  // 体能(M) = 小肌肉(FM) + 大肌肉(GM) + 手眼协调(EH) 的标准分总和
  const motorDomains = funcScores.filter(d => ['FM','GM','EH'].includes(d.code));
  const motorSum = motorDomains.reduce((s, d) => s + d.percentile, 0);
  const motorMax = motorDomains.length * 95;
  const motorPct = motorMax > 0 ? Math.round(motorSum / motorMax * 100) : 0;

  // 行为(MB) = 4个行为领域的标准分总和
  const behSum = behaviorScores.reduce((s, d) => s + d.percentile, 0);
  const behMax = behaviorScores.length * 95;
  const behPct = behMax > 0 ? Math.round(behSum / behMax * 100) : 0;

  return [
    { name: '沟通(C)', domains: commDomains.map(d => d.name).join('+'), sum: commSum, pct: commPct, percentile: calcPercentileRank(commPct), devLevel: calcDevLevel(calcPercentileRank(commPct)) },
    { name: '体能(M)', domains: motorDomains.map(d => d.name).join('+'), sum: motorSum, pct: motorPct, percentile: calcPercentileRank(motorPct), devLevel: calcDevLevel(calcPercentileRank(motorPct)) },
    { name: '行为(MB)', domains: behaviorScores.map(d => d.name).join('+'), sum: behSum, pct: behPct, percentile: calcPercentileRank(behPct), devLevel: calcDevLevel(calcPercentileRank(behPct)) }
  ];
}

/* === 雷达图 === */
function drawRadar() {
  const svg = document.getElementById('radarChart');
  if (!svg) return;
  const cx = 170, cy = 170, r = 120;
  const data = funcScores;
  const n = data.length;
  const colors = ['#7EC8F0','#FFB88C','#FFD966','#7ED6A8','#B8A0E0','#FFB0C8','#A0D8EF'];
  let grid = '', axes = '', pts = [], dots = '', labels = '';
  for (let lv = 1; lv <= 4; lv++) {
    const lr = r * lv / 4;
    let gpts = [];
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) - Math.PI / 2;
      gpts.push(`${cx + lr * Math.cos(a)},${cy + lr * Math.sin(a)}`);
    }
    grid += `<polygon points="${gpts.join(' ')}" fill="none" stroke="#E8ECF0" stroke-width="1"/>`;
  }
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) - Math.PI / 2;
    axes += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(a)}" y2="${cy + r * Math.sin(a)}" stroke="#E8ECF0"/>`;
    const val = data[i].pct / 100;
    pts.push(`${cx + r * val * Math.cos(a)},${cy + r * val * Math.sin(a)}`);
    dots += `<circle cx="${cx + r * val * Math.cos(a)}" cy="${cy + r * val * Math.sin(a)}" r="4" fill="${colors[i]}" stroke="#fff" stroke-width="2"/>`;
    const lx = cx + (r + 24) * Math.cos(a);
    const ly = cy + (r + 24) * Math.sin(a);
    labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#5A6478">${data[i].name}</text>`;
  }
  svg.innerHTML = `${grid}${axes}<polygon points="${pts.join(' ')}" fill="rgba(59,155,245,0.15)" stroke="#3B9BF5" stroke-width="2"/>${dots}${labels}`;
}

/* === 发展表现图（折线图） === */
function drawDevProfile() {
  const svg = document.getElementById('devProfileChart');
  if (!svg) return;
  const W = 700, H = 320;
  const padL = 80, padR = 30, padT = 30, padB = 60;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = funcScores.length;
  const colors = ['#7EC8F0','#FFB88C','#FFD966','#7ED6A8','#B8A0E0','#FFB0C8','#A0D8EF'];

  // Y轴：发展年龄（月），范围 0~60月
  const yMin = 0, yMax = 60;
  const yTicks = [0, 12, 24, 36, 48, 60];
  const yLabels = ['0月', '1岁', '2岁', '3岁', '4岁', '5岁'];

  function yPos(months) { return padT + chartH - (months - yMin) / (yMax - yMin) * chartH; }
  function xPos(i) { return padL + (i + 0.5) / n * chartW; }

  let svgContent = '';

  // 背景网格
  yTicks.forEach((tick, i) => {
    const y = yPos(tick);
    svgContent += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#E8ECF0" stroke-width="1" ${i === 0 ? '' : 'stroke-dasharray="4,4"'}/>`;
    svgContent += `<text x="${padL - 10}" y="${y + 4}" text-anchor="end" font-size="11" fill="#8C95A6">${yLabels[i]}</text>`;
  });

  // 实足年龄参考线
  const actualY = yPos(ACTUAL_AGE_MONTHS);
  svgContent += `<line x1="${padL}" y1="${actualY}" x2="${W - padR}" y2="${actualY}" stroke="#F56C6C" stroke-width="1.5" stroke-dasharray="6,4"/>`;
  svgContent += `<text x="${W - padR + 5}" y="${actualY + 4}" font-size="10" fill="#F56C6C">实足年龄</text>`;

  // 折线 + 数据点
  let linePts = [];
  funcScores.forEach((d, i) => {
    const x = xPos(i);
    const y = yPos(d.devMonths);
    linePts.push(`${x},${y}`);
  });
  svgContent += `<polyline points="${linePts.join(' ')}" fill="none" stroke="#3B9BF5" stroke-width="2.5"/>`;

  funcScores.forEach((d, i) => {
    const x = xPos(i);
    const y = yPos(d.devMonths);
    svgContent += `<circle cx="${x}" cy="${y}" r="6" fill="${colors[i]}" stroke="#fff" stroke-width="2"/>`;
    svgContent += `<text x="${x}" y="${y - 12}" text-anchor="middle" font-size="11" font-weight="500" fill="#1A2233">${d.devAge}</text>`;
    // X轴标签
    svgContent += `<text x="${x}" y="${H - padB + 18}" text-anchor="middle" font-size="11" fill="#5A6478">${d.name}</text>`;
  });

  svg.innerHTML = svgContent;
}

SUBTESTS.forEach(g => {

    for (let i = 0; i < item.count; i++) {

let currentScaleDomain = '';
function calcDomainStats(key) {
  const qs = questionsByDomain[key] || [];
  let s0 = 0, s1 = 0, s2 = 0;
  qs.forEach(q => { const v = answers[q.id]; if (v === 0) s0++; else if (v === 1) s1++; else s2++; });
  return { total: qs.length, s0, s1, s2, pct: qs.length > 0 ? Math.round(s2 / qs.length * 100) : 0 };
}

function initScale() {
  const bar = document.getElementById('scaleDropdownBar');
  let options = '';
  SUBTESTS.forEach(g => {
    g.items.forEach(item => {
      const key = g.group + '__' + item.name;
      const stats = calcDomainStats(key);
      const sel = currentScaleDomain === key ? 'selected' : '';
      options += `<option value="${key}" ${sel}>${g.group} - ${item.name} (${stats.pct}%)</option>`;
    });
  });
  bar.innerHTML = `<select onchange="onScaleDropdownChange(this)">${options}</select>`;
  if (!currentScaleDomain) {
    const firstKey = Object.keys(questionsByDomain)[0];
    if (firstKey) {
      const firstName = SUBTESTS[0].items[0].name;
      selectScaleDomain(firstKey, firstName);
    }
  }
}
function onScaleDropdownChange(sel) {
  const key = sel.value;
  const parts = key.split('__');
  const name = parts.length > 1 ? parts[1] : key;
  selectScaleDomain(key, name);
}

function selectScaleDomain(key, name) {
  currentScaleDomain = key;
  // Update dropdown selection without re-rendering
  const dd = document.querySelector('#scaleDropdownBar select');
  if (dd) dd.value = key;
  const qs = questionsByDomain[key] || [];
  const stats = calcDomainStats(key);

  const barW0 = stats.total > 0 ? (stats.s0 / stats.total * 100) : 0;
  const barW1 = stats.total > 0 ? (stats.s1 / stats.total * 100) : 0;
  const barW2 = stats.total > 0 ? (stats.s2 / stats.total * 100) : 0;

  document.getElementById('scaleSummaryBar').innerHTML = `
    <div class="title">${name} — 答题明细</div>
    <div class="scale-stats">
      <span><span class="dot" style="background:var(--app-success)"></span>通过 ${stats.s2}</span>
      <span><span class="dot" style="background:var(--app-warning)"></span>萌芽 ${stats.s1}</span>
      <span><span class="dot" style="background:var(--app-danger)"></span>不通过 ${stats.s0}</span>
      <span style="font-weight:500">${stats.pct}%</span>
      <div class="sum-bar">
        <div class="sum-bar-seg" style="width:${barW2}%;background:var(--app-success)"></div>
        <div class="sum-bar-seg" style="width:${barW1}%;background:var(--app-warning)"></div>
        <div class="sum-bar-seg" style="width:${barW0}%;background:var(--app-danger)"></div>
      </div>
    </div>`;

  // 卡片式题目
  const resultLabels = { independent: '独立(+)', error: '错误(-)', prompted: '辅助(P)' };
  const resultColors = { independent: '#52C41A', error: '#F56C6C', prompted: '#F5A623' };
  document.getElementById('scaleCards').innerHTML = qs.map(q => {
    const ans = answers[q.id];
    const note = answerNotes[q.id];
    const rounds = answerRounds[q.id];
    const scoreOpts = [
      { value: 0, label: '0 不通过' },
      { value: 1, label: '1 萌芽' },
      { value: 2, label: '2 通过' }
    ];
    let roundsHtml = '';
    if (rounds && rounds.length > 0 && rounds.some(r => r.result)) {
      roundsHtml = '<div style="margin-top:6px;padding:6px 8px;background:#FAFBFC;border-radius:6px;border:1px solid #E8ECF0">'
        + '<div style="font-size:11px;color:#8C95A6;margin-bottom:4px">回合统计</div>'
        + '<div style="display:flex;gap:6px;flex-wrap:wrap">'
        + rounds.filter(r => r.result).map((r, i) => {
          const color = resultColors[r.result] || '#8C95A6';
          const label = resultLabels[r.result] || r.result;
          return '<span style="font-size:11px;color:' + color + ';background:' + color + '14;padding:1px 6px;border-radius:3px">第' + (i+1) + '回合 ' + label + '</span>';
        }).join('')
        + '</div></div>';
    }
    return `<div class="q-card">
      <div class="q-header">
        <span class="q-num">${q.number}</span>
        <span class="q-desc">${q.desc}</span>
      </div>
      <div class="q-scores">
        ${scoreOpts.map(o => `<span class="q-score-opt ${ans === o.value ? 'selected-' + o.value : ''}">${o.label}</span>`).join('')}
      </div>
      ${roundsHtml}
      ${note ? '<div class="q-note">' + note + '</div>' : ''}
    </div>`;
  }).join('');
}

  });

  if (!iepData.length) {
    iepData = [{ domain: '综合', domainLabel: '综合训练', pct: 0, goals: [{ name: '综合训练', stages: ['辅助下完成基础任务','独立完成基础任务','泛化到新情境'] }] }];
  }

  renderIEPTable();
}

function renderIEPTable() {
  let html = '<div class="iep-tbl-scroll"><table class="iep-table"><thead><tr><th style="width:150px">年龄段及领域</th><th style="width:180px">干预目标</th><th>阶段目标</th>';
  if (iepEditing) html += '<th style="width:60px">操作</th>';
  html += '</tr></thead><tbody>';

  const delSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

  iepData.forEach((domain, di) => {
    let totalRows = domain.goals.reduce((s, g) => s + g.stages.length, 0);
    let firstRow = true;
    domain.goals.forEach((goal, gi) => {
      goal.stages.forEach((stage, si) => {
        html += '<tr>';
        if (firstRow) {
          html += `<td class="domain-cell" rowspan="${totalRows}"><div>${domain.domainLabel}</div>`;
          if (iepEditing) html += `<a class="iep-domain-del" onclick="confirmDeleteDomain(${di})">${delSvg} 删除</a>`;
          html += '</td>';
          firstRow = false;
        }
        if (si === 0) {
          html += `<td class="goal-cell" rowspan="${goal.stages.length}">${goal.name}</td>`;
        }
        html += `<td>${stage}</td>`;
        if (iepEditing) html += `<td><a class="del-link" onclick="confirmDeleteStage(${di},${gi},${si})">${delSvg} 删除</a></td>`;
        html += '</tr>';
      });
    });
  });

  html += '</tbody></table></div>';

  // 底部操作按钮
  html += '<div class="iep-actions">';
  if (iepEditing) {
    html += '<button class="iep-btn-cancel" onclick="cancelIEPEdit()">取消</button>';
    html += '<div class="iep-add-wrap"><button class="iep-btn-add" onclick="toggleAddPopover()">添加目标</button><div class="iep-add-popover" id="addPopover"><div class="pop-item" onclick="showToast(\'从目标库添加功能开发中\');hideAddPopover()">从目标库添加</div><div class="pop-divider"></div><div class="pop-item" onclick="openIEPModal();hideAddPopover()">+ 自定义</div></div></div>';
    html += '<button class="iep-btn-save" onclick="saveIEP()">保存</button>';
  } else {
    html += '<button class="iep-btn-export" onclick="exportIEP()">导出</button>';
    html += '<button class="iep-btn-import" onclick="showToast(\'导入干预目标功能开发中\')">导入干预目标</button>';
    html += '<button class="iep-btn-edit" onclick="startIEPEdit()">编辑</button>';
  }
  html += '</div>';

  document.getElementById('iepContent').innerHTML = html;
}

function startIEPEdit() { iepEditing = true; renderIEPTable(); }
function cancelIEPEdit() { iepEditing = false; renderIEPTable(); }
function saveIEP() {
  iepEditing = false;
  localStorage.setItem('rice_assessment_iep_' + recordId, JSON.stringify(iepData));
  renderIEPTable();
  showToast('IEP 已保存');
}
function exportIEP() {
  showToast('正在生成Word文档...');
  setTimeout(() => {
    // 构建 Word HTML
    let tableHtml = '<table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse;width:100%;font-family:SimSun,serif;font-size:12pt;">';
    tableHtml += '<tr style="background:#3B9BF5;color:#fff;"><th style="width:150px">阶梯及领域</th><th style="width:180px">任务目标</th><th>短期目标</th></tr>';
    iepData.forEach(domain => {
      let totalRows = domain.goals.reduce((s, g) => s + g.stages.length, 0);
      let firstRow = true;
      domain.goals.forEach(goal => {
        goal.stages.forEach((stage, si) => {
          tableHtml += '<tr>';
          if (firstRow) { tableHtml += '<td rowspan="' + totalRows + '" style="font-weight:bold;vertical-align:top;">' + domain.domainLabel + '</td>'; firstRow = false; }
          if (si === 0) tableHtml += '<td rowspan="' + goal.stages.length + '" style="vertical-align:top;">' + goal.name + '</td>';
          tableHtml += '<td>' + stage + '</td></tr>';
        });
      });
    });
    tableHtml += '</table>';

    const html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
      '<head><meta charset="utf-8"><style>body{font-family:SimSun,serif;font-size:12pt;}h1{font-size:16pt;text-align:center;}table{margin-top:12pt;}.info{margin:6pt 0;font-size:11pt;}</style></head><body>' +
      '<h1>个别化教育计划</h1>' +
      '<p class="info">学生姓名：张小明 &nbsp;&nbsp; 性别：男 &nbsp;&nbsp; 出生日期：2019.05.20</p>' +
      '<p class="info">使用日期：&nbsp;&nbsp; 制定人员：李老师 &nbsp;&nbsp; 家长签名：</p>' +
      '<p class="info">通过标准：冷测，连续三天的第一个回合通过 &nbsp;&nbsp; 教学情境：个训课、家庭康复指导</p>' +
      tableHtml +
      '</body></html>';

    const blob = new Blob(['\ufeff' + html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '张小明个别化教育计划.doc';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Word文档已导出');
  }, 300);
}

function deleteIEPDomain(di) {
  iepData.splice(di, 1);
  renderIEPTable();
}
function deleteIEPStage(di, gi, si) {
  iepData[di].goals[gi].stages.splice(si, 1);
  if (iepData[di].goals[gi].stages.length === 0) iepData[di].goals.splice(gi, 1);
  if (iepData[di].goals.length === 0) iepData.splice(di, 1);
  renderIEPTable();
}

let pendingDelete = null;
function confirmDeleteDomain(di) {
  pendingDelete = { type: 'domain', di };
  document.getElementById('iepDeleteMsg').textContent = '确定要删除「' + iepData[di].domainLabel + '」整个领域及其所有目标吗？';
  document.getElementById('iepDeleteModal').classList.add('show');
}
function confirmDeleteStage(di, gi, si) {
  pendingDelete = { type: 'stage', di, gi, si };
  document.getElementById('iepDeleteMsg').textContent = '确定要删除这条阶段目标吗？';
  document.getElementById('iepDeleteModal').classList.add('show');
}
function closeDeleteModal() {
  pendingDelete = null;
  document.getElementById('iepDeleteModal').classList.remove('show');
}
function execDelete() {
  if (!pendingDelete) return;
  if (pendingDelete.type === 'domain') deleteIEPDomain(pendingDelete.di);
  else deleteIEPStage(pendingDelete.di, pendingDelete.gi, pendingDelete.si);
  closeDeleteModal();
  showToast('已删除');
}
function addIEPGoal() { openIEPModal(); }
function toggleAddPopover() {
  const p = document.getElementById('addPopover');
  p.classList.toggle('show');
}
function hideAddPopover() { const p = document.getElementById('addPopover'); if (p) p.classList.remove('show'); }
function openIEPModal() {
  document.getElementById('iepAddDomain').value = '';
  document.getElementById('iepAddGoal').value = '';
  document.getElementById('iepAddStages').value = '';
  document.getElementById('iepAddModal').classList.add('show');
}
function closeIEPModal() { document.getElementById('iepAddModal').classList.remove('show'); }
function confirmAddGoal() {
  const domain = document.getElementById('iepAddDomain').value.trim();
  const goal = document.getElementById('iepAddGoal').value.trim();
  const stagesText = document.getElementById('iepAddStages').value.trim();
  if (!domain || !goal) { showToast('请填写领域和干预目标'); return; }
  const stages = stagesText ? stagesText.split('\n').filter(s => s.trim()) : ['阶段目标1'];
  const existing = iepData.find(d => d.domain === domain);
  if (existing) { existing.goals.push({ name: goal, stages }); }
  else { iepData.push({ domain, domainLabel: domain, pct: 0, goals: [{ name: goal, stages }] }); }
  closeIEPModal();
  renderIEPTable();
  showToast('已添加');
}
// 点击外部关闭 popover
document.addEventListener('click', function(e) {
  if (!e.target.closest('.iep-add-wrap')) hideAddPopover();
});

/* === 编辑功能 === */
function toggleEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  inputEl.value = textEl.innerText;
  textEl.style.display = 'none';
  inputEl.style.display = 'block';
  actionsEl.style.display = 'flex';
  linkEl.style.display = 'none';
  inputEl.focus();
}

function cancelEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  textEl.style.display = 'block';
  inputEl.style.display = 'none';
  actionsEl.style.display = 'none';
  linkEl.style.display = 'inline-flex';
}

function saveEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  textEl.innerText = inputEl.value;
  textEl.style.display = 'block';
  inputEl.style.display = 'none';
  actionsEl.style.display = 'none';
  linkEl.style.display = 'inline-flex';
  // 保存到 localStorage
  const key = 'rice_assessment_report_edit_' + recordId + '_' + id;
  localStorage.setItem(key, inputEl.value);
  showToast('已保存');
}

function loadSavedEdits() {
  ['eduOutline', 'analysis'].forEach(id => {
    const key = 'rice_assessment_report_edit_' + recordId + '_' + id;
    const saved = localStorage.getItem(key);
    if (saved) {
      const textEl = document.getElementById(id + 'Text');
      if (textEl) textEl.innerText = saved;
    }
  });
}

/* === 导出PDF === */
function exportPDF() {
  showToast('正在生成PDF...');
  setTimeout(() => { window.print(); }, 300);
}

/* === 通用 === */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}
function resetAll() {
  Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.href = 'assessment-list.html';
}

// 初始化
renderReport();
initScale();
initIEP();
loadSavedEdits();

</script>
