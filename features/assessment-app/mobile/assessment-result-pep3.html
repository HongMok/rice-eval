<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PEP-3 评估报告 - 手机端</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; max-width: 420px; margin: 0 auto; }
.topbar { height: 44px; background: var(--app-card); border-bottom: 1px solid var(--app-border); display: flex; align-items: center; padding: 0 12px; flex-shrink: 0; }
.topbar .back { font-size: 16px; cursor: pointer; margin-right: 8px; color: var(--app-text); }
.topbar .title { font-size: 15px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tab-bar { background: var(--app-card); border-bottom: 1px solid var(--app-border); display: flex; flex-shrink: 0; }
.tab-btn { flex: 1; padding: 10px 0; font-size: 13px; color: var(--app-text-nav); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; font-family: var(--app-font); font-weight: 500; text-align: center; }
.tab-btn.active { color: var(--app-primary); border-bottom-color: var(--app-primary); }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.tab-content { display: none; padding: 12px; }
.tab-content.active { display: block; }
.section-label { display: inline-block; background: var(--app-primary); color: #fff; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: var(--app-radius-md); margin-bottom: 10px; }
.card { background: var(--app-card); border-radius: var(--app-radius-lg); padding: 14px; box-shadow: var(--app-shadow); margin-bottom: 12px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-item { font-size: 13px; }
.info-item .label { color: var(--app-text-sec); }
.info-item .value { font-weight: 500; }
.report-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.report-desc { font-size: 12px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 14px; }
.tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -14px; padding: 0 14px; }
table.score-tbl { width: 100%; border-collapse: collapse; min-width: 400px; }
table.score-tbl th { background: #F5F7FA; padding: 8px 10px; text-align: left; font-weight: 500; color: var(--app-text-sec); font-size: 12px; border-bottom: 1px solid var(--app-border); white-space: nowrap; }
table.score-tbl td { padding: 8px 10px; border-bottom: 1px solid var(--app-border); font-size: 13px; white-space: nowrap; }
table.score-tbl tr:last-child td { border-bottom: none; }
table.score-tbl tr.total-row td { font-weight: 600; background: #F5F7FA; }
.behavior-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--app-border); gap: 8px; flex-wrap: wrap; }
.behavior-row:last-child { border-bottom: none; }
.behavior-row .bname { font-size: 13px; font-weight: 500; min-width: 80px; }
.behavior-row .bscore { font-size: 13px; color: var(--app-text-sec); }
.behavior-row .brating { display: flex; gap: 6px; }
.rating-opt { padding: 3px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; }
.rating-opt.selected { background: var(--app-primary); color: #fff; border-color: var(--app-primary); }
.editable-area .edit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.editable-area .edit-link { color: var(--app-primary); font-size: 12px; cursor: pointer; }
.editable-area .area-text { font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
.editable-area .area-textarea { width: 100%; min-height: 100px; font-size: 13px; line-height: 1.8; font-family: var(--app-font); border: 1px solid var(--app-primary); border-radius: var(--app-radius-md); padding: 10px; resize: vertical; outline: none; display: none; }
.editable-area .edit-actions { display: none; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.editable-area .edit-actions button { padding: 6px 14px; border-radius: var(--app-radius-md); font-size: 12px; cursor: pointer; font-family: var(--app-font); }
.editable-area .edit-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.editable-area .edit-actions .btn-save { background: var(--app-primary); color: #fff; border: none; }
.pct-bar { display: inline-block; height: 6px; border-radius: 3px; background: var(--app-primary); vertical-align: middle; margin-right: 4px; }
.radar-svg { width: 100%; max-width: 300px; height: 300px; }
.chart-center { text-align: center; }
.bottom-actions { background: var(--app-card); border-top: 1px solid var(--app-border); padding: 10px 12px; display: flex; justify-content: center; gap: 12px; flex-shrink: 0; }
.btn-export { padding: 8px 20px; background: #fff; border: 1px solid #D8DDE5; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; color: var(--app-text-sec); font-family: var(--app-font); }
.btn-send { padding: 8px 20px; background: var(--app-primary); color: #fff; border: none; border-radius: var(--app-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--app-font); }
</style>
<style>
/* IEP 样式 */
.iep-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 12px; }
.iep-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; margin-bottom: 12px; }
.iep-info .label { color: var(--app-text-sec); }
.iep-info .link { color: var(--app-primary); cursor: pointer; }
.iep-tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.iep-table { width: 100%; border-collapse: collapse; min-width: 500px; }
.iep-table th { background: var(--app-primary); color: #fff; padding: 8px 10px; text-align: left; font-size: 12px; font-weight: 500; white-space: nowrap; }
.iep-table td { padding: 8px 10px; border-bottom: 1px solid var(--app-border); font-size: 12px; vertical-align: top; }
.iep-table .domain-cell { font-weight: 500; border-right: 1px solid var(--app-border); }
.iep-table .goal-cell { border-right: 1px solid var(--app-border); }
.iep-table .del-link { color: var(--app-danger); font-size: 11px; cursor: pointer; }
.iep-domain-del { color: var(--app-danger); font-size: 11px; cursor: pointer; margin-top: 6px; display: block; }
.iep-actions { display: flex; justify-content: center; gap: 8px; padding: 10px 0; }
.iep-actions button { padding: 7px 16px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); font-weight: 500; }
.iep-btn-export { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.iep-btn-import { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-edit { background: var(--app-primary); border: none; color: #fff; }
.iep-btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-btn-add { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-save { background: var(--app-primary); border: none; color: #fff; }
.iep-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.iep-modal-overlay.show { display: flex; }
.iep-modal { background: #fff; border-radius: var(--app-radius-xl) var(--app-radius-xl) 0 0; padding: 20px 16px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; }
.iep-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.iep-modal h3 .close { cursor: pointer; font-size: 18px; color: var(--app-text-sec); background: none; border: none; }
.iep-modal .form-group { margin-bottom: 12px; }
.iep-modal .form-group label { display: block; font-size: 12px; color: var(--app-text-sec); margin-bottom: 4px; }
.iep-modal .form-group input, .iep-modal .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: 14px; font-family: var(--app-font); }
.iep-modal .form-group textarea { min-height: 70px; resize: vertical; }
.iep-modal .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.iep-modal .form-actions button { padding: 8px 18px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); }
.iep-modal .form-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-modal .form-actions .btn-confirm { background: var(--app-primary); border: none; color: #fff; }
</style>
<style>
/* 评估量表Tab - 手机端 */
.scale-filter { padding: 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; display: flex; gap: 8px; }
.scale-filter .tag { display: inline-block; padding: 5px 14px; border-radius: 9999px; font-size: 12px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; color: var(--app-text-sec); cursor: pointer; flex-shrink: 0; }
.scale-filter .tag.active { background: var(--app-primary); color: #fff; border-color: var(--app-primary); }
.scale-summary-bar { background: var(--app-card); border-radius: var(--app-radius-lg); padding: 10px 12px; margin-bottom: 10px; }
.scale-summary-bar .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.scale-stats { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 12px; }
.scale-stats .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 2px; }
.sum-bar { flex: 1; min-width: 80px; height: 6px; background: #E8ECF0; border-radius: 3px; overflow: hidden; display: flex; }
.sum-bar-seg { height: 100%; }
.q-card { background: var(--app-card); border: 1px solid var(--app-border); border-radius: var(--app-radius-lg); padding: 12px; margin-bottom: 8px; }
.q-card .q-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.q-card .q-num { font-size: 13px; font-weight: 600; color: var(--app-primary); min-width: 24px; }
.q-card .q-desc { font-size: 13px; line-height: 1.5; flex: 1; }
.q-card .q-scores { display: flex; gap: 4px; flex-wrap: wrap; }
.q-card .q-score-opt { padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; color: var(--app-text-sec); flex: 1; text-align: center; }
.q-card .q-score-opt.selected-0 { background: #FFF0F0; color: var(--app-danger); border-color: var(--app-danger); }
.q-card .q-score-opt.selected-1 { background: #FFF8EB; color: var(--app-warning); border-color: var(--app-warning); }
.q-card .q-score-opt.selected-2 { background: #F0FFF4; color: var(--app-success); border-color: var(--app-success); }
.q-card .q-note { margin-top: 6px; font-size: 11px; color: var(--app-text-sec); background: #F9FAFB; border-radius: 6px; padding: 5px 8px; }
.q-card .q-note::before { content: '📝 '; }
.reset-btn { position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 6px 12px; border-radius: var(--app-radius-md); font-size: 12px; cursor: pointer; z-index: 9999; opacity: 0.5; }
.reset-btn:hover { opacity: 1; }
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #1A2233; color: #fff; padding: 8px 16px; border-radius: var(--app-radius-md); font-size: 13px; z-index: 10000; display: none; white-space: nowrap; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
@media print { .topbar,.tab-bar,.bottom-actions,.reset-btn,.toast,.edit-link,.edit-actions,.iep-actions{display:none!important} .content{overflow:visible!important;height:auto!important} .tab-content{display:block!important;padding:10px!important} .tab-content#tabIEP,.tab-content#tabScale{display:none!important} body{height:auto;overflow:visible} }
</style>
</head>
<body>

<div class="topbar">
  <span class="back" onclick="location.href='assessment-list.html'">←</span>
  <span class="title">张小明评估报告</span>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0,this)">评估报告</button>
  <button class="tab-btn" onclick="switchTab(1,this)">IEP</button>
  <button class="tab-btn" onclick="switchTab(2,this)">评估量表</button>
</div>

<div class="content">
  <div class="tab-content active" id="tabReport"></div>
  <div class="tab-content" id="tabIEP">
    <div class="iep-title">张小明IEP</div>
    <div class="card">
      <div class="iep-info">
        <div><span class="label">学生姓名：</span>张小明</div>
        <div><span class="label">性别：</span>男</div>
        <div><span class="label">出生日期：</span>2019-05-20</div>
        <div><span class="label">制定人员：</span>李老师</div>
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;color:var(--app-text-sec);">课程包：</label>
      <select id="coursePacketSelect" onchange="onCoursePacketChange()" style="padding:6px 10px;border:1px solid var(--app-border);border-radius:var(--app-radius-md);font-size:13px;font-family:var(--app-font);width:100%;margin-top:4px;"></select>
    </div>
    <div id="iepContent"><div style="text-align:center;padding:30px 0;color:var(--app-text-sec);font-size:13px;">请先选择课程包</div></div>
  </div>
  <div class="tab-content" id="tabScale">
    <div class="scale-filter" id="scaleFilter"></div>
    <div id="scaleSummaryBar" class="scale-summary-bar"></div>
    <div id="scaleCards"></div>
  </div>
</div>

<div class="bottom-actions" id="bottomActions">
  <button class="btn-export" onclick="exportPDF()">导出PDF</button>
  <button class="btn-send" onclick="showToast('已生成家长版报告链接')">发送报告</button>
</div>

<div class="iep-modal-overlay" id="iepDeleteModal">
  <div class="iep-modal">
    <h3>确认删除 <button class="close" onclick="closeDeleteModal()">✕</button></h3>
    <p style="font-size:13px;color:var(--app-text-sec);margin-bottom:14px;" id="iepDeleteMsg">确定要删除吗？</p>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
      <button class="btn-confirm" style="background:var(--app-danger);" onclick="execDelete()">删除</button>
    </div>
  </div>
</div>
<div class="iep-modal-overlay" id="iepAddModal">
  <div class="iep-modal">
    <h3>添加目标 <button class="close" onclick="closeIEPModal()">✕</button></h3>
    <div class="form-group"><label>年龄段及领域</label><input type="text" id="iepAddDomain" placeholder="如：2-3岁-语言理解"></div>
    <div class="form-group"><label>干预目标</label><input type="text" id="iepAddGoal" placeholder="如：命名训练"></div>
    <div class="form-group"><label>阶段目标（每行一个）</label><textarea id="iepAddStages" placeholder="命名常见物品&#10;命名动作"></textarea></div>
    <div class="form-actions"><button class="btn-cancel" onclick="closeIEPModal()">取消</button><button class="btn-confirm" onclick="confirmAddGoal()">确认添加</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="reset-btn" onclick="resetAll()">🔄 一键重置</button>

<script>
/* === 参数 === */
const params = new URLSearchParams(location.search);
const recordId = params.get('record') || 'rec001';

/* === PEP-3 领域结构 === */
const FUNC_DOMAINS = [
  { name: '模仿', code: 'I', total: 16 },
  { name: '知觉', code: 'P', total: 13 },
  { name: '小肌肉', code: 'FM', total: 16 },
  { name: '大肌肉', code: 'GM', total: 18 },
  { name: '手眼协调', code: 'EH', total: 15 },
  { name: '认知理解', code: 'CP', total: 26 },
  { name: '认知表达', code: 'CV', total: 27 }
];
const BEHAVIOR_DOMAINS = [
  { name: '情感关系', code: 'R', total: 12 },
  { name: '游戏及兴趣', code: 'M', total: 8 },
  { name: '感觉反应', code: 'S', total: 12 },
  { name: '语言异常', code: 'L', total: 11 }
];
const SUBTESTS = [
  { group: '发展性子测验', items: [
    { name: '认知/语前语言', count: 20 }, { name: '语言表达', count: 18 }, { name: '语言理解', count: 16 },
    { name: '精细动作', count: 22 }, { name: '粗大动作', count: 14 }, { name: '视觉动作模仿', count: 12 }
  ]},
  { group: '行为特征子测验', items: [
    { name: '情感表达', count: 10 }, { name: '社会互动', count: 10 }, { name: '非语言行为特征', count: 18 }, { name: '语言行为特征', count: 12 }
  ]},
  { group: '养育者报告', items: [
    { name: '问题行为', count: 10 }, { name: '个人自理', count: 5 }, { name: '适应行为', count: 5 }
  ]}
];

/* === 加载答题数据 === */
function loadAnswers() {
  const key = 'rice_assessment_answers_' + recordId;
  const stored = localStorage.getItem(key);
  const result = { scores: {}, notes: {}, rounds: {} };
  if (stored) {
    const data = JSON.parse(stored);
    Object.keys(data).forEach(qId => {
      if (qId === '_marks') return;
      const v = data[qId];
      if (v && typeof v === 'object' && v.value !== undefined) {
        result.scores[qId] = v.value;
        if (v.notes) result.notes[qId] = v.notes;
        if (v.rounds && Array.isArray(v.rounds)) result.rounds[qId] = v.rounds;
      } else if (typeof v === 'number') {
        result.scores[qId] = v;
      }
    });
    if (data.answers && typeof data.answers === 'object') {
      Object.keys(data.answers).forEach(qId => { result.scores[qId] = data.answers[qId]; });
      if (data.notes) Object.assign(result.notes, data.notes);
    }
    return result;
  }
  const sampleNotes = ['需要多次示范才能完成','对材料表现出明显兴趣','注意力持续约30秒','需要手把手辅助','自发完成，表现积极','有轻微抵触情绪','在提示下能完成一半'];
  for (let i = 1; i <= 174; i++) {
    const r = Math.random();
    result.scores['pep3_q' + i] = r < 0.5 ? 2 : r < 0.8 ? 1 : 0;
    if (Math.random() < 0.15) result.notes['pep3_q' + i] = sampleNotes[Math.floor(Math.random() * sampleNotes.length)];
  }
  return result;
}
const answerData = loadAnswers();
const answers = answerData.scores;
const answerNotes = answerData.notes;
const answerRounds = answerData.rounds;

/* === 计算各领域得分 === */
function calcDomainScores() {
  const funcScores = FUNC_DOMAINS.map(d => {
    let p = 0, e = 0, f = 0;
    for (let i = 0; i < d.total; i++) {
      const qIdx = FUNC_DOMAINS.slice(0, FUNC_DOMAINS.indexOf(d)).reduce((s, dd) => s + dd.total, 0) + i + 1;
      const v = answers['pep3_q' + qIdx];
      if (v === 2) p++; else if (v === 1) e++; else f++;
    }
    return { ...d, p, e, f, pct: Math.round(p / d.total * 100) };
  });
  const behaviorScores = BEHAVIOR_DOMAINS.map(d => {
    let total = 0, count = 0;
    const startIdx = FUNC_DOMAINS.reduce((s, dd) => s + dd.total, 0);
    for (let i = 0; i < d.total; i++) {
      const qIdx = startIdx + BEHAVIOR_DOMAINS.slice(0, BEHAVIOR_DOMAINS.indexOf(d)).reduce((s, dd) => s + dd.total, 0) + i + 1;
      const v = answers['pep3_q' + qIdx];
      if (v !== undefined) { total += v; count++; }
    }
    const avg = count > 0 ? total / count : 0;
    const rating = avg >= 1.5 ? 'A' : avg >= 0.8 ? 'M' : 'S';
    return { ...d, score: total, rating };
  });
  return { funcScores, behaviorScores };
}
const { funcScores, behaviorScores } = calcDomainScores();

/* === Tab 切换 === */
function switchTab(idx, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => { c.classList.remove('active'); c.style.display = 'none'; });
  const tab = document.querySelectorAll('.tab-content')[idx];
  tab.classList.add('active');
  tab.style.display = 'block';
  document.getElementById('bottomActions').style.display = idx === 0 ? 'flex' : 'none';
}

/* === 渲染评估报告Tab === */
function renderReport() {
  const totalP = funcScores.reduce((s, d) => s + d.p, 0);
  const totalE = funcScores.reduce((s, d) => s + d.e, 0);
  const totalF = funcScores.reduce((s, d) => s + d.f, 0);
  const totalItems = FUNC_DOMAINS.reduce((s, d) => s + d.total, 0);

  let html = `

/* === 雷达图 === */
function drawRadar() {
  const svg = document.getElementById('radarChart');
  if (!svg) return;
  const cx = 170, cy = 170, r = 120;
  const data = funcScores;
  const n = data.length;
  const colors = ['#7EC8F0','#FFB88C','#FFD966','#7ED6A8','#B8A0E0','#FFB0C8','#A0D8EF'];
  let grid = '', axes = '', pts = [], dots = '', labels = '';
  for (let lv = 1; lv <= 4; lv++) {
    const lr = r * lv / 4;
    let gpts = [];
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) - Math.PI / 2;
      gpts.push(`${cx + lr * Math.cos(a)},${cy + lr * Math.sin(a)}`);
    }
    grid += `<polygon points="${gpts.join(' ')}" fill="none" stroke="#E8ECF0" stroke-width="1"/>`;
  }
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) - Math.PI / 2;
    axes += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(a)}" y2="${cy + r * Math.sin(a)}" stroke="#E8ECF0"/>`;
    const val = data[i].pct / 100;
    pts.push(`${cx + r * val * Math.cos(a)},${cy + r * val * Math.sin(a)}`);
    dots += `<circle cx="${cx + r * val * Math.cos(a)}" cy="${cy + r * val * Math.sin(a)}" r="4" fill="${colors[i]}" stroke="#fff" stroke-width="2"/>`;
    const lx = cx + (r + 24) * Math.cos(a);
    const ly = cy + (r + 24) * Math.sin(a);
    labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#5A6478">${data[i].name}</text>`;
  }
  svg.innerHTML = `${grid}${axes}<polygon points="${pts.join(' ')}" fill="rgba(59,155,245,0.15)" stroke="#3B9BF5" stroke-width="2"/>${dots}${labels}`;
}

let currentScaleDomain = '';
function calcScaleDomainStats(key) {
  const qs = questionsByDomain[key] || [];
  let s0 = 0, s1 = 0, s2 = 0;
  qs.forEach(q => { const v = answers[q.id]; if (v === 0) s0++; else if (v === 1) s1++; else s2++; });
  return { total: qs.length, s0, s1, s2, pct: qs.length > 0 ? Math.round(s2 / qs.length * 100) : 0 };
}

function initScale() {
  const filter = document.getElementById('scaleFilter');
  filter.innerHTML = flatDomains.map(d => {
    const stats = calcScaleDomainStats(d.key);
    return `<span class="tag ${currentScaleDomain === d.key ? 'active' : ''}" onclick="selectScaleDomain('${d.key}')">${d.name} ${stats.pct}%</span>`;
  }).join('');
  if (!currentScaleDomain && flatDomains.length) selectScaleDomain(flatDomains[0].key);
}

function selectScaleDomain(key) {
  currentScaleDomain = key;
  // update filter tags
  document.querySelectorAll('.scale-filter .tag').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.scale-filter .tag').forEach(t => {
    if (t.onclick.toString().includes("'" + key + "'")) t.classList.add('active');
  });
  initScale();

  const qs = questionsByDomain[key] || [];
  const stats = calcScaleDomainStats(key);
  const domainInfo = flatDomains.find(d => d.key === key);
  const displayName = domainInfo ? domainInfo.name : key;

  const barW2 = stats.total > 0 ? (stats.s2 / stats.total * 100) : 0;
  const barW1 = stats.total > 0 ? (stats.s1 / stats.total * 100) : 0;
  const barW0 = stats.total > 0 ? (stats.s0 / stats.total * 100) : 0;

  document.getElementById('scaleSummaryBar').innerHTML = `
    <div class="title">${displayName} — 答题明细</div>

      <span><span class="dot" style="background:var(--app-danger)"></span>不通过 ${stats.s0}</span>
      <span style="font-weight:500">${stats.pct}%</span>
      <div class="sum-bar">
        <div class="sum-bar-seg" style="width:${barW2}%;background:var(--app-success)"></div>
        <div class="sum-bar-seg" style="width:${barW1}%;background:var(--app-warning)"></div>
        <div class="sum-bar-seg" style="width:${barW0}%;background:var(--app-danger)"></div>
      </div>
    </div>`;

  const resultLabels = { independent: '独立(+)', error: '错误(-)', prompted: '辅助(P)' };
  const resultColors = { independent: '#52C41A', error: '#F56C6C', prompted: '#F5A623' };
  document.getElementById('scaleCards').innerHTML = qs.map(q => {
    const ans = answers[q.id];
    const note = answerNotes[q.id];
    const rounds = answerRounds[q.id];
    let roundsHtml = '';
    if (rounds && rounds.length > 0 && rounds.some(r => r.result)) {
      roundsHtml = '<div style="margin-top:5px;padding:5px 7px;background:#FAFBFC;border-radius:6px;border:1px solid #E8ECF0">'
        + '<div style="font-size:10px;color:#8C95A6;margin-bottom:3px">回合统计</div>'
        + '<div style="display:flex;gap:4px;flex-wrap:wrap">'
        + rounds.filter(r => r.result).map((r, i) => {
          const color = resultColors[r.result] || '#8C95A6';
          const label = resultLabels[r.result] || r.result;
          return '<span style="font-size:10px;color:' + color + ';background:' + color + '14;padding:1px 5px;border-radius:3px">第' + (i+1) + '回合 ' + label + '</span>';
        }).join('') + '</div></div>';
    }
    return `<div class="q-card">
      <div class="q-header"><span class="q-num">${q.number}</span><span class="q-desc">${q.desc}</span></div>
      <div class="q-scores">
        <span class="q-score-opt ${ans === 0 ? 'selected-0' : ''}">0 不通过</span>

        <span class="q-score-opt ${ans === 2 ? 'selected-2' : ''}">2 通过</span>
      </div>
      ${roundsHtml}
      ${note ? '<div class="q-note">' + note + '</div>' : ''}
    </div>`;
  }).join('');
}

function exportIEP() { showToast('正在生成Word文档...'); setTimeout(() => { showToast('Word文档已导出（手机端请在PAD端操作导出）'); }, 500); }
function deleteIEPDomain(di) { iepData.splice(di, 1); renderIEPTable(); }
function deleteIEPStage(di, gi, si) { iepData[di].goals[gi].stages.splice(si, 1); if (!iepData[di].goals[gi].stages.length) iepData[di].goals.splice(gi, 1); if (!iepData[di].goals.length) iepData.splice(di, 1); renderIEPTable(); }
let pendingDelete = null;
function confirmDeleteDomain(di) { pendingDelete = { type:'domain', di }; document.getElementById('iepDeleteMsg').textContent = '确定要删除「' + iepData[di].domainLabel + '」整个领域吗？'; document.getElementById('iepDeleteModal').classList.add('show'); }
function confirmDeleteStage(di, gi, si) { pendingDelete = { type:'stage', di, gi, si }; document.getElementById('iepDeleteMsg').textContent = '确定要删除这条阶段目标吗？'; document.getElementById('iepDeleteModal').classList.add('show'); }
function closeDeleteModal() { pendingDelete = null; document.getElementById('iepDeleteModal').classList.remove('show'); }
function execDelete() { if (!pendingDelete) return; if (pendingDelete.type === 'domain') deleteIEPDomain(pendingDelete.di); else deleteIEPStage(pendingDelete.di, pendingDelete.gi, pendingDelete.si); closeDeleteModal(); showToast('已删除'); }
function openIEPModal() { document.getElementById('iepAddDomain').value = ''; document.getElementById('iepAddGoal').value = ''; document.getElementById('iepAddStages').value = ''; document.getElementById('iepAddModal').classList.add('show'); }
function closeIEPModal() { document.getElementById('iepAddModal').classList.remove('show'); }
function confirmAddGoal() {
  const domain = document.getElementById('iepAddDomain').value.trim();
  const goal = document.getElementById('iepAddGoal').value.trim();
  const stagesText = document.getElementById('iepAddStages').value.trim();
  if (!domain || !goal) { showToast('请填写领域和干预目标'); return; }
  const stages = stagesText ? stagesText.split('\n').filter(s => s.trim()) : ['阶段目标1'];
  const existing = iepData.find(d => d.domain === domain);
  if (existing) { existing.goals.push({ name: goal, stages }); } else { iepData.push({ domain, domainLabel: domain, pct: 0, goals: [{ name: goal, stages }] }); }
  closeIEPModal(); renderIEPTable(); showToast('已添加');
}

/* === 编辑功能 === */
function toggleEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  inputEl.value = textEl.innerText;
  textEl.style.display = 'none'; inputEl.style.display = 'block'; actionsEl.style.display = 'flex'; linkEl.style.display = 'none';
  inputEl.focus();
}
function cancelEdit(id) {
  document.getElementById(id + 'Text').style.display = 'block';
  document.getElementById(id + 'Input').style.display = 'none';
  document.getElementById(id + 'Actions').style.display = 'none';
  document.getElementById(id + 'Area').querySelector('.edit-link').style.display = 'inline-flex';
}
function saveEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  textEl.innerText = inputEl.value;
  cancelEdit(id);
  localStorage.setItem('rice_assessment_report_edit_' + recordId + '_' + id, inputEl.value);
  showToast('已保存');
}
function loadSavedEdits() {
  ['eduOutline', 'analysis'].forEach(id => {
    const saved = localStorage.getItem('rice_assessment_report_edit_' + recordId + '_' + id);
    if (saved) { const el = document.getElementById(id + 'Text'); if (el) el.innerText = saved; }
  });
}
function exportPDF() { showToast('正在生成PDF...'); setTimeout(() => { window.print(); }, 300); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show'; setTimeout(() => t.className = 'toast', 2000); }
function resetAll() { Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); }); location.href = 'assessment-list.html'; }

renderReport();
initScale();
initIEP();
loadSavedEdits();
</script>
