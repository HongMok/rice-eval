<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>评估报告列表 - 康复师App 手机端</title>
<style>
/* === 全局变量（蓝色主题 Part B） === */
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--app-font);
  background: var(--app-bg);
  color: var(--app-text);
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* === 顶部导航栏 === */
.top-header {
  background: var(--app-card);
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--app-border);
  position: relative;
}
.back-btn {
  font-size: 18px;
  color: var(--app-text);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px 4px 0;
  display: flex;
  align-items: center;
}
.top-header-title {
  font-size: 16px;
  font-weight: 600;
  flex: 1;
}

/* === Tab 筛选栏 === */
.tab-bar {
  background: var(--app-card);
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 44px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--app-border);
}
.tab-group {
  display: flex;
  gap: 0;
  flex: 1;
}
.tab-btn {
  padding: 10px 14px;
  font-size: 14px;
  color: var(--app-text-nav);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  font-family: var(--app-font);
  font-weight: 500;
}
.tab-btn:hover { color: var(--app-primary); }
.tab-btn.active {
  color: var(--app-primary);
  border-bottom-color: var(--app-primary);
}
.new-btn {
  color: var(--app-primary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--app-font);
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.new-btn:hover { color: var(--app-primary-hover); }

/* === 列表区域 === */
.list-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: 80px; /* space for test buttons above tab bar */
  -webkit-overflow-scrolling: touch;
}
.list-empty {
  text-align: center;
  padding: 60px 0;
  color: var(--app-text-sec);
  font-size: 14px;
}

/* === 评估记录卡片（移动端竖排） === */
.record-card {
  background: var(--app-card);
  border-radius: var(--app-radius-lg);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--app-shadow);
  width: 100%;
}
.record-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.record-title {
  font-size: 15px;
  font-weight: 600;
}
.record-title .status-ongoing { color: var(--app-primary); }
.record-title .status-done { color: var(--app-success); }
.record-status-badge {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
}
.record-status-badge.ongoing {
  background: var(--app-primary-light);
  color: var(--app-primary);
}
.record-status-badge.completed {
  background: #F0FFF4;
  color: var(--app-success);
}
.record-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 13px;
  color: var(--app-text-sec);
  margin-bottom: 12px;
}
.record-meta-row {
  display: flex;
  gap: 16px;
}
.record-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.record-actions button {
  padding: 7px 18px;
  border-radius: var(--app-radius-md);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--app-font);
  font-weight: 500;
}
.btn-delete {
  background: #fff;
  border: 1px solid var(--app-danger);
  color: var(--app-danger);
}
.btn-delete:hover { background: #FFF0F0; }
.btn-continue {
  background: var(--app-primary);
  color: #fff;
  border: none;
  flex: 1;
}
.btn-continue:hover { background: var(--app-primary-hover); }
.btn-view {
  background: var(--app-primary);
  color: #fff;
  border: none;
  flex: 1;
}
.btn-view:hover { background: var(--app-primary-hover); }

/* === 底部Tab导航 === */
.bottom-tab {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: 56px;
  background: var(--app-card);
  border-top: 1px solid var(--app-border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
  flex-shrink: 0;
}
.bottom-tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--app-font);
  padding: 4px 0;
}
.bottom-tab-icon { font-size: 20px; }
.bottom-tab-label {
  font-size: 10px;
  color: var(--app-text-sec);
}
.bottom-tab-item.active .bottom-tab-label {
  color: var(--app-primary);
  font-weight: 500;
}
.bottom-tab-item.active .bottom-tab-icon {
  color: var(--app-primary);
}

/* === 弹窗 === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--app-radius-xl) var(--app-radius-xl) 0 0;
  padding: 20px 16px;
  width: 100%;
  max-width: 420px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.modal h3 .close {
  cursor: pointer;
  font-size: 18px;
  color: var(--app-text-sec);
  background: none;
  border: none;
  padding: 4px;
}
.modal #toolList {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

/* 评估工具选择卡片 */
.tool-card {
  border: 1px solid var(--app-border);
  border-radius: var(--app-radius-lg);
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .15s;
}
.tool-card:hover {
  border-color: var(--app-primary);
  background: var(--app-primary-light);
}
.tool-card:active { transform: scale(0.98); }
.tool-card .card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.tool-card .card-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--app-radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.tool-card .card-icon.pep3 { background: #EDE9FE; }
.tool-card .card-icon.vbmapp { background: #DBEAFE; }
.tool-card .card-name { font-size: 15px; font-weight: 600; }
.tool-card .card-desc {
  font-size: 13px;
  color: var(--app-text-sec);
  margin-bottom: 6px;
  line-height: 1.5;
}
.tool-card .card-meta {
  font-size: 12px;
  color: var(--app-text-nav);
  display: flex;
  gap: 12px;
}

/* 删除确认弹窗 */
.modal-delete { border-radius: var(--app-radius-xl); }
.modal-delete p {
  font-size: 14px;
  color: var(--app-text-sec);
  line-height: 1.6;
  margin-bottom: 16px;
}
.modal-btns {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.modal-btns button {
  padding: 8px 20px;
  border-radius: var(--app-radius-md);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--app-font);
}
.modal-btns .cancel {
  background: #fff;
  border: 1px solid var(--app-border);
  color: var(--app-text);
}
.modal-btns .confirm-delete {
  background: var(--app-danger);
  color: #fff;
  border: none;
}

/* === 测试数据按钮组（底部右侧，tab bar 上方） === */
.test-btns {
  position: fixed;
  bottom: 64px;
  right: calc((100vw - 420px) / 2 + 8px);
  z-index: 99;
  display: flex;
  gap: 4px;
}
@media (max-width: 420px) {
  .test-btns { right: 8px; }
}
.test-btn {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  line-height: 1;
  font-family: var(--app-font);
}
.test-btn.high { background: #F0FFF4; color: #52C41A; border: 1px solid #B7EB8F; }
.test-btn.mid { background: #FFFBE6; color: #FAAD14; border: 1px solid #FFE58F; }
.test-btn.low { background: #FFF1F0; color: #F5222D; border: 1px solid #FFA39E; }
.test-btn:hover { filter: brightness(0.95); }

/* === 重置按钮 === */
.reset-btn {
  position: fixed;
  bottom: 64px;
  left: calc((100vw - 420px) / 2 + 8px);
  background: rgba(0,0,0,0.35);
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: var(--app-radius-md);
  font-size: 12px;
  cursor: pointer;
  z-index: 99;
  opacity: 0.5;
}
@media (max-width: 420px) {
  .reset-btn { left: 8px; }
}
.reset-btn:hover { opacity: 1; }

/* === Toast === */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #1A2233;
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--app-radius-md);
  font-size: 13px;
  z-index: 10000;
  display: none;
  max-width: 300px;
  text-align: center;
}
.toast.show {
  display: block;
  animation: fadeInOut 2s ease;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<!-- 顶部导航栏 -->
<div class="top-header">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="top-header-title">张小明 的评估</div>
</div>

<!-- Tab 筛选栏 -->
<div class="tab-bar">
  <div class="tab-group">
    <button class="tab-btn active" data-filter="all" onclick="switchTab(this)">全部</button>
    <button class="tab-btn" data-filter="completed" onclick="switchTab(this)">已完成</button>
    <button class="tab-btn" data-filter="ongoing" onclick="switchTab(this)">评估中</button>
  </div>
  <button class="new-btn" onclick="openNewModal()">📋 新建评估</button>
</div>

<!-- 列表区域 -->
<div class="list-area" id="listArea"></div>

<!-- 底部Tab导航 -->
<div class="bottom-tab">
  <button class="bottom-tab-item">
    <span class="bottom-tab-icon">🏠</span>
    <span class="bottom-tab-label">首页</span>
  </button>
  <button class="bottom-tab-item active">
    <span class="bottom-tab-icon">👤</span>
    <span class="bottom-tab-label">学员</span>
  </button>
  <button class="bottom-tab-item">
    <span class="bottom-tab-icon">👤</span>
    <span class="bottom-tab-label">我的</span>
  </button>
</div>

<!-- 新建评估弹窗（底部弹出） -->
<div class="modal-overlay" id="newModal">
  <div class="modal">
    <h3>选择评估工具 <button class="close" onclick="closeModal('newModal')">✕</button></h3>
    <div id="toolList"></div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="deleteModal" style="align-items:center;">
  <div class="modal modal-delete" style="border-radius:var(--app-radius-xl);max-width:320px;">
    <h3>确认删除</h3>
    <p>确定要删除这条评估记录吗？删除后数据无法恢复。</p>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal('deleteModal')">取消</button>
      <button class="confirm-delete" id="confirmDeleteBtn" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<!-- 重置确认弹窗 -->
<div class="modal-overlay" id="resetModal" style="align-items:center;">
  <div class="modal modal-delete" style="border-radius:var(--app-radius-xl);max-width:320px;">
    <h3>确认重置</h3>
    <p>确定要重置所有评估数据吗？重置后将恢复默认模拟数据。</p>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal('resetModal')">取消</button>
      <button class="confirm-delete" onclick="confirmReset()">重置</button>
    </div>
  </div>
</div>

<!-- 测试数据按钮 -->
<div class="test-btns" id="testBtns">
  <button class="test-btn high" onclick="generateTestData('high')" title="高分测试数据">🟢</button>
  <button class="test-btn mid" onclick="generateTestData('mid')" title="中分测试数据">🟡</button>
  <button class="test-btn low" onclick="generateTestData('low')" title="低分测试数据">🔴</button>
</div>

<div class="toast" id="toast"></div>
<button class="reset-btn" onclick="resetAll()">🔄 重置</button>

<script>
/* === 数据管理 === */
const RECORDS_KEY = 'rice_assessment_records';
const TOOLS_KEY = 'rice_assessment_tools';

// 默认评估工具
function getDefaultTools() {
  return [
    { id: 'pep3', name: 'PEP-3', desc: '心理教育评估第三版，适用于2-7.5岁儿童', type: '发展评估', questionCount: 174, estimatedTime: '约60分钟', status: 'active' },
    { id: 'cpep', name: 'C-PEP', desc: '孤独症儿童发展评估（中国残联版），适用于0-6岁儿童', type: '发展评估', questionCount: 130, estimatedTime: '约50分钟', status: 'active' },
    { id: 'vbmapp', name: 'VB-MAPP', desc: '语言行为里程碑评估，基于ABA原理评估语言和社交技能', type: '语言行为', questionCount: 170, estimatedTime: '约45分钟', status: 'active' }
  ];
}

// 默认评估记录
function getDefaultRecords() {
  return [
    { id: 'rec001', toolId: 'pep3', toolName: 'PEP-3', date: '2024-01-15', time: '2024-01-15 09:30:00', status: 'completed', assessor: '李老师', answeredCount: 174, totalCount: 174 },
    { id: 'rec002', toolId: 'cpep', toolName: 'C-PEP', date: '2024-03-10', time: '2024-03-10 10:00:00', status: 'completed', assessor: '李老师', answeredCount: 130, totalCount: 130 },
    { id: 'rec003', toolId: 'vbmapp', toolName: 'VB-MAPP', date: '2024-02-01', time: '2024-02-01 14:15:30', status: 'completed', assessor: '李老师', answeredCount: 170, totalCount: 170 },
    { id: 'rec004', toolId: 'pep3', toolName: 'PEP-3', date: '2026-04-10', time: '2026-04-10 11:20:45', status: 'ongoing', assessor: '李老师', answeredCount: 80, totalCount: 174 }
  ];
}

// 初始化数据
function initData() {
  // 工具列表：检测并补充缺失的工具
  let tools = JSON.parse(localStorage.getItem(TOOLS_KEY) || 'null');
  if (!tools) {
    tools = getDefaultTools();
  } else {
    const defaultTools = getDefaultTools();
    defaultTools.forEach(dt => {
      if (!tools.find(t => t.id === dt.id)) tools.push(dt);
    });
  }
  localStorage.setItem(TOOLS_KEY, JSON.stringify(tools));

  // 评估记录：检测并补充缺失的默认记录
  let records = JSON.parse(localStorage.getItem(RECORDS_KEY) || 'null');
  if (!records) {
    records = getDefaultRecords();
  } else {
    const defaultRecords = getDefaultRecords();
    defaultRecords.forEach(dr => {
      if (!records.find(r => r.id === dr.id)) records.push(dr);
    });
  }
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
}

/* === 当前筛选状态 === */
let currentFilter = 'all';
let deleteTargetId = null;

/* === Tab 切换 === */
function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderList();
}

/* === 渲染列表 === */
function renderList() {
  const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  // 按日期倒序
  records.sort((a, b) => b.date.localeCompare(a.date));
  // 筛选
  const filtered = currentFilter === 'all' ? records
    : currentFilter === 'completed' ? records.filter(r => r.status === 'completed')
    : records.filter(r => r.status === 'ongoing');

  const area = document.getElementById('listArea');
  if (filtered.length === 0) {
    area.innerHTML = '<div class="list-empty">暂无评估记录</div>';
    return;
  }

  area.innerHTML = filtered.map(r => {
    const statusText = r.status === 'completed' ? '已完成' : '评估中';
    const statusClass = r.status === 'completed' ? 'completed' : 'ongoing';
    const dateStr = r.date.replace(/-/g, '.');
    // 进度信息
    const progress = r.status === 'ongoing' && r.totalCount
      ? `<span>进度: ${r.answeredCount}/${r.totalCount}</span>` : '';
    // 操作按钮
    let actions = '';
    if (r.status === 'ongoing') {
      actions = `<button class="btn-delete" onclick="tryDelete('${r.id}')">删除</button>
                 <button class="btn-continue" onclick="continueAssessment('${r.id}','${r.toolId}')">继续评估</button>`;
    } else {
      actions = `<button class="btn-view" onclick="viewResult('${r.id}','${r.toolId}')">查看结果</button>`;
    }
    return `<div class="record-card">
      <div class="record-card-header">
        <div class="record-title">${r.toolName} · ${dateStr}</div>
        <span class="record-status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="record-meta">
        <div class="record-meta-row">
          <span>🕐 ${r.time || r.date}</span>
        </div>
        <div class="record-meta-row">
          <span>👤 ${r.assessor}</span>
          ${progress}
        </div>
      </div>
      <div class="record-actions">${actions}</div>
    </div>`;
  }).join('');
}

/* === 新建评估弹窗 === */
function openNewModal() {
  const tools = JSON.parse(localStorage.getItem(TOOLS_KEY) || '[]').filter(t => t.status === 'active');
  document.getElementById('toolList').innerHTML = tools.map(t => {
    const iconHtml = t.avatar
      ? `<div class="card-icon" style="overflow:hidden"><img src="${t.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
      : `<div class="card-icon ${t.id || ''}">${t.id === 'pep3' ? '📋' : t.id === 'vbmapp' ? '📊' : t.id === 'cpep' ? '🧩' : '📝'}</div>`;
    return `
    <div class="tool-card" onclick="createAssessment('${t.id}')">
      <div class="card-top">
        ${iconHtml}
        <div class="card-name">${t.name}</div>
      </div>
      <div class="card-desc">${t.desc || '暂无描述'}</div>
      <div class="card-meta">
        <span>${t.questionCount}题</span>
        <span>${t.estimatedTime || '约' + Math.max(15, Math.round(t.questionCount * 0.35)) + '分钟'}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('newModal').classList.add('show');
}

/* === 创建新评估 === */
function createAssessment(toolId) {
  closeModal('newModal');
  const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  const tools = JSON.parse(localStorage.getItem(TOOLS_KEY) || '[]');
  const tool = tools.find(t => t.id === toolId);
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 10);
  const timeStr = `${dateStr} ${now.toTimeString().slice(0, 8)}`;
  const newRec = {
    id: 'rec_' + Date.now(),
    toolId, toolName: tool.name,
    date: dateStr, time: timeStr,
    status: 'ongoing', assessor: '李老师',
    answeredCount: 0, totalCount: tool.questionCount
  };
  records.push(newRec);
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
  localStorage.setItem('rice_assessment_current_record', newRec.id);
  localStorage.setItem('rice_assessment_current_tool', toolId);
  location.href = `assessment-answer.html?record=${newRec.id}&tool=${toolId}`;
}

/* === 继续评估 === */
function continueAssessment(recId, toolId) {
  localStorage.setItem('rice_assessment_current_record', recId);
  localStorage.setItem('rice_assessment_current_tool', toolId);
  location.href = `assessment-answer.html?record=${recId}&tool=${toolId}`;
}

/* === 查看结果 === */
function viewResult(recId, toolId) {
  location.href = `assessment-result.html?record=${recId}&tool=${toolId}`;
}

/* === 删除评估 === */
function tryDelete(recId) {
  deleteTargetId = recId;
  document.getElementById('deleteModal').classList.add('show');
}

function confirmDelete() {
  if (!deleteTargetId) return;
  let records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  records = records.filter(r => r.id !== deleteTargetId);
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
  // 清除对应答题数据
  localStorage.removeItem('rice_assessment_answers_' + deleteTargetId);
  deleteTargetId = null;
  closeModal('deleteModal');
  showToast('已删除');
  renderList();
}

/* === 弹窗控制 === */
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

/* === 通用 === */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}

function resetAll() {
  document.getElementById('resetModal').classList.add('show');
}

function confirmReset() {
  closeModal('resetModal');
  Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.reload();
}

/* === 测试数据生成 === */
const TOOL_SCORE_CONFIG = {
  pep3: { maxScore: 2, midScore: 1, minScore: 0, totalQuestions: 174, prefix: 'pep3' },
  cpep: { maxScore: 1, midScore: 0.5, minScore: 0, totalQuestions: 130, prefix: 'cpep' },
  vbmapp: { maxScore: 1, midScore: 0.5, minScore: 0, totalQuestions: 175, prefix: 'vbmapp' }
};

function generateTestData(level) {
  const tools = JSON.parse(localStorage.getItem(TOOLS_KEY) || '[]').filter(t => t.status === 'active');
  const records = JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]');
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 10);
  const timeStr = `${dateStr} ${now.toTimeString().slice(0, 8)}`;
  const levelLabel = level === 'high' ? '高分' : level === 'mid' ? '中分' : '低分';

  tools.forEach(tool => {
    const cfg = TOOL_SCORE_CONFIG[tool.id];
    if (!cfg) return;

    // 生成答题数据（含回合统计）
    const answers = {};
    const roundResults = ['independent', 'error', 'prompted'];
    for (let i = 1; i <= cfg.totalQuestions; i++) {
      const qId = `${cfg.prefix}_q${i}`;
      const rand = Math.random();
      let scoreValue;
      if (level === 'high') {
        scoreValue = rand < 0.85 ? cfg.maxScore : cfg.midScore;
      } else if (level === 'mid') {
        if (rand < 0.5) scoreValue = cfg.maxScore;
        else if (rand < 0.8) scoreValue = cfg.midScore;
        else scoreValue = cfg.minScore;
      } else {
        if (rand < 0.7) scoreValue = cfg.minScore;
        else if (rand < 0.85) scoreValue = cfg.midScore;
        else scoreValue = cfg.maxScore;
      }
      const entry = { value: scoreValue, label: '' };
      // 约50%的题目生成回合统计数据
      if (Math.random() < 0.5) {
        const numRounds = 3 + Math.floor(Math.random() * 2);
        const rounds = [];
        for (let r = 0; r < numRounds; r++) {
          const rr = Math.random();
          let result;
          if (level === 'high') result = rr < 0.8 ? 'independent' : rr < 0.9 ? 'prompted' : 'error';
          else if (level === 'mid') result = rr < 0.4 ? 'independent' : rr < 0.7 ? 'prompted' : 'error';
          else result = rr < 0.15 ? 'independent' : rr < 0.3 ? 'prompted' : 'error';
          rounds.push({ round: r + 1, result: result });
        }
        entry.rounds = rounds;
      }
      answers[qId] = entry;
    }

    // 创建记录
    const recId = 'rec_test_' + tool.id + '_' + Date.now();
    records.push({
      id: recId, toolId: tool.id, toolName: tool.name,
      date: dateStr, time: timeStr,
      status: 'completed', assessor: '测试(' + levelLabel + ')',
      answeredCount: cfg.totalQuestions, totalCount: cfg.totalQuestions
    });

    // 写入答题数据
    localStorage.setItem('rice_assessment_answers_' + recId, JSON.stringify(answers));
  });

  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
  showToast(`已生成${levelLabel}测试数据（${tools.length}个工具）`);
  renderList();
}

// 初始化
initData();
renderList();
