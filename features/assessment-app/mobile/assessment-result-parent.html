<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>评估报告 - 家长版</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); min-height: 100vh; max-width: 420px; margin: 0 auto; }
.hero { background: linear-gradient(135deg, #3B9BF5, #60B8FF); padding: 24px 16px 20px; color: #fff; }
.hero .student-name { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.hero .subtitle { font-size: 13px; opacity: 0.9; }
.content { padding: 12px 12px 24px; margin-top: -8px; }
.card { background: var(--app-card); border-radius: var(--app-radius-xl); padding: 16px; box-shadow: var(--app-shadow); margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.chart-container { text-align: center; }
.radar-svg { width: 100%; max-width: 280px; height: 280px; }
.domain-item { margin-bottom: 14px; }
.domain-item:last-child { margin-bottom: 0; }
.domain-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
.domain-label .name { font-size: 13px; font-weight: 500; }
.domain-label .level { font-size: 12px; }
.domain-bar { height: 8px; background: #E8ECF0; border-radius: 9999px; overflow: hidden; }
.domain-fill { height: 100%; border-radius: 9999px; transition: width .6s ease; }
.summary-text { font-size: 13px; line-height: 1.8; color: var(--app-text); }
.footer-note { text-align: center; padding: 20px 12px; font-size: 12px; color: var(--app-text-sec); line-height: 1.6; }
.reset-btn { position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 6px 12px; border-radius: var(--app-radius-md); font-size: 12px; cursor: pointer; z-index: 9999; opacity: 0.5; }
.reset-btn:hover { opacity: 1; }
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #1A2233; color: #fff; padding: 8px 16px; border-radius: var(--app-radius-md); font-size: 13px; z-index: 10000; display: none; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div class="hero">
  <div class="student-name">张小明 评估报告</div>
  <div class="subtitle" id="subtitleText">PEP-3 心理教育评估 · 2024-01-15</div>
</div>

<div class="content">
  <div class="card">
    <div class="card-title">发展概况</div>
    <div class="chart-container">
      <svg class="radar-svg" id="radarChart" viewBox="0 0 300 300"></svg>
    </div>
  </div>

  <div class="card">
    <div class="card-title">各领域表现</div>
    <div id="domainList"></div>
  </div>

  <div class="card">
    <div class="card-title">📝 评估总结</div>
    <div class="summary-text" id="summaryText"></div>
  </div>

  <div class="footer-note">
    本报告由 RICE AI 康复系统生成<br>
    如有疑问请联系您的康复师
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="reset-btn" onclick="resetAll()">🔄 一键重置</button>

<script>
const params = new URLSearchParams(location.search);
const toolId = params.get('tool') || 'pep3';
const isPep3 = toolId === 'pep3';

const PEP3_DATA = [
  { name:'认知', pct:75, color:'#7EC8F0' },
  { name:'语言表达', pct:35, color:'#FFB88C' },
  { name:'语言理解', pct:50, color:'#FFD966' },
  { name:'精细动作', pct:65, color:'#7ED6A8' },
  { name:'粗大动作', pct:60, color:'#B8A0E0' },
  { name:'视觉模仿', pct:25, color:'#FFB0C8' }
];
const VBMAPP_DATA = [
  { name:'要求', pct:80, color:'#7EC8F0' },
  { name:'命名', pct:60, color:'#FFB88C' },
  { name:'听者反应', pct:67, color:'#FFD966' },
  { name:'视觉配对', pct:53, color:'#7ED6A8' },
  { name:'游戏', pct:73, color:'#B8A0E0' },
  { name:'社交', pct:47, color:'#FFB0C8' }
];
const data = isPep3 ? PEP3_DATA : VBMAPP_DATA;

function init() {
  document.getElementById('subtitleText').textContent = isPep3
    ? 'PEP-3 心理教育评估 · 2024-01-15'
    : 'VB-MAPP 语言行为里程碑评估 · 2024-02-01';
  renderDomains();
  drawRadar();
  renderSummary();
}

function renderDomains() {
  document.getElementById('domainList').innerHTML = data.map(d => {
    const level = d.pct >= 70 ? '良好' : d.pct >= 50 ? '中等' : '需关注';
    const levelColor = d.pct >= 70 ? '#52C41A' : d.pct >= 50 ? '#F5A623' : '#F56C6C';
    return `<div class="domain-item">
      <div class="domain-label">
        <span class="name">${d.name}</span>
        <span class="level" style="color:${levelColor}">${level}</span>
      </div>
      <div class="domain-bar">
        <div class="domain-fill" style="width:${d.pct}%;background:${d.color}"></div>
      </div>
    </div>`;
  }).join('');
}

function drawRadar() {
  const svg = document.getElementById('radarChart');
  const cx = 150, cy = 150, r = 100;
  const n = data.length;
  let grid = '';
  for (let level = 1; level <= 4; level++) {
    const lr = r * level / 4;
    let pts = [];
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) - Math.PI / 2;
      pts.push(`${cx + lr * Math.cos(a)},${cy + lr * Math.sin(a)}`);
    }
    grid += `<polygon points="${pts.join(' ')}" fill="none" stroke="#E8ECF0" stroke-width="1"/>`;
  }
  let axes = '', labels = '', dataPoints = [], dots = '';
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) - Math.PI / 2;
    axes += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(a)}" y2="${cy + r * Math.sin(a)}" stroke="#E8ECF0"/>`;
    const val = data[i].pct / 100;
    dataPoints.push(`${cx + r * val * Math.cos(a)},${cy + r * val * Math.sin(a)}`);
    dots += `<circle cx="${cx + r * val * Math.cos(a)}" cy="${cy + r * val * Math.sin(a)}" r="4" fill="${data[i].color}" stroke="#fff" stroke-width="2"/>`;
    const lx = cx + (r + 22) * Math.cos(a);
    const ly = cy + (r + 22) * Math.sin(a);
    labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#5A6478">${data[i].name}</text>`;
  }
  svg.innerHTML = `${grid}${axes}<polygon points="${dataPoints.join(' ')}" fill="rgba(59,155,245,0.12)" stroke="#3B9BF5" stroke-width="2"/>${dots}${labels}`;
}

function renderSummary() {
  document.getElementById('summaryText').textContent = isPep3
    ? '您的孩子在认知方面发展良好，能够完成与年龄相当的认知任务。精细动作和粗大动作发展也比较正常。语言表达和视觉模仿方面建议加强训练，可以在日常生活中多鼓励孩子主动表达需求，多进行模仿游戏。语言理解处于中等水平，建议通过简单指令游戏来提升。整体来看，孩子在多个领域都有进步空间，建议配合康复师的训练计划，在家庭中创造更多语言互动的机会。'
    : '您的孩子在语言要求和游戏方面表现较好，能够主动表达需求并参与游戏活动。命名和听者反应处于中等水平，建议在日常生活中多进行物品命名练习。视觉配对和社交方面需要重点关注，可以通过配对游戏和社交互动活动来提升。建议配合康复师的训练计划，在家庭中创造更多互动机会。';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}
function resetAll() {
  Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.reload();
}

init();
</script>
</body>
</html>
