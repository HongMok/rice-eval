<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VB-MAPP 评估报告 - 手机端</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; max-width: 420px; margin: 0 auto; }

/* 底部Tab导航 */
.bottom-nav { background: var(--app-card); border-top: 1px solid var(--app-border); display: flex; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 0); }
.bottom-nav .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 6px 0 4px; cursor: pointer; border: none; background: none; font-family: var(--app-font); color: var(--app-text-nav); font-size: 10px; gap: 2px; }
.bottom-nav .nav-item .nav-icon { font-size: 18px; line-height: 1; }
.bottom-nav .nav-item .nav-label { font-size: 10px; font-weight: 500; }
.bottom-nav .nav-item.active { color: var(--app-primary); }

.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.tab-content { display: none; padding: 12px; }
.tab-content.active { display: block; }

.section-label { display: inline-block; background: var(--app-primary); color: #fff; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: var(--app-radius-md); margin-bottom: 10px; }
.card { background: var(--app-card); border-radius: var(--app-radius-lg); padding: 14px; box-shadow: var(--app-shadow); margin-bottom: 12px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
.info-item { font-size: 13px; }
.info-item .label { color: var(--app-text-sec); margin-right: 2px; }
.info-item .value { font-weight: 500; }
.report-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.report-desc { font-size: 12px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 14px; }

/* 网格表 - 横向可滚动 */
.tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -14px; padding: 0 14px; }
.grid-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 340px; }
.grid-table th, .grid-table td { border: 1px solid var(--app-border); padding: 3px 4px; text-align: center; }
.grid-table th { background: #F5F7FA; font-weight: 500; color: var(--app-text-sec); font-size: 10px; }
.cell-filled { background: var(--app-primary); border-radius: 2px; }
.cell-empty { background: #F0F2F5; }
.cell-half { background: #93C5FD; }
.grid-level-label { font-weight: 600; font-size: 12px; color: var(--app-text); padding: 8px 0 4px; }

/* === 三色主题区块 === */
.section-block { margin-bottom: 12px; }
.section-header { padding: 10px 14px; border-radius: 8px 8px 0 0; color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 1px; text-align: center; }
.section-header .section-subtitle { font-size: 10px; font-weight: 400; opacity: 0.85; margin-top: 2px; }
.section-header.milestone { background: linear-gradient(135deg, #43A047, #66BB6A); }
.section-header.barrier { background: linear-gradient(135deg, #F9A825, #FFB74D); }
.section-header.transition { background: linear-gradient(135deg, #1E88E5, #42A5F5); }
.section-body { background: var(--app-card); border-radius: 0 0 8px 8px; padding: 14px; box-shadow: var(--app-shadow); }

/* 里程碑网格 */
.milestone-grid { margin-bottom: 12px; }
.milestone-grid .grid-title { font-size: 12px; font-weight: 600; color: #43A047; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.milestone-grid .grid-title .level-badge { background: #43A047; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 4px; }
.grid-table.milestone-theme th { background: #E8F5E9; color: #2E7D32; }
.grid-table.milestone-theme .cell-filled { background: #43A047; }
.grid-table.milestone-theme .cell-half { background: #A5D6A7; }
.grid-table.barrier-theme th { background: #FFF8E1; color: #E65100; }
.grid-table.barrier-theme .cell-filled { background: #F9A825; }
.grid-table.barrier-theme .cell-half { background: #FFE082; }
.grid-table.transition-theme th { background: #E3F2FD; color: #1565C0; }
.grid-table.transition-theme .cell-filled { background: #1E88E5; }
.grid-table.transition-theme .cell-half { background: #90CAF9; }

/* 领域报告卡片 - 带左侧色条 */
.domain-report { border: 1px solid var(--app-border); border-radius: var(--app-radius-lg); padding: 12px; margin-bottom: 10px; }
.domain-report.milestone-card { border-left: 3px solid #43A047; }
.domain-report.milestone-card .dr-score { color: #43A047; }
.domain-report.barrier-card { border-left: 3px solid #F9A825; }
.domain-report.barrier-card .dr-score { color: #E65100; }
.domain-report.transition-card { border-left: 3px solid #1E88E5; }
.domain-report.transition-card .dr-score { color: #1565C0; }
.domain-report .dr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.domain-report .dr-name { font-size: 13px; font-weight: 600; }
.domain-report .dr-score { font-size: 12px; color: var(--app-primary); font-weight: 500; }
.domain-report .dr-desc { font-size: 12px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 4px; }
.domain-report .dr-advice { font-size: 12px; line-height: 1.6; }
.domain-report .dr-advice strong { color: var(--app-primary); }

/* 得分概览条 */
.score-overview { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #F5F7FA; border-radius: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.score-overview .score-big { font-size: 24px; font-weight: 700; }
.score-overview .score-big.green { color: #43A047; }
.score-overview .score-big.orange { color: #E65100; }
.score-overview .score-big.blue { color: #1E88E5; }
.score-overview .score-detail { font-size: 12px; color: var(--app-text-sec); }
.score-overview .score-bar { flex: 1; min-width: 80px; height: 6px; background: #E8ECF0; border-radius: 3px; overflow: hidden; }
.score-overview .score-bar-fill { height: 100%; border-radius: 3px; }
.score-overview .score-bar-fill.green { background: linear-gradient(90deg, #43A047, #66BB6A); }
.score-overview .score-bar-fill.orange { background: linear-gradient(90deg, #F9A825, #FFB74D); }
.score-overview .score-bar-fill.blue { background: linear-gradient(90deg, #1E88E5, #42A5F5); }

/* 转衔类别标题 */
.transition-cat-title { font-size: 12px; font-weight: 600; color: #1565C0; padding: 8px 10px; background: #E3F2FD; border-radius: 6px; margin: 12px 0 8px; }

/* 可编辑区域 */
.editable-area { position: relative; }
.editable-area .edit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.editable-area .edit-link { color: var(--app-primary); font-size: 12px; cursor: pointer; }
.editable-area .area-text { font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
.editable-area .area-textarea { width: 100%; min-height: 100px; font-size: 13px; line-height: 1.8; font-family: var(--app-font); border: 1px solid var(--app-primary); border-radius: var(--app-radius-md); padding: 10px; resize: vertical; outline: none; display: none; }
.editable-area .edit-actions { display: none; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.editable-area .edit-actions button { padding: 6px 14px; border-radius: var(--app-radius-md); font-size: 12px; cursor: pointer; font-family: var(--app-font); }
.editable-area .edit-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.editable-area .edit-actions .btn-save { background: var(--app-primary); color: #fff; border: none; }

/* 底部操作栏（报告tab） */
.bottom-actions { background: var(--app-card); border-top: 1px solid var(--app-border); padding: 10px 12px; display: flex; justify-content: center; gap: 12px; flex-shrink: 0; }
.btn-export { padding: 8px 20px; background: #fff; border: 1px solid #D8DDE5; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; color: var(--app-text-sec); font-family: var(--app-font); }
.btn-send { padding: 8px 20px; background: var(--app-primary); color: #fff; border: none; border-radius: var(--app-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--app-font); }

/* IEP */
.iep-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 12px; }
.iep-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; margin-bottom: 12px; }
.iep-info .label { color: var(--app-text-sec); }
.iep-tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.iep-table { width: 100%; border-collapse: collapse; min-width: 500px; }
.iep-table th { background: var(--app-primary); color: #fff; padding: 8px 10px; text-align: left; font-size: 12px; font-weight: 500; white-space: nowrap; }
.iep-table td { padding: 8px 10px; border-bottom: 1px solid var(--app-border); font-size: 12px; vertical-align: top; }
.iep-table .domain-cell { font-weight: 500; border-right: 1px solid var(--app-border); }
.iep-table .goal-cell { border-right: 1px solid var(--app-border); }
.iep-table .del-link { color: var(--app-danger); font-size: 11px; cursor: pointer; }
.iep-domain-del { color: var(--app-danger); font-size: 11px; cursor: pointer; margin-top: 6px; display: block; }
.iep-actions { display: flex; justify-content: center; gap: 8px; padding: 10px 0; }
.iep-actions button { padding: 7px 16px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); font-weight: 500; }
.iep-btn-export { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.iep-btn-import { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-edit { background: var(--app-primary); border: none; color: #fff; }
.iep-btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-btn-add { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-save { background: var(--app-primary); border: none; color: #fff; }

/* IEP 弹窗 */
.iep-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.iep-modal-overlay.show { display: flex; }
.iep-modal { background: #fff; border-radius: var(--app-radius-xl) var(--app-radius-xl) 0 0; padding: 20px 16px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; }
.iep-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.iep-modal h3 .close { cursor: pointer; font-size: 18px; color: var(--app-text-sec); background: none; border: none; }
.iep-modal .form-group { margin-bottom: 12px; }
.iep-modal .form-group label { display: block; font-size: 12px; color: var(--app-text-sec); margin-bottom: 4px; }
.iep-modal .form-group input, .iep-modal .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: 14px; font-family: var(--app-font); }
.iep-modal .form-group textarea { min-height: 70px; resize: vertical; }
.iep-modal .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.iep-modal .form-actions button { padding: 8px 18px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); }
.iep-modal .form-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-modal .form-actions .btn-confirm { background: var(--app-primary); border: none; color: #fff; }

/* 评估量表 - 顶部下拉选择（替代左侧导航） */
.scale-dropdown-bar { padding: 10px 0; margin-bottom: 8px; }
.scale-dropdown-bar select { width: 100%; padding: 8px 10px; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: 13px; font-family: var(--app-font); background: var(--app-card); color: var(--app-text); appearance: auto; }
.scale-summary-bar { background: var(--app-card); border-radius: var(--app-radius-lg); padding: 10px 12px; margin-bottom: 10px; }
.scale-summary-bar .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.scale-stats { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 12px; }
.scale-stats .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 2px; }
.sum-bar { flex: 1; min-width: 60px; height: 6px; background: #E8ECF0; border-radius: 3px; overflow: hidden; display: flex; }
.sum-bar-seg { height: 100%; }

/* 题目卡片 - 单列 */
.q-card { background: var(--app-card); border: 1px solid var(--app-border); border-radius: var(--app-radius-lg); padding: 12px; margin-bottom: 8px; }
.q-card .q-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.q-card .q-num { font-size: 13px; font-weight: 600; color: var(--app-primary); min-width: 24px; }
.q-card .q-desc { font-size: 13px; line-height: 1.5; flex: 1; }
.q-card .q-scores { display: flex; gap: 4px; flex-wrap: wrap; }
.q-card .q-score-opt { padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; color: var(--app-text-sec); flex: 1; text-align: center; }
.q-card .q-score-opt.selected-0 { background: #FFF0F0; color: var(--app-danger); border-color: var(--app-danger); }
.q-card .q-score-opt.selected-05 { background: #FFF8EB; color: var(--app-warning); border-color: var(--app-warning); }
.q-card .q-score-opt.selected-1 { background: #F0FFF4; color: var(--app-success); border-color: var(--app-success); }
.q-card .q-note { margin-top: 6px; font-size: 11px; color: var(--app-text-sec); background: #F9FAFB; border-radius: 6px; padding: 5px 8px; }
.q-card .q-note::before { content: '\1F4DD '; }

/* 重置按钮 & Toast */
.reset-btn { position: fixed; bottom: 60px; right: 12px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 6px 12px; border-radius: var(--app-radius-md); font-size: 12px; cursor: pointer; z-index: 9999; opacity: 0.5; }
.reset-btn:hover { opacity: 1; }
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #1A2233; color: #fff; padding: 8px 16px; border-radius: var(--app-radius-md); font-size: 13px; z-index: 10000; display: none; white-space: nowrap; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }

/* 打印样式 */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
  .bottom-nav,.bottom-actions,.reset-btn,.toast,.edit-link,.edit-actions,.iep-actions{display:none!important}
  .content{overflow:visible!important;height:auto!important}
  .tab-content{display:block!important;padding:12px!important}
  .tab-content#tabIEP,.tab-content#tabScale{display:none!important}
  body{height:auto;overflow:visible;max-width:none}
  .card,.section-card{background:none!important;box-shadow:none!important;border:none!important;border-radius:0!important;padding:0!important;margin-bottom:0!important}
  .card+.card{margin-top:8px!important;padding-top:12px!important;border-top:1px solid #E0E4E8!important}
  .section-label{display:block!important;background:#3B9BF5!important;color:#fff!important;font-size:13px!important;font-weight:600!important;padding:6px 12px!important;border-radius:0!important;margin:12px 0 10px 0!important;break-after:avoid!important;page-break-after:avoid!important}
  .domain-report{border:1px solid #E8ECF0!important;border-radius:6px!important;padding:10px 12px!important;margin-bottom:6px!important;break-inside:avoid!important;page-break-inside:avoid!important}
  .info-grid{break-inside:avoid!important;page-break-inside:avoid!important}
  .grid-level-label{break-after:avoid!important;page-break-after:avoid!important}
  .report-title{font-size:18px!important;text-align:center!important;break-after:avoid!important}
  .report-desc{break-after:avoid!important}
  p,.dr-desc,.dr-advice,.area-text{orphans:3;widows:3}
  table{border-collapse:collapse!important}
  th{background:#F5F7FA!important}
  td,th{border:1px solid #E8ECF0!important;padding:4px 6px!important}
  .cell-filled{background:#3B9BF5!important}
  .cell-half{background:#93C5FD!important}
  .cell-empty{background:#F0F2F5!important}
  .q-score-opt.selected-1{background:#F0FFF4!important;color:#52C41A!important;border-color:#52C41A!important}
  .q-score-opt.selected-05{background:#FFF8EB!important;color:#F5A623!important;border-color:#F5A623!important}
  .q-score-opt.selected-0{background:#FFF0F0!important;color:#F56C6C!important;border-color:#F56C6C!important}
  .editable-area .area-text{display:block!important}
  .editable-area .area-textarea{display:none!important}
  @page{margin:12mm 8mm;size:A4}
  .domain-report,.q-card{break-inside:avoid;page-break-inside:avoid}
}
</style>
</head>
<body>

<div class="content">
  <div class="tab-content active" id="tabReport"></div>
  <div class="tab-content" id="tabIEP">
    <div class="iep-title">张小明IEP</div>
    <div class="card"><div class="iep-info">
      <div><span class="label">学生姓名：</span>张小明</div><div><span class="label">性别：</span>男</div>
      <div><span class="label">出生日期：</span>2019-05-20</div><div><span class="label">制定人员：</span>李老师</div>
    </div></div>
    <div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--app-text-sec);">课程包：</label>
      <select id="coursePacketSelect" onchange="onCoursePacketChange()" style="padding:6px 10px;border:1px solid var(--app-border);border-radius:var(--app-radius-md);font-size:13px;font-family:var(--app-font);width:100%;margin-top:4px;"></select>
    </div>
    <div id="iepContent"><div style="text-align:center;padding:30px 0;color:var(--app-text-sec);font-size:13px;">请先选择课程包</div></div>
  </div>
  <div class="tab-content" id="tabScale">
    <div class="scale-dropdown-bar">
      <select id="scaleDomainSelect" onchange="onScaleDomainChange()"></select>
    </div>
    <div id="scaleSummaryBar" class="scale-summary-bar"></div>
    <div id="scaleCards"></div>
  </div>
</div>

<div class="bottom-actions" id="bottomActions">
  <button class="btn-export" onclick="exportPDF()">导出PDF</button>
  <button class="btn-send" onclick="showToast('已生成家长版报告链接')">发送报告</button>
</div>

<!-- 底部Tab导航 -->
<div class="bottom-nav" id="bottomNav">
  <button class="nav-item active" onclick="switchTab(0,this)"><span class="nav-icon">📊</span><span class="nav-label">评估报告</span></button>
  <button class="nav-item" onclick="switchTab(1,this)"><span class="nav-icon">📋</span><span class="nav-label">IEP</span></button>
  <button class="nav-item" onclick="switchTab(2,this)"><span class="nav-icon">📝</span><span class="nav-label">评估量表</span></button>
</div>

<!-- 弹窗 -->
<div class="iep-modal-overlay" id="iepDeleteModal"><div class="iep-modal"><h3>确认删除 <button class="close" onclick="closeDeleteModal()">✕</button></h3><p style="font-size:13px;color:var(--app-text-sec);margin-bottom:14px;" id="iepDeleteMsg">确定要删除吗？</p><div class="form-actions"><button class="btn-cancel" onclick="closeDeleteModal()">取消</button><button class="btn-confirm" style="background:var(--app-danger);" onclick="execDelete()">删除</button></div></div></div>
<div class="iep-modal-overlay" id="iepAddModal"><div class="iep-modal"><h3>添加目标 <button class="close" onclick="closeIEPModal()">✕</button></h3><div class="form-group"><label>阶梯及领域</label><input type="text" id="iepAddDomain" placeholder="如：提要求"></div><div class="form-group"><label>任务目标</label><input type="text" id="iepAddGoal" placeholder="如：两词组合要求"></div><div class="form-group"><label>短期目标（每行一个）</label><textarea id="iepAddStages" placeholder="要求常见物品&#10;要求动作"></textarea></div><div class="form-actions"><button class="btn-cancel" onclick="closeIEPModal()">取消</button><button class="btn-confirm" onclick="confirmAddGoal()">确认添加</button></div></div></div>
<div class="toast" id="toast"></div>
<button class="reset-btn" onclick="resetAll()">🔄 一键重置</button>

<script>
const params = new URLSearchParams(location.search);
const recordId = params.get('record') || 'rec003';

/* === VB-MAPP 结构 === */
const MILESTONE_LEVELS = [
  { level: 1, range: '0-18月', domains: [
    {name:'提要求',count:5},{name:'命名',count:5},{name:'听者反应',count:5},{name:'视觉配对',count:5},

/* === 确定性伪随机（基于种子字符串，同一 recordId 始终生成相同数据） === */
function seededRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) { h = ((h << 5) - h + seed.charCodeAt(i)) | 0; }
  return function() { h = (h * 1103515245 + 12345) & 0x7fffffff; return (h % 1000) / 1000; };
}

/* === 加载答题数据 === */
function loadAnswers() {
  const key = 'rice_assessment_answers_' + recordId;
  const stored = localStorage.getItem(key);
  const result = { scores: {}, notes: {}, rounds: {} };
  if (stored) {
    const data = JSON.parse(stored);
    Object.keys(data).forEach(qId => {
      if (qId === '_marks') return;
      const v = data[qId];
      if (v && typeof v === 'object' && v.value !== undefined) {
        result.scores[qId] = v.value;
        if (v.notes) result.notes[qId] = v.notes;
        if (v.rounds && Array.isArray(v.rounds)) result.rounds[qId] = v.rounds;
      } else if (typeof v === 'number') {
        result.scores[qId] = v;
      }
    });
    if (data.answers && typeof data.answers === 'object') {
      Object.keys(data.answers).forEach(qId => { result.scores[qId] = data.answers[qId]; });
      if (data.notes) Object.assign(result.notes, data.notes);
    }
    return result;
  }
  const sampleNotes = ['需要多次示范','主动发起要求','在提示下完成','注意力短暂','表现出兴趣但未完成','需要实物辅助','能泛化到新环境'];
  const rand = seededRandom(recordId + '_fallback');
  for (let i = 1; i <= 175; i++) {
    const r = rand();
    result.scores['vbmapp_q' + i] = r < 0.4 ? 1 : r < 0.7 ? 0.5 : 0;
    if (rand() < 0.12) result.notes['vbmapp_q' + i] = sampleNotes[Math.floor(rand() * sampleNotes.length)];
  }
  return result;
}
const answerData = loadAnswers();
const answers = answerData.scores;
const answerNotes = answerData.notes;
const answerRounds = answerData.rounds;

/* === 计算里程碑得分 === */
function calcMilestoneScores() {
  const domainTotals = {};
  ALL_MILESTONE_DOMAINS.forEach(d => { domainTotals[d] = { score: 0, total: 0 }; });
  let qIdx = 1;
  MILESTONE_LEVELS.forEach(lv => {
    lv.domains.forEach(d => {
      for (let i = 0; i < d.count; i++) {
        const v = answers['vbmapp_q' + qIdx] || 0;
        domainTotals[d.name].score += v;
        domainTotals[d.name].total += 1;
        qIdx++;
      }
    });
  });
  return domainTotals;
}
const milestoneScores = calcMilestoneScores();
const totalMilestone = Object.values(milestoneScores).reduce((s, d) => s + d.score, 0);

/* 障碍得分：基于里程碑薄弱领域确定性推导 */
function calcBarrierScores() {
  const rand = seededRandom(recordId + '_barrier');
  const milestonePct = totalMilestone / 170;
  const baseSeverity = 1 - milestonePct;
  return BARRIERS.map((b, i) => {
    const offset = ((i * 7 + 3) % 11) / 11 - 0.5;
    const raw = baseSeverity * 4 + offset * 1.5;
    const score = Math.max(0, Math.min(4, Math.round(raw)));
    return { name: b, score };
  });
}

/* 转衔得分：基于里程碑和障碍确定性推导 */
function calcTransitionScores() {
  const milestonePct = totalMilestone / 170;
  const all = [];
  let idx = 0;
  TRANSITION_CATS.forEach(cat => {
    cat.areas.forEach(a => {
      const offset = ((idx * 13 + 5) % 9) / 9 - 0.5;
      const raw = milestonePct * 5 + offset * 1.2;
      const score = Math.max(0, Math.min(5, Math.round(raw)));
      all.push({ name: a, category: cat.title, score });
      idx++;
    });
  });
  return all;
}

const barrierScores = calcBarrierScores();
const transitionScores = calcTransitionScores();
const totalBarrier = barrierScores.reduce((s, b) => s + b.score, 0);
const totalTransition = transitionScores.reduce((s, t) => s + t.score, 0);

/* === Tab 切换（底部导航） === */
function switchTab(idx, btn) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => { c.classList.remove('active'); c.style.display = 'none'; });
  const tab = document.querySelectorAll('.tab-content')[idx];

  tab.style.display = 'block';
  document.getElementById('bottomActions').style.display = idx === 0 ? 'flex' : 'none';
}

/* === 渲染里程碑网格 === */
function renderMilestoneGrid(level) {
  const lv = MILESTONE_LEVELS.find(l => l.level === level);
  const startM = (level - 1) * 5 + 1;
  let html = '<table class="grid-table milestone-theme"><thead><tr><th></th>';
  lv.domains.forEach(d => { const n = d.name; html += '<th>' + (n.length > 3 ? n.slice(0, 3) : n) + '</th>'; });
  html += '</tr></thead><tbody>';
  for (let m = startM + 4; m >= startM; m--) {
    html += '<tr><td style="font-weight:600">' + m + 'M</td>';
    lv.domains.forEach(d => {
      const ds = milestoneScores[d.name];
      const ratio = ds && ds.total > 0 ? ds.score / ds.total : 0;
      const threshold = (m - startM + 1) / 5;
      const cls = ratio >= threshold ? 'cell-filled' : ratio >= threshold - 0.2 ? 'cell-half' : 'cell-empty';
      html += '<td><div style="width:16px;height:12px;margin:auto;border-radius:2px" class="' + cls + '"></div></td>';
    });
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

/* === 渲染障碍网格（全部24项，4行×6列，共4个表格） === */
function renderBarrierGrid() {
  const cols = 6;
  const rows = Math.ceil(BARRIERS.length / cols);
  let html = '';
  for (let r = 0; r < rows; r++) {
    const startIdx = r * cols;
    const endIdx = Math.min(startIdx + cols, BARRIERS.length);
    const rowBarriers = BARRIERS.slice(startIdx, endIdx);
    html += '<table class="grid-table barrier-theme" style="margin-bottom:10px"><thead><tr><th></th>';
    rowBarriers.forEach(b => {
      html += '<th style="font-size:9px;max-width:50px;word-break:break-all">' + (b.length > 4 ? b.slice(0, 4) : b) + '</th>';
    });
    html += '</tr></thead><tbody>';
    for (let score = 4; score >= 1; score--) {
      html += '<tr><td style="font-weight:600">' + score + '</td>';
      rowBarriers.forEach((b, ci) => {
        const bs = barrierScores[startIdx + ci];
        const cls = bs && bs.score >= score ? 'cell-filled' : 'cell-empty';
        html += '<td><div style="width:16px;height:12px;margin:auto;border-radius:2px" class="' + cls + '"></div></td>';
      });
      html += '</tr>';
    }
    html += '</tbody></table>';
  }
  return html;
}

/* === 渲染转衔网格（3组） === */
function renderTransitionGrid() {
  let html = '';
  TRANSITION_CATS.forEach(cat => {
    const catScores = transitionScores.filter(t => t.category === cat.title);
    html += '<div style="font-size:12px;font-weight:600;color:#1565C0;margin:10px 0 4px">' + cat.title + '</div>';
    html += '<table class="grid-table transition-theme" style="margin-bottom:10px"><thead><tr><th></th>';
    catScores.forEach(t => {
      const shortName = t.name.length > 4 ? t.name.slice(0, 4) : t.name;
      html += '<th style="font-size:9px;max-width:50px;word-break:break-all">' + shortName + '</th>';
    });
    html += '</tr></thead><tbody>';
    for (let score = 5; score >= 1; score--) {
      html += '<tr><td style="font-weight:600">' + score + '</td>';
      catScores.forEach(t => {
        const cls = t.score >= score ? 'cell-filled' : 'cell-empty';
        html += '<td><div style="width:16px;height:12px;margin:auto;border-radius:2px" class="' + cls + '"></div></td>';
      });
      html += '</tr>';
    }
    html += '</tbody></table>';
  });
  return html;
}

const sampleDescs = ['能发出2个以上的声音要求','能用手势或声音要求5个物品','能用单词要求10个物品','能自发要求20个物品','能用短语要求','能命名5个物品','能命名10个物品','能命名25个物品','能命名50个物品','能命名200个物品','能按指令指认5个物品','能按指令执行10个动作','能按指令选择物品','能配对相同的图片','能配对颜色和形状','能独立玩玩具5分钟','能参与社交游戏','能模仿动作','能仿说单词','能发出10个不同的声音'];
let allQ = [], qByDomain = {}, gNum = 1;
const flatDomains = [];
SUBTESTS.forEach(g => {
  g.items.forEach(item => {
    const key = g.group + '__' + item.name;
    qByDomain[key] = [];
    flatDomains.push({ key: key, name: item.name, group: g.group });
    for (let i = 0; i < item.count; i++) {
      const q = { id: 'vbmapp_q' + gNum, number: gNum, domain: key, domainName: item.name, desc: sampleDescs[(gNum - 1) % sampleDescs.length] };
      allQ.push(q);
      qByDomain[key].push(q);
      gNum++;
    }
  });
});

let currentDomain = '';
function calcDomainStats(key) {
  const qs = qByDomain[key] || [];
  let s0 = 0, s05 = 0, s1 = 0;
  qs.forEach(q => { const v = answers[q.id]; if (v === 1) s1++; else if (v === 0.5) s05++; else s0++; });
  return { total: qs.length, s0: s0, s05: s05, s1: s1, pct: qs.length > 0 ? Math.round(s1 / qs.length * 100) : 0 };
}

function initScale() {
  /* 构建下拉选择器（按 Level 分组） */
  const sel = document.getElementById('scaleDomainSelect');
  let optHtml = '';
  SUBTESTS.forEach(g => {
    optHtml += '<optgroup label="' + g.group + '">';
    g.items.forEach(item => {
      const key = g.group + '__' + item.name;
      const stats = calcDomainStats(key);
      const selected = currentDomain === key ? ' selected' : '';
      optHtml += '<option value="' + key + '"' + selected + '>' + item.name + ' (' + stats.pct + '%)</option>';
    });
    optHtml += '</optgroup>';
  });
  sel.innerHTML = optHtml;
  if (!currentDomain && flatDomains.length) {
    currentDomain = flatDomains[0].key;
    sel.value = currentDomain;
  }
  renderScaleDetail(currentDomain);
}

function onScaleDomainChange() {
  const sel = document.getElementById('scaleDomainSelect');
  currentDomain = sel.value;
  renderScaleDetail(currentDomain);
}

function renderScaleDetail(key) {
  const qs = qByDomain[key] || [];
  const stats = calcDomainStats(key);
  const domainInfo = flatDomains.find(d => d.key === key);
  const displayName = domainInfo ? domainInfo.name : key.split('__')[1];

  const barW1 = stats.total > 0 ? (stats.s1 / stats.total * 100) : 0;
  const barW05 = stats.total > 0 ? (stats.s05 / stats.total * 100) : 0;
  const barW0 = stats.total > 0 ? (stats.s0 / stats.total * 100) : 0;

  document.getElementById('scaleSummaryBar').innerHTML =
    '<div class="title">' + displayName + ' — 答题明细</div>' +
    '<div class="scale-stats">' +
    '<span><span class="dot" style="background:var(--app-success)"></span>1分 ' + stats.s1 + '</span>' +
    '<span><span class="dot" style="background:var(--app-warning)"></span>0.5分 ' + stats.s05 + '</span>' +
    '<span><span class="dot" style="background:var(--app-danger)"></span>0分 ' + stats.s0 + '</span>' +
    '<span style="font-weight:500">' + stats.pct + '%</span>' +
    '<div class="sum-bar">' +
    '<div class="sum-bar-seg" style="width:' + barW1 + '%;background:var(--app-success)"></div>' +
    '<div class="sum-bar-seg" style="width:' + barW05 + '%;background:var(--app-warning)"></div>' +
    '<div class="sum-bar-seg" style="width:' + barW0 + '%;background:var(--app-danger)"></div>' +
    '</div></div>';

  const resultLabels = { independent: '独立(+)', error: '错误(-)', prompted: '辅助(P)' };
  const resultColors = { independent: '#52C41A', error: '#F56C6C', prompted: '#F5A623' };
  document.getElementById('scaleCards').innerHTML = qs.map(q => {
    const ans = answers[q.id];
    const note = answerNotes[q.id];
    const rounds = answerRounds[q.id];
    let roundsHtml = '';
    if (rounds && rounds.length > 0 && rounds.some(r => r.result)) {
      roundsHtml = '<div style="margin-top:5px;padding:5px 7px;background:#FAFBFC;border-radius:6px;border:1px solid #E8ECF0">'
        + '<div style="font-size:10px;color:#8C95A6;margin-bottom:3px">回合统计</div><div style="display:flex;gap:4px;flex-wrap:wrap">'
        + rounds.filter(r => r.result).map((r, i) => { const color = resultColors[r.result] || '#8C95A6'; const label = resultLabels[r.result] || r.result; return '<span style="font-size:10px;color:' + color + ';background:' + color + '14;padding:1px 5px;border-radius:3px">第' + (i+1) + '回合 ' + label + '</span>'; }).join('') + '</div></div>';
    }
    return '<div class="q-card"><div class="q-header"><span class="q-num">' + q.number + '</span><span class="q-desc">' + q.desc + '</span></div>' +
      '<div class="q-scores">' +
      '<span class="q-score-opt ' + (ans === 0 ? 'selected-0' : '') + '">0 未达标</span>' +
      '<span class="q-score-opt ' + (ans === 0.5 ? 'selected-05' : '') + '">0.5 部分</span>' +
      '<span class="q-score-opt ' + (ans === 1 ? 'selected-1' : '') + '">1 达标</span>' +
      '</div>' + roundsHtml + (note ? '<div class="q-note">' + note + '</div>' : '') + '</div>';
  }).join('');
}
</script>

    });
    tableHtml += '</table>';
    var docHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>body{font-family:SimSun,serif;font-size:12pt;}h1{font-size:16pt;text-align:center;}table{margin-top:12pt;}.info{margin:6pt 0;font-size:11pt;}</style></head><body>' +
      '<h1>个别化教育计划</h1>' +
      '<p class="info">学生姓名：张小明 &nbsp;&nbsp; 性别：男 &nbsp;&nbsp; 出生日期：2019-05-20</p>' +
      '<p class="info">制定人员：李老师 &nbsp;&nbsp; 制定日期：' + new Date().toISOString().slice(0, 10) + '</p>' +
      '<p class="info">通过标准：冷测，连续三天的第一个回合通过</p>' +
      '<p class="info">教学情境：个训课、家庭康复指导</p>' +
      tableHtml + '</body></html>';
    var blob = new Blob(['\ufeff' + docHtml], { type: 'application/msword' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = '张小明个别化教育计划.doc';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Word文档已导出');
  }, 300);
}
function deleteIEPDomain(di) { iepData.splice(di, 1); renderIEPTable(); }
function deleteIEPStage(di, gi, si) { iepData[di].goals[gi].stages.splice(si, 1); if (!iepData[di].goals[gi].stages.length) iepData[di].goals.splice(gi, 1); if (!iepData[di].goals.length) iepData.splice(di, 1); renderIEPTable(); }
let pendingDelete = null;
function confirmDeleteDomain(di) { pendingDelete = { type:'domain', di: di }; document.getElementById('iepDeleteMsg').textContent = '确定要删除「' + iepData[di].domainLabel + '」整个领域及其所有目标吗？'; document.getElementById('iepDeleteModal').classList.add('show'); }
function confirmDeleteStage(di, gi, si) { pendingDelete = { type:'stage', di: di, gi: gi, si: si }; document.getElementById('iepDeleteMsg').textContent = '确定要删除这条短期目标吗？'; document.getElementById('iepDeleteModal').classList.add('show'); }
function closeDeleteModal() { pendingDelete = null; document.getElementById('iepDeleteModal').classList.remove('show'); }
function execDelete() { if (!pendingDelete) return; if (pendingDelete.type === 'domain') deleteIEPDomain(pendingDelete.di); else deleteIEPStage(pendingDelete.di, pendingDelete.gi, pendingDelete.si); closeDeleteModal(); showToast('已删除'); }
function openIEPModal() { document.getElementById('iepAddDomain').value = ''; document.getElementById('iepAddGoal').value = ''; document.getElementById('iepAddStages').value = ''; document.getElementById('iepAddModal').classList.add('show'); }
function closeIEPModal() { document.getElementById('iepAddModal').classList.remove('show'); }
function confirmAddGoal() {
  const domain = document.getElementById('iepAddDomain').value.trim();
  const goal = document.getElementById('iepAddGoal').value.trim();
  const stagesText = document.getElementById('iepAddStages').value.trim();
  if (!domain || !goal) { showToast('请填写领域和任务目标'); return; }
  const stages = stagesText ? stagesText.split('\n').filter(s => s.trim()) : ['短期目标1'];
  const existing = iepData.find(d => d.domain === domain);
  if (existing) { existing.goals.push({ name: goal, stages: stages }); } else { iepData.push({ domain: domain, domainLabel: domain, pct: 0, goals: [{ name: goal, stages: stages }] }); }
  closeIEPModal(); renderIEPTable(); showToast('已添加');
}

/* === 编辑功能 === */
function toggleEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  inputEl.value = textEl.innerText;
  textEl.style.display = 'none';
  inputEl.style.display = 'block';
  actionsEl.style.display = 'flex';
  linkEl.style.display = 'none';
  inputEl.focus();
}
function cancelEdit(id) {
  document.getElementById(id + 'Text').style.display = 'block';
  document.getElementById(id + 'Input').style.display = 'none';
  document.getElementById(id + 'Actions').style.display = 'none';
  document.getElementById(id + 'Area').querySelector('.edit-link').style.display = 'inline-flex';
}
function saveEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  textEl.innerText = inputEl.value;
  cancelEdit(id);
  localStorage.setItem('rice_assessment_report_edit_' + recordId + '_' + id, inputEl.value);
  showToast('已保存');
}
function loadSavedEdits() {
  ['analysis'].forEach(id => {
    const saved = localStorage.getItem('rice_assessment_report_edit_' + recordId + '_' + id);
    if (saved) { const el = document.getElementById(id + 'Text'); if (el) el.innerText = saved; }
  });
}
function exportPDF() {
  showToast('正在生成PDF...');
  setTimeout(function() { window.print(); }, 300);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2000);
}
function resetAll() {
  Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.href = 'assessment-list.html';
}

/* === 初始化 === */
renderReport();
initScale();
initIEP();
loadSavedEdits();
</script>
</body>
</html>
