<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEP-3 评估报告 - 康复师App PAD端</title>
<style>
:root {
  --app-primary: #3B9BF5;
  --app-primary-hover: #2B8AE0;
  --app-primary-light: #EBF5FF;
  --app-bg: #F0F2F5;
  --app-card: #FFFFFF;
  --app-border: #E8ECF0;
  --app-text: #1A2233;
  --app-text-sec: #8C95A6;
  --app-text-nav: #5A6478;
  --app-success: #52C41A;
  --app-warning: #F5A623;
  --app-danger: #F56C6C;
  --app-radius-md: 8px;
  --app-radius-lg: 12px;
  --app-radius-xl: 16px;
  --app-shadow: 0 2px 8px rgba(0,0,0,0.06);
  --app-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.topbar { height: 48px; background: var(--app-card); border-bottom: 1px solid var(--app-border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
.topbar .back { font-size: 16px; cursor: pointer; margin-right: 12px; text-decoration: none; color: var(--app-text); }
.topbar .title { font-size: 16px; font-weight: 600; }
.tab-bar { background: var(--app-card); border-bottom: 1px solid var(--app-border); padding: 0 20px; display: flex; flex-shrink: 0; }
.tab-btn { padding: 12px 24px; font-size: 14px; color: var(--app-text-nav); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; font-family: var(--app-font); font-weight: 500; }
.tab-btn:hover { color: var(--app-primary); }
.tab-btn.active { color: var(--app-primary); border-bottom-color: var(--app-primary); }
.content { flex: 1; overflow-y: auto; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }
.section-label { display: inline-block; background: var(--app-primary); color: #fff; font-size: 13px; font-weight: 500; padding: 4px 14px; border-radius: var(--app-radius-md); margin-bottom: 14px; }
.card { background: var(--app-card); border-radius: var(--app-radius-xl); padding: 20px; box-shadow: var(--app-shadow); margin-bottom: 20px; }
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 24px; }
.info-item { font-size: 14px; }
.info-item .label { color: var(--app-text-sec); margin-right: 4px; }
.info-item .value { font-weight: 500; }
.report-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.report-desc { font-size: 13px; color: var(--app-text-sec); line-height: 1.6; margin-bottom: 20px; }
table.score-tbl { width: 100%; border-collapse: collapse; }
table.score-tbl th { background: #F5F7FA; padding: 10px 14px; text-align: left; font-weight: 500; color: var(--app-text-sec); font-size: 13px; border-bottom: 1px solid var(--app-border); }
table.score-tbl td { padding: 10px 14px; border-bottom: 1px solid var(--app-border); font-size: 14px; }
table.score-tbl tr:last-child td { border-bottom: none; }
table.score-tbl tr:hover td { background: #FAFBFC; }
table.score-tbl tr.total-row td { font-weight: 600; background: #F5F7FA; }
.behavior-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--app-border); gap: 16px; }
.behavior-row:last-child { border-bottom: none; }
.behavior-row .bname { width: 140px; font-size: 14px; font-weight: 500; }
.behavior-row .bscore { width: 60px; font-size: 14px; color: var(--app-text-sec); }
.behavior-row .brating { display: flex; gap: 8px; }
.rating-opt { padding: 4px 16px; border-radius: 9999px; font-size: 13px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; }
.rating-opt.selected { background: var(--app-primary); color: #fff; border-color: var(--app-primary); }
.editable-area { position: relative; }
.editable-area .edit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.editable-area .edit-link { color: var(--app-primary); font-size: 13px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.editable-area .edit-link:hover { color: var(--app-primary-hover); }
.editable-area .area-text { font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
.editable-area .area-textarea { width: 100%; min-height: 120px; font-size: 14px; line-height: 1.8; font-family: var(--app-font); border: 1px solid var(--app-primary); border-radius: var(--app-radius-md); padding: 12px; resize: vertical; outline: none; display: none; }
.editable-area .area-textarea:focus { box-shadow: 0 0 0 2px rgba(59,155,245,0.2); }
.editable-area .edit-actions { display: none; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.editable-area .edit-actions button { padding: 6px 16px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; font-family: var(--app-font); }
.editable-area .edit-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.editable-area .edit-actions .btn-save { background: var(--app-primary); color: #fff; border: none; }
@media print { .topbar, .tab-bar, .bottom-actions, .reset-btn, .toast, .edit-link, .edit-actions, .iep-actions { display: none !important; } .content { overflow: visible !important; height: auto !important; } .tab-content { display: block !important; padding: 10px !important; } .tab-content#tabIEP, .tab-content#tabScale { display: none !important; } body { height: auto; overflow: visible; } }
/* IEP 样式 */
.iep-title { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 16px; }
.iep-info { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px 24px; font-size: 14px; margin-bottom: 16px; }
.iep-info .label { color: var(--app-text-sec); }
.iep-info .link { color: var(--app-primary); cursor: pointer; }
.iep-table { width: 100%; border-collapse: collapse; background: var(--app-card); border-radius: var(--app-radius-lg); overflow: hidden; }
.iep-table th { background: var(--app-primary); color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; font-weight: 500; }
.iep-table td { padding: 10px 14px; border-bottom: 1px solid var(--app-border); font-size: 13px; vertical-align: top; }
.iep-table tr:hover td { background: #FAFBFC; }
.iep-table .domain-cell { font-weight: 500; border-right: 1px solid var(--app-border); }
.iep-table .goal-cell { border-right: 1px solid var(--app-border); }
.iep-table .del-link { color: var(--app-danger); font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 2px; white-space: nowrap; }
.iep-table .del-link:hover { opacity: 0.7; }
.iep-domain-del { color: var(--app-danger); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; margin-top: 8px; text-decoration: none; white-space: nowrap; }
.iep-actions { display: flex; justify-content: center; gap: 12px; padding: 12px 20px; position: sticky; bottom: 0; background: var(--app-card); border-top: 1px solid var(--app-border); z-index: 10; }
.iep-actions button { padding: 8px 24px; border-radius: var(--app-radius-md); font-size: 14px; cursor: pointer; font-family: var(--app-font); font-weight: 500; }
.iep-btn-export { background: #fff; border: 1px solid var(--app-border); color: var(--app-text-sec); }
.iep-btn-import { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-edit { background: var(--app-primary); border: none; color: #fff; }
.iep-btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-btn-add { background: #fff; border: 1px solid var(--app-primary); color: var(--app-primary); }
.iep-btn-save { background: var(--app-primary); border: none; color: #fff; }
/* 添加目标弹出菜单 */
.iep-add-wrap { position: relative; display: inline-block; }
.iep-add-popover { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; border-radius: var(--app-radius-lg); box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 8px 0; min-width: 160px; display: none; z-index: 20; margin-bottom: 8px; }
.iep-add-popover.show { display: block; }
.iep-add-popover::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #fff; }
.iep-add-popover .pop-item { padding: 10px 20px; font-size: 14px; cursor: pointer; color: var(--app-primary); text-align: center; }
.iep-add-popover .pop-item:hover { background: var(--app-primary-light); }
.iep-add-popover .pop-divider { height: 1px; background: var(--app-border); margin: 0 12px; }
/* 自定义目标弹窗 */
.iep-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; }
.iep-modal-overlay.show { display: flex; }
.iep-modal { background: #fff; border-radius: var(--app-radius-xl); padding: 24px; width: 480px; max-width: 90%; }
.iep-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.iep-modal h3 .close { cursor: pointer; font-size: 18px; color: var(--app-text-sec); background: none; border: none; }
.iep-modal .form-group { margin-bottom: 14px; }
.iep-modal .form-group label { display: block; font-size: 13px; color: var(--app-text-sec); margin-bottom: 4px; }
.iep-modal .form-group input, .iep-modal .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--app-border); border-radius: var(--app-radius-md); font-size: 14px; font-family: var(--app-font); }
.iep-modal .form-group textarea { min-height: 80px; resize: vertical; }
.iep-modal .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.iep-modal .form-actions button { padding: 8px 20px; border-radius: var(--app-radius-md); font-size: 14px; cursor: pointer; font-family: var(--app-font); }
.iep-modal .form-actions .btn-cancel { background: #fff; border: 1px solid var(--app-border); color: var(--app-text); }
.iep-modal .form-actions .btn-confirm { background: var(--app-primary); border: none; color: #fff; }
.radar-svg { width: 100%; max-width: 420px; height: 420px; }
.chart-center { text-align: center; }
.pct-bar { display: inline-block; height: 6px; border-radius: 3px; background: var(--app-primary); vertical-align: middle; margin-right: 6px; }
.bottom-actions { background: var(--app-card); border-top: 1px solid var(--app-border); padding: 12px 20px; display: flex; justify-content: center; gap: 16px; flex-shrink: 0; }
.btn-export { padding: 10px 32px; background: #fff; border: 1px solid #D8DDE5; border-radius: var(--app-radius-md); font-size: 14px; cursor: pointer; color: var(--app-text-sec); font-family: var(--app-font); }
.btn-export:hover { background: #F5F7FA; }
.btn-send { padding: 10px 32px; background: var(--app-primary); color: #fff; border: none; border-radius: var(--app-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--app-font); }
.btn-send:hover { background: var(--app-primary-hover); }
.coming-soon { text-align: center; padding: 80px 0; }
.coming-soon .icon { font-size: 48px; margin-bottom: 16px; }
.coming-soon .text { font-size: 16px; color: var(--app-text-sec); }
</style>
<style>
/* 评估量表Tab */
.scale-layout { display: flex; gap: 0; height: calc(100vh - 160px); }
.scale-nav { width: 220px; background: var(--app-card); border-right: 1px solid var(--app-border); overflow-y: auto; flex-shrink: 0; padding: 12px 0; }
.scale-nav .tree-group-title { display: flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--app-text); cursor: pointer; user-select: none; }
.scale-nav .tree-group-title:hover { background: #F5F7FA; }
.scale-nav .tree-group-title .arrow { display: inline-block; transition: transform .2s; font-size: 10px; }
.scale-nav .tree-group-title .arrow.collapsed { transform: rotate(-90deg); }
.scale-nav .tree-item { padding: 7px 16px 7px 28px; font-size: 13px; color: var(--app-text-nav); cursor: pointer; border-left: 3px solid transparent; display: flex; justify-content: space-between; align-items: center; }
.scale-nav .tree-item:hover { background: #F5F7FA; }
.scale-nav .tree-item.active { background: var(--app-primary-light); color: var(--app-primary); border-left-color: var(--app-primary); font-weight: 500; }
.scale-nav .tree-item .nav-pct { font-size: 11px; color: var(--app-text-sec); font-weight: 400; }
.scale-nav .tree-item.active .nav-pct { color: var(--app-primary); }
.scale-nav .tree-children.hidden { display: none; }
.scale-detail { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
.scale-info-bar { padding: 12px 20px; background: var(--app-card); border-bottom: 1px solid var(--app-border); flex-shrink: 0; }
.scale-info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px 20px; font-size: 13px; }
.scale-info-grid .label { color: var(--app-text-sec); }
.scale-layout { display: flex; gap: 0; flex: 1; overflow: hidden; min-height: 0; }
.scale-domain-bar { padding: 12px 20px; background: #FAFBFC; border-bottom: 1px solid var(--app-border); flex-shrink: 0; }
.scale-summary { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.scale-summary .sum-item { font-size: 13px; display: flex; align-items: center; gap: 4px; }
.scale-summary .sum-dot { width: 8px; height: 8px; border-radius: 50%; }
.scale-summary .sum-bar { flex: 1; min-width: 120px; height: 6px; background: #E8ECF0; border-radius: 3px; overflow: hidden; display: flex; }
.scale-summary .sum-bar-seg { height: 100%; }
.scale-cards { flex: 1; overflow-y: auto; padding: 16px 20px; background: var(--app-bg); }
.q-card { background: var(--app-card); border: 1px solid var(--app-border); border-radius: var(--app-radius-lg); padding: 14px 16px; margin-bottom: 10px; }
.q-card .q-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.q-card .q-num { font-size: 14px; font-weight: 600; color: var(--app-primary); min-width: 28px; }
.q-card .q-desc { font-size: 14px; line-height: 1.5; flex: 1; }
.q-card .q-scores { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; padding-left: 38px; max-width: 420px; }
.q-card .q-score-opt { padding: 4px 14px; border-radius: 9999px; font-size: 12px; font-weight: 500; border: 1px solid var(--app-border); background: #fff; color: var(--app-text-sec); flex: 1; text-align: center; }
.q-card .q-score-opt.selected-0 { background: #FFF0F0; color: var(--app-danger); border-color: var(--app-danger); }
.q-card .q-score-opt.selected-1 { background: #FFF8EB; color: var(--app-warning); border-color: var(--app-warning); }
.q-card .q-score-opt.selected-2 { background: #F0FFF4; color: var(--app-success); border-color: var(--app-success); }
.q-card .q-note { margin-top: 6px; padding-left: 38px; font-size: 12px; color: var(--app-text-sec); background: #F9FAFB; border-radius: 6px; padding: 6px 10px 6px 38px; }
.q-card .q-note::before { content: '📝 '; }
.score-badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
.score-badge.s0 { background: #FFF0F0; color: var(--app-danger); }
.score-badge.s1 { background: #FFF8EB; color: var(--app-warning); }
.score-badge.s2 { background: #F0FFF4; color: var(--app-success); }
.note-row td { padding: 2px 14px 10px; border-top: none !important; }
.note-text { font-size: 12px; color: var(--app-text-sec); background: #F9FAFB; border-radius: 6px; padding: 6px 10px; display: inline-block; max-width: 100%; }
.note-text::before { content: '📝 '; }
.reset-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 8px 14px; border-radius: var(--app-radius-md); font-size: 13px; cursor: pointer; z-index: 9999; opacity: 0.5; }
.reset-btn:hover { opacity: 1; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1A2233; color: #fff; padding: 10px 20px; border-radius: var(--app-radius-md); font-size: 13px; z-index: 10000; display: none; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div class="topbar">
  <span class="back" onclick="location.href='assessment-list.html'">←</span>
  <span class="title">张小明评估报告</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0,this)">评估报告</button>
  <button class="tab-btn" onclick="switchTab(1,this)">IEP</button>
  <button class="tab-btn" onclick="switchTab(2,this)">评估量表</button>
</div>

<div class="content">
  <!-- Tab 1: 评估报告 -->
  <div class="tab-content active" id="tabReport"></div>
  <!-- Tab 2: IEP -->
  <div class="tab-content" id="tabIEP">
    <div class="iep-title">张小明IEP</div>
    <div class="card">
      <div class="iep-info">
        <div><span class="label">学生姓名：</span>张小明</div>
        <div><span class="label">性别：</span>男</div>
        <div><span class="label">出生日期：</span>2019-05-20</div>
        <div><span class="label">使用日期：</span><span class="link" id="iepDateLink" onclick="showToast('日期选择功能开发中')">请选择 ></span></div>
        <div><span class="label">制定人员：</span>李老师</div>
        <div><span class="label">家长签名：</span></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <label style="font-size:13px;color:var(--app-text-sec);">课程包：</label>
      <select id="coursePacketSelect" onchange="onCoursePacketChange()" style="padding:6px 12px;border:1px solid var(--app-border);border-radius:var(--app-radius-md);font-size:14px;font-family:var(--app-font);min-width:220px;"></select>
    </div>
    <div id="iepContent">
      <div style="text-align:center;padding:40px 0;color:var(--app-text-sec);">请先选择课程包，系统将根据评估结果自动生成 IEP 建议</div>
    </div>
  </div>
  <!-- Tab 3: 评估量表 -->
  <div class="tab-content" id="tabScale" style="padding:0;display:none;flex-direction:column;height:calc(100vh - 96px);">
    <div class="scale-info-bar" id="scaleInfoStatic">
      <div class="scale-info-grid">
        <div><span class="label">学生姓名：</span>张小明</div>
        <div><span class="label">评估工具：</span>PEP-3</div>
        <div><span class="label">评估时间：</span>2024-01-15</div>
        <div><span class="label">评估师：</span>李老师</div>
        <div><span class="label">评估次数：</span>第1次</div>
        <div><span class="label">实足年龄：</span>4岁8月</div>
      </div>
    </div>
    <div class="scale-layout">
      <div class="scale-nav" id="scaleNav"></div>
      <div class="scale-detail">
        <div class="scale-domain-bar" id="scaleDomainBar"></div>
        <div class="scale-cards" id="scaleCards"></div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-actions" id="bottomActions">
  <button class="btn-export" onclick="exportPDF()">导出PDF</button>
  <button class="btn-send" onclick="showToast('已生成家长版报告链接')">发送报告</button>
</div>

<!-- IEP 删除确认弹窗 -->
<div class="iep-modal-overlay" id="iepDeleteModal">
  <div class="iep-modal" style="width:380px;">
    <h3>确认删除 <button class="close" onclick="closeDeleteModal()">✕</button></h3>
    <p style="font-size:14px;color:var(--app-text-sec);line-height:1.6;margin-bottom:16px;" id="iepDeleteMsg">确定要删除这条目标吗？</p>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
      <button class="btn-confirm" style="background:var(--app-danger);" onclick="execDelete()">删除</button>
    </div>
  </div>
</div>

<!-- IEP 添加目标弹窗 -->
<div class="iep-modal-overlay" id="iepAddModal">
  <div class="iep-modal">
    <h3>添加目标 <button class="close" onclick="closeIEPModal()">✕</button></h3>
    <div class="form-group">
      <label>年龄段及领域</label>
      <input type="text" id="iepAddDomain" placeholder="如：2-3岁-语言理解">
    </div>
    <div class="form-group">
      <label>干预目标</label>
      <input type="text" id="iepAddGoal" placeholder="如：命名训练">
    </div>
    <div class="form-group">
      <label>阶段目标（每行一个）</label>
      <textarea id="iepAddStages" placeholder="如：&#10;命名常见物品&#10;命名动作&#10;命名属性"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeIEPModal()">取消</button>
      <button class="btn-confirm" onclick="confirmAddGoal()">确认添加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="reset-btn" onclick="resetAll()">🔄 一键重置</button>

<script>
/* === 参数 === */
const params = new URLSearchParams(location.search);
const recordId = params.get('record') || 'rec001';

/* === PEP-3 领域结构 === */
const FUNC_DOMAINS = [
  { name: '模仿', code: 'I', total: 16 },

/* === 加载答题数据 === */
function loadAnswers() {
  const key = 'rice_assessment_answers_' + recordId;
  const stored = localStorage.getItem(key);
  const result = { scores: {}, notes: {} };
  if (stored) {
    const data = JSON.parse(stored);
    Object.keys(data).forEach(qId => {
      if (qId === '_marks') return;
      const v = data[qId];
      if (v && typeof v === 'object' && v.value !== undefined) {
        result.scores[qId] = v.value;
        if (v.notes) result.notes[qId] = v.notes;
      } else if (typeof v === 'number') {
        result.scores[qId] = v;
      }
    });
    // 旧格式兼容
    if (data.answers && typeof data.answers === 'object') {
      Object.keys(data.answers).forEach(qId => { result.scores[qId] = data.answers[qId]; });
      if (data.notes) Object.assign(result.notes, data.notes);
    }
    return result;
  }
  // fallback: 生成随机中等分数据 + 部分备注
  const sampleNotes = ['需要多次示范才能完成','对材料表现出明显兴趣','注意力持续约30秒','需要手把手辅助','自发完成，表现积极','有轻微抵触情绪','在提示下能完成一半'];
  for (let i = 1; i <= 174; i++) {
    const r = Math.random();
    result.scores['pep3_q' + i] = r < 0.5 ? 2 : r < 0.8 ? 1 : 0;
    if (Math.random() < 0.15) {
      result.notes['pep3_q' + i] = sampleNotes[Math.floor(Math.random() * sampleNotes.length)];
    }
  }
  return result;
}
const answerData = loadAnswers();
const answers = answerData.scores;
const answerNotes = answerData.notes;

/* === 计算各领域得分 === */
function calcDomainScores() {
  // 简化：按题号范围分配到功能发展领域
  const funcScores = FUNC_DOMAINS.map(d => {
    let p = 0, e = 0, f = 0;
    for (let i = 0; i < d.total; i++) {
      const qIdx = FUNC_DOMAINS.slice(0, FUNC_DOMAINS.indexOf(d)).reduce((s, dd) => s + dd.total, 0) + i + 1;
      const v = answers['pep3_q' + qIdx];
      if (v === 2) p++;
      else if (v === 1) e++;
      else f++;
    }
    return { ...d, p, e, f, pct: Math.round(p / d.total * 100) };
  });
  const behaviorScores = BEHAVIOR_DOMAINS.map(d => {
    let total = 0, count = 0;
    const startIdx = FUNC_DOMAINS.reduce((s, dd) => s + dd.total, 0);
    for (let i = 0; i < d.total; i++) {
      const qIdx = startIdx + BEHAVIOR_DOMAINS.slice(0, BEHAVIOR_DOMAINS.indexOf(d)).reduce((s, dd) => s + dd.total, 0) + i + 1;
      const v = answers['pep3_q' + qIdx];
      if (v !== undefined) { total += v; count++; }
    }
    const avg = count > 0 ? total / count : 0;
    const rating = avg >= 1.5 ? 'A' : avg >= 0.8 ? 'M' : 'S';
    return { ...d, score: total, rating };
  });
  return { funcScores, behaviorScores };
}
const { funcScores, behaviorScores } = calcDomainScores();

/* === 雷达图 === */
function drawRadar() {
  const svg = document.getElementById('radarChart');
  if (!svg) return;
  const cx = 220, cy = 220, r = 150;
  const data = funcScores;
  const n = data.length;
  const colors = ['#7EC8F0','#FFB88C','#FFD966','#7ED6A8','#B8A0E0','#FFB0C8','#A0D8EF'];
  let grid = '', axes = '', pts = [], dots = '', labels = '';
  for (let lv = 1; lv <= 4; lv++) {
    const lr = r * lv / 4;
    let gpts = [];
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) - Math.PI / 2;
      gpts.push(`${cx + lr * Math.cos(a)},${cy + lr * Math.sin(a)}`);
    }
    grid += `<polygon points="${gpts.join(' ')}" fill="none" stroke="#E8ECF0" stroke-width="1"/>`;
  }
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) - Math.PI / 2;
    axes += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(a)}" y2="${cy + r * Math.sin(a)}" stroke="#E8ECF0"/>`;
    const val = data[i].pct / 100;
    pts.push(`${cx + r * val * Math.cos(a)},${cy + r * val * Math.sin(a)}`);
    dots += `<circle cx="${cx + r * val * Math.cos(a)}" cy="${cy + r * val * Math.sin(a)}" r="5" fill="${colors[i]}" stroke="#fff" stroke-width="2"/>`;
    const lx = cx + (r + 30) * Math.cos(a);
    const ly = cy + (r + 30) * Math.sin(a);
    labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#5A6478">${data[i].name}</text>`;
  }
  svg.innerHTML = `${grid}${axes}<polygon points="${pts.join(' ')}" fill="rgba(59,155,245,0.15)" stroke="#3B9BF5" stroke-width="2"/>${dots}${labels}`;
}

          '能用拇指和食指捏取小物品（如葡萄干）',
          '能将小珠子穿入绳子（直径1cm以上）',
          '能拧开瓶盖（松紧适中）'
        ]}
      ]
    },
    '模仿': {
      ageLabel: '2-3岁·模仿能力',
      goals: [
        { name: '动作模仿', stages: [
          '能模仿3个粗大动作（拍手、举手、跺脚）',
          '能模仿3个精细动作（捏、指、握拳）',
          '能模仿2步以上的动作序列'
        ]},
        { name: '声音模仿', stages: [
          '能模仿3个元音（a、o、e）',
          '能模仿5个辅音+元音组合（ba、ma、da等）',
          '能模仿双音节词（妈妈、爸爸、拜拜）'
        ]}
      ]
    },
    '知觉': {
      ageLabel: '2-3岁·感知觉',
      goals: [
        { name: '视觉辨别', stages: [
          '能追视移动物体跨越中线',
          '能从3个物品中找出指定物品',
          '能辨认5种常见颜色'
        ]}
      ]
    },
    '大肌肉': {
      ageLabel: '3-4岁·粗大动作',
      goals: [
        { name: '平衡与跳跃', stages: [
          '能单脚站立保持3秒以上',
          '能双脚离地向前跳10cm以上',
          '能走15cm宽平衡木1.5米'
        ]}
      ]
    }
  };

  iepData = weakDomains.map(d => {
    const iep = DOMAIN_IEP[d.name];
    if (iep) {
      return { domain: d.name, domainLabel: iep.ageLabel, pct: d.pct, goals: iep.goals };
    }
    return { domain: d.name, domainLabel: d.name, pct: d.pct, goals: [{ name: '综合训练', stages: ['辅助下完成基础任务', '独立完成基础任务', '泛化到新情境'] }] };
  });

  renderIEPTable();
}

function renderIEPTable() {
  let html = '<table class="iep-table"><thead><tr><th style="width:150px">年龄段及领域</th><th style="width:180px">干预目标</th><th>阶段目标</th>';
  if (iepEditing) html += '<th style="width:60px">操作</th>';
  html += '</tr></thead><tbody>';

  const delSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

  iepData.forEach((domain, di) => {
    let totalRows = domain.goals.reduce((s, g) => s + g.stages.length, 0);
    let firstRow = true;
    domain.goals.forEach((goal, gi) => {
      goal.stages.forEach((stage, si) => {
        html += '<tr>';
        if (firstRow) {
          html += `<td class="domain-cell" rowspan="${totalRows}"><div>${domain.domainLabel}</div>`;
          if (iepEditing) html += `<a class="iep-domain-del" onclick="confirmDeleteDomain(${di})">${delSvg} 删除</a>`;
          html += '</td>';
          firstRow = false;
        }
        if (si === 0) {
          html += `<td class="goal-cell" rowspan="${goal.stages.length}">${goal.name}</td>`;
        }
        html += `<td>${stage}</td>`;
        if (iepEditing) html += `<td><a class="del-link" onclick="confirmDeleteStage(${di},${gi},${si})">${delSvg} 删除</a></td>`;
        html += '</tr>';
      });
    });
  });

  html += '</tbody></table>';

  // 底部操作按钮
  html += '<div class="iep-actions">';
  if (iepEditing) {
    html += '<button class="iep-btn-cancel" onclick="cancelIEPEdit()">取消</button>';
    html += '<div class="iep-add-wrap"><button class="iep-btn-add" onclick="toggleAddPopover()">添加目标</button><div class="iep-add-popover" id="addPopover"><div class="pop-item" onclick="showToast(\'从目标库添加功能开发中\');hideAddPopover()">从目标库添加</div><div class="pop-divider"></div><div class="pop-item" onclick="openIEPModal();hideAddPopover()">+ 自定义</div></div></div>';
    html += '<button class="iep-btn-save" onclick="saveIEP()">保存</button>';
  } else {
    html += '<button class="iep-btn-export" onclick="exportIEP()">导出</button>';
    html += '<button class="iep-btn-import" onclick="showToast(\'导入干预目标功能开发中\')">导入干预目标</button>';
    html += '<button class="iep-btn-edit" onclick="startIEPEdit()">编辑</button>';
  }
  html += '</div>';

  document.getElementById('iepContent').innerHTML = html;
}

function startIEPEdit() { iepEditing = true; renderIEPTable(); }
function cancelIEPEdit() { iepEditing = false; renderIEPTable(); }
function saveIEP() {
  iepEditing = false;
  localStorage.setItem('rice_assessment_iep_' + recordId, JSON.stringify(iepData));
  renderIEPTable();
  showToast('IEP 已保存');
}
function exportIEP() {
  showToast('正在生成Word文档...');
  setTimeout(() => {
    // 构建 Word HTML
    let tableHtml = '<table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse;width:100%;font-family:SimSun,serif;font-size:12pt;">';
    tableHtml += '<tr style="background:#3B9BF5;color:#fff;"><th style="width:150px">年龄段及领域</th><th style="width:180px">干预目标</th><th>阶段目标</th></tr>';
    iepData.forEach(domain => {
      let totalRows = domain.goals.reduce((s, g) => s + g.stages.length, 0);
      let firstRow = true;
      domain.goals.forEach(goal => {
        goal.stages.forEach((stage, si) => {
          tableHtml += '<tr>';
          if (firstRow) { tableHtml += '<td rowspan="' + totalRows + '" style="font-weight:bold;vertical-align:top;">' + domain.domainLabel + '</td>'; firstRow = false; }
          if (si === 0) tableHtml += '<td rowspan="' + goal.stages.length + '" style="vertical-align:top;">' + goal.name + '</td>';
          tableHtml += '<td>' + stage + '</td></tr>';
        });
      });
    });
    tableHtml += '</table>';

    const html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
      '<head><meta charset="utf-8"><style>body{font-family:SimSun,serif;font-size:12pt;}h1{font-size:16pt;text-align:center;}table{margin-top:12pt;}.info{margin:6pt 0;font-size:11pt;}</style></head><body>' +
      '<h1>张小明 个别化教育计划（IEP）</h1>' +
      '<p class="info">学生姓名：张小明 &nbsp;&nbsp; 性别：男 &nbsp;&nbsp; 出生日期：2019-05-20</p>' +
      '<p class="info">制定人员：李老师 &nbsp;&nbsp; 制定日期：' + new Date().toISOString().slice(0, 10) + '</p>' +
      tableHtml +
      '</body></html>';

    const blob = new Blob(['\ufeff' + html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '张小明_IEP_' + new Date().toISOString().slice(0, 10) + '.doc';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Word文档已导出');
  }, 300);
}

function deleteIEPDomain(di) {
  iepData.splice(di, 1);
  renderIEPTable();
}
function deleteIEPStage(di, gi, si) {
  iepData[di].goals[gi].stages.splice(si, 1);
  if (iepData[di].goals[gi].stages.length === 0) iepData[di].goals.splice(gi, 1);
  if (iepData[di].goals.length === 0) iepData.splice(di, 1);
  renderIEPTable();
}

let pendingDelete = null;
function confirmDeleteDomain(di) {
  pendingDelete = { type: 'domain', di };
  document.getElementById('iepDeleteMsg').textContent = '确定要删除「' + iepData[di].domainLabel + '」整个领域及其所有目标吗？';
  document.getElementById('iepDeleteModal').classList.add('show');
}
function confirmDeleteStage(di, gi, si) {
  pendingDelete = { type: 'stage', di, gi, si };
  document.getElementById('iepDeleteMsg').textContent = '确定要删除这条阶段目标吗？';
  document.getElementById('iepDeleteModal').classList.add('show');
}
function closeDeleteModal() {
  pendingDelete = null;
  document.getElementById('iepDeleteModal').classList.remove('show');
}
function execDelete() {
  if (!pendingDelete) return;
  if (pendingDelete.type === 'domain') deleteIEPDomain(pendingDelete.di);
  else deleteIEPStage(pendingDelete.di, pendingDelete.gi, pendingDelete.si);
  closeDeleteModal();
  showToast('已删除');
}
function addIEPGoal() { openIEPModal(); }
function toggleAddPopover() {
  const p = document.getElementById('addPopover');
  p.classList.toggle('show');
}
function hideAddPopover() { const p = document.getElementById('addPopover'); if (p) p.classList.remove('show'); }
function openIEPModal() {
  document.getElementById('iepAddDomain').value = '';
  document.getElementById('iepAddGoal').value = '';
  document.getElementById('iepAddStages').value = '';
  document.getElementById('iepAddModal').classList.add('show');
}
function closeIEPModal() { document.getElementById('iepAddModal').classList.remove('show'); }
function confirmAddGoal() {
  const domain = document.getElementById('iepAddDomain').value.trim();
  const goal = document.getElementById('iepAddGoal').value.trim();
  const stagesText = document.getElementById('iepAddStages').value.trim();
  if (!domain || !goal) { showToast('请填写领域和干预目标'); return; }
  const stages = stagesText ? stagesText.split('\n').filter(s => s.trim()) : ['阶段目标1'];
  const existing = iepData.find(d => d.domain === domain);
  if (existing) { existing.goals.push({ name: goal, stages }); }
  else { iepData.push({ domain, domainLabel: domain, pct: 0, goals: [{ name: goal, stages }] }); }
  closeIEPModal();
  renderIEPTable();
  showToast('已添加');
}
// 点击外部关闭 popover
document.addEventListener('click', function(e) {
  if (!e.target.closest('.iep-add-wrap')) hideAddPopover();
});

/* === 编辑功能 === */
function toggleEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  inputEl.value = textEl.innerText;
  textEl.style.display = 'none';
  inputEl.style.display = 'block';
  actionsEl.style.display = 'flex';
  linkEl.style.display = 'none';
  inputEl.focus();
}

function cancelEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  textEl.style.display = 'block';
  inputEl.style.display = 'none';
  actionsEl.style.display = 'none';
  linkEl.style.display = 'inline-flex';
}

function saveEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  textEl.innerText = inputEl.value;
  textEl.style.display = 'block';
  inputEl.style.display = 'none';
  actionsEl.style.display = 'none';
  linkEl.style.display = 'inline-flex';
  // 保存到 localStorage
  const key = 'rice_assessment_report_edit_' + recordId + '_' + id;
  localStorage.setItem(key, inputEl.value);
  showToast('已保存');
}

function loadSavedEdits() {
  ['eduOutline', 'analysis'].forEach(id => {
    const key = 'rice_assessment_report_edit_' + recordId + '_' + id;
    const saved = localStorage.getItem(key);
    if (saved) {
      const textEl = document.getElementById(id + 'Text');
      if (textEl) textEl.innerText = saved;
    }
  });
}

/* === 导出PDF === */
function exportPDF() {
  showToast('正在生成PDF...');
  setTimeout(() => { window.print(); }, 300);
}

/* === 通用 === */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}
function resetAll() {
  Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.href = 'assessment-list.html';
}

// 初始化
renderReport();
initScale();
initIEP();
loadSavedEdits();
</script>
