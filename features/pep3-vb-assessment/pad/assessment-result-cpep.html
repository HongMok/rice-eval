<!DOCTYPE html>

<style>
:root {
  --app-primary: #3B9BF5;

  --app-bg: #F0F2F5;

}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--app-font); background: var(--app-bg); color: var(--app-text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.tab-btn { padding: 12px 24px; font-size: 14px; color: var(--app-text-nav); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; font-family: var(--app-font); font-weight: 500; }

table.score-tbl { width: 100%; border-collapse: collapse; }
table.score-tbl th { background: #F5F7FA; padding: 10px 14px; text-align: left; font-weight: 500; color: var(--app-text-sec); font-size: 13px; border-bottom: 1px solid var(--app-border); }

@media print { .topbar, .tab-bar, .bottom-actions, .reset-btn, .toast, .edit-link, .edit-actions, .iep-actions { display: none !important; } .content { overflow: visible !important; height: auto !important; } .tab-content { display: block !important; padding: 10px !important; } .tab-content#tabIEP, .tab-content#tabScale { display: none !important; } body { height: auto; overflow: visible; } }

<script>
const params = new URLSearchParams(location.search);
const recordId = params.get('record') || 'rec002';

/* === C-PEP 领域结构 === */
const CPEP_DOMAINS = [
  { name: '感知觉', count: 55 },
  { name: '精细动作', count: 36 },
  { name: '粗大动作', count: 72 },
  { name: '模仿', count: 14 },
  { name: '认知', count: 48 },
  { name: '语言理解', count: 30 },
  { name: '语言表达', count: 30 }
];
const TOTAL_QUESTIONS = CPEP_DOMAINS.reduce((s, d) => s + d.count, 0);

/* 发展年龄映射（简化） */
const DEV_AGE_MAP = [
  { pct: 90, age: '5岁0月' }, { pct: 75, age: '4岁0月' }, { pct: 60, age: '3岁6月' },
  { pct: 50, age: '3岁0月' }, { pct: 40, age: '2岁6月' }, { pct: 25, age: '2岁0月' },
  { pct: 0, age: '1岁6月' }
];
function getDevAge(pct) {
  for (const m of DEV_AGE_MAP) { if (pct >= m.pct) return m.age; }
  return '1岁0月';
}

/* === 加载答题数据 === */
function loadAnswers() {
  const key = 'rice_assessment_answers_' + recordId;
  const stored = localStorage.getItem(key);
  const result = { scores: {}, notes: {} };
  if (stored) {
    const data = JSON.parse(stored);
    Object.keys(data).forEach(qId => {
      if (qId === '_marks') return;
      const v = data[qId];
      if (v && typeof v === 'object' && v.value !== undefined) {
        result.scores[qId] = v.value;
        if (v.notes) result.notes[qId] = v.notes;
      } else if (typeof v === 'number') {
        result.scores[qId] = v;
      }
    });
    if (data.answers && typeof data.answers === 'object') {
      Object.keys(data.answers).forEach(qId => { result.scores[qId] = data.answers[qId]; });
      if (data.notes) Object.assign(result.notes, data.notes);
    }
    return result;

function calcScores() {
  let qIdx = 1;
  return CPEP_DOMAINS.map(d => {
    let pass = 0, partial = 0, fail = 0;
    for (let i = 0; i < d.count; i++) {
      const v = answers['cpep_q' + qIdx];
      if (v === 1) pass++;
      else if (v === 0.5) partial++;
      else fail++;
      qIdx++;
    }
    const pct = Math.round(pass / d.count * 100);
    return { ...d, pass, partial, fail, score: pass, pct, devAge: getDevAge(pct) };
  });
}

/* === 雷达图 === */
function drawRadar() {
  const svg = document.getElementById('radarChart');
  if (!svg) return;
  const cx = 210, cy = 210, r = 140, n = domainScores.length;
  let grid = '', axes = '', pts = [], dots = '', labels = '';
  for (let lv = 1; lv <= 4; lv++) {
    const lr = r * lv / 4;
    let gpts = [];
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) - Math.PI / 2;
      gpts.push(`${cx + lr * Math.cos(a)},${cy + lr * Math.sin(a)}`);
    }
    grid += `<polygon points="${gpts.join(' ')}" fill="none" stroke="#E8ECF0" stroke-width="1"/>`;
  }
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) - Math.PI / 2;
    axes += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(a)}" y2="${cy + r * Math.sin(a)}" stroke="#E8ECF0"/>`;
    const val = domainScores[i].pct / 100;
    pts.push(`${cx + r * val * Math.cos(a)},${cy + r * val * Math.sin(a)}`);
    dots += `<circle cx="${cx + r * val * Math.cos(a)}" cy="${cy + r * val * Math.sin(a)}" r="5" fill="${colors[i]}" stroke="#fff" stroke-width="2"/>`;
    const lx = cx + (r + 28) * Math.cos(a);
    const ly = cy + (r + 28) * Math.sin(a);
    labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#5A6478">${domainScores[i].name}</text>`;
  }
  svg.innerHTML = `${grid}${axes}<polygon points="${pts.join(' ')}" fill="rgba(59,155,245,0.15)" stroke="#3B9BF5" stroke-width="2"/>${dots}${labels}`;
}

      tableHtml + '</body></html>';
    const blob = new Blob(['\ufeff' + html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '张小明_IEP_' + new Date().toISOString().slice(0, 10) + '.doc';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Word文档已导出');
  }, 300);
}
function deleteIEPDomain(di) { iepData.splice(di, 1); renderIEPTable(); }
function deleteIEPStage(di, gi, si) { iepData[di].goals[gi].stages.splice(si, 1); if (!iepData[di].goals[gi].stages.length) iepData[di].goals.splice(gi, 1); if (!iepData[di].goals.length) iepData.splice(di, 1); renderIEPTable(); }
let pendingDelete = null;
function confirmDeleteDomain(di) { pendingDelete = { type:'domain', di }; document.getElementById('iepDeleteMsg').textContent = '确定要删除「' + iepData[di].domainLabel + '」整个领域及其所有目标吗？'; document.getElementById('iepDeleteModal').classList.add('show'); }
function confirmDeleteStage(di, gi, si) { pendingDelete = { type:'stage', di, gi, si }; document.getElementById('iepDeleteMsg').textContent = '确定要删除这条阶段目标吗？'; document.getElementById('iepDeleteModal').classList.add('show'); }
function closeDeleteModal() { pendingDelete = null; document.getElementById('iepDeleteModal').classList.remove('show'); }
function execDelete() { if (!pendingDelete) return; if (pendingDelete.type === 'domain') deleteIEPDomain(pendingDelete.di); else deleteIEPStage(pendingDelete.di, pendingDelete.gi, pendingDelete.si); closeDeleteModal(); showToast('已删除'); }
function addIEPGoal() { openIEPModal(); }
function toggleAddPopover() { document.getElementById('addPopover').classList.toggle('show'); }
function hideAddPopover() { const p = document.getElementById('addPopover'); if (p) p.classList.remove('show'); }
function openIEPModal() { document.getElementById('iepAddDomain').value = ''; document.getElementById('iepAddGoal').value = ''; document.getElementById('iepAddStages').value = ''; document.getElementById('iepAddModal').classList.add('show'); }
function closeIEPModal() { document.getElementById('iepAddModal').classList.remove('show'); }
function confirmAddGoal() {
  const domain = document.getElementById('iepAddDomain').value.trim();
  const goal = document.getElementById('iepAddGoal').value.trim();
  const stagesText = document.getElementById('iepAddStages').value.trim();
  if (!domain || !goal) { showToast('请填写领域和干预目标'); return; }
  const stages = stagesText ? stagesText.split('\n').filter(s => s.trim()) : ['阶段目标1'];
  const existing = iepData.find(d => d.domain === domain);
  if (existing) { existing.goals.push({ name: goal, stages }); } else { iepData.push({ domain, domainLabel: domain, pct: 0, goals: [{ name: goal, stages }] }); }
  closeIEPModal(); renderIEPTable(); showToast('已添加');
}
document.addEventListener('click', function(e) { if (!e.target.closest('.iep-add-wrap')) hideAddPopover(); });

/* === 编辑功能 === */
function toggleEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  const actionsEl = document.getElementById(id + 'Actions');
  const linkEl = document.getElementById(id + 'Area').querySelector('.edit-link');
  inputEl.value = textEl.innerText;
  textEl.style.display = 'none';
  inputEl.style.display = 'block';
  actionsEl.style.display = 'flex';
  linkEl.style.display = 'none';
  inputEl.focus();
}
function cancelEdit(id) {
  document.getElementById(id + 'Text').style.display = 'block';
  document.getElementById(id + 'Input').style.display = 'none';
  document.getElementById(id + 'Actions').style.display = 'none';
  document.getElementById(id + 'Area').querySelector('.edit-link').style.display = 'inline-flex';
}
function saveEdit(id) {
  const textEl = document.getElementById(id + 'Text');
  const inputEl = document.getElementById(id + 'Input');
  textEl.innerText = inputEl.value;
  cancelEdit(id);
  localStorage.setItem('rice_assessment_report_edit_' + recordId + '_' + id, inputEl.value);
  showToast('已保存');
}
function loadSavedEdits() {
  ['analysis', 'recommend'].forEach(id => {
    const saved = localStorage.getItem('rice_assessment_report_edit_' + recordId + '_' + id);
    if (saved) { const el = document.getElementById(id + 'Text'); if (el) el.innerText = saved; }
  });
}
function exportPDF() {
  showToast('正在生成PDF...');
  setTimeout(() => { window.print(); }, 300);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}
function resetAll() {
  Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
  location.href = 'assessment-list.html';
}

renderReport();
initScale();
initIEP();
loadSavedEdits();
</script>
