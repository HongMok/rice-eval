<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量导入评估题目 - RICE AI 后台管理系统</title>
<style>
:root {
  --color-primary: #7C3AED;
  --color-primary-hover: #6D28D9;
  --color-primary-light: #EDE9FE;
  --color-bg-page: #F5F5F5;
  --color-bg-card: #FFFFFF;
  --color-border: #E5E7EB;
  --color-border-input: #D1D5DB;
  --color-text-primary: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-placeholder: #9CA3AF;
  --color-success: #059669;
  --color-success-bg: #ECFDF5;
  --color-warning: #EA580C;
  --color-warning-bg: #FFF7ED;
  --color-danger: #DC2626;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-family); background: var(--color-bg-page); color: var(--color-text-primary); display: flex; height: 100vh; overflow: hidden; }

.sidebar { width: 80px; background: #fff; border-right: 1px solid var(--color-border); display: flex; flex-direction: column; align-items: center; padding-top: 16px; flex-shrink: 0; }
.sidebar-logo { width: 40px; height: 40px; background: var(--color-primary); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; margin-bottom: 20px; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 8px; width: 64px; border-radius: var(--radius-md); cursor: pointer; text-decoration: none; color: var(--color-text-secondary); font-size: 12px; margin-bottom: 4px; }
.nav-item:hover { background: #F3F4F6; }
.nav-item.active { background: var(--color-primary); color: #fff; }
.nav-item .icon { font-size: 20px; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 56px; background: #fff; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; padding: 0 24px; flex-shrink: 0; }
.topbar-left { font-size: 14px; font-weight: 600; }
.topbar-breadcrumb { margin-left: 24px; font-size: 13px; color: var(--color-text-secondary); }
.topbar-breadcrumb a { color: var(--color-primary); text-decoration: none; cursor: pointer; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--color-text-secondary); }
.topbar-right .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-primary-light); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--color-primary); }

.content { flex: 1; overflow-y: auto; padding: 24px; display: flex; align-items: flex-start; justify-content: center; }

/* 弹窗样式（页面模拟） */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: var(--radius-lg); width: 680px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--color-border); }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--color-text-secondary); padding: 4px; }
.modal-close:hover { color: var(--color-text-primary); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--color-border); display: flex; justify-content: flex-end; gap: 12px; }

/* 步骤 */
.step { margin-bottom: 24px; }
.step-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }

/* 下载模板 */
.template-btns { display: flex; gap: 12px; }
.template-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--color-border-input); border-radius: var(--radius-md); background: #fff; cursor: pointer; font-size: 13px; color: var(--color-primary); font-family: var(--font-family); }
.template-btn:hover { background: var(--color-primary-light); }

/* 上传区 */
.upload-zone { border: 2px dashed var(--color-border-input); border-radius: var(--radius-md); padding: 32px; text-align: center; cursor: pointer; transition: all .2s; }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--color-primary); background: var(--color-primary-light); }
.upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
.upload-zone p { font-size: 14px; color: var(--color-text-secondary); }
.upload-zone .link { color: var(--color-primary); font-weight: 500; }
.file-info { margin-top: 12px; padding: 10px 16px; background: var(--color-success-bg); border-radius: var(--radius-md); font-size: 13px; color: var(--color-success); display: none; align-items: center; gap: 8px; }
.file-info.show { display: flex; }

/* 预览表格 */
.preview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.preview-table th { background: #F9FAFB; padding: 8px 12px; text-align: left; font-weight: 500; color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border); }
.preview-table td { padding: 8px 12px; border-bottom: 1px solid var(--color-border); }
.preview-table tr:hover td { background: #F9FAFB; }
.preview-table .error-row td { background: #FEF2F2; color: var(--color-danger); }
.preview-stats { margin-top: 12px; font-size: 13px; color: var(--color-text-secondary); display: flex; gap: 16px; }
.preview-stats .stat { display: flex; align-items: center; gap: 4px; }
.preview-stats .stat.error { color: var(--color-danger); }

.preview-section { display: none; }
.preview-section.show { display: block; }

/* 导入结果 */
.import-result { display: none; text-align: center; padding: 24px; }
.import-result.show { display: block; }
.import-result .success-icon { font-size: 48px; margin-bottom: 12px; }
.import-result .result-text { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.import-result .result-detail { font-size: 13px; color: var(--color-text-secondary); }

.btn-primary { background: var(--color-primary); color: #fff; border: none; padding: 8px 20px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: #fff; border: 1px solid var(--color-border-input); color: #374151; padding: 8px 20px; border-radius: var(--radius-md); font-size: 14px; cursor: pointer; }
.btn-secondary:hover { background: #F9FAFB; }

.reset-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.35); color: #fff; border: none; padding: 8px 14px; border-radius: var(--radius-md); font-size: 13px; cursor: pointer; z-index: 9999; opacity: 0.6; }
.reset-btn:hover { opacity: 1; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1F2937; color: #fff; padding: 10px 24px; border-radius: var(--radius-md); font-size: 14px; z-index: 10000; display: none; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">R</div>
  <a class="nav-item"><span class="icon">📦</span>产品</a>
  <a class="nav-item"><span class="icon">📋</span>订单</a>
  <a class="nav-item"><span class="icon">👥</span>用户</a>
  <a class="nav-item"><span class="icon">🎓</span>学生</a>
  <a class="nav-item active"><span class="icon">📝</span>评估</a>
  <a class="nav-item"><span class="icon">📚</span>课程包</a>
  <a class="nav-item"><span class="icon">📖</span>学习</a>
  <a class="nav-item"><span class="icon">🤖</span>AI助手</a>
  <a class="nav-item"><span class="icon">📢</span>营销</a>
  <a class="nav-item"><span class="icon">⚙️</span>设置</a>
</nav>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">RICE AI 后台管理系统</div>
    <div class="topbar-breadcrumb">
      <a onclick="goBack()">< 返回编辑页</a> &nbsp; 批量导入评估题目
    </div>
    <div class="topbar-right">
      <span>🔍 ⌘K</span><span>⛶</span><span>↻</span><span>⚙</span><span>En</span>
      <div class="avatar">管</div>
    </div>
  </header>

  <!-- 弹窗模拟 -->
  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>批量导入评估题目</h2>
        <button class="modal-close" onclick="goBack()">✕</button>
      </div>
      <div class="modal-body">
        <!-- Step 1 -->
        <div class="step" id="step1">
          <div class="step-title"><span class="step-num">1</span> 下载模板</div>
          <div class="template-btns">
            <button class="template-btn" onclick="downloadTemplate('excel')">📥 下载 Excel 模板</button>
            <button class="template-btn" onclick="downloadTemplate('csv')">📥 下载 CSV 模板</button>
          </div>
        </div>

        <!-- Step 2 -->
        <div class="step" id="step2">
          <div class="step-title"><span class="step-num">2</span> 上传文件</div>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="icon">📁</div>
            <p>拖拽文件到此处，或 <span class="link">点击选择文件</span></p>
            <p style="font-size:12px;color:#9CA3AF;margin-top:4px">支持 .xlsx, .csv 格式</p>
          </div>
          <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none" onchange="handleFile(this)">
          <div class="file-info" id="fileInfo">
            <span>📄</span>
            <span id="fileName"></span>
            <span style="margin-left:auto;cursor:pointer;color:#DC2626" onclick="removeFile()">✕ 移除</span>
          </div>
        </div>

        <!-- Step 3 预览 -->
        <div class="step preview-section" id="step3">
          <div class="step-title"><span class="step-num">3</span> 预览数据</div>
          <table class="preview-table">
            <thead>
              <tr><th>题号</th><th>子测验/领域</th><th>题目描述</th><th>评分选项</th><th>状态</th></tr>
            </thead>
            <tbody id="previewBody"></tbody>
          </table>
          <div class="preview-stats" id="previewStats"></div>
        </div>

        <!-- 导入结果 -->
        <div class="import-result" id="importResult">
          <div class="success-icon">✅</div>
          <div class="result-text">导入完成</div>
          <div class="result-detail" id="resultDetail"></div>
        </div>
      </div>
      <div class="modal-footer" id="modalFooter">
        <button class="btn-secondary" onclick="goBack()">取消</button>
        <button class="btn-primary" id="importBtn" disabled onclick="doImport()">确认导入</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="reset-btn" onclick="resetAll()">🔄 一键重置</button>

<script>
let fileUploaded = false;
let previewData = [];

// 模拟预览数据
const MOCK_PREVIEW = [
  { num: 1, domain: '认知/语前语言', desc: '对铃声转头寻找声源', scores: '0/1/2', ok: true },
  { num: 2, domain: '认知/语前语言', desc: '追视移动物体（水平方向）', scores: '0/1/2', ok: true },
  { num: 3, domain: '认知/语前语言', desc: '从两个杯子中找到藏起的物品', scores: '0/1/2', ok: true },
  { num: 4, domain: '认知/语前语言', desc: '将圆形放入形状板', scores: '0/1/2', ok: true },
  { num: 5, domain: '认知/语前语言', desc: '将三角形放入形状板', scores: '0/1/2', ok: true },
  { num: 6, domain: '语言表达', desc: '能说出自己的名字', scores: '0/1/2', ok: true },
  { num: 7, domain: '语言表达', desc: '能用2-3个词组成短句', scores: '0/1/2', ok: true },
  { num: 8, domain: '语言表达', desc: '能描述图片中的动作', scores: '0/1/2', ok: true },
  { num: 9, domain: '', desc: '缺少子测验信息', scores: '0/1/2', ok: false },
  { num: 10, domain: '语言理解', desc: '', scores: '0/1/2', ok: false },
  { num: 11, domain: '语言理解', desc: '能按指令取物品', scores: '0/1/2', ok: true },
  { num: 12, domain: '精细动作', desc: '能用拇指和食指捏取小物品', scores: '0/1/2', ok: true },
];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}

function goBack() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || 'pep3';
  location.href = `admin-assessment-edit.html?id=${id}`;
}

function downloadTemplate(type) {
  showToast(`已下载 ${type === 'excel' ? 'Excel' : 'CSV'} 模板（模拟）`);
}

// 拖拽
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); simulateUpload('拖拽文件.csv'); });

function handleFile(input) {
  if (input.files.length > 0) {
    simulateUpload(input.files[0].name);
  }
}

function simulateUpload(name) {
  fileUploaded = true;
  document.getElementById('fileInfo').classList.add('show');
  document.getElementById('fileName').textContent = name;
  document.getElementById('uploadZone').style.display = 'none';
  previewData = MOCK_PREVIEW;
  showPreview();
}

function removeFile() {
  fileUploaded = false;
  document.getElementById('fileInfo').classList.remove('show');
  document.getElementById('uploadZone').style.display = '';
  document.getElementById('step3').classList.remove('show');
  document.getElementById('importBtn').disabled = true;
  document.getElementById('fileInput').value = '';
}

function showPreview() {
  const body = document.getElementById('previewBody');
  body.innerHTML = previewData.map(r => `
    <tr class="${r.ok ? '' : 'error-row'}">
      <td>${r.num}</td>
      <td>${r.domain || '<span style="color:#DC2626">缺失</span>'}</td>
      <td>${r.desc || '<span style="color:#DC2626">缺失</span>'}</td>
      <td>${r.scores}</td>
      <td>${r.ok ? '✅' : '❌ 异常'}</td>
    </tr>
  `).join('');

  const total = previewData.length;
  const valid = previewData.filter(r => r.ok).length;
  const errors = total - valid;
  document.getElementById('previewStats').innerHTML = `
    <span class="stat">共 <strong>${total}</strong> 条</span>
    <span class="stat">有效 <strong>${valid}</strong> 条</span>
    <span class="stat ${errors > 0 ? 'error' : ''}">异常 <strong>${errors}</strong> 条</span>
  `;
  document.getElementById('step3').classList.add('show');
  document.getElementById('importBtn').disabled = false;
}

function doImport() {
  const valid = previewData.filter(r => r.ok).length;
  const errors = previewData.length - valid;

  // 隐藏步骤，显示结果
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'none';
  document.getElementById('importResult').classList.add('show');
  document.getElementById('resultDetail').textContent = `成功导入 ${valid} 条，失败 ${errors} 条`;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn-primary" onclick="goBack()">返回编辑页</button>
  `;
  showToast('导入完成');
}

function resetAll() {
  if (confirm('确定要重置所有评估数据吗？')) {
    Object.keys(localStorage).forEach(k => { if (k.startsWith('rice_assessment_')) localStorage.removeItem(k); });
    location.reload();
  }
}
</script>
</body>
</html>
