<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品工作台 - RICE评估系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#f5f5f5}

.topbar{height:48px;background:#1a1a2e;color:#fff;display:flex;align-items:center;padding:0 16px;gap:10px}
.topbar .logo{font-weight:700;font-size:15px}
.topbar .bc{font-size:13px;color:#aaa;flex:1}.topbar .bc b{color:#fff;font-weight:400}
.topbar button{padding:5px 12px;border:1px solid #555;background:0 0;color:#ccc;border-radius:4px;cursor:pointer;font-size:12px}
.topbar button:hover{background:#333}
.topbar button.on{background:#7C3AED;border-color:#7C3AED;color:#fff}

.main{display:flex;height:calc(100vh - 48px)}

/* Left */
.lp{min-width:200px;overflow-y:auto;background:#fff;padding:12px}
.lp .gt{font-size:11px;color:#999;font-weight:600;padding:6px 8px;margin-top:12px}
.lp .gt:first-child{margin-top:0}
.lp .pi{padding:7px 12px;font-size:13px;color:#333;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:6px}
.lp .pi:hover{background:#f5f3ff}
.lp .pi.act{background:#ede9fe;color:#7C3AED;font-weight:500}
.lp .pi .ob{font-size:11px;color:#7C3AED;background:#f5f3ff;border:1px solid #e0d4fc;padding:1px 7px;border-radius:3px;cursor:pointer;margin-left:auto;white-space:nowrap}
.lp .pi .ob:hover{background:#7C3AED;color:#fff}

/* Divider */
.dv{width:6px;background:#e5e5e5;cursor:col-resize;flex-shrink:0;transition:background .15s}
.dv:hover,.dv.drag{background:#7C3AED}

/* Right */
.rp{min-width:200px;display:flex;flex-direction:column;background:#fff;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid #e5e5e5;background:#fafafa;flex-shrink:0;overflow-x:auto}
.tab{padding:8px 14px;font-size:12px;color:#666;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab:hover{color:#333;background:#f0f0f0}
.tab.act{color:#7C3AED;border-bottom-color:#7C3AED;font-weight:500}
.tab .x{margin-left:6px;color:#aaa;cursor:pointer;font-size:14px}
.tab .x:hover{color:#e53e3e}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid #eee;background:#fafafa;flex-shrink:0}
.toolbar .path{font-size:12px;color:#aaa;font-family:monospace;flex:1}
.toolbar button{padding:4px 12px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer;font-size:12px;color:#555}
.toolbar button:hover{background:#f0f0f0}
.toolbar button.primary{background:#7C3AED;color:#fff;border-color:#7C3AED}
.toolbar button.primary:hover{background:#6d28d9}
.toolbar .saved{font-size:11px;color:#22c55e;display:none}

/* Doc */
.dc{flex:1;overflow-y:auto;padding:24px 32px}
.dc textarea{width:100%;height:100%;border:none;outline:none;resize:none;font-family:'SF Mono',Monaco,'Fira Code',monospace;font-size:13px;line-height:1.6;padding:0;color:#333}

/* Markdown */
.md h1{font-size:22px;margin:0 0 16px;padding-bottom:8px;border-bottom:2px solid #7C3AED;color:#1a1a2e}
.md h2{font-size:18px;margin:24px 0 12px;color:#1a1a2e}
.md h3{font-size:15px;margin:20px 0 8px;color:#333}
.md h4{font-size:14px;margin:16px 0 6px;color:#555}
.md p{margin:8px 0;font-size:14px;line-height:1.7;color:#333}
.md code{background:#f4f4f4;padding:2px 6px;border-radius:3px;font-size:13px;font-family:'SF Mono',Monaco,monospace}
.md pre{background:#f8f8f8;padding:14px 18px;border-radius:6px;overflow-x:auto;margin:12px 0;border:1px solid #eee}
.md pre code{background:none;padding:0;font-size:12px;line-height:1.5}
.md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
.md th,.md td{border:1px solid #ddd;padding:6px 10px;text-align:left}
.md th{background:#f5f5f5;font-weight:600}
.md blockquote{border-left:3px solid #7C3AED;padding:8px 16px;margin:12px 0;background:#faf8ff;color:#666;font-size:13px}
.md ul,.md ol{padding-left:24px;margin:8px 0}
.md li{margin:4px 0;font-size:14px;line-height:1.6}
.md strong{color:#1a1a2e}
.md hr{border:none;border-top:1px solid #e5e5e5;margin:20px 0}
.md a{color:#7C3AED;text-decoration:none}

.empty{text-align:center;padding:80px 20px;color:#999}
.empty .ei{font-size:48px;margin-bottom:16px}

/* Home */
.home{padding:40px;overflow-y:auto;flex:1}
.home h1{font-size:24px;color:#1a1a2e;margin-bottom:6px}
.home .sub{color:#888;font-size:14px;margin-bottom:32px}
.home .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.home .card{background:#fff;border-radius:12px;padding:24px;border:1px solid #e5e5e5;cursor:pointer;transition:all .2s}
.home .card:hover{border-color:#7C3AED;box-shadow:0 4px 16px rgba(124,58,237,.1);transform:translateY(-2px)}
.home .card .ci{font-size:32px;margin-bottom:12px}
.home .card .ct{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.home .card .cd{font-size:13px;color:#888;margin-bottom:14px}
.home .card .tags{display:flex;flex-wrap:wrap;gap:4px}
.home .card .tag{font-size:11px;padding:2px 8px;background:#f0f0f0;border-radius:10px;color:#666}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📐 产品工作台</div>
  <div class="bc" id="bc"></div>
  <button onclick="goHome()">🏠 首页</button>
  <button id="bP" class="on" onclick="setDev('pad')">💻 Pad</button>
  <button id="bM" onclick="setDev('mobile')">📱 手机</button>
</div>
<div class="main" id="main">
  <div class="lp" id="lp" style="width:35%"></div>
  <div class="dv" id="dv"></div>
  <div class="rp" id="rp" style="width:65%">
    <div class="tabs" id="tabs"></div>
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="path" id="tPath"></span>
      <span class="saved" id="savedMsg">✓ 已保存</span>
      <button id="btnEdit" onclick="toggleEdit()">✏️ 编辑</button>
      <button id="btnSave" class="primary" onclick="saveDoc()" style="display:none">💾 保存</button>
    </div>
    <div class="dc" id="dc"><div class="empty"><div class="ei">📄</div><p>点击左侧页面查看文档</p></div></div>
  </div>
</div>
<script>
const C={"features": [{"id": "assessment-admin", "name": "评估管理（后台）", "icon": "⚙️", "description": "评估工具配置、导入导出、题目编辑", "pages": [{"id": "admin-assessment-list", "name": "评估工具列表", "html": "features/assessment-admin/pad/admin-assessment-list.html", "doc": "docs/assessment-admin/admin-assessment-list.md", "devices": ["pad"]}, {"id": "admin-assessment-edit", "name": "评估工具编辑", "html": "features/assessment-admin/pad/admin-assessment-edit.html", "doc": "docs/assessment-admin/admin-assessment-edit.md", "devices": ["pad"]}, {"id": "admin-assessment-import", "name": "评估工具导入", "html": "features/assessment-admin/pad/admin-assessment-import.html", "doc": "docs/assessment-admin/admin-assessment-import.md", "devices": ["pad"]}]}, {"id": "assessment-app", "name": "评估App（康复师端）", "icon": "📋", "description": "评估答题、评估结果、评估报告", "pages": [{"id": "assessment-list", "name": "评估列表", "html": "features/assessment-app/{device}/assessment-list.html", "doc": "docs/assessment-app/assessment-list.md", "devices": ["pad", "mobile"]}, {"id": "assessment-intro", "name": "评估介绍", "html": "features/assessment-app/pad/assessment-intro.html", "doc": "docs/assessment-app/assessment-intro.md", "devices": ["pad"]}, {"id": "assessment-answer", "name": "评估答题", "html": "features/assessment-app/{device}/assessment-answer.html", "doc": "docs/assessment-app/assessment-answer.md", "devices": ["pad", "mobile"]}, {"id": "assessment-result", "name": "评估结果（通用）", "html": "features/assessment-app/{device}/assessment-result.html", "doc": "docs/assessment-app/assessment-result.md", "devices": ["pad", "mobile"]}, {"id": "assessment-result-pep3", "name": "评估结果（PEP-3）", "html": "features/assessment-app/{device}/assessment-result-pep3.html", "doc": "docs/assessment-app/assessment-result-pep3.md", "devices": ["pad", "mobile"]}, {"id": "assessment-result-cpep", "name": "评估结果（C-PEP）", "html": "features/assessment-app/{device}/assessment-result-cpep.html", "doc": "docs/assessment-app/assessment-result-cpep.md", "devices": ["pad", "mobile"]}, {"id": "assessment-result-vbmapp", "name": "评估结果（VB-MAPP）", "html": "features/assessment-app/{device}/assessment-result-vbmapp.html", "doc": "docs/assessment-app/assessment-result-vbmapp.md", "devices": ["pad", "mobile"]}, {"id": "assessment-result-parent", "name": "评估结果（照顾者报告）", "html": "features/assessment-app/{device}/assessment-result-parent.html", "doc": "docs/assessment-app/assessment-result-parent.md", "devices": ["pad", "mobile"]}]}]};
const D={"docs/assessment-app.md": "# 康复师App端 — 评估答题与结果系统 产品需求文档\n\n> 设计规范：`design/DESIGN.md` Part B（康复师 App 端，主色 #3B9BF5）\n\n---\n\n## 系统界面跳转关系\n\n```\n评估记录列表页 (assessment-list.html)\n  │\n  ├─ [新建评估] ──→ 选择评估工具弹窗（Modal，页内弹出）\n  │     └─ [选择工具] ──→ 评估工具介绍页 (assessment-intro.html)\n  │           └─ [开始评估] ──→ 评估答题页 (assessment-answer.html)\n  │\n  ├─ [继续评估] ──→ 评估答题页 (assessment-answer.html)\n  │\n  └─ [查看报告] ──→ 评估结果路由页 (assessment-result.html)\n                      │\n                      ├─ tool=pep3   → PEP-3 报告页 (assessment-result-pep3.html)\n                      ├─ tool=cpep   → C-PEP 报告页 (assessment-result-cpep.html)\n                      └─ tool=vbmapp → VB-MAPP 报告页 (assessment-result-vbmapp.html)\n                                        │\n                                        ├─ [Tab: IEP] ──→ IEP 个别化教育计划（页内Tab）\n                                        └─ [Tab: 评估量表] ──→ 评估量表详情（页内Tab）\n\n评估答题页 (assessment-answer.html)\n  │\n  └─ [提交评估] ──→ 评估结果路由页 (assessment-result.html)\n```\n\n---\n\n## 界面1：评估记录列表页 (assessment-list.html)\n\n### 界面路径\n\n```\n评估记录列表页 ← 当前界面\n```\n\n### 线框图\n\n```\n+--------+------------------------------------------------------------------+\n| 👤头像 |  全部 | 已完成 | 评估中                      📋 新建评估        |\n| 张小明  |-------+--------+----------+------------------------------------+\n| 男·5岁  |                                                                  |\n|        |  +--------------------------------------------------------------+ |\n| 📊 概述 |  | 2026.04.10 - 评估中                                         | |\n| 📝 评估 |  | 评估时间: 2026-04-10 09:30  工具: PEP-3  评估师: 李老师     | |\n|[选中态] |  |                                      [删除]  [继续评估]     | |\n| 📖 1v1  |  +--------------------------------------------------------------+ |\n| 👥 小组 |                                                                  |\n| 📋 报告 |  +--------------------------------------------------------------+ |\n| 🏛 残联  |  | 2026.03.15 - 已完成                                         | |\n|        |  | 评估时间: 2026-03-15 14:00  工具: VB-MAPP  评估师: 王老师   | |\n| ──────  |  |                                                    [查看]    | |\n| 🔒 冻结 |  +--------------------------------------------------------------+ |\n|        |                                                                  |\n|        |                                          +----+----+----+        |\n|        |                                          | 🟢 | 🟡 | 🔴 |        |\n|        |                                          +----+----+----+        |\n+--------+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**左侧导航栏**\n- 学生头像 + 姓名 + 性别·年龄\n- 导航项：康复概述、评估报告（选中）、1对1训练课、小组课、康复报告、残联报告\n- 底部\"冻结\"链接\n\n**Tab 筛选**\n- 全部 / 已完成 / 评估中，选中态蓝色下划线\n- 右侧\"新建评估\"蓝色文字按钮\n\n**评估记录卡片**\n- 标题行：日期 + 状态（评估中=蓝色，已完成=绿色）\n- 信息行：评估时间、工具名称、评估师\n- 操作按钮：评估中→【删除】+【继续评估】，已完成→【查看】\n\n**新建评估弹窗**\n- 弹出模态弹窗，展示可用评估工具列表（详见界面8：选择评估工具弹窗）\n\n**测试数据生成按钮**\n- 页面右侧固定浮动，3 个按钮：🟢高分 / 🟡中分 / 🔴低分\n- 点击后为所有已启用工具各生成一条已完成记录 + 答题数据\n\n| 档位 | 最高分概率 | 中间分概率 | 最低分概率 |\n|------|-----------|-----------|-----------|\n| 高分 | 80-100%   | 0-20%     | 0%        |\n| 中分 | 40-60%    | 20-40%    | 20%       |\n| 低分 | 10%       | 10-20%    | 60-80%    |\n\n**删除确认弹窗**\n- 自定义弹窗（非浏览器原生），确认后删除记录和答题数据\n\n### 新旧功能关系\n\n这是已有界面，在评估记录里面，新增字段【评估工具】\n\n---\n\n## 界面2：评估工具介绍页 (assessment-intro.html)\n\n### 界面路径\n\n```\n评估记录列表页\n  └─ [新建评估] ──→ ...\n        └─ [选择工具] ──→ 评估工具介绍页 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------------+\n| ← 返回   PEP-3 心理教育评估                                            |\n+------------------------------------------------------------------------+\n|                                                                         |\n|  +------------------------------------------------------------------+  |\n|  | 📋 PEP-3 心理教育评估（第三版）                                    |  |\n|  |                                                                    |  |\n|  | 类型: PEP-3 · 心理教育评估    题目数: 172 题                       |  |\n|  | 预估用时: 45-90 分钟           适用年龄: 2岁~7岁6个月              |  |\n|  +------------------------------------------------------------------+  |\n|                                                                         |\n|  +------------------------------------------------------------------+  |\n|  | 📖 工具介绍                                                        |  |\n|  |                                                                    |  |\n|  | PEP-3 是由 Eric Schopler 等人开发的标准化评估工具，专门用于         |  |\n|  | 评估孤独症谱系障碍（ASD）及相关发育障碍儿童的发展水平和行为特征。    |  |\n|  |                                                                    |  |\n|  | ## 评估结构                                                        |  |\n|  | PEP-3 包含 10 个发展性子测验和 4 个适应行为子测验...                |  |\n|  |                                                                    |  |\n|  | （富文本内容，来自后台配置的 intro 字段）                            |  |\n|  +------------------------------------------------------------------+  |\n|                                                                         |\n+------------------------------------------------------------------------+\n| [固定底部]                                                              |\n|                              [ 开始评估 ]                               |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**页面入口**\n- 从列表页新建评估弹窗选择工具后跳转到此页\n- URL 参数：`?record={recordId}&tool={toolId}`\n\n**工具基本信息卡片**\n- 工具图标 + 名称\n- 类型标签、题目数量、预估用时、适用年龄\n\n**富文本介绍区域**\n- 内容来源：后台编辑页配置的 `intro` 字段（HTML 富文本）\n- 支持标题、段落、列表、加粗等格式\n- 若未配置介绍内容，显示默认占位文字\n- 数据来源优先级：后台配置的 `intro` 字段 → 内置默认介绍文档\n\n**底部操作栏**\n- 固定底部，白色背景\n- 居中蓝色实心按钮\"开始评估\"\n- 点击后跳转到答题页：`assessment-answer.html?record={recordId}&tool={toolId}`\n\n### 新旧功能关系\n\n沿用现有弹窗\n\n---\n\n## 界面3：评估答题页 (assessment-answer.html)\n\n### 界面路径\n\n```\n评估记录列表页\n  ├─ [新建评估] ──→ ... ──→ 评估工具介绍页\n  │     └─ [开始评估] ──→ 评估答题页 ← 当前界面\n  └─ [继续评估] ──→ 评估答题页 ← 当前界面\n```\n\n### 线框图 — 直接评分模式\n\n```\n+------------------------------------------------------------------------+\n| ← PEP-3 心理教育评估     已完成 [████████░░] 45/172    ⚙              |\n+------------------------------------------------------------------------+\n|            |                                                            |\n| 领域导航   |  认知/语前语言                                              |\n|            |                                                            |\n| ▼ 发展性   |  +--------------------------------------------------------+ |\n|  ● 认知/.. |  | #1 对铃声转头寻找声源                              🚩  | |\n|  ○ 语言表达|  | +----------------------------------------------------+ | |\n|  ○ 语言理解|  | | 操作: 摇铃铛，观察儿童是否转头寻找声源              | | |\n|  ○ 精细动作|  | | 材料: 铃铛                                         | | |\n|  ○ 粗大动作|  | +----------------------------------------------------+ | |\n|  ○ 视觉模仿|  |                                                        | |\n|            |  | [  0-不通过  ] [  1-萌芽  ] [  2-通过  ]               | |\n| ▶ 行为特征 |  |   (红色)       (橙色)       (绿色)                     | |\n| ▶ 养育者   |  |                                                        | |\n|            |  | 📝 备注                                                | |\n|            |  +--------------------------------------------------------+ |\n|            |                                                            |\n|            |  +--------------------------------------------------------+ |\n|            |  | #2 用手指指物...                                   🚩  | |\n|            |  | ...                                                    | |\n|            |  +--------------------------------------------------------+ |\n|            |                                                            |\n+------------------------------------------------------------------------+\n| 🚩 待定: 2题 查看  | [一键不通过] [一键通过] [下一领域] |  [提交评估]  |\n+------------------------------------------------------------------------+\n```\n\n### 线框图 — 回合统计模式\n\n```\n+------------------------------------------------------------------------+\n| ← PEP-3 心理教育评估     已完成 [████████░░] 45/172    ⚙              |\n+------------------------------------------------------------------------+\n|            |                                                            |\n| 领域导航   |  认知/语前语言                                              |\n|            |                                                            |\n| ▼ 发展性   |  +--------------------------------------------------------+ |\n|  ● 认知/.. |  | #1 对铃声转头寻找声源                              🚩  | |\n|  ○ 语言表达|  | +----------------------------------------------------+ | |\n|            |  | | 操作: 摇铃铛，观察儿童是否转头寻找声源              | | |\n|            |  | +----------------------------------------------------+ | |\n|            |  |                                                        | |\n|            |  | +----------------------------------------------------+ | |\n|            |  | | 回合统计          默认建议3回合，可自由增加         | | |\n|            |  | |                                                    | | |\n|            |  | | 第1回合  [ 独立(+) ] [ 错误(-) ] [ 辅助(P) ]       | | |\n|            |  | | 第2回合  [ 独立(+) ] [ 错误(-) ] [ 辅助(P) ]       | | |\n|            |  | | 第3回合  [ 独立(+) ] [ 错误(-) ] [ 辅助(P) ]       | | |\n|            |  | |                                                    | | |\n|            |  | | [+ 新增测试回合]                        [重置]    | | |\n|            |  | |                                                    | | |\n|            |  | | ─────────────────────────────────────────          | | |\n|            |  | | 换算评分: 1-萌芽（独立率 33%）                     | | |\n|            |  | +----------------------------------------------------+ | |\n|            |  |                                                        | |\n|            |  | 📝 备注                                                | |\n|            |  +--------------------------------------------------------+ |\n|            |                                                            |\n+------------------------------------------------------------------------+\n| 🚩 待定: 2题 查看  | [一键不通过] [一键通过] [下一领域] |  [提交评估]  |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**整体布局**\n- 顶部栏：返回 + 工具名称 + 进度条 + 设置按钮\n- 左侧导航树（240px）：分组→领域两级结构\n- 右侧题目卡片区域：当前领域的所有题目\n- 底部操作栏：待定信息 + 快捷操作 + 提交按钮\n\n**左侧导航树**\n- 分组标题可折叠（`navCollapsedByDefault` 控制默认状态）\n- 领域项显示圆点状态：灰色=未答、橙色=部分完成、绿色=全部完成\n- 领域项右侧显示进度数字 `(已答/总数)`\n\n**题目卡片 — 直接评分模式**\n- 卡片头部：题号 + 项目名称 + 待定标记按钮（🚩）\n- 信息盒子：操作描述、所需材料、适用年龄（由 `cardFields` 配置控制）\n- 操作描述支持换行显示（CSV 中的 `\\n` 在导入时转为真正换行符）\n- 评分按钮组：过滤掉分值为空的等级，按分值从低到高排列（左→右），颜色红→橙→绿\n- 评分按钮显示格式：`X分（标签）`，如 `1分（达标）`、`0.5分（4个）`；无标签时只显示 `X分`\n- 评分描述：仅 `showScoreDesc=true` 时显示（C-PEP 启用）\n\n**题目卡片 — 回合统计模式（Cold Probe）**\n- 评分按钮区域替换为回合统计区域\n- 默认 3 个回合行，每行 3 个按钮：独立(+)绿色 / 错误(-)红色 / 辅助(P)橙色\n- 可点击\"+ 新增测试回合\"增加回合，无上限\n- 回合统计完成后自动显示换算结果\n\n**回合统计换算公式**\n\n用独立率作为百分比，线性映射到该题的分值区间，四舍五入到最近的有效评分等级。天然兼容3级、4级、5级评分体系。\n\n```\n独立率 = 独立完成数 / 已答回合数\n辅助率 = 辅助完成数 / 已答回合数\n\n// Step 1: 计算有效比率 effectiveRate（0~1）\nif (独立率 >= 80%)        → effectiveRate = 1.0（稳定掌握）\nelse if (全部错误)         → effectiveRate = 0（完全未掌握）\nelse if (独立=0 且 辅助>0) → effectiveRate = 1/(等级数-1)（有辅助能力，略高于最低分）\nelse                       → effectiveRate = 独立率（线性映射）\n\n// Step 2: 线性插值到分值\nrawValue = 最低分 + effectiveRate × (最高分 - 最低分)\n\n// Step 3: 四舍五入到最近的有效评分等级\nresultScore = 距离 rawValue 最近的评分等级\n```\n\n**辅助完成的特殊处理**\n\n辅助完成 (P) 不计入独立完成，但不等于错误：\n- **全辅助无独立**：effectiveRate = `1/(等级数-1)`，映射到略高于最低分的位置（第2个等级附近）\n  - 3级 → effectiveRate=0.5 → 中间分\n  - 4级 → effectiveRate=0.33 → 第2等级\n  - 5级 → effectiveRate=0.25 → 第2等级\n- **全错误无辅助**：effectiveRate = 0 → 最低分\n- 设计意图：有辅助下能完成说明技能处于萌芽状态，应高于完全不会\n\n**3级评分映射（VB-MAPP 里程碑：0, 0.5, 1）**\n\n| 回合结果 | 独立率 | effectiveRate | rawValue | 映射结果 |\n|----------|--------|--------------|----------|----------|\n| 3独立0错误 | 100% | 1.0 | 1.0 | 1分（达标） |\n| 2独立1错误 | 67% | 0.67 | 0.67 | 0.5分（部分达标） |\n| 1独立2错误 | 33% | 0.33 | 0.33 | 0.5分（部分达标） |\n| 0独立3辅助 | 0% | 0.5 | 0.5 | 0.5分（部分达标） |\n| 0独立3错误 | 0% | 0 | 0 | 0分（错误） |\n\n**4级评分映射（VB-MAPP 障碍：1, 2, 3, 4）**\n\n| 回合结果 | 独立率 | effectiveRate | rawValue | 映射结果 |\n|----------|--------|--------------|----------|----------|\n| 3独立0错误 | 100% | 1.0 | 4.0 | 4分 |\n| 2独立1错误 | 67% | 0.67 | 3.01 | 3分 |\n| 1独立2错误 | 33% | 0.33 | 1.99 | 2分 |\n| 0独立3辅助 | 0% | 0.33 | 1.99 | 2分 |\n| 0独立3错误 | 0% | 0 | 1.0 | 1分 |\n\n**5级评分映射（VB-MAPP 转衔：1, 2, 3, 4, 5）**\n\n| 回合结果 | 独立率 | effectiveRate | rawValue | 映射结果 |\n|----------|--------|--------------|----------|----------|\n| 3独立0错误 | 100% | 1.0 | 5.0 | 5分 |\n| 2独立1错误 | 67% | 0.67 | 3.68 | 4分 |\n| 1独立2错误 | 33% | 0.33 | 2.32 | 2分 |\n| 1独立1辅助1错误 | 33% | 0.33 | 2.32 | 2分 |\n| 0独立3辅助 | 0% | 0.25 | 2.0 | 2分 |\n| 0独立3错误 | 0% | 0 | 1.0 | 1分 |\n| 4独立1错误(5回合) | 80% | 1.0 | 5.0 | 5分 |\n| 3独立2错误(5回合) | 60% | 0.6 | 3.4 | 3分 |\n\n**模式切换规则**\n\n| 切换方向 | 数据处理 | 确认提示 |\n|---------|---------|---------|\n| 直接评分 → 回合统计 | 评分数据保留，回合数据为空 | \"切换后需通过回合统计重新验证\" |\n| 回合统计 → 直接评分 | 评分数据保留，回合数据清除 | \"回合统计数据将被清除\" |\n\n- 模式为全局设置（影响所有题目）\n- 默认模式：`rounds`（回合统计）\n\n**提交校验规则**\n\n| 条件 | 行为 |\n|------|------|\n| 0 题已答 | 阻断提交，提示\"请至少完成部分题目\" |\n| 部分已答 + `allowPartialSubmit=false` | 阻断提交，提示未完成题数 |\n| 部分已答 + `allowPartialSubmit=true` | 确认弹窗，显示已完成/未完成题数 |\n| 全部完成 | 确认弹窗，确认后提交 |\n\n- PEP-3 / C-PEP / VB-MAPP 均为 `allowPartialSubmit=false`\n- 提交后：更新记录 `status=completed` → 跳转结果路由页\n\n**底部操作栏**\n- 左侧：待定计数 + 查看链接（弹出待定列表弹窗）\n- 中间：快捷操作按钮（一键评最低分 / 一键评最高分 / 下一领域）\n- 右侧：提交按钮（未全部完成=灰色，全部完成=蓝色）\n\n**备注功能**\n- 折叠式，点击\"📝 备注\"展开输入框\n- 200 字限制，失焦自动保存\n\n**待定标记**\n- 点击🚩切换标记状态，被标记卡片左侧显示橙色竖条\n- 待定列表弹窗：按领域分组展示，点击可跳转定位\n\n**断点续答**\n- 每次评分操作后立即自动保存\n- 退出时弹出确认弹窗，提示\"进度已自动保存\"\n- 恢复时加载所有已保存数据（scores、notes、marks、roundsData）\n\n### 新旧功能关系\n\n新功能\n\n---\n\n## 界面4：评估结果路由页 (assessment-result.html)\n\n### 界面路径\n\n```\n评估记录列表页\n  ├─ [查看报告] ──→ 评估结果路由页 ← 当前界面\n  └─ ... ──→ 评估答题页\n        └─ [提交评估] ──→ 评估结果路由页 ← 当前界面\n```\n\n### 线框图\n\n``` ------------------------------------------------------+  |\n|                                                                         |\n+------------------------------------------------------------------------+\n| [导出PDF]                                                               |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**三色主题设计**\n\nVB-MAPP 报告采用三色主题区分三大评估板块：\n\n| 板块 | 主题色 | 渐变色 | 说明 |\n|------|--------|--------|------|\n| 里程碑评估 | 🟢 绿色 | #43A047 → #66BB6A | 发展性技能评估 |\n| 障碍评估 | 🟠 橙色 | #F9A825 → #FFB74D | 学习障碍评估 |\n| 转衔评估 | 🔵 蓝色 | #1E88E5 → #42A5F5 | 转衔准备评估 |\n\n每个板块包含：渐变色标题栏 + 计分总表 + 评估报告（领域卡片列表）\n\n**Tab1 — 评估报告内容模块**\n\n| 模块 | 说明 |\n|------|------|\n| 基本信息 | 姓名、性别、出生日期、测评日期 |\n| 里程碑计分总表 | 得分概览条 + 三级网格（Level 3/2/1），每级按领域展示填充格 |\n| 里程碑评估报告 | 16 个领域卡片，每卡片含：领域名+得分、评价描述、IEP建议 |\n| 障碍计分总表 | 得分概览条 + 24项障碍网格（每项4分） |\n| 障碍评估报告 | 24 项障碍卡片，含得分、影响描述、干预建议 |\n| 转衔计分总表 | 得分概览条 + 按三大类别分组的网格（每项5分） |\n| 转衔评估报告 | 18 个转衔领域卡片，按三大类别分组展示 |\n| 综合分析 | 自动生成，支持编辑保存 |\n\n**里程碑评估领域（16个）**\n\n```\n提要求、命名、听者反应、视觉配对、游戏、社交、模仿、仿说、\n发音、LRFFC、对话、集体技能、语言结构、数学、阅读、书写\n```\n\n**里程碑三级结构**\n\n| 阶段 | 月龄范围 | 说明 |\n|------|---------|------|\n| Level 1 | 0-18月 | 基础阶段 |\n| Level 2 | 18-30月 | 中级阶段 |\n| Level 3 | 30-48月 | 高级阶段 |\n\n**障碍评估项目（24项）**\n\n```\n行为问题、教学控制、提要求的缺陷、命名的缺陷、模仿的缺陷、\n仿说的缺陷、视觉感知和配对的缺失、听者技能的缺陷、对话的缺陷、\n社会技能的缺陷、依赖辅助、猜想式回答、扫视的缺陷、\n条件性辨别的缺陷、不能泛化、薄弱动机、对行为有要求就会减弱动机、\n依赖强化物、自我刺激、发音清晰度的缺陷、强迫性行为、\n多动行为、没有目光接触、感觉防御\n```\n\n每项满分4分，得分越高表示障碍越严重。\n\n**转衔评估三大类别（18个领域）**\n\n| 类别 | 包含领域 |\n|------|---------|\n| 第一类：VB-MAPP得分和独立学习的能力 | VB-MAPP里程碑得分、VB-MAPP障碍得分、负面行为和教学控制、教室常规、集体技能、社会技能和社会游戏、独立的学业工作 |\n| 第二类：学习模式 | 泛化、强化物泛化、获得技能的速度、新技能的维持、自然环境中的学习、未经训练的转换 |\n| 第三类：语言和社交技能 | 自发语言、独立的对话、社交互动、同伴互动、社区活动 |\n\n每项满分5分。\n\n> 报告计算规则详见：`config/report-prompt-vbmapp.md`\n\n**Tab2 — IEP**\n- 详见界面9：IEP 个别化教育计划\n- IEP 生成规则详见：`config/iep-prompt-vbmapp.md`\n\n**Tab3 — 评估量表**\n- 详见界面10：评估量表详情\n- 左侧导航：按里程碑三级阶段分组（Level 1/2/3），每级下列出各领域\n- 评分选项：达标(1) / 部分达标(0.5) / 未达标(0)\n\n**底部操作栏**\n- 【导出PDF】：调用 `window.print()`，打印样式适配三色主题\n\n### 新旧功能关系\n\n新功能\n\n---\n\n\n## 界面8：选择评估工具弹窗（弹窗，位于 assessment-list.html）\n\n### 界面路径\n\n```\n评估记录列表页\n  └─ [新建评估] ──→ 选择评估工具弹窗 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------+\n|  选择评估工具                                              [×]    |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | 📋                                                            | |\n|  | PEP-3                                                         | |\n|  | 心理教育评估第三版，适用于2-7.5岁儿童                          | |\n|  | 174题  约60分钟                                                | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | 🧩                                                            | |\n|  | C-PEP                                                         | |\n|  | 孤独症儿童发展评估（中国残联版），适用于0-6岁儿童               | |\n|  | 130题  约50分钟                                                | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | 📊                                                            | |\n|  | VB-MAPP                                                       | |\n|  | 语言行为里程碑评估，基于ABA原理评估语言和社交技能               | |\n|  | 170题  约45分钟                                                | |\n|  +--------------------------------------------------------------+ |\n+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**弹窗触发**\n- 点击列表页右上角\"新建评估\"按钮弹出\n\n**工具卡片列表**\n- 仅展示 `status=active` 的工具\n- 每张卡片展示：工具图标（40px 圆角方形）、名称、描述、题目数、预估用时\n- 图标颜色：PEP-3=紫色底、VB-MAPP=蓝色底、C-PEP=默认\n- 自定义工具若有上传头像则展示头像\n\n**交互行为**\n- hover：边框变蓝 + 浅蓝背景\n- 点击工具卡片 → 创建新评估记录（status=ongoing）→ 跳转评估工具介绍页\n- 点击 × 或遮罩层关闭弹窗\n\n### 新旧功能关系\n\n新功能\n**⚠️注意：需要把当前课包内置的评估工具，也列到第一位**\n\n---\n\n## 界面9：IEP 个别化教育计划（Tab，位于报告页）\n\n### 界面路径\n\n```\n评估记录列表页\n  └─ [查看报告] ──→ 评估结果路由页\n        └─ ... ──→ PEP-3/C-PEP/VB-MAPP 报告页\n              └─ [Tab: IEP] ──→ IEP 个别化教育计划 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------------+\n| ← 张小明评估报告                                                        |\n+------------------------------------------------------------------------+\n| 评估报告 | [IEP] | 评估量表                                             |\n+========================================================================+\n|                                                                         |\n|  张小明IEP                                                              |\n|                                                                         |\n|  +------------------------------------------------------------------+  |\n|  | 学生姓名: 张小明    性别: 男    出生日期: 2019-05-20              |  |\n|  | 使用日期: 请选择 >   制定人员: 李老师    家长签名:                 |  |\n|  +------------------------------------------------------------------+  |\n|                                                                         |\n|  课程包: [RICE1v1 ▼]                                                    |\n|                                                                         |\n|  +------------------------------------------------------------------+  |\n|  | 年龄段及领域 | 干预目标       | 阶段目标                          |  |\n|  | ------------ | -------------- | --------------------------------- |  |\n|  | 2-3岁        | 命名训练       | 1. 命名常见物品                   |  |\n|  | 语言表达     |                | 2. 命名动作                       |  |\n|  | 得分率 35%   |                | 3. 命名属性                       |  |\n|  |              | 仿说训练       | 1. 仿说单词                       |  |\n|  |              |                | 2. 仿说短句                       |  |\n|  | ------------ | -------------- | --------------------------------- |  |\n|  | 3-4岁        | 听觉注意       | 1. 听指令取物                     |  |\n|  | 语言理解     |                | 2. 听指令执行动作                 |  |\n|  | 得分率 42%   |                | 3. 理解复杂指令                   |  |\n|  +------------------------------------------------------------------+  |\n|                                                                         |\n|  [编辑]  [添加目标]  [导出Word]                                         |\n|                                                                         |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**基本信息区**\n- 学生姓名、性别、出生日期、使用日期（可选择）、制定人员、家长签名\n\n**课程包选择器**\n- 下拉选择课程包（数据来源：`config/course-packets.json`）\n- 选择后根据评估结果自动生成 IEP 建议\n- 未选择时显示提示：\"请先选择课程包，系统将根据评估结果自动生成 IEP 建议\"\n\n**IEP 表格**\n- 三列：年龄段及领域、干预目标、阶段目标\n- 自动生成逻辑：筛选薄弱领域 → 匹配课程包内干预项目 → 填充阶段目标\n\n> IEP 生成规则详见：\n> - PEP-3：`config/iep-prompt-pep3.md`\n> - C-PEP：`config/iep-prompt-cpep.md`\n> - VB-MAPP：`config/iep-prompt-vbmapp.md`\n> - 通用工具：`config/iep-prompt-common.md`\n\n**编辑模式**\n- 点击\"编辑\"进入编辑态，表格每行右侧出现删除按钮\n- 可删除整个领域或单条阶段目标\n- 删除前弹出确认弹窗\n\n**添加目标弹窗**\n- 字段：年龄段及领域（文本）、干预目标（文本）、阶段目标（多行文本，每行一个）\n- 若领域已存在则追加目标，否则新建领域行\n\n**导出 Word**\n- 生成 HTML 表格 → Blob 下载为 .doc 文件\n- 表格样式：蓝色表头、宋体12pt、边框合并\n\n### 新旧功能关系\n\nIEP页，可以沿用现有的界面功能\n基于评估结果推导出来IEP，也是能支持编辑修改\n\n---\n\n## 界面10：评估量表详情（Tab，位于报告页）\n\n### 界面路径\n\n```\n评估记录列表页\n  └─ [查看报告] ──→ 评估结果路由页\n        └─ ... ──→ PEP-3/C-PEP/VB-MAPP 报告页\n              └─ [Tab: 评估量表] ──→ 评估量表详情 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------------+\n| ← 张小明评估报告                                                        |\n+------------------------------------------------------------------------+\n| 评估报告 | IEP | [评估量表]                                             |\n+========================================================================+\n| 学生: 张小明  工具: PEP-3  时间: 2024-01-15  评估师: 李老师  第1次      |\n+------------------------------------------------------------------------+\n|            |                                                            |\n| 领域导航   |  认知/语前语言 — 答题明细                                    |\n|            |                                                            |\n| ▼ 发展性   |  ● 通过 12题  ● 萌芽 5题  ● 不通过 3题  得分率 60%          |\n|  ● 认知/.. |  [████████████████░░░░░░░░░░]                               |\n|  ○ 语言表达|                                                            |\n|  ○ 语言理解|  +--------------------------------------------------------+ |\n|  ○ 精细动作|  | #1 对铃声转头寻找声源                                    | |\n|  ○ 粗大动作|  | [  0-不通过  ] [ ●1-萌芽● ] [  2-通过  ]                 | |\n|  ○ 视觉模仿|  |                                                        | |\n|            |  | 回合统计                                                | |\n| ▶ 行为特征 |  | 第1回合 独立(+)  第2回合 辅助(P)  第3回合 独立(+)        | |\n| ▶ 养育者   |  |                                                        | |\n|            |  | 📝 需要多次示范才能完成                                  | |\n|            |  +--------------------------------------------------------+ |\n|            |                                                            |\n|            |  +--------------------------------------------------------+ |\n|            |  | #2 追视移动物体                                          | |\n|            |  | [  0-不通过  ] [  1-萌芽  ] [ ●2-通过● ]                 | |\n|            |  +--------------------------------------------------------+ |\n|            |                                                            |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**顶部信息栏**\n- 学生姓名、评估工具、评估时间、评估师、评估次数\n\n**左侧领域导航**\n- 与答题页导航结构一致：分组 → 领域两级树\n- 每个领域右侧显示得分率百分比\n- 点击领域切换右侧详情\n\n**各工具导航结构差异**\n\n| 工具 | 导航结构 |\n|------|---------|\n| PEP-3 | 发展性子测验(6项) + 行为特征子测验(4项) + 养育者报告(3项) |\n| C-PEP | 7 个领域直接列出（无分组层级） |\n| VB-MAPP | Level 1/2/3 三级分组，每级下列出各领域 |\n\n**右侧详情区**\n\n**领域统计摘要**\n- 领域名称 + \"答题明细\"标题\n- 三色统计：通过(绿) / 萌芽(橙) / 不通过(红) 各多少题\n- 得分率百分比 + 三色堆叠进度条\n\n**题目卡片列表**\n- 每题一张卡片，展示：\n  - 题号 + 题目描述\n  - 评分选项按钮组（选中项高亮，其余灰色）\n  - 回合统计详情（若有）：每回合结果标签（独立=绿、错误=红、辅助=橙）\n  - 备注文字（若有）\n\n**评分选项颜色**\n\n| 工具 | 最高分 | 中间分 | 最低分 |\n|------|--------|--------|--------|\n| PEP-3 | 2-通过(绿) | 1-萌芽(橙) | 0-不通过(红) |\n| C-PEP | 1-通过(绿) | 0.5-中间反应(橙) | 0-不通过(红) |\n| VB-MAPP | 1-达标(绿) | 0.5-部分达标(橙) | 0-未达标(红) |\n\n**只读模式**\n- 评估量表为只读查看，不可修改评分\n- 评分按钮仅展示选中状态，不可点击\n\n### 新旧功能关系\n\n新功能\n", "docs/assessment-admin.md": "# 评估工具后台管理系统 — 产品需求文档\n\n> 设计规范：`design/DESIGN.md` Part A（后台管理端，主色 #7C3AED）\n\n---\n\n## 系统界面跳转关系\n\n```\n评估工具列表页 (admin-assessment-list.html)\n  │\n  ├─ [类型管理] ──→ 类型配置管理弹窗（Modal，页内弹出）\n  │\n  ├─ [+ 新建评估工具] ──→ 新建评估工具弹窗（Modal，页内弹出）\n  │     ├─ [手动录入] ──→ 评估工具编辑页（空白）\n  │     └─ [表格导入] ──→ 弹窗内切换为导入步骤\n  │           └─ [导入完成] ──→ 评估工具编辑页\n  │\n  ├─ [卡片\"编辑\"] ──→ 评估工具编辑页 (admin-assessment-edit.html?id=xxx)\n  │     │\n  │     ├─ [< 返回] ──→ 评估工具列表页\n  │     │\n  │     ├─ [基本信息\"编辑\"] ──→ 基本信息编辑抽屉（Drawer，页内滑出）\n  │     │\n  │     ├─ [题目\"编辑\"/\"+添加题目\"] ──→ 评估项目编辑抽屉（Drawer，页内滑出）\n  │     │\n  │     ├─ [课包图标] ──→ 课包干预目标关联 — 全屏界面（新页面）\n  │     │     │\n  │     │     ├─ [预设匹配 → 设置/编辑] ──→ 匹配设置抽屉（Drawer）\n  │     │     │\n  │     │     └─ [规则匹配 → 编辑] ──→ 规则编辑弹窗（Modal）\n  │     │\n  │     └─ [导入入口] ──→ 批量导入页 (admin-assessment-import.html?id=xxx)\n  │           └─ [< 返回编辑页] ──→ 评估工具编辑页\n  │\n  └─ [toggle 开关] ──→ 直接切换启用/停用（无跳转）\n```\n\n---\n\n## 界面1：评估工具列表页 — `pad/admin-assessment-list.html`\n\n### 界面路径\n\n```\n评估工具列表页 ← 当前界面\n```\n\n### 线框图\n\n```\n+--------+------------------------------------------------------------------+\n| RICE   |  < 返回   评估工具管理                    ⌘K  ⛶  ↻  ⚙  En  👤  |\n| AI     +------------------------------------------------------------------+\n|        |                                                                   |\n| 产品   |  +------------------------------------------------------------+  |\n| 订单   |  | 🔍 名称搜索_______ | 全部状态 ▼ | [搜索] [重置]  [类型管理] | |\n| 用户   |  +------------------------------------------------------------+  |\n| 学生   |                                                                   |\n|[评估]  |  +------------------+ +------------------+ +------------------+  |\n| 课程包 |  | 📋        [🟢ON] | | 📋        [⚪OFF]| | 📋        [🟢ON] |  |\n| 学习   |  | PEP-3             | | C-PEP            | | VB-MAPP          |  |\n| AI助手 |  | 心理教育评估第三  | | 孤独症儿童发展   | | 语言行为里程碑   |  |\n| 营销   |  | 版...             | | 评估...          | | 评估...          |  |\n| 设置   |  | 题数:172 修改:... | | 题数:0  修改:... | | 题数:170 修改:.. |  |\n|        |  |            [编辑] | |            [编辑] | |            [编辑] |  |\n|        |  +------------------+ +------------------+ +------------------+  |\n|        |                                                                   |\n|        |  +------------------+                                             |\n|        |  | ┌ ─ ─ ─ ─ ─ ─ ┐ |                                             |\n|        |  | | + 新建评估工具| |                                             |\n|        |  | └ ─ ─ ─ ─ ─ ─ ┘ |                                             |\n|        |  +------------------+                                             |\n+--------+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**卡片网格**\n- 3列网格布局，每张卡片展示：圆形图标、名称、描述（2行截断）、toggle 开关、题数/修改时间、编辑链接\n- 停用卡片 opacity: 0.55，hover 恢复 0.85\n- 末尾固定虚线卡片\"+ 新建评估工具\"\n\n**筛选条件区**\n- 左侧：名称搜索框 + 状态下拉（全部/启用/停用，onchange 实时筛选）+ 搜索按钮 + 重置按钮\n- 右侧：「类型管理」按钮\n\n**启用/停用规则**\n\n| 规则 | 说明 |\n|------|------|\n| 默认状态 | 新建工具默认\"停用\" |\n| 启用校验 | 题目数=0 时禁止启用，提示\"该评估工具尚无题目，无法启用\"，开关自动恢复 |\n| 切换方式 | 点击 toggle 直接生效，无确认弹窗 |\n| 停用影响 | 停用工具在康复师 App 新建评估弹窗中不可见 |\n\n**类型显示名映射**\n\n| type | 显示名 |\n|------|--------|\n| pep3 | PEP-3 · 心理教育评估 |\n| cpep | C-PEP · 孤独症儿童发展评估 |\n| vbmapp | VB-MAPP · 语言行为里程碑评估 |\n| common | 通用评估 · 综合型评估 |\n\n### 新旧功能关系\n- **在现有系统，左侧导航栏，新增【评估】按钮，点击进入评估工具管理**\n- **左侧导航栏，沿用之前其他的tab的逻辑，双层左侧目录。第二级目录默认收起即可**\n\n\n---\n\n## 界面2：类型配置管理弹窗（弹窗，位于 admin-assessment-list.html）\n\n### 界面路径\n\n```\n评估工具列表页\n  └─ [类型管理] ──→ 类型配置管理弹窗 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------+\n|                                                          [×]      |\n|  评估类型配置管理                                                  |\n|  管理评估工具的类型配置，包括答题模式、卡片字段等。                    |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | PEP-3 (pep3) — 心理教育评估（Schopler修订版）                  | |\n|  |                                                                | |\n|  | 答题模式:     [按领域分组 ▼]    显示评分说明: [否 ▼]            | |\n|  | 导航默认折叠: [否 ▼]           允许部分提交:  [否 ▼]            | |\n|  | 卡片字段:     ☑ 评估项目名 ☑ 操作描述 ☑ 所需材料 ☐ 适用年龄    | |\n|  | 快捷操作:     ☑ 一键不通过 ☑ 一键通过 ☑ 下一领域                | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | C-PEP (cpep) — 孤独症儿童发展评估（中国残联版）                 | |\n|  | ...                                                            | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | VB-MAPP (vbmapp) — 语言行为里程碑评估                          | |\n|  | ...                                                            | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | 通用评估 (common) — 综合型评估                                  | |\n|  | ...                                                            | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|                                        [取消]  [保存]              |\n+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**可编辑配置项**\n\n| 配置项 | 控件 | 可选值 |\n|--------|------|--------|\n| 答题模式 (listMode) | 下拉 | 按领域分组(byDomain) / 按题号排序(byOrder) |\n| 显示评分说明 (showScoreDesc) | 下拉 | 是 / 否 |\n| 导航默认折叠 (navCollapsedByDefault) | 下拉 | 是 / 否 |\n| 允许部分提交 (allowPartialSubmit) | 下拉 | 是 / 否 |\n| 卡片字段 (cardFields) | 多选 | itemName / desc / materials / ageRange |\n| 快捷操作 (quickActions) | 多选 | failAll / passAll / nextDomain |\n\n**只读展示**\n- 类型标识、名称、描述\n- 报告配置（reportPage、reportTitle）\n\n### 新旧功能关系\n\n新功能\n\n---\n\n## 界面3：新建评估工具弹窗（弹窗，位于 admin-assessment-list.html）\n\n### 界面路径\n\n```\n评估工具列表页\n  └─ [+ 新建评估工具] ──→ 新建评估工具弹窗 ← 当前界面\n```\n\n### 线框图\n\n```\n+--------------------------------------------------+\n|  新建评估工具                              [×]    |\n|  请先填写基本信息，然后选择配置方式                 |\n|                                                    |\n|  +------+  名称 *: [________________]              |\n|  | 📋   |  类型 *: [请选择评估工具类型 ▼]           |\n|  | 上传  |  描述:   [____________________]          |\n|  +------+          [____________________]          |\n|                                                    |\n|  选择配置方式:                                      |\n|  +--------------------+ +--------------------+     |\n|  | 📥 表格录入         | | ✏️ 手动录入         |     |\n|  | 下载模板，填写评估   | | 在线逐条添加评估    |     |\n|  | 题目后上传导入       | | 领域和题目          |     |\n|  +--------------------+ +--------------------+     |\n+--------------------------------------------------+\n```\n\n### 功能说明\n\n**基本信息**\n- 图标上传（64px 圆形）、名称（必填）、类型下拉（必填）、描述\n- 类型下拉为自定义组件（非原生 select），每项展示名称+描述\n- 选择类型后，若描述为空则自动填入该类型的工具简介\n\n**表单校验规则**\n\n| 校验 | 提示 |\n|------|------|\n| 名称为空 | \"请输入评估工具名称\" |\n| 类型未选 | \"请选择评估工具类型\" |\n| 名称重复 | \"评估工具名称\"XXX\"已存在，请使用其他名称\" |\n\n**配置方式**\n- 手动录入：创建工具（status=inactive, questionCount=0）→ 跳转空白编辑页\n- 表格导入：弹窗内切换为导入步骤（隐藏基本信息区），展示三步导入流程\n\n### 新旧功能关系\n\n新功能\n\n\n## 界面4：评估工具编辑页 — `pad/admin-assessment-edit.html`\n\n### 界面路径\n\n```\n评估工具列表页\n  ├─ [卡片\"编辑\"] ──→ 评估工具编辑页 ← 当前界面\n  └─ [+ 新建评估工具] ──→ ...\n        └─ [手动录入/导入完成] ──→ 评估工具编辑页 ← 当前界面\n```\n\n### 线框图\n\n```\n+--------+------------------------------------------------------------------+\n| RICE   |  < 返回   PEP-3 编辑                     ⌘K  ⛶  ↻  ⚙  En  👤  |\n| AI     +------------------------------------------------------------------+\n|        |                                                                   |\n| 产品   |  +------------------------------------------------------------+  |\n| 订单   |  | 📋 名称: PEP-3  类型: PEP-3  描述: 心理教育...             |  |\n| 用户   |  | 评估工具介绍: 已配置                          [编辑]       |  |\n| 学生   |  +------------------------------------------------------------+  |\n|[评估]  |                                                                   |\n| 课程包 |  +------------------------------------------------------------+  |\n| 学习   |  | 课包关联:                                                    |  |\n| AI助手 |  | (🟣RICE) (⚪小组) (⚪春暖) (⚪言语)                          |  |\n| 营销   |  |  RICE1v1  RICE小组  春暖综合  春暖言语                       |  |\n| 设置   |  |    ✓                                                         |  |\n|        |  +------------------------------------------------------------+  |\n|        |                                                                   |\n|        |  +------------+ +----------------------------------------------+  |\n|        |  | 领域目录   | | 认知/语前语言 — 题目列表          [+ 添加题目] |  |\n|        |  |    [编辑]  | |                                                |  |\n|        |  |            | | 序号 | 评估项目 | 描述   | 材料 | 评分..| 操作|  |\n|        |  | ▼ 发展性   | | ---- | -------- | ------ | ---- | ------| ----|  |\n|        |  |  ● 认知/.. | |  1   | 对铃声.. | 摇铃.. | 铃铛 | 2/1/0 | 编辑|  |\n|        |  |    语言表达| |  2   | 用手指.. | 观察.. | 图片 | 2/1/0 | 删除|  |\n|        |  |    语言理解| |  3   | ...      | ...    | ...  | ...   | ... |  |\n|        |  |    精细动作| |                                                |  |\n|        |  |    粗大动作| |                                                |  |\n|        |  |    视觉模仿| |                                                |  |\n|        |  |            | |                                                |  |\n|        |  | ▶ 行为特征 | |                                                |  |\n|        |  | ▶ 养育者.. | |                                                |  |\n|        |  +------------+ +----------------------------------------------+  |\n|        |                                                                   |\n|        |                                                       [保存]      |\n+--------+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**基本信息区**\n- 默认只读展示：头像 + 名称 + 类型 + 描述 + 评估工具介绍状态（\"已配置\"/\"未配置\"）\n- 点击\"编辑\"弹出右侧抽屉（520px），含：图标上传、名称、类型（只读）、描述、富文本介绍编辑器\n- 富文本编辑器：contenteditable div，工具栏含 B/I/U/H/OL/UL，数据存储为 `intro` 字段（HTML 字符串）\n- 抽屉底部\"删除此评估工具\"红色链接：必须先停用才能删除\n\n**课包干预目标关联栏**\n- 位置：基本信息区和题目列表之间\n- 横向排列所有课包图标（48px 紫色圆形 + 文字缩写）+ 课包名称\n- 已启用：正常显示 + 右上角绿色勾 ✓；未启用：灰度显示\n- 点击任意课包图标 → 进入全屏干预目标关联界面\n- 数据源：`config/course-packets.json`，RICE1v1 默认关闭（需人为打开）\n\n**左侧领域结构树**\n- 宽度 280px，两级结构：分组 → 子测验/领域\n- 普通模式：点击分组折叠/展开，点击子项选中加载右侧题目\n- 编辑模式：节点 hover 显示 ✏️ 改名 / 🗑 删除，底部\"+ 添加分组\"/\"+ 添加子组\"\n\n**右侧题目表格**\n- 列：排序号（可排序）、评估项目、操作描述、所需材料、适用年龄、是否必答、启用状态、评分等级（动态列）、操作（编辑/删除）\n- 题目编辑抽屉（520px）：核心字段（排序号、项目名、描述、评分说明）+ 扩展字段（材料、年龄、必答、启用，默认折叠）\n\n**评分体系规则**\n\n```\n新增题目评分来源优先级：\n1. 同领域已有题目 → 复制其 scores 结构（分值+标签，说明留空）\n2. 领域内无题目 → fallback 到工具类型预设评分体系\n\n预设评分体系：\n  PEP-3:   2-通过 / 1-萌芽 / 0-不通过\n  C-PEP:   1-通过 / 0.5-中间反应 / 0-不通过\n  VB-MAPP: 1-1分 / 0.5-0.5分 / 0-0分\n```\n\n### 新旧功能关系\n\n新功能\n\n---\n\n## 界面5：课包干预目标关联 — 全屏界面（全屏覆盖层，位于 admin-assessment-edit.html）\n\n### 界面路径\n\n```\n评估工具列表页\n  └─ [卡片\"编辑\"] ──→ 评估工具编辑页\n        └─ [课包图标] ──→ 课包干预目标关联 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------------+\n| [← 返回]  RICE1v1   评估工具「PEP-3」↔ 课包「RICE1v1」                 |\n|                                          12/172 已匹配   [🟢 已启用]   |\n+------------------------------------------------------------------------+\n|                                                                         |\n|  匹配模式:  (● 预设匹配)  (○ 规则匹配)                                  |\n|                                                                         |\n|  子模式:  [● 评估项目匹配]  [○ 评估分数匹配]                             |\n|                                                                         |\n|  +------------+ +------------------------------------------------------+|\n|  | 领域目录   | | 题号 | 评估项目      | 匹配的干预目标     | 操作     ||\n|  |            | | ---- | ------------- | ------------------ | -------- ||\n|  | ▼ 发展性   | |  1   | 对铃声转头..  | 多种基本姿势       | [设置]   ||\n|  |  认知 3/20 | |      | 摇铃铛观察..  | 🟣动作 🟠粗大动作  | [删除]   ||\n|  |  语言 0/15 | |  2   | 用手指指物..  | (未匹配)           | [设置]   ||\n|  |  理解 5/18 | |  3   | 模仿拍手..    | 模仿动作           | [编辑]   ||\n|  |  精细 0/12 | |      | 示范拍手..    | 🟣动作 🟠精细动作  | [删除]   ||\n|  |  粗大 0/10 | |  ... | ...           | ...                | ...      ||\n|  |  视觉 0/8  | |                                                      ||\n|  |            | |                                                      ||\n|  | ▶ 行为特征 | |                                                      ||\n|  | ▶ 养育者   | |                                                      ||\n|  +------------+ +------------------------------------------------------+|\n|                                                                         |\n|                              [📥 导出关联表]  [🤖 AI自动匹配]           |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**顶部栏**\n- 返回按钮、课包名称、关联备注标签、匹配进度（X/Y 已匹配，仅预设模式）、启用/关闭 toggle\n\n**模式选择**（两张卡片，单选）\n\n| 模式 | 说明 |\n|------|------|\n| 预设匹配 | 每个评估项目和课包内干预项目做匹配，可手动编辑或AI自动匹配 |\n| 规则匹配 | 不做预设匹配，提供匹配规则文本，AI在生成IEP时自动匹配 |\n\n切换模式时，若当前模式有数据则弹窗确认。\n\n**预设匹配 — 子模式**（radio pills）\n\n| 子模式 | 说明 |\n|--------|------|\n| 评估项目匹配 | 每个评估项目关联多个干预目标（一对多） |\n| 评估分数匹配 | 同一评估项目下，不同评分等级分别匹配不同干预目标 |\n\n切换子模式时，若有匹配数据则弹窗确认（切换会清空）。\n\n**左侧目录树**\n- 分组 → 子领域两层结构，与编辑页树一致\n- 每个子领域显示匹配进度（如 `3/10`）\n- 颜色：全匹配=绿色，部分=紫色，无=灰色\n\n**右侧详情面板**\n- 评估项目匹配模式：每行显示题号、评估项目、匹配的干预目标（名称+领域标签）、操作\n- 评估分数匹配模式：主行显示评估项目+配置状态，子行按评分等级展开\n\n**配置状态判断**\n\n```\n已配置（绿色）：所有评分等级都配置了干预目标\n部分配置（橙色）：部分评分等级配置了\n未配置（灰色）：无任何配置\n```\n\n**AI自动匹配**\n- 点击弹确认（已有数据时提示会清空）\n- 按领域关键词智能匹配，匹配完成后所有评估项目都有对应干预目标\n\n**导出关联表**\n- CSV 文件，9列：评估项目题号、评估项目、评估项目描述、评估项目评分、评估项目评分标签、关联干预项目ID、关联干预项目、关联干预项目大领域、关联干预项目子领域\n- 评估分数匹配模式下同一评估项目按评分等级展开多行\n- UTF-8 BOM 编码，QUOTE_ALL\n\n### 新旧功能关系\n\n新功能\n\n---\n\n## 界面6：匹配设置抽屉（右侧抽屉，位于 admin-assessment-edit.html）\n\n### 界面路径\n\n```\n评估工具列表页\n  └─ [卡片\"编辑\"] ──→ 评估工具编辑页\n        └─ [课包图标] ──→ 课包干预目标关联\n              └─ [预设匹配 → 设置/编辑] ──→ 匹配设置抽屉 ← 当前界面\n```\n\n### 线框图\n\n```\n                                    +----------------------------------+\n                                    | 匹配设置                   [×]  |\n                                    |                                  |\n                                    | 对铃声转头寻找声源               |\n                                    | 摇铃铛，观察儿童是否转头寻找声源  |\n                                    |                                  |\n                                    | 🔍 [搜索干预目标___________]     |\n                                    |                                  |\n                                    | ☆ AI推荐                [刷新]  |\n                                    | +------------------------------+ |\n                                    | | 🟣动作 🟠粗大动作             | |\n                                    | |   多种基本姿势          [✓]  | |\n                                    | +------------------------------+ |\n |  |\n|        |  | 📄 下载 VB-MAPP 模板 (vbmapp-import-template.csv)           |  |\n|        |  +------------------------------------------------------------+  |\n|        |                                                                   |\n|        |  +------------------------------------------------------------+  |\n|        |  | 📌 CSV 表头格式说明                                         |  |\n|        |  | 评分列采用行级配置，列名格式: 评分_{字母}_{字段}              |  |\n|        |  | 字段: 分值 / 标签 / 说明                                     |  |\n|        |  | 示例: 评分_a_分值, 评分_a_标签, 评分_a_说明                   |  |\n|        |  +------------------------------------------------------------+  |\n|        |                                                                   |\n|        |  +------------------------------------------------------------+  |\n|        |  | ┌ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ┐  |  |\n|        |  | |  📁 拖拽文件到此处，或点击选择文件                    |  |  |\n|        |  | |     支持 .xlsx / .csv 格式                           |  |  |\n|        |  | └ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ┘  |  |\n|        |  +------------------------------------------------------------+  |\n|        |                                                                   |\n|        |  (上传后显示预览表格)                                              |\n|        |  +------------------------------------------------------------+  |\n|        |  | 题号 | 子测验/领域 | 题目描述 | 评分选项 | 状态             |  |\n|        |  | ---- | ----------- | -------- | -------- | ----             |  |\n|        |  |  1   | 认知/语前.. | 对铃声.. | 2/1/0    | ✅ 有效          |  |\n|        |  |  9   | (空)        | 缺少..   | -        | ❌ 异常          |  |\n|        |  +------------------------------------------------------------+  |\n|        |  | 共 172 条，有效 170 条，异常 2 条                            |  |\n|        |  +------------------------------------------------------------+  |\n|        |                                                                   |\n|        |                                              [确认导入]           |\n+--------+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**三步流程**\n\n| 步骤 | 说明 |\n|------|------|\n| ① 下载模板 | 提供 PEP-3 和 VB-MAPP 两套预设模板下载 |\n| ② 上传文件 | 拖拽或点击上传，支持 .xlsx / .csv |\n| ③ 预览数据 | 解析后展示预览表格，异常行红色高亮 |\n\n**CSV 表头格式**\n\n| 列名 | 必填 | 说明 |\n|------|------|------|\n| 排序 | 否 | 缺失时自动递增 |\n| 一级分类 | **是** | 分组名称（group） |\n| 二级分类 | **是** | 子测验/领域名称（domain） |\n| 评估项目 | 否 | 题目简短名称 |\n| 操作描述 | **是** | 题目详细描述 |\n| 所需材料 | 否 | 评估所需教具 |\n| 适用年龄 | 否 | 如 12-24月 |\n| 是否必答 | 否 | 默认\"是\" |\n| 评分_{字母}_{字段} | 动态 | 字母编号 a/b/c...，字段: 分值/标签/说明 |\n\n**解析规则**\n\n```\n1. 读取表头行，识别所有列索引\n2. 正则 ^评分_([a-z])_(分值|标签|说明)$ 匹配评分列\n3. 按字母排序评分列组（a, b, c...），构建 scoreColMap\n4. 逐行解析：\n   - 缺少一级分类或二级分类 → 标记无效，跳过\n   - 构建 domainKey = {一级分类}__{二级分类}\n   - 每行生成 Question 对象，scores 数组从评分列动态构建\n5. 返回：config（按 domainKey 分组）、totalCount、invalidCount\n```\n\n**导入结果**\n- 隐藏三步流程，显示：✅ 导入完成，成功 N 条，失败 N 条\n- 底部按钮变为\"返回编辑页\"\n\n**CSV 文件规范**\n- 所有字段 QUOTE_ALL（双引号包裹）\n- 双引号转义：两个双引号\n- UTF-8 编码，不带 BOM\n- Excel (.xlsx) 使用 SheetJS 库解析\n\n### 新旧功能关系\n\n新功能\n\n\n---\n\n## 界面9：基本信息编辑抽屉（右侧抽屉，位于 admin-assessment-edit.html）\n\n### 界面路径\n\n```\n评估工具列表页\n  └─ [卡片\"编辑\"] ──→ 评估工具编辑页\n        └─ [基本信息\"编辑\"] ──→ 基本信息编辑抽屉 ← 当前界面\n```\n\n### 线框图\n\n```\n                                    +----------------------------------+\n                                    | 编辑基本信息                [×]  |\n                                    |                                  |\n                                    | +------+                         |\n                                    | | 📋   |  工具图标               |\n                                    | | 上传  |  点击更换图片           |\n                                    | +------+                         |\n                                    |                                  |\n                                    | * 名称: [PEP-3__________]       |\n                                    |   类型: PEP-3 · 心理教育评估     |\n                                    |         (只读)                   |\n                                    |                                  |\n                                    |   描述:                          |\n                                    |   [心理教育评估（第三版）_____]  |\n                                    |   [________________________]     |\n                                    |                                  |\n                                    |   评估工具介绍:                  |\n                                    |   [B] [I] [U] | [H] [OL] [UL]   |\n                                    |   +----------------------------+ |\n                                    |   | PEP-3 是由 Eric Schopler  | |\n                                    |   | 等人开发的标准化评估工具...| |\n                                    |   |                            | |\n                                    |   | ## 评估结构                | |\n                                    |   | PEP-3 包含 10 个发展性    | |\n                                    |   | 子测验和 4 个适应行为...  | |\n                                    |   +----------------------------+ |\n                                    |                                  |\n                                    |   ─────────────────────────────  |\n                                    |   删除此评估工具（红色链接）     |\n                                    |                                  |\n                                    |              [取消]  [保存]      |\n                                    +----------------------------------+\n```\n\n### 功能说明\n\n**抽屉尺寸**\n- 宽度 520px，从右侧滑出，带半透明遮罩\n\n**表单字段**\n\n| 字段 | 控件 | 说明 |\n|------|------|------|\n| 工具图标 | 圆形上传区（64px） | 点击触发文件选择，支持 image/* |\n| 名称 | 文本输入框 | 必填 |\n| 类型 | 只读文本 | 创建后不可修改，灰底展示 |\n| 描述 | 多行文本框 | 可选，80px 高度 |\n| 评估工具介绍 | 富文本编辑器 | contenteditable div，200px 最小高度 |\n\n**富文本编辑器**\n- 工具栏按钮：B（加粗）、I（斜体）、U（下划线）、H（标题H3）、OL（有序列表）、UL（无序列表）\n- 数据存储为 `intro` 字段（HTML 字符串）\n- 预设内容来源：`config/tool-intro-pep3.md`、`config/tool-intro-cpep.md`、`config/tool-intro-vbmapp.md`\n\n**删除工具**\n- 底部红色链接\"删除此评估工具\"\n- 必须先停用才能删除，否则提示\"请先停用该评估工具\"\n- 删除前弹出确认弹窗\n\n**操作按钮**\n- 取消：关闭抽屉，不保存\n- 保存：校验名称非空 → 更新工具数据 → 关闭抽屉 → 刷新页面\n\n### 新旧功能关系\n\n新功能\n**其中，工具介绍是需要【富文本组件】编辑的。这里就调用RICE系统现有的组件**\n\n---\n\n## 界面10：评估项目编辑抽屉（右侧抽屉，位于 admin-assessment-edit.html）\n\n### 界面路径\n\n```\n评估工具列表页\n  └─ [卡片\"编辑\"] ──→ 评估工具编辑页\n        └─ [题目\"编辑\" / \"+ 添加题目\"] ──→ 评估项目编辑抽屉 ← 当前界面\n```\n\n### 线框图\n\n```\n                                    +----------------------------------+\n                                    | 编辑题目 / 添加题目        [×]  |\n                                    |                                  |\n                                    | * 排序: [__1__]                  |\n                                    |                                  |\n                                    | * 评估项目:                      |\n                                    |   [对铃声转头寻找声源_________]  |\n                                    |                                  |\n                                    |   操作描述:                      |\n                                    |   [摇铃铛，观察儿童是否转头____] |\n                                    |   [寻找声源__________________]   |\n                                    |                                  |\n                                    | * 评分说明:                      |\n                                    |   ┌──────┬──────────┬──────────┐ |\n                                    |   │ 分值 │   标签   │   说明   │ |\n                                    |   ├──────┼──────────┼──────────┤ |\n                                    |   │ [2 ] │ [通过  ] │ [______] │ |\n                                    |   │ [1 ] │ [萌芽  ] │ [______] │ |\n                                    |   │ [0 ] │ [不通过] │ [______] │ |\n                                    |   └──────┴──────────┴──────────┘ |\n                                    |                                  |\n                                    |   ▶ 扩展字段（所需材料、适用..） |\n                                    |   ┌──────────────────────────┐   |\n                                    |   │ 所需材料: [铃铛________] │   |\n                                    |   │ 适用年龄: [12-24月]      │   |\n                                    |   │ 是否必答: [是 ▼]         │   |\n                                    |   │ 启用状态: [●ON]          │   |\n                                    |   └──────────────────────────┘   |\n                                    |                                  |\n                                    |              [取消]  [保存]      |\n                                    +----------------------------------+\n```\n\n### 功能说明\n\n**抽屉尺寸**\n- 宽度 520px，从右侧滑出，带半透明遮罩\n\n**核心字段（始终展示）**\n\n| 字段 | 控件 | 说明 |\n|------|------|------|\n| 排序 | 数字输入框（100px） | 必填，新增时自动递增 |\n| 评估项目 | 文本输入框 | 必填，题目简短名称 |\n| 操作描述 | 多行文本框（80px） | 题目详细描述 |\n| 评分说明 | 动态表格 | 每行含分值(number)、标签(text)、说明(textarea) |\n\n**评分说明**\n- 评分等级数量由工具类型决定（PEP-3=3级、C-PEP=3级、VB-MAPP=3级）\n- 新增题目时，评分结构从同领域已有题目复制（分值+标签），说明留空\n- 若领域内无题目，fallback 到工具类型预设评分体系\n\n**扩展字段（默认折叠）**\n- 点击\"▶ 扩展字段\"展开/收起\n- 所需材料：文本输入框\n- 适用年龄：文本输入框（如 \"12-24月\"）\n- 是否必答：下拉（是/否），默认\"是\"\n- 启用状态：toggle 开关，默认开启\n\n**操作按钮**\n- 取消：关闭抽屉，不保存\n- 保存：校验排序和项目名非空 → 更新/新增题目 → 关闭抽屉 → 刷新题目列表\n\n### 新旧功能关系\n\n新功能\n", "docs/assessment-app/assessment-list.md": "## 界面1：评估记录列表页 (assessment-list.html)\n\n### 界面路径\n\n```\n评估记录列表页 ← 当前界面\n```\n\n### 线框图\n\n```\n+--------+------------------------------------------------------------------+\n| 👤头像 |  全部 | 已完成 | 评估中                      📋 新建评估        |\n| 张小明  |-------+--------+----------+------------------------------------+\n| 男·5岁  |                                                                  |\n|        |  +--------------------------------------------------------------+ |\n| 📊 概述 |  | 2026.04.10 - 评估中                                         | |\n| 📝 评估 |  | 评估时间: 2026-04-10 09:30  工具: PEP-3  评估师: 李老师     | |\n|[选中态] |  |                                      [删除]  [继续评估]     | |\n| 📖 1v1  |  +--------------------------------------------------------------+ |\n| 👥 小组 |                                                                  |\n| 📋 报告 |  +--------------------------------------------------------------+ |\n| 🏛 残联  |  | 2026.03.15 - 已完成                                         | |\n|        |  | 评估时间: 2026-03-15 14:00  工具: VB-MAPP  评估师: 王老师   | |\n| ──────  |  |                                                    [查看]    | |\n| 🔒 冻结 |  +--------------------------------------------------------------+ |\n|        |                                                                  |\n|        |                                          +----+----+----+        |\n|        |                                          | 🟢 | 🟡 | 🔴 |        |\n|        |                                          +----+----+----+        |\n+--------+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**左侧导航栏**\n- 学生头像 + 姓名 + 性别·年龄\n- 导航项：康复概述、评估报告（选中）、1对1训练课、小组课、康复报告、残联报告\n- 底部\"冻结\"链接\n\n**Tab 筛选**\n- 全部 / 已完成 / 评估中，选中态蓝色下划线\n- 右侧\"新建评估\"蓝色文字按钮\n\n**评估记录卡片**\n- 标题行：日期 + 状态（评估中=蓝色，已完成=绿色）\n- 信息行：评估时间、工具名称、评估师\n- 操作按钮：评估中→【删除】+【继续评估】，已完成→【查看】\n\n**新建评估弹窗**\n- 弹出模态弹窗，展示可用评估工具列表（详见界面8：选择评估工具弹窗）\n\n**测试数据生成按钮**\n- 页面右侧固定浮动，3 个按钮：🟢高分 / 🟡中分 / 🔴低分\n- 点击后为所有已启用工具各生成一条已完成记录 + 答题数据\n\n| 档位 | 最高分概率 | 中间分概率 | 最低分概率 |\n|------|-----------|-----------|-----------|\n| 高分 | 80-100%   | 0-20%     | 0%        |\n| 中分 | 40-60%    | 20-40%    | 20%       |\n| 低分 | 10%       | 10-20%    | 60-80%    |\n\n**删除确认弹窗**\n- 自定义弹窗（非浏览器原生），确认后删除记录和答题数据\n\n### 新旧功能关系\n\n这是已有界面，在评估记录里面，新增字段【评估工具】\n\n---\n\n---\n\n## 界面8：选择评估工具弹窗（弹窗，位于 assessment-list.html）\n\n### 界面路径\n\n```\n评估记录列表页\n  └─ [新建评估] ──→ 选择评估工具弹窗 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------+\n|  选择评估工具                                              [×]    |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | 📋                                                            | |\n|  | PEP-3                                                         | |\n|  | 心理教育评估第三版，适用于2-7.5岁儿童                          | |\n|  | 174题  约60分钟                                                | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | 🧩                                                            | |\n|  | C-PEP                                                         | |\n|  | 孤独症儿童发展评估（中国残联版），适用于0-6岁儿童               | |\n|  | 130题  约50分钟                                                | |\n|  +--------------------------------------------------------------+ |\n|                                                                    |\n|  +--------------------------------------------------------------+ |\n|  | 📊                                                            | |\n|  | VB-MAPP                                                       | |\n|  | 语言行为里程碑评估，基于ABA原理评估语言和社交技能               | |\n|  | 170题  约45分钟                                                | |\n|  +--------------------------------------------------------------+ |\n+------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**弹窗触发**\n- 点击列表页右上角\"新建评估\"按钮弹出\n\n**工具卡片列表**\n- 仅展示 `status=active` 的工具\n- 每张卡片展示：工具图标（40px 圆角方形）、名称、描述、题目数、预估用时\n- 图标颜色：PEP-3=紫色底、VB-MAPP=蓝色底、C-PEP=默认\n- 自定义工具若有上传头像则展示头像\n\n**交互行为**\n- hover：边框变蓝 + 浅蓝背景\n- 点击工具卡片 → 创建新评估记录（status=ongoing）→ 跳转评估工具介绍页\n- 点击 × 或遮罩层关闭弹窗\n\n### 新旧功能关系\n\n新功能\n**⚠️注意：需要把当前课包内置的评估工具，也列到第一位**\n\n---\n", "docs/assessment-app/assessment-result-parent.md": "## 界面9：IEP 个别化教育计划（Tab，位于报告页）\n\n### 界面路径\n\n```\n评估记录列表页\n  └─ [查看报告] ──→ 评估结果路由页\n        └─ ... ──→ PEP-3/C-PEP/VB-MAPP 报告页\n              └─ [Tab: IEP] ──→ IEP 个别化教育计划 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------------+\n| ← 张小明评估报告                                                        |\n+------------------------------------------------------------------------+\n| 评估报告 | [IEP] | 评估量表                                             |\n+========================================================================+\n|                                                                         |\n|  张小明IEP                                                              |\n|                                                                         |\n|  +------------------------------------------------------------------+  |\n|  | 学生姓名: 张小明    性别: 男    出生日期: 2019-05-20              |  |\n|  | 使用日期: 请选择 >   制定人员: 李老师    家长签名:                 |  |\n|  +------------------------------------------------------------------+  |\n|                                                                         |\n|  课程包: [RICE1v1 ▼]                                                    |\n|                                                                         |\n|  +------------------------------------------------------------------+  |\n|  | 年龄段及领域 | 干预目标       | 阶段目标                          |  |\n|  | ------------ | -------------- | --------------------------------- |  |\n|  | 2-3岁        | 命名训练       | 1. 命名常见物品                   |  |\n|  | 语言表达     |                | 2. 命名动作                       |  |\n|  | 得分率 35%   |                | 3. 命名属性                       |  |\n|  |              | 仿说训练       | 1. 仿说单词                       |  |\n|  |              |                | 2. 仿说短句                       |  |\n|  | ------------ | -------------- | --------------------------------- |  |\n|  | 3-4岁        | 听觉注意       | 1. 听指令取物                     |  |\n|  | 语言理解     |                | 2. 听指令执行动作                 |  |\n|  | 得分率 42%   |                | 3. 理解复杂指令                   |  |\n|  +------------------------------------------------------------------+  |\n|                                                                         |\n|  [编辑]  [添加目标]  [导出Word]                                         |\n|                                                                         |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**基本信息区**\n- 学生姓名、性别、出生日期、使用日期（可选择）、制定人员、家长签名\n\n**课程包选择器**\n- 下拉选择课程包（数据来源：`config/course-packets.json`）\n- 选择后根据评估结果自动生成 IEP 建议\n- 未选择时显示提示：\"请先选择课程包，系统将根据评估结果自动生成 IEP 建议\"\n\n**IEP 表格**\n- 三列：年龄段及领域、干预目标、阶段目标\n- 自动生成逻辑：筛选薄弱领域 → 匹配课程包内干预项目 → 填充阶段目标\n\n> IEP 生成规则详见：\n> - PEP-3：`config/iep-prompt-pep3.md`\n> - C-PEP：`config/iep-prompt-cpep.md`\n> - VB-MAPP：`config/iep-prompt-vbmapp.md`\n> - 通用工具：`config/iep-prompt-common.md`\n\n**编辑模式**\n- 点击\"编辑\"进入编辑态，表格每行右侧出现删除按钮\n- 可删除整个领域或单条阶段目标\n- 删除前弹出确认弹窗\n\n**添加目标弹窗**\n- 字段：年龄段及领域（文本）、干预目标（文本）、阶段目标（多行文本，每行一个）\n- 若领域已存在则追加目标，否则新建领域行\n\n**导出 Word**\n- 生成 HTML 表格 → Blob 下载为 .doc 文件\n- 表格样式：蓝色表头、宋体12pt、边框合并\n\n### 新旧功能关系\n\nIEP页，可以沿用现有的界面功能\n基于评估结果推导出来IEP，也是能支持编辑修改\n\n---\n", "docs/assessment-app/assessment-result-vbmapp.md": "## 界面7：VB-MAPP 报告页 (assessment-result-vbmapp.html)\n\n### 界面路径\n\n```\n评估记录列表页\n  └─ [查看报告] ──→ 评估结果路由页\n        └─ tool=vbmapp ──→ VB-MAPP 报告页 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------------+\n| ← 张小明评估报告                                                        |\n+------------------------------------------------------------------------+\n| 评估报告 | IEP | 评估量表                                               |\n+========================================================================+\n|                                                                         |\n|  VB-MAPP 语言行为里程碑评估报告                                         |\n|  本评估报告整合了ABA与语言行为分析的教学理论...                           |\n|                                                                         |\n|  +---------- |  ║  │ IEP建议：增加该领域的训练频次...                         │   ║    |\n|  ║  └──────────────────────────────────────────────────────────┘   ║    |\n|  ╚══════════════════════════════════════════════════════════════════╝    |\n|                                                                         |\n|  ╔══════════════════════════════════════════════════════════════════╗    |\n|  ║  🟠 VB-MAPP 障碍计分总表 (橙色主题)                             ║    |\n|  ╠══════════════════════════════════════════════════════════════════╣    |\n|  ║  总分: 32 / 满分96分  得分率 33%  [█████░░░░░░░░░░░]           ║    |\n|  ║                                                                  ║    |\n|  ║  ┌──────────────┬───┬───┬───┬───┐                               ║    |\n|  ║  │ 障碍项       │ 1 │ 2 │ 3 │ 4 │                               ║    |\n|  ║  │ 行为问题     │ ██│ ██│ ░░│ ░░│                               ║    |\n|  ║  │ 教学控制     │ ██│ ░░│ ░░│ ░░│                               ║    |\n|  ║  │ ...          │...│...│...│...│                               ║    |\n|  ║  └──────────────┴───┴───┴───┴───┘                               ║    |\n|  ╚══════════════════════════════════════════════════════════════════╝    |\n|                                                                         |\n|  ╔══════════════════════════════════════════════════════════════════╗    |\n|  ║  🟠 VB-MAPP 障碍评估报告 (橙色主题)                             ║    |\n|  ╠══════════════════════════════════════════════════════════════════╣    |\n|  ║  各障碍项卡片（同里程碑报告卡片结构，橙色左侧色条）              ║    |\n|  ╚══════════════════════════════════════════════════════════════════╝    |\n|                                                                         |\n|  ╔══════════════════════════════════════════════════════════════════╗    |\n|  ║  🔵 VB-MAPP 转衔计分总表 (蓝色主题)                             ║    |\n|  ╠══════════════════════════════════════════════════════════════════╣    |\n|  ║  总分: 45 / 满分90分  得分率 50%  [████████░░░░░░░░]           ║    |\n|  ║  按三大类别分组展示网格                                          ║    |\n|  ╚══════════════════════════════════════════════════════════════════╝    |\n|                                                                         |\n|  ╔══════════════════════════════════════════════════════════════════╗    |\n|  ║  🔵 VB-MAPP 转衔评估报告 (蓝色主题)                             ║    |\n|  ╠══════════════════════════════════════════════════════════════════╣    |\n|  ║  按三大类别分组，各转衔领域卡片（蓝色左侧色条）                  ║    |\n|  ╚══════════════════════════════════════════════════════════════════╝    |\n|                                                                         |\n|  +------------------------------------------------------------------+  |\n|  | 综合分析                                              [编辑]      |  |\n|  | 里程碑评估：总分85.5/170分。优势领域：提要求、听者反应...          |  |\n|  | 障碍评估：总分32分。存在一定障碍，需在教学中注意规避...            |  |\n|  | 转衔评估：总分45分。部分转衔技能已具备...                         |  |\n|  +------------------------------------------------------------------+  |\n|                                                                         |\n+------------------------------------------------------------------------+\n| [导出PDF]                                                               |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**三色主题设计**\n\nVB-MAPP 报告采用三色主题区分三大评估板块：\n\n| 板块 | 主题色 | 渐变色 | 说明 |\n|------|--------|--------|------|\n| 里程碑评估 | 🟢 绿色 | #43A047 → #66BB6A | 发展性技能评估 |\n| 障碍评估 | 🟠 橙色 | #F9A825 → #FFB74D | 学习障碍评估 |\n| 转衔评估 | 🔵 蓝色 | #1E88E5 → #42A5F5 | 转衔准备评估 |\n\n每个板块包含：渐变色标题栏 + 计分总表 + 评估报告（领域卡片列表）\n\n**Tab1 — 评估报告内容模块**\n\n| 模块 | 说明 |\n|------|------|\n| 基本信息 | 姓名、性别、出生日期、测评日期 |\n| 里程碑计分总表 | 得分概览条 + 三级网格（Level 3/2/1），每级按领域展示填充格 |\n| 里程碑评估报告 | 16 个领域卡片，每卡片含：领域名+得分、评价描述、IEP建议 |\n| 障碍计分总表 | 得分概览条 + 24项障碍网格（每项4分） |\n| 障碍评估报告 | 24 项障碍卡片，含得分、影响描述、干预建议 |\n| 转衔计分总表 | 得分概览条 + 按三大类别分组的网格（每项5分） |\n| 转衔评估报告 | 18 个转衔领域卡片，按三大类别分组展示 |\n| 综合分析 | 自动生成，支持编辑保存 |\n\n**里程碑评估领域（16个）**\n\n```\n提要求、命名、听者反应、视觉配对、游戏、社交、模仿、仿说、\n发音、LRFFC、对话、集体技能、语言结构、数学、阅读、书写\n```\n\n**里程碑三级结构**\n\n| 阶段 | 月龄范围 | 说明 |\n|------|---------|------|\n| Level 1 | 0-18月 | 基础阶段 |\n| Level 2 | 18-30月 | 中级阶段 |\n| Level 3 | 30-48月 | 高级阶段 |\n\n**障碍评估项目（24项）**\n\n```\n行为问题、教学控制、提要求的缺陷、命名的缺陷、模仿的缺陷、\n仿说的缺陷、视觉感知和配对的缺失、听者技能的缺陷、对话的缺陷、\n社会技能的缺陷、依赖辅助、猜想式回答、扫视的缺陷、\n条件性辨别的缺陷、不能泛化、薄弱动机、对行为有要求就会减弱动机、\n依赖强化物、自我刺激、发音清晰度的缺陷、强迫性行为、\n多动行为、没有目光接触、感觉防御\n```\n\n每项满分4分，得分越高表示障碍越严重。\n\n**转衔评估三大类别（18个领域）**\n\n| 类别 | 包含领域 |\n|------|---------|\n| 第一类：VB-MAPP得分和独立学习的能力 | VB-MAPP里程碑得分、VB-MAPP障碍得分、负面行为和教学控制、教室常规、集体技能、社会技能和社会游戏、独立的学业工作 |\n| 第二类：学习模式 | 泛化、强化物泛化、获得技能的速度、新技能的维持、自然环境中的学习、未经训练的转换 |\n| 第三类：语言和社交技能 | 自发语言、独立的对话、社交互动、同伴互动、社区活动 |\n\n每项满分5分。\n\n> 报告计算规则详见：`config/report-prompt-vbmapp.md`\n\n**Tab2 — IEP**\n- 详见界面9：IEP 个别化教育计划\n- IEP 生成规则详见：`config/iep-prompt-vbmapp.md`\n\n**Tab3 — 评估量表**\n- 详见界面10：评估量表详情\n- 左侧导航：按里程碑三级阶段分组（Level 1/2/3），每级下列出各领域\n- 评分选项：达标(1) / 部分达标(0.5) / 未达标(0)\n\n**底部操作栏**\n- 【导出PDF】：调用 `window.print()`，打印样式适配三色主题\n\n### 新旧功能关系\n\n新功能\n\n---\n", "docs/assessment-app/assessment-result.md": "## 界面4：评估结果路由页 (assessment-result.html)\n\n### 界面路径\n\n```\n评估记录列表页\n  ├─ [查看报告] ──→ 评估结果路由页 ← 当前界面\n  └─ ... ──→ 评估答题页\n        └─ [提交评估] ──→ 评估结果路由页 ← 当前界面\n```\n\n### 线框图\n\n```\n+------------------------------------------------------------------------+\n|                                                                         |\n|                                                                         |\n|                          ⟳ 正在加载评估报告...                          |\n|                                                                         |\n|                                                                         |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**路由逻辑**\n\n```javascript\nconst REPORT_PAGES = {\n  pep3:   'assessment-result-pep3.html',\n  cpep:   'assessment-result-cpep.html',\n  vbmapp: 'assessment-result-vbmapp |  +--------------------------------------------------------+ |\n|            |                                                            |\n+------------------------------------------------------------------------+\n| 🚩 待定: 2题 查看  | [一键不通过] [一键通过] [下一领域] |  [提交评估]  |\n+------------------------------------------------------------------------+\n```\n\n### 线框图 — 回合统计模式\n\n```\n+------------------------------------------------------------------------+\n| ← PEP-3 心理教育评估     已完成 [████████░░] 45/172    ⚙              |\n+------------------------------------------------------------------------+\n|            |                                                            |\n| 领域导航   |  认知/语前语言                                              |\n|            |                                                            |\n| ▼ 发展性   |  +--------------------------------------------------------+ |\n|  ● 认知/.. |  | #1 对铃声转头寻找声源                              🚩  | |\n|  ○ 语言表达|  | +----------------------------------------------------+ | |\n|            |  | | 操作: 摇铃铛，观察儿童是否转头寻找声源              | | |\n|            |  | +----------------------------------------------------+ | |\n|            |  |                                                        | |\n|            |  | +----------------------------------------------------+ | |\n|            |  | | 回合统计          默认建议3回合，可自由增加         | | |\n|            |  | |                                                    | | |\n|            |  | | 第1回合  [ 独立(+) ] [ 错误(-) ] [ 辅助(P) ]       | | |\n|            |  | | 第2回合  [ 独立(+) ] [ 错误(-) ] [ 辅助(P) ]       | | |\n|            |  | | 第3回合  [ 独立(+) ] [ 错误(-) ] [ 辅助(P) ]       | | |\n|            |  | |                                                    | | |\n|            |  | | [+ 新增测试回合]                        [重置]    | | |\n|            |  | |                                                    | | |\n|            |  | | ─────────────────────────────────────────          | | |\n|            |  | | 换算评分: 1-萌芽（独立率 33%）                     | | |\n|            |  | +----------------------------------------------------+ | |\n|            |  |                                                        | |\n|            |  | 📝 备注                                                | |\n|            |  +--------------------------------------------------------+ |\n|            |                                                            |\n+------------------------------------------------------------------------+\n| 🚩 待定: 2题 查看  | [一键不通过] [一键通过] [下一领域] |  [提交评估]  |\n+------------------------------------------------------------------------+\n```\n\n### 功能说明\n\n**整体布局**\n- 顶部栏：返回 + 工具名称 + 进度条 + 设置按钮\n- 左侧导航树（240px）：分组→领域两级结构\n- 右侧题目卡片区域：当前领域的所有题目\n- 底部操作栏：待定信息 + 快捷操作 + 提交按钮\n\n**左侧导航树**\n- 分组标题可折叠（`navCollapsedByDefault` 控制默认状态）\n- 领域项显示圆点状态：灰色=未答、橙色=部分完成、绿色=全部完成\n- 领域项右侧显示进度数字 `(已答/总数)`\n\n**题目卡片 — 直接评分模式**\n- 卡片头部：题号 + 项目名称 + 待定标记按钮（🚩）\n- 信息盒子：操作描述、所需材料、适用年龄（由 `cardFields` 配置控制）\n- 操作描述支持换行显示（CSV 中的 `\\n` 在导入时转为真正换行符）\n- 评分按钮组：过滤掉分值为空的等级，按分值从低到高排列（左→右），颜色红→橙→绿\n- 评分按钮显示格式：`X分（标签）`，如 `1分（达标）`、`0.5分（4个）`；无标签时只显示 `X分`\n- 评分描述：仅 `showScoreDesc=true` 时显示（C-PEP 启用）\n\n**题目卡片 — 回合统计模式（Cold Probe）**\n- 评分按钮区域替换为回合统计区域\n- 默认 3 个回合行，每行 3 个按钮：独立(+)绿色 / 错误(-)红色 / 辅助(P)橙色\n- 可点击\"+ 新增测试回合\"增加回合，无上限\n- 回合统计完成后自动显示换算结果\n\n**回合统计换算公式**\n\n用独立率作为百分比，线性映射到该题的分值区间，四舍五入到最近的有效评分等级。天然兼容3级、4级、5级评分体系。\n\n```\n独立率 = 独立完成数 / 已答回合数\n辅助率 = 辅助完成数 / 已答回合数\n\n// Step 1: 计算有效比率 effectiveRate（0~1）\nif (独立率 >= 80%)        → effectiveRate = 1.0（稳定掌握）\nelse if (全部错误)         → effectiveRate = 0（完全未掌握）\nelse if (独立=0 且 辅助>0) → effectiveRate = 1/(等级数-1)（有辅助能力，略高于最低分）\nelse                       → effectiveRate = 独立率（线性映射）\n\n// Step 2: 线性插值到分值\nrawValue = 最低分 + effectiveRate × (最高分 - 最低分)\n\n// Step 3: 四舍五入到最近的有效评分等级\nresultScore = 距离 rawValue 最近的评分等级\n```\n\n**辅助完成的特殊处理**\n\n辅助完成 (P) 不计入独立完成，但不等于错误：\n- **全辅助无独立**：effectiveRate = `1/(等级数-1)`，映射到略高于最低分的位置（第2个等级附近）\n  - 3级 → effectiveRate=0.5 → 中间分\n  - 4级 → effectiveRate=0.33 → 第2等级\n  - 5级 → effectiveRate=0.25 → 第2等级\n- **全错误无辅助**：effectiveRate = 0 → 最低分\n- 设计意图：有辅助下能完成说明技能处于萌芽状态，应高于完全不会\n\n**3级评分映射（VB-MAPP 里程碑：0, 0.5, 1）**\n\n| 回合结果 | 独立率 | effectiveRate | rawValue | 映射结果 |\n|----------|--------|--------------|----------|----------|\n| 3独立0错误 | 100% | 1.0 | 1.0 | 1分（达标） |\n| 2独立1错误 | 67% | 0.67 | 0.67 | 0.5分（部分达标） |\n| 1独立2错误 | 33% | 0.33 | 0.33 | 0.5分（部分达标） |\n| 0独立3辅助 | 0% | 0.5 | 0.5 | 0.5分（部分达标） |\n| 0独立3错误 | 0% | 0 | 0 | 0分（错误） |\n\n**4级评分映射（VB-MAPP 障碍：1, 2, 3, 4）**\n\n| 回合结果 | 独立率 | effectiveRate | rawValue | 映射结果 |\n|----------|--------|--------------|----------|----------|\n| 3独立0错误 | 100% | 1.0 | 4.0 | 4分 |\n| 2独立1错误 | 67% | 0.67 | 3.01 | 3分 |\n| 1独立2错误 | 33% | 0.33 | 1.99 | 2分 |\n| 0独立3辅助 | 0% | 0.33 | 1.99 | 2分 |\n| 0独立3错误 | 0% | 0 | 1.0 | 1分 |\n\n**5级评分映射（VB-MAPP 转衔：1, 2, 3, 4, 5）**\n\n| 回合结果 | 独立率 | effectiveRate | rawValue | 映射结果 |\n|----------|--------|--------------|----------|----------|\n| 3独立0错误 | 100% | 1.0 | 5.0 | 5分 |\n| 2独立1错误 | 67% | 0.67 | 3.68 | 4分 |\n| 1独立2错误 | 33% | 0.33 | 2.32 | 2分 |\n| 1独立1辅助1错误 | 33% | 0.33 | 2.32 | 2分 |\n| 0独立3辅助 | 0% | 0.25 | 2.0 | 2分 |\n| 0独立3错误 | 0% | 0 | 1.0 | 1分 |\n| 4独立1错误(5回合) | 80% | 1.0 | 5.0 | 5分 |\n| 3独立2错误(5回合) | 60% | 0.6 | 3.4 | 3分 |\n\n**模式切换规则**\n\n| 切换方向 | 数据处理 | 确认提示 |\n|---------|---------|---------|\n| 直接评分 → 回合统计 | 评分数据保留，回合数据为空 | \"切换后需通过回合统计重新验证\" |\n| 回合统计 → 直接评分 | 评分数据保留，回合数据清除 | \"回合统计数据将被清除\" |\n\n- 模式为全局设置（影响所有题目）\n- 默认模式：`rounds`（回合统计）\n\n**提交校验规则**\n\n| 条件 | 行为 |\n|------|------|\n| 0 题已答 | 阻断提交，提示\"请至少完成部分题目\" |\n| 部分已答 + `allowPartialSubmit=false` | 阻断提交，提示未完成题数 |\n| 部分已答 + `allowPartialSubmit=true` | 确认弹窗，显示已完成/未完成题数 |\n| 全部完成 | 确认弹窗，确认后提交 |\n\n- PEP-3 / C-PEP / VB-MAPP 均为 `allowPartialSubmit=false`\n- 提交后：更新记录 `status=completed` → 跳转结果路由页\n\n**底部操作栏**\n- 左侧：待定计数 + 查看链接（弹出待定列表弹窗）\n- 中间：快捷操作按钮（一键评最低分 / 一键评最高分 / 下一领域）\n- 右侧：提交按钮（未全部完成=灰色，全部完成=蓝色）\n\n**备注功能**\n- 折叠式，点击\"📝 备注\"展开输入框\n- 200 字限制，失焦自动保存\n\n**待定标记**\n- 点击🚩切换标记状态，被标记卡片左侧显示橙色竖条\n- 待定列表弹
