EDE9FE;\n\n  /* 中性色 */\n  --color-bg-page: #F5F5F5;\n  --color-bg-card: #FFFFFF;\n  --color-border: #E5E7EB;\n  --color-border-input: #D1D5DB;\n  --color-text-primary: #1F2937;\n  --color-text-secondary: #6B7280;\n  --color-text-placeholder: #9CA3AF;\n\n  /* 语义色 */\n  --color-success: #059669;\n  --color-success-bg: #ECFDF5;\n  --color-warning: #EA580C;\n  --color-warning-bg: #FFF7ED;\n  --color-danger: #DC2626;\n\n  /* 圆角 */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-pill: 9999px;\n\n  /* 间距 */\n  --spacing-xs: 4px;\n  --spacing-sm: 8px;\n  --spacing-md: 16px;\n  --spacing-lg: 24px;\n  --spacing-xl: 32px;\n\n  /* 字体 */\n  --font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, \"Noto Sans SC\", sans-serif;\n  --font-size-xs: 12px;\n  --font-size-sm: 13px;\n  --font-size-base: 14px;\n  --font-size-lg: 16px;\n  --font-size-xl: 20px;\n\n  /* 阴影 */\n  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);\n  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);\n  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);\n}\n```\n\n---\n\n## 8. 适用范围\n\n本 Part A 设计规范仅适用于：\n- 后台管理端页面（`pad/admin-*.html`），包括评估工具列表页、编辑页、批量导入弹窗等\n\n不适用于：\n- 康复师 App 手机端页面（`mobile/assessment-*.html`）\n- 康复师 App PAD 端页面（`pad/assessment-*.html`）\n\n> 康复师 App 端（答题交互、评估结果等页面）的设计规范将在收到 App 界面截图后，作为 Part B 补充到本文件中。\n\n---\n\n# Part B：康复师 App 端设计规范\n\n> 从康复师 App 界面（学生康复概况页 PAD 端）提炼，适用于评估答题和评估结果相关页面（`mobile/assessment-*.html` 和 `pad/assessment-*.html`）。\n\n---\n\n## 1. 配色体系\n\n### 主色（Primary）\n| 用途 | 色值 | 说明 |\n|------|------|------|\n| 品牌蓝 / 主操作 | `#3B9BF5` | 导航选中背景、主按钮、链接色 |\n| 主色浅底 | `#EBF5FF` | 导航选中项背景、轻量高亮 |\n| 主色悬停 | `#2B8AE0` | hover 加深 |\n\n### 中性色（Neutral）\n| 用途 | 色值 |\n|------|------|\n| 页面背景 | `#F0F2F5` / `#F5F7FA` |\n| 卡片/面板背景 | `#FFFFFF` |\n| 卡片边框 | 无边框（靠阴影区分）或 `#E8ECF0` |\n| 正文文字 | `#1A2233` |\n| 次要文字 / 描述 | `#8C95A6` |\n| 占位符文字 | `#B0B8C8` |\n| 分割线 | `#E8ECF0` |\n| 导航未选中文字 | `#5A6478` |\n| 导航栏背景 | `#FFFFFF` |\n\n### 语义色 / 多彩色板（用于图表和分类卡片）\n| 用途 | 色值 | 说明 |\n|------|------|------|\n| 粉色系 | `#FFB0C8` / `#FFD6E4` | 动作发展等领域柱状图 |\n| 橙色系 | `#FFB88C` / `#FFDCC8` | 游戏等领域 |\n| 黄色系 | `#FFD966` / `#FFECB3` | 发音等领域 |\n| 绿色系 | `#7ED6A8` / `#C8F0DC` | 沟通等领域 |\n| 蓝色系 | `#7EC8F0` / `#C8E8FF` | 社交情绪/认知等领域 |\n| 紫色系 | `#B8A0E0` / `#DDD0F0` | 生活自理等领域 |\n| 青色系 | `#6DD4D4` / `#C0F0F0` | 行为管理等领域 |\n| 核心特征卡片 | `#EBF5FF` 底 + `#3B9BF5` 图标 | 蓝色系信息卡片 |\n| 干预重点卡片 | `#FFF4EB` 底 + `#F5A623` 图标 | 橙色系信息卡片 |\n| 注意事项卡片 | `#FFF0F0` 底 + `#F56C6C` 图标 | 红色系信息卡片 |\n| 成功/通过 | `#52C41A` | 绿色 |\n| 进行中 | `#3B9BF5` | 蓝色 |\n| 冻结/停用 | `#3B9BF5` | 蓝色链接 |\n\n---\n\n## 2. 字体与排版\n\n| 元素 | 字号 | 字重 | 颜色 |\n|------|------|------|------|\n| 页面/区块标题（如\"康复概况\"） | 18px | 600 | `#1A2233` |\n| 卡片标题（如\"信息摘要\"） | 16px | 600 | `#1A2233` |\n| 子标题（如\"核心特征\"） | 15px | 600 | `#3B9BF5` / 语义色 |\n| 正文 | 14px | 400 | `#1A2233` |\n| 描述/说明文字 | 13px | 400 | `#8C95A6` |\n| 数据数值（如\"100%\"\"57%\"） | 14px | 600 | `#1A2233` |\n| 图表标签 | 12px | 400 | `#5A6478` |\n| 导航菜单文字 | 14px | 400 / 500(选中) | `#5A6478` / `#3B9BF5`(选中) |\n| 操作链接 | 14px | 500 | `#3B9BF5` |\n\n- 字体族：`-apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Helvetica Neue\", \"Noto Sans SC\", sans-serif`\n- 行高：1.6（正文）、1.3（标题）\n\n---\n\n## 3. 间距与圆角\n\n| 元素 | 数值 |\n|------|------|\n| 页面内边距 | 20px（手机端 16px） |\n| 卡片圆角 | 16px |\n| 卡片内边距 | 20px（手机端 16px） |\n| 卡片间距 | 16px |\n| 信息子卡片圆角 | 12px |\n| 按钮圆角 | 8px |\n| 输入框圆角 | 8px |\n| 头像圆角 | 50%（圆形） |\n| 柱状图柱体圆角 | 8px（顶部） |\n| 进度条圆角 | 9999px（pill） |\n\n---\n\n## 4. 组件样式\n\n### 4.1 左侧导航栏（PAD端）\n- 宽度：约 160px\n- 背景：`#FFFFFF`\n- 顶部：用户头像（圆形 48px）+ 姓名 + 性别图标 + 年龄\n- 课程包选择器：下拉，带品牌色方块图标\n- 导航项：图标（18px）+ 文字（14px）水平排列，左侧内边距 16px\n- 选中态：浅蓝背景 `#EBF5FF`，文字和图标变蓝 `#3B9BF5`，左侧 3px 蓝色竖条\n- 未选中态：文字 `#5A6478`，图标同色\n- 导航项列表：康复概述、评估报告、1对1训练课、小组课、康复报告、残联报告\n- 底部：操作链接（如\"冻结\"，蓝色文字）\n\n### 4.2 顶部栏（PAD端）\n- 高度：约 48px\n- 背景：`#FFFFFF`\n- 左侧：返回箭头 `<` + 排序/筛选图标\n- 无系统级顶部栏（App 内嵌页面）\n\n### 4.3 内容卡片\n- 背景：`#FFFFFF`\n- 圆角：16px\n- 阴影：`0 2px 8px rgba(0,0,0,0.06)`\n- 内边距：20px\n- 标题行：标题文字 + 右侧操作链接/按钮（如\"编辑摘要\"、\"AI生成\"）\n\n### 4.4 柱状图（康复概况）\n- 柱体：渐变色，从深到浅（底部深、顶部浅），圆角顶部 8px\n- 柱体宽度：约 48px，间距 12px\n- 百分比数值：显示在柱体中间，白色文字 14px 600\n- 底部标签：12px `#5A6478`\n- 基准线：虚线，`#C8D0DC`\n- 顶部统计：干预中 / 已通过 / 完成率，数值加粗\n\n### 4.5 信息摘要卡片（三列彩色子卡片）\n- 布局：3列等宽，gap 16px\n- 每个子卡片：\n  - 圆角 12px\n  - 内边距 16px\n  - 背景：对应语义浅色底（蓝/橙/红）\n  - 顶部：圆形图标（24px）+ 标题（15px 600，对应深色）\n  - 内容：14px 正文，`#1A2233`，行高 1.6\n  - 列表项前缀：`·` 圆点\n\n### 4.6 右侧面板（PAD端）\n- 宽度：约 280px\n- 包含：快捷操作按钮（资料库、AI历史对话）、AI建议区、家长反馈区\n- 按钮样式：白底 + 浅灰边框，圆角 8px，图标+文字\n- 空状态：插画图 + 灰色提示文字\n\n### 4.7 主按钮（Primary Button）\n- 背景：`#3B9BF5`\n- 文字：`#FFFFFF`，14px，500\n- 圆角：8px\n- 内边距：8px 20px\n- 悬停：`#2B8AE0`\n\n### 4.8 次按钮 / 文字按钮\n- 背景：`#FFFFFF` 或透明\n- 边框：1px `#D8DDE5`（有边框时）\n- 文字：`#3B9BF5`，14px，500\n- 圆角：8px\n- 示例：编辑摘要、AI生成\n\n### 4.9 进度条\n- 高度：6px ~ 8px\n- 背景轨道：`#E8ECF0`\n- 填充色：`#3B9BF5`（蓝色渐变）\n- 圆角：9999px（pill）\n\n### 4.10 评分按钮组（答题页专用）\n- 手机端：底部固定，3个等宽按钮横排\n  - 未选中：白底 + 灰边框\n  - 选中：对应语义色填充 + 白色文字\n  - PEP-3：0-不通过（`#F56C6C`红）/ 1-萌芽（`#F5A623`橙）/ 2-通过（`#52C41A`绿）\n  - VB-MAPP：0（`#F56C6C`）/ 0.5（`#F5A623`）/ 1（`#52C41A`）\n- PAD端：表格行内 radio 按钮组，同色系\n\n### 4.11 题目卡片（手机端答题页）\n- 背景：`#FFFFFF`\n- 圆角：16px\n- 阴影：`0 2px 8px rgba(0,0,0,0.06)`\n- 内边距：20px\n- 题号：14px 600 `#3B9BF5`\n- 题目描述：16px 400 `#1A2233`\n- 标记待定：文字链接 `#F5A623`，带旗帜图标\n\n---\n\n## 5. 布局规则\n\n### PAD端（康复师App）\n- 整体布局：左侧导航（160px）+ 中间内容区（flex: 1）+ 右侧面板（280px，可选）\n- 内容区背景：`#F0F2F5`\n- 内容区内边距：20px\n- 答题页特殊布局：左侧子测验导航（200px）+ 右侧题目表格区\n\n### 手机端（康复师App）\n- 单列全宽，max-width 420px，居中\n- 底部 Tab 导航（固定底部，高度 56px）\n- Tab 项：图标（20px）+ 文字（10px），选中态蓝色 `#3B9BF5`，未选中 `#8C95A6`\n- 内容区内边距：16px\n- 答题页特殊布局：顶部进度条 + 中间题目卡片 + 底部评分按钮（固定底部）\n\n---\n\n## 6. 图标规范\n\n- 导航图标：线性风格，18px，1.5px 描边\n- 操作图标：16px\n- 图标库建议：与后台管理端一致，Lucide Icons / Heroicons\n- 特殊图标：AI 相关用 ✨ 星形，编辑用 ✏️ 铅笔，标记用 ⚑ 旗帜\n\n---\n\n## 7. CSS 变量参考\n\n```css\n/* === 康复师 App 端变量 === */\n:root {\n  /* 主色 */\n  --app-color-primary: #3B9BF5;\n  --app-color-primary-hover: #2B8AE0;\n  --app-color-primary-light: #EBF5FF;\n\n  /* 中性色 */\n  --app-color-bg-page: #F0F2F5;\n  --app-color-bg-card: #FFFFFF;\n  --app-color-border: #E8ECF0;\n  --app-color-text-primary: #1A2233;\n  --app-color-text-secondary: #8C95A6;\n  --app-color-text-placeholder: #B0B8C8;\n  --app-color-text-nav: #5A6478;\n\n  /* 语义色 */\n  --app-color-success: #52C41A;\n  --app-color-warning: #F5A623;\n  --app-color-danger: #F56C6C;\n\n  /* 信息卡片背景 */\n  --app-color-info-blue-bg: #EBF5FF;\n  --app-color-info-orange-bg: #FFF4EB;\n  --app-color-info-red-bg: #FFF0F0;\n\n  /* 图表多彩色板 */\n  --app-chart-pink: #FFB0C8;\n  --app-chart-orange: #FFB88C;\n  --app-chart-yellow: #FFD966;\n  --app-chart-green: #7ED6A8;\n  --app-chart-blue: #7EC8F0;\n  --app-chart-purple: #B8A0E0;\n  --app-chart-cyan: #6DD4D4;\n\n  /* 评分按钮色 */\n  --app-score-fail: #F56C6C;\n  --app-score-emerging: #F5A623;\n  --app-score-pass: #52C41A;\n\n  /* 圆角 */\n  --app-radius-sm: 4px;\n  --app-radius-md: 8px;\n  --app-radius-lg: 12px;\n  --app-radius-xl: 16px;\n  --app-radius-pill: 9999px;\n\n  /* 间距 */\n  --app-spacing-xs: 4px;\n  --app-spacing-sm: 8px;\n  --app-spacing-md: 16px;\n  --app-spacing-lg: 20px;\n  --app-spacing-xl: 24px;\n\n  /* 字体 */\n  --app-font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Helvetica Neue\", \"Noto Sans SC\", sans-serif;\n\n  /* 阴影 */\n  --app-shadow-sm: 0 2px 8px rgba(0,0,0,0.06);\n  --app-shadow-md: 0 4px 16px rgba(0,0,0,0.1);\n}\n```\n\n---\n\n## 8. 适用范围\n\n本 Part B 设计规范适用于：\n- 康复师 App 手机端页面（`mobile/assessment-*.html`）\n- 康复师 App PAD 端页面（`pad/assessment-*.html`）\n\n不适用于：\n- 后台管理端页面（`pad/admin-*.html`）— 请参考 Part A\n"};
let dev='pad',curF=null,openT=[],actT=null,editing=false,editContent='',fileHandles={};

function renderLeft(){
  const el=document.getElementById('lp');
  if(!curF){
    let h='<div class="home"><h1>RICE 评估系统</h1><p class="sub">选择功能模块浏览原型和需求文档</p><div class="grid">';
    for(const f of C.features)h+=`<div class="card" onclick="openF('${f.id}')"><div class="ci">${f.icon}</div><div class="ct">${f.name}</div><div class="cd">${f.description}</div><div class="tags">${f.pages.map(p=>`<span class="tag">${p.name}</span>`).join('')}</div></div>`;
    h+='</div></div>';el.innerHTML=h;return;
  }
  let h='';
  for(const f of C.features){
    h+=`<div class="gt">${f.icon} ${f.name}</div>`;
    for(const p of f.pages){
      const a=actT===p.doc?'act':'';
      const hp=p.html.replace('{device}',dev);
      h+=`<div class="pi ${a}" onclick="selP('${f.id}','${p.id}')"><span>📄 ${p.name}</span><span class="ob" onclick="event.stopPropagation();window.open('${hp}','_blank')">打开原型</span></div>`;
    }
  }
  h+='<div class="gt">📐 设计与配置</div>';
  const extras=[['design/DESIGN.md','🎨 设计规范'],['config/report-prompt-cpep.md','📊 C-PEP报告'],['config/report-prompt-pep3.md','📊 PEP-3报告'],['config/report-prompt-vbmapp.md','📊 VB-MAPP报告'],['config/iep-prompt-cpep.md','📋 C-PEP IEP'],['config/iep-prompt-pep3.md','📋 PEP-3 IEP'],['config/iep-prompt-vbmapp.md','📋 VB-MAPP IEP'],['config/iep-prompt-common.md','📋 IEP通用规则']];
  for(const[p,n]of extras){const a=actT===p?'act':'';h+=`<div class="pi ${a}" onclick="openDoc('${p}','${n}')"><span>${n}</span></div>`;}
  el.innerHTML=h;
}

function openF(fid){curF=C.features.find(f=>f.id===fid);renderLeft();if(curF.pages.length)selP(curF.id,curF.pages[0].id);}
function selP(fid,pid){curF=C.features.find(f=>f.id===fid);const p=curF.pages.find(x=>x.id===pid);if(!p)return;
  document.getElementById('bc').innerHTML=`${curF.name} / <b>${p.name}</b>`;openDoc(p.doc,p.name);}
function setDev(d){dev=d;document.getElementById('bP').classList.toggle('on',d==='pad');document.getElementById('bM').classList.toggle('on',d==='mobile');renderLeft();}

// Tabs
function openDoc(path,name){
  editing=false;
  if(!openT.find(t=>t.path===path))openT.push({path,name:name||path.split('/').pop()});
  actT=path;renderTabs();renderDoc(path);renderLeft();
}
function renderTabs(){
  let h='';for(const t of openT){const a=t.path===actT?'act':'';
    h+=`<div class="tab ${a}" onclick="openDoc('${t.path}','${t.name}')">${t.name}<span class="x" onclick="event.stopPropagation();closeTab('${t.path}')">&times;</span></div>`;}
  document.getElementById('tabs').innerHTML=h;
}
function closeTab(p){openT=openT.filter(t=>t.path!==p);if(actT===p)actT=openT.length?openT[openT.length-1].path:null;
  renderTabs();if(actT)renderDoc(actT);else{document.getElementById('dc').innerHTML='<div class="empty"><div class="ei">📄</div><p>点击左侧页面查看文档</p></div>';document.getElementById('toolbar').style.display='none';}renderLeft();}

// Render doc
function renderDoc(path){
  const raw=D[path];const el=document.getElementById('dc');const tb=document.getElementById('toolbar');
  tb.style.display='flex';document.getElementById('tPath').textContent=path;
  document.getElementById('btnEdit').style.display='';document.getElementById('btnSave').style.display='none';
  document.getElementById('savedMsg').style.display='none';editing=false;
  if(!raw&&raw!==''){el.innerHTML=`<div class="empty"><div class="ei">📝</div><p>文档尚未创建<br><code>${path}</code></p></div>`;return;}
  el.innerHTML=`<div class="md">${md(raw)}</div>`;editContent=raw;
}

// Edit toggle
function toggleEdit(){
  const el=document.getElementById('dc');
  if(!editing){
    editing=true;
    document.getElementById('btnEdit').textContent='👁 预览';
    document.getElementById('btnSave').style.display='';
    el.innerHTML=`<textarea id="editor">${esc(editContent)}</textarea>`;
    document.getElementById('editor').focus();
    // Sync on input
    document.getElementById('editor').addEventListener('input',e=>{editContent=e.target.value;});
  }else{
    editing=false;
    document.getElementById('btnEdit').textContent='✏️ 编辑';
    document.getElementById('btnSave').style.display='none';
    D[actT]=editContent; // update in-memory
    el.innerHTML=`<div class="md">${md(editContent)}</div>`;
  }
}

// Save
async function saveDoc(){
  if(!actT)return;
  D[actT]=editContent;
  // Try File System Access API (Chrome/Edge)
  if(window.showSaveFilePicker){
    try{
      let handle=fileHandles[actT];
      if(!handle){
        handle=await window.showSaveFilePicker({suggestedName:actT.split('/').pop(),types:[{description:'Markdown',accept:{'text/markdown':['.md']}}]});
        fileHandles[actT]=handle;
      }
      const w=await handle.createWritable();
      await w.write(editContent);await w.close();
      showSaved();return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  // Fallback: download
  const blob=new Blob([editContent],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=actT.split('/').pop();a.click();URL.revokeObjectURL(a.href);
  showSaved();
}
function showSaved(){const el=document.getElementById('savedMsg');el.style.display='';setTimeout(()=>el.style.display='none',2000);}

// Markdown
function md(s){
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>'<pre><code>'+esc(c.trim())+'</code></pre>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/^---$/gm,'<hr>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // Tables
  s=s.replace(/(\|.+\|[\r\n]+\|[-| :]+\|[\r\n]+((\|.+\|[\r\n]*)+))/g,m=>{
    const rows=m.trim().split('\n').filter(r=>r.trim());if(rows.length<2)return m;
    const hc=rows[0].split('|').filter(c=>c.trim());
    let t='<table><thead><tr>'+hc.map(c=>'<th>'+c.trim()+'</th>').join('')+'</tr></thead><tbody>';
    for(let i=2;i<rows.length;i++){const cells=rows[i].split('|').filter(c=>c.trim());t+='<tr>'+cells.map(c=>'<td>'+c.trim()+'</td>').join('')+'</tr>';}
    return t+'</tbody></table>';});
  s=s.replace(/^- (.+)$/gm,'<li>$1</li>');
  s=s.replace(/((?:<li>.*<\/li>\n?)+)/g,m=>'<ul>'+m+'</ul>');
  s=s.replace(/\n\n/g,'</p><p>');s='<p>'+s+'</p>';
  s=s.replace(/<p>\s*(<h[1-4]|<pre|<table|<ul|<blockquote|<hr)/g,'$1');
  s=s.replace(/(<\/h[1-4]>|<\/pre>|<\/table>|<\/ul>|<\/blockquote>|<hr>)\s*<\/p>/g,'$1');
  return s;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Divider
(function(){const d=document.getElementById('dv'),l=document.getElementById('lp'),r=document.getElementById('rp');let drag=false;
d.addEventListener('mousedown',e=>{drag=true;d.classList.add('drag');document.body.style.cursor='col-resize';document.body.style.userSelect='none';e.preventDefault();});
document.addEventListener('mousemove',e=>{if(!drag)return;const rect=document.getElementById('main').getBoundingClientRect();const pct=Math.max(15,Math.min(85,((e.clientX-rect.left)/rect.width)*100));l.style.width=pct+'%';r.style.width=(100-pct)+'%';});
document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;d.classList.remove('drag');document.body.style.cursor='';document.body.style.userSelect='';});
})();

// Init
renderLeft();
</script>
